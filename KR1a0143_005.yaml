body:
  text: 周易玩辭集解卷五翰林院編修查慎行撰下經程傳曰天地萬物之本夫婦人倫之始所以上經首乾坤下經首咸繼以恆也胡雲峯曰上經首乾坤天地定位也下經首咸山澤通氣也位欲其分故乾坤分為二卦氣欲其合故山澤合為一卦愚按六子正配前後序卦相連艮兌為少震巽為長隂陽或偏在上或偏在下惟坎離得乾坤之中氣所以先坎離而繼之以咸恆仍終之以既濟未濟一部易經始終只是八卦而已艮下兌上咸亨利貞取女吉取去聲先儒謂夫婦一小天地故咸為取女之卦說文咸皆也彖傳以感釋咸義惟皆感乃為咸也卦體艮下兌上六爻皆得應感之正故曰亨利貞用以取女自無不吉禮云男下女女從男夫婦之義由此始也三月廟見然後執婦功方取之時尚未成婦故不稱婦而稱女至恆卦長男長女爻辭直言婦人夫子矣彖曰咸感也柔上而剛下二氣感應以相與止而說男下女是以亨利貞取女吉也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣說音義與悅同咸彼此相感之義有感而無應不可謂咸相感必以心故咸加心而為感感中便含應字意剛柔以質言感應以氣言舊注剛柔平對愚竊謂宜以剛感柔應為義上卦本乾六自三往居上而為兌故曰柔上下卦本坤九自上來居下而為艮故曰剛下二氣者山也澤也全卦內外無不應故總而言之曰二氣感應坤以三與上乾以上與三故曰相與止而說卦德也男下女卦體也艮止則男之感也専兌說則女之應也順所以亨所以利貞所以取女吉天地之感物以氣乾道成男坤道成女萬物之化生天地交感之應也聖人之感人以心和者無乖戾平者無偏頗天下之和平即聖人感人之應也寂然不動者性感而遂通者情凡感之為道不能感非其類觀其所感者由感通之情引而伸之可以盡天地萬物之情也愚按家人彖傳曰男女正天地之大義也故聖人于卦爻往往取象馬上經乾坤之後繼以屯蒙屯有婚媾之文而以女子貞為美蒙有納婦之吉而以見金夫為凶于小畜則咎其反目于泰則許其歸妹于大過則厪老婦士夫之醜于咸恆則少男少女必感應以正長男長女必從一而終又以家人正內外以睽合異同以漸定女歸之期以姤致女壯之戒無非立其制而嚴其防蓋剛柔濟則隂陽和天道人道悉備于易道中矣象曰山上有澤咸君子以虛受人程明道曰天地間只冇一箇感應而已愚按彖傳言感言應大象則言受自我感人則人應我受人之感則我應人爻取自我感人象取我受人感為義人知咸之為感不知其妙在能受山以虛故能受澤心以虛故能受人虛者人所得于天之本體中無私主無主故虛苟以私意實之則先入者為主感應之機窒矣聶雙江云夫子于咸卦提出虛寂二字以立感應之本而以至神贊之蓋本卦之止而悅以發其藴二氏得之而絶念吾儒得之以通感愚按君子之虛只是全得此心本體任事物之來而我未嘗有將迎之念是之謂以虛受非致虛守寂之謂也陸象山有云與有意見人說話最難入以其不虛也可移作注腳吾學與二氏毫釐千里之辨在此初六咸其拇子夏傳作􅡑象曰咸其拇志在外也本義拇足大指咸以人身取象感于最下咸拇之象欲進而未能故不言吉凶愚竊謂初在下足不動拇豈能行因與四應四當心位故象申之曰志在外外者外卦也志在外卦心雖感而跡未應緣是止體但以拇之道為感而已莊子所謂神行官止者歟一說初在止體之下宜靜不宜動今一念初起即逐乎外跟腳不定如拇欲動之象不言凶咎者聖人不欲以一念之始概其生平也胡庭芳曰文王于兩體重在三上二爻以男女之正取昏姻之象周公于六爻又自人身取象以四當心位為感之主絶無彖辭之意卦爻不同如此愚按夫子于彖傳大象極言感應之理與爻辭又不同六二咸其腓凶居吉象曰雖凶居吉順不害也說文腓脛腨本義足肚也欲行則先自動二當其處躁妄而不能固守者也愚按六二柔順中正爻何以言凶既凶矣何復云居吉小象加一雖字其義瞭然謂動雖凶而居則吉居則雖凶而不害以其順也凶與害相尋居與順相因能止其所則身安而腓不動可以易凶為吉矣柔順乃六二之本體故以此利導之胡雲峯曰咸與艮皆取身為象咸六二即艮六二艮其腓不言吉凶咸其腓則曰凶者躁動故也居吉即艮其腓之謂在咸下體則凶如艮本體則吉九三咸其股執其隨往吝象曰咸其股亦不處也志在隨人所執下也本義股隨足而動不能自専者也執者主當持守之意下二爻皆欲動三不能自守而隨之故取其象愚竊謂九三以剛居剛本非詭隨之性因下與二比見二之咸其腓以為道在隨人從風而靡與世俯仰執其隨而不變殊不知往則致吝也內卦艮體艮卦以三為主爻故于二言腓即言隨二隨三而止也咸卦于二言腓于三言隨三隨二而動也小象亦不處正承二而言處字即二爻居字之義二在三之下而取法乎下志主于隨二而不為先自謂處矣而不知亦不處也處與隨相反股雖止而志則隨豈能自守乎內三爻艮體皆不宜動而三之志在隨人流于汚下曰亦不處曰所執下惜之也亦鄙之也九四貞吉悔亡憧憧往來朋從爾思象曰貞吉悔亡未感害也憧憧往來未光大也胡雲峯曰爻言貞吉悔亡者凡四卦皆先占後象巽九五咸大壯未濟皆九四九居四本非貞而有悔故戒以必正則吉而悔可亡也愚竊謂貞悔皆從感上說貞則吉而悔亡感不以正則有悔可知咸以四為主爻凡五爻之所感者皆四為之四者心位也在上下之間有往來之象此心忽而在拇忽而在腓與股忽而在脢與輔頰舌憧憧往來形容一片忙迫之狀人之一身自拇至舌皆聽命于心故曰朋從爾思不言心言思者病其心失官而以思為主也四才剛位柔又入悅體故其象如此象曰未感害非謂無感則無害謂不貞而感則有害貞則無害其為感也未光大者言其憧憧往來但從感人上做工夫逐物之學也心體豈能光明正大九五咸其脢無悔象曰咸其脢志末也脢亦作脄据經傳考之凡有兩解內則搗珍取牛羊麋鹿麕之肉必脄鄭康成注脄與脢同脊側月子夏易傳在脊曰脢馬融云脢背也許氏說文亦同潘子醇曰咸其脢謂不見也程傳脢與心相背背其私心本義脢背月在心上而相背不能感物以上俱作背解王輔嗣古注云脢在心之上口之下陸德明釋文脢今謂之三思臺動而迫飲食以咽有他思則噎與頰舌最為近比脢不能言假口頰以宣之則脢似在咽㗋間非背也王伯厚曰艮言止可取諸背咸言感所取皆動物由拇而腓而股而心而㗋之脢口之輔頰舌自下而上皆運用之物五獨取背似非倫類凡人將行未行則拇自振搖將言未言則㗋中宛轉拇者動腓股之漸脢者鼓頰舌之先又一解也黃氏日抄以為當以諸家與古注相參而義備今依後說按五與上比已發于心而未形于言慎其所感則不至于滕口說五之所以無悔也本義云志末謂不能感物愚竊謂五亦非無感者大過本末弱末字指上六正與此同謂五與上志相感其義較明上六咸其輔頰舌象曰咸其輔頰舌滕口說也本義輔頰舌皆所以言者而在身之上上六感人以言而無其實故象如此愚按輔在口中其骨彊或謂之牙車頰腮也舌動則輔應而頰隨之三者相須為用上居說終兌之口也爻辭不云口而云輔頰舌其惡佞也深故取類也遍多言之人招尤取憎不問可知故不言吉凶夫以言感人其感已淺然如蘇張輩全無實心専以口舌為事指陳利害亦能傾動一時所謂滕口說者也說文滕張口逞辭貌張元岵曰人之相感無過言行二端下卦拇腓股行之象也以靜為善上卦脢輔頰舌言之象也以寡為吉四居中心以虛而靈故不言心心虛則拇腓等節節皆靈心不虛則拇腓等節節皆妄若徒在形骸上周旋自頂至踵無一而可周公取象立言之㫖也愚竊按爻之吉凶皆係于止與不止其就人身取象各因其位之當不當不必論應不應蓋拇與心腓與脢股與輔皆不相應者也咸恆二卦剛柔上下二體極分明咸少男在少女之下男光乎女而昏姻之道成恆長男在長女之上夫尊婦卑而居室之倫正据反對卦看則恆下卦之巽上而為咸之兌恆上卦之震下而為咸之艮此咸之柔上剛下也咸下卦之艮上而為恆之震咸上卦之兌下而為恆之巽此恆之剛上柔下也京氏傳謂咸自否來以否上之剛下居于三三之柔往居于上為柔上剛下恆自泰來以泰下之剛往居于四四上之柔來居于初為剛上柔下本義則謂咸自旅來柔上居上剛下居五恆自豐來剛上居四柔下居初說各不同今按兩卦彖傳但言上下並無往來字樣似不必作卦變說只据反對看可也巽下震上恆亨無咎利貞利有攸往程傳恆常久也恆而不亨非可恆之道所謂可恆之道又非守一隅而不知變也徐進齊曰恆有二義有不變之恆有不已之恆利貞不變之恆也利有攸往不已之恆也愚按卦彖先言亨而後言無咎者六爻雖內外相應而初二四五皆不得位三過剛上過柔皆失中道故必亨然後無咎又必利貞然後利往所謂變而不失其常也天地間可常之道妙處全在乎變一動一散至變者莫如雷風而卦名取此蓋物未有窮而不變者待其窮而後變則有變之迹非所為恆矣利有攸往者及其未窮而變則終始相受循環無端彖傳所謂終則有始也象數論曰迅雷疾風天道有時而變聖人謂此雷風相與之常耳知雷風之為恆則知往來古今不離俄頃而恆之道得矣彖曰恆久也剛上而柔下雷風相與巽而動剛柔皆應恆恆亨無咎利貞久于其道也天地之道恆久而不已也利有攸往終則有始也日月得天而能久照四時變化而能久成聖人久于其道而天下化成觀其所恆而天地萬物之情可見矣本卦與咸反對剛上柔下解見前卦愚按大傳云雷風相薄此云雷風相與薄者兩相激射之義與者互相助成之義巽而動承雷風相與來剛柔皆應承剛上柔下來剛上柔下其分正雷風相與其氣通巽而動其事順剛柔皆應其情交此卦之所以為恆也亨者以此無咎者以此利貞者亦以此久于其道即上四者之道聖人恐人不知道之所在故曰天地之道恆久不已明道配天地所以能久也不曰始終而曰終則有始者以卦體觀之巽下震上隂陽之始也隂自巽生至坤而終矣一陽生于下而為震陽自震生至乾而終矣一隂生于下而為巽以咸恆反對觀之陽終于艮而震始之隂終于兌而巽始之所謂天地之道恆久不已者如此本義以終屬久于其道以始屬利有攸往似不若以久道統終始免得分配也以下六句又承終則有始說到所以成其為恆處日月以一日言四時以一嵗言天行一日一周而日月因之以久照故曰得天天氣一嵗四變而四時因之以成嵗故曰久成聖人之久道與日月同其久照四時同其久成故曰化成咸云化生屬天地此云化成屬聖人天地生之而聖人成之也天地萬物不外此恆久之道道不可見而雷風之相與飛潛動植之相應即是其情豈不昭昭在目乎愚又按彖傳言終始者凡四卦除純乾外蠱少男少女恆長男長女歸妹長男少女皆有夫婦之義焉所謂人之終始也象曰雷風恆君子以立不易方邱行可曰巽入也而在內震出也而在外二物各居其位則謂之恆立不易方方乃理之不可易者吳臨川曰雷之起每嵗各有方風之起八節各有方周而復始常然不易愚謂方字與艮大象思不出位位字義同惟道所在初無定位隨時隨地皆有不易之方王陽明曰君子體雷風恆之象雖酬酢萬變妙用無方而其所立必有卓然不可易之體得其解矣初六浚恆貞凶無攸利象曰浚恆之凶始求深也愚按初為長女之主四為長男之主夫婦也初以隂居陽巽性務入浚恆之象浚者深也取浚井之義與四木正應故曰貞貞則何以凶而無攸利蓋初之病正坐以貞自負天下固有理本正而行不通者無攸利與利有攸往相反乃其凶處象申之曰始求深凡浚井者必由淺而入深求之于初失在太驟俗所云一杴思掘井正是此義先儒謂凡未信而諫若賈誼京房劉蕡皆交淺言深者也愚又謂人情物理由淺而深則其深為可久不獨夫婦君臣也朋友亦然陳餘謂張耳曰不意君之望臣深兩人凶終正以此求者責望之私始求更有欲速之病拖之倫類無一而可者也九二悔亡象曰九二悔亡能久中也程沙隨曰大壯九二解初六及本爻皆不著所以然蓋以爻明之也舊注謂久于中故悔亡愚竊謂既久中矣焉得有悔周公因二以陽居隂失位故宜有悔未嘗明言悔亡之由夫子推原其義曰能久中以見六爻惟九二獨具此恆德非剛中者不能能字有工夫有力量諸爻皆不能中不能久可知久而不中者初四上也不久不中者九三也執中無權者六五也九三不恆其德或承之羞貞吝象曰不恆其德無所容也本義過剛不中志在從上不能久于所故有此象愚竊謂三以剛居剛非無德而不貞者但當巽之終而近乎震巽為躁卦以剛躁處上下之交雷動風從豈能久于其所故為不恆其德之象不言凶言羞者以凶懼之不若以羞動之或者不知其所自來分明是自家惶愧之狀周氏光德曰無德而不恆不足責也惟不恆其德則人將以其晚節誅其生平故雖貞亦凶程敬承曰羞者內愧己外愧人無所逃于天地之間故曰無所容黃正憲曰無所容者公是公非在人十目十手在獨二語尤明快一說三與上應上體震動不恆其德者也三以當位之剛自下應之意在爭救上既振恆安能容受故羞辱及其所承此陳之泄冶唐高宗時之禇遂良也若九三自不恆其德何以云貞而吝乎又是一解愚又按論語引此爻辭古注云無恆之人易所不占是從卜筮作解竊謂夫子此言是就巫醫一流而說非謂易之爻辭多因筮占立象也九四田無禽象曰久非其位安得禽也來矣鮮曰震為火塗田象下卦巽為雞禽象四已離巽位無禽之象師六五所應者九二之剛實故有禽本爻所應乃隂虛之初六亦無禽之象愚按三好事而無成四以剛居柔是必欲終所事者于田志在得禽亦恆情也但已入震體震位本在初今居四則處非其位非所據而據焉妄意久當有獲豈知守株待兔安得禽乎夫子惜其以有用之心用之無用之地故作喚醒之辭六五恆其德貞婦人吉夫子凶象曰婦人貞吉從一而終也夫子制義從婦凶也程敬承曰陽主通變夫道也隂主安貞婦道也本義謂以柔中應剛中常久不易乃婦人之道非夫子所宜今以爻辭合小象看二與五正應二悔亡而五恆德皆久于中而貞者但二以下應上猶婦人從夫乃是正道五居君位猶夫為家督有制義之權者也義之與比惟變所適若亦守從一而終之義是夫從婦道矣故此凶而彼吉李之翰曰恆以當為體以變為用偏于變通是不恆其德偏于執守則為婦人之恆愚又按卦體長男長女當以初四兩爻為夫婦而于五言之漸之夫婦則不言于二五而于三四兩爻言之各就卦之內外以明卦之大義而不盡拘爻位皆變例也上六振恆凶象曰振恆在上大無功也本義振者動之速也震終則過動居上非其所安愚竊謂居上之道安靜所以養恆久之福今在震體之上以隂居隂宜靜而動振作不已終身馳騖則以振動為恆凶可知矣夫雷之鼓動萬物暫而不測也振其可恆用乎上之意在好事喜功聖人探其意而折之不但曰無功而且曰大無功上不利于國下不利于民王介甫之新法是也陸庸成曰貞者咸恆二卦之權輿也貞于感以無心而為咸貞于恆以立心而為恆然咸之所貴者虛也諸爻各執一以為感則不虛矣恆之所貴者方也諸爻皆隨地以為恆則非方矣故二卦之象皆有完義而二卦之爻皆無全德艮下乾上遁亨小利貞卦以四陽在上得名離卦傳云遁則退也非以避為退乃善藏其用不露圭角之義程子謂寧武子能沉晦以免難是已二隂在下正道未至全滅君子以為尚有亨道焉小利貞亦遁中之事程傳云隂之始長君子知微故當深戒而聖人之意未遽已故有小利貞之教未嘗分君子小人也本義則云君子能遁則身退而道亨小人則利于守正愚竊謂小利貞即本卦九三象辭不可大事之意遁與大壯反對大壯彖曰利貞此加一小字以見君子當此時大權既不在我務在勤小物矜細行舉動皆合于正使小人無所伺吾隙而已胡仲虎曰卦以四陽得名名卦必以陽為主胡雲峯亦云聖人于隂卦主陽為君子謀也小字似不當作小人解小人方用事時豈能遁又豈肯遁哉京氏辟卦遁為六月之卦彖曰遁亨遁而亨也剛當位而應與時行也小利貞浸而長也遁之時義大矣哉遁而亨者身雖遁而道則亨也剛指九五中正故曰當位應謂六二剛當位而應與時行也先儒多謂當其方應而即行是遁之機㑹愚竊謂聖人之于天下雖知道之將廢豈忍坐視其亂而不救靜看機㑹與時偕行與遁跡長往一流固當有别二隂雖有向長之勢未便驟長必且以漸如水之浸物未便濕透猶冀維持挽回所謂小利貞者扶持使未遂成否之世界也君子之出處所關在世運人心豈其潔身獨善决去惟恐不速哉時義之大非贊詞乃嘆詞也時從外遇義自中裁蘇紫溪曰遁豈聖人好為隱逸惟時而已知時者安故嘉則貞肥則利好遁則吉固志則莫能勝失時者窮故尾則厲係則疾聖人欲人之與時偕行若是其切有得于時則離羣而往固遁也即同世而居而心無所欲亦遁也無得于時則因時俯仰固非遁也即離世獨立亦非遁也故曰遁之時義大矣哉象曰天下有山遁君子以逺小人不惡而嚴愚按天下有山相去遼絶只是占得地步高天不自以為高自山仰之而見其高天無絶山之情山自無援天之路君子體此象以天道自處曷嘗峻拒小人逺之云者正使小人日在前而對面相遁欲近我而不得也不惡者待彼之禮嚴者自守之堅逺小人艮止象不惡而嚴乾剛象初六遁尾厲勿用有攸往象曰遁尾之厲不往何災也易之取象例以上為首下為尾本義遁而在後尾之象危之道也不可以有所往先儒謂初二兩隂爻皆小人也今從之隂方長則陽當遁遁者陽而尾之者則隂也四陽將遁初尾其後或搜其過于謝事之餘或摘其短于身去之後皆尾象厲勿用有攸往則指陽而言君子尚非可遁之時往則犯災矣六二執之用黃牛之革莫之勝說音脫象曰執用黃牛固志也莫之勝說程傳說守從本音作不可勝言解本義以中順自守人莫能解說字作脫字解黃氏曰抄謂常從程胡雲峯曰五在上得中二以中順固結之有黃牛革之象莫之勝說喜二之從五者固也二承三故執之今依本義作脫二柔浸長蓋迫陽以必遁者然居艮體應五而比三不以勢相加而以術相籠絡固結遁者之志使不得去小象固志二字正解莫之勝說曰執未免有束縛之意曰黃牛之革則柔韌堅牢使君子欲脫而不能此小人作用之巧九三係遁有疾厲畜臣妾吉象曰係遁之厲有疾憊也畜臣妾吉不可大事也本義下比二隂當遁而有所係之象有疾而危之道也然以畜臣妄則吉蓋君子之于小人惟臣妾則不必其賢而可畜爾愚又謂三與上無應而下與隂同體中爻互巽為繩係之象二以私情相結三未免瞻顧不能决病在纒綿牽戀故有疾而厲夫子于疾字下又添憊字以形容困頓之狀蓋係之道用以畜臣妾則吉若士君子出處大事亦同于豢養私恩此處不知壞了人品甚言係之不可也一說九三一爻砥方進之二隂為成卦之主關係極大故曰係遁自三以上至否四則莫可挽回惟曰有命而已故遁三之畜臣妾當時未必見信逮畜之不得而至于剝臣妾以宫人寵矣是故三之係甚難而心甚危有三之係而後有四之好五之嘉有三之疾憊而後有上之肥如此看係字見解議論俱濶大别是一解九四好遁君子吉小人否象曰君子好遁小人否也好上聲好字本義作去聲謂有所好而能絶之愚竊謂當讀上聲四與初雖正應而上下異體相去稍逺與三所處之位不同不以應之故而有所係戀及彼此交好之時飄然逺引所謂好遁也然惟剛健之君子能之若小人則不然矣故曰君子吉小人否否者不然之謂非否卦之否也觀小象可知九五嘉遁貞吉象曰嘉遁貞吉以正志也程傳云遁非人主之事故不取君位五以剛中正應二柔中正故曰嘉是去得恰好時節自然貞吉胡雲峯曰非正應而相昵曰係以中正而相應曰嘉隨九五孚于嘉因六三之係而見也此之嘉遁亦因三之係而見愚按嘉者禮也始以禮進終以禮退小象于二曰固志于五曰正志二之欲固者即五之志五之所正者已之初志也由其居中得正故其象如此上九肥遁無不利象曰肥遁無不利無所疑也本義肥者寬裕自得之意愚按卦體二隂四陽三與二初同體四與初應五與二應故三言係而四言好五言嘉上無所應故言肥心廣體胖身之肥也又按肥古本作􅖦一作蜚史記封禪書乾稱蜚龍張平子賦欲蜚肥以保名則以肥為飛義今不取肥與疾憊相反三因係致疾上因遁而肥有係無係之别也既無所係遁復何疑三疑于所比四五疑于所應從來君子小人之隙皆生于疑我無所疑于心人無所疑于我鴻飛冥冥安往而不利乎大抵遁之時貴乎逺四陽以次漸上係不如好好不如嘉嘉不如肥愈逺于隂者愈善也愚又按卦名以陽避隂故先儒多以初二兩爻屬小人細玩六爻爻象多就君子看亦可初六位卑地下跡逺于要津其象為尾如柳下惠為士師梅子真為吳門市卒當危亂之世不犯難行亦無災害時可以遁而不必遁者也六二柔順中正與九五正應彼此交情方固黃牛之革與革初取象同彼當革時不可有為此當遁時不可得脫心欲遁而勢未能遁季札子臧是已九三過剛不中與二隂同體逡巡係戀至與臣妾一例見畜夫富貴利祿士君子之厲而臣妾之吉也此時當遁而勢不能遁大夫種是已內三爻艮體主乎止故其象如此九四以剛居柔與初正應相好而無相尤小人處此方為情愛所昵君子則以義在當去急流勇退其范少伯之于越李鄴侯之于唐乎九五陽剛中正下與二應恬退之志至此得遂及時而行進退以禮不降不辱其子房二疏之于漢乎上九身處逺外遁世無悶獨斷不疑在上古則巢許務成在後世則四皓魯二生其人乎外三爻乾體主乎行故其象如此張彥陵曰人情難退用黃牛以固志曰嘉曰肥欣然高易退之風人情好進危羝羊以朂貞曰羸曰艱凛然示難進之戒繫傳所以云大壯則止遁則退也此兩卦反對之義乾下震上大壯利貞壯從士不從土卦名加大字者惟大有五陽大畜大過大壯皆四陽蓋隂陽之勢至三而平分至四而極盛九四一爻為成卦之主乾陽自內上升而震動于外豈非大者之壯姤一隂始生即曰女壯陽動于復長于臨交于泰至四而大壯天下未有大而不正者聖人慮陽之過盛故戒以利貞以北宋事觀之慶歷之壯君子失之疏元祐之壯君子失之急只自恃其壯便非貞玩爻辭陽爻皆以居隂者為吉以陽居陽者為凶為厲其義自明按十二辟卦大壯為二月之卦而爾雅以八月為壯疏云八月得辛則為塞壯其義在所未詳疑事無質俟再考彖曰大壯大者壯也剛以動故壯大壯利貞大者正也正大而天地之情可見矣愚按本義陽長過中過中二字便帶憂危之意大壯其可恃乎天地間柔者不能壯惟剛故壯然剛而不動亦無以見其壯惟剛以動故壯大者壯以勢言也初二三四陽爻皆言壯五上二隂不言壯大者正以理言也正大二字承上大者正說來不平看惟正所以成其大復見天地之心陽氣初動也大壯見天地之情陽氣發于上也天地未嘗無情只在正大處見得咸恆萃三卦皆見天地萬物之情大壯止言天地者萬物不能同天地之正大也象曰雷在天上大壯君子以非禮弗履雜卦傳云大壯則止遁則退也雷在天上乃其發越時如何能止先儒謂當壯往之時當以能止為正君子以非禮弗履處壯之心猶之處遁之心也愚又謂此君子克己自勝之學非禮之私潛滋于隱微之中勇者無所用其力直須從起念處制縛得定銷鎔得淨方能不形于動履之間初九壯于趾征凶有孚象曰壯于趾其孚窮也凡爻之言趾者多在初爻先儒謂大壯第五爻變則為夬故兩卦取象同壯趾在初鋭于始進征則必凶以其陽剛居正故有孚愚按諸卦凡言有孚者多無凶象既凶矣何以又云有孚蓋初以剛居剛與上無應専以盛氣加人而無真誠之意故爻辭教之有孚欲其積誠以動上也小象不論其征不征凶不凶只是壯于趾雖有孚而亦窮如漢之黨人宋之太學諸生身居卑下挾其壯往之氣欲上除君側小人客主之勢相去甚懸適足自取祻敗是因孚以致凶者也故曰其孚窮匹夫匹婦之諒聖人不取也九二貞吉象曰九二貞吉以中也九二中而不正爻辭謂之貞吉者吕伯恭云直指大壯之體愚按初壯趾三羸角九二上不在角下不在趾居下卦之中故小象歸本于中可見壯非猛厲之氣只在剛柔得中而已以剛居柔而又得中且與五正應即此便是貞吉本義謂所處得中猶可因以不失其正戒占者使因中以求正然後可以得吉也夫子之言明白了當似不必多生回護轉折九三小人用壯君子用罔貞厲羝羊觸藩羸其角象曰小人用壯君子罔也愚按大壯與遁反對遁之九四即大壯之九三故兩爻並舉小人君子小人用壯君子用罔與遁四君子吉小人否語氣相似而意相反石介云壯惟小人用之君子則否極合爻辭之㫖趙汝梅曰孔子慮後世疑爻辭兩用字小人與君子皆有所用故去其一云君子罔按釋文以無訓罔與此正合君子罔言君子則無之也若依舊注視有如無為君子過于勇之象則君子亦鹵莽人耳與用壯者何異乎三以剛居剛正而不中故以貞厲為戒羝羊二句又是貞厲之象羝壯羊也屬陽中爻自三至五互兌三四兩爻皆有羊象震在上為竹為萑葦藩象觸藩用壯之象兌為毁折羸角之象九三居乾體之上與上六應羊即九三藩指上六三為壯羊其氣盛上為純隂其謀深聖人慮三之恃壯而輕敵也故戒之曰小人則用壯君子則不用若用壯則雖貞亦厲為羝羊觸藩羸角之象矣夫羊之好觸恃其角耳觸藩而羸總見壯之不可輕用三四兩爻先言貞厲貞吉後言觸藩决藩亦爻辭變例也錢國瑞曰遁而係二柔則憊大壯而觸二柔則羸剛大而以柔小為觸非正大之動而傾危之動矣楊誠齊曰羊喜于鬭而狃于勝喜于鬬故技止于一觸之勇狃于勝故怒及于無心之藩張元岵曰藩無心而能係角易往而難返士君子當為神龍不當為羝羊當蕩除城府不當自樹藩籬自壞頭角九四貞吉悔亡藩决不羸壯于大輿之輹象曰藩决不羸尚往也愚按四入動體為羣陽領袖成卦之主在此爻以剛居柔與九二同故爻詞亦許其貞吉從容以進必無失錯故悔可亡藩决不羸承上文而言三前為四所阻猶有藩焉四前二隂則藩决矣角不羸矣不但此也抑且壯于大輿之輹乃衆陽合力之象輿之行也以輹輹壯則車強隂為陽之藩陽者車之輹藩决則彼壅既通輹壯則我進有力小象所以云尚往三陽在下至四然後尚往蓋合乾健震動而為往則前此之未宜往明矣六五喪羊于易無悔象曰喪羊于易位不當也程傳羊象羣陽並進六五以和易待之使無所用其剛是喪羊于易也本義依王注謂羣陽自失其壯愚竊按五與四比兩爻合看羊當指四今從程傳詳釋之大有六五以柔乘剛象曰易而無備本爻亦乘剛喪羊于易即易而無備之義九四率諸陽動而前進五欲與爭勝其勢甚難惟坦然平易用柔中之道接之五不設藩羊將誰觸壯者至此自失其壯而羊喪矣以柔居剛位雖不當而無悔柔能御剛也蓋此爻變則為夬夬之羊指上牽之者九五也大壯之羊指四喪之者六五也聖人于陽爻論用剛制柔之道于隂爻論用柔御剛之道如此楊誠齊曰六五當衆陽強盛時能使之帖然自喪者以柔順和易之德調伏之也故無悔黃氏日抄据小象言位不當則居羣陽並進之衝為其所决似矣若能以柔勝剛宜曰位當豈得言位不當耶與旅卦喪牛于易義同兼存其說以備考上六羝羊觸藩不能退不能遂無攸利艱則吉象曰不能退不能遂不詳也艱則吉咎不長也本義壯終動極故觸藩而不能退其質本柔又不能遂其進愚按上居震末與三正應羝羊九三也上與五同是隂爻不能如五之御四乃設藩以受三之觸不退不遂正是九三觸藩之象自三言之不應觸上之藩自上言之不應羸三之角未有羊羸角而藩不壞者彼此兩敗俱傷之象故曰無攸利艱則吉艱字與前爻易字相反兩隂爻一為其易一處其難上之不詳其猶有易心乎惟反其易者而為艱則吉而咎不長詳者熟思審處之義凡人處事以為易則不詳以為艱則詳矣不詳是壯時之病艱是處壯之藥陸庸成曰大者壯也故四陽有壯五上無壯大者正也故四陽有貞五上無貞初不言貞壯之纍也二兼言吉貞之全也錢國瑞曰遁之上三爻皆以遁為亨惟三可畜二柔為臣妾以一體合止之故大壯之下三爻皆以貞為利惟四可以輹二柔為大輿以一體合動之故可見主君之權在我乃所以成其時行運轉之機在我乃所以成其剛動坤下離上晉康侯用錫馬蕃庶晝日三接晉取進為義卦體離上坤下下柔順而上文明以世道言乃可進之時也豫言侯以震晉言侯以坤坤臣道也康侯侯之能安民者即考工記所謂寧侯坤為牝馬為衆錫馬蕃庶之象離為日而在上君德也晝日之象三隂在下三接之象本義多受大接而顯被親禮是已愚又竊謂卦辭蓋古覲禮也錫馬蕃庶諸侯以禮覲天子之事晝日三接天子以禮接諸侯之事按覲禮庭實惟國所有奉束帛匹馬卓上九馬隨之以素的一馬以為上書其國名馬必十匹用成數敬也又尚書康王之誥太保畢公率諸侯入應門皆布乘黃朱奉圭兼幣此朝覲用馬之證曰用錫者如九江納錫大龜禹錫元圭皆以下奉上之義再按覲禮侯氏坐取圭升致命成拜乃出覲畢又升致命成拜降出亨畢王勞之擯者咸升成拜降出升拜者凡三周禮掌客上公三享三食三燕大行人公之禮三享三問三勞左傳晉文公朝王出入三覲皆晝日三接之證六五之君以文明出治而三隂以順德承之明良一心安靜以養和平之福故為朝覲燕享君臣晉接之卦彖曰晉進也明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也火在天上其明最盛故名大有明出地上其明方新故云大明順而麗乎大明總言內外卦德柔進而上行本義作卦變看謂自觀來六四之柔上行至五愚竊按易述曰柔指坤之六三出地上而親附離日也似當從此解今据其說詳發之柔字兼坤三爻進而上行則専指六三一爻初二視三為進退三進則諸柔並進矣彖傳言柔上行者凡四噬嗑暌鼎皆言得中故上行指六五本卦但言上行而不言得中是離明在上為君而六三為上行之侯三坤主與上正應小象于三云志上行猶云志在上也似不必說卦變卦變之說本于虞翻蜀才謂四五兩爻互換是已然同在外卦何得云上來矣鮮謂明夷下卦之雜進而為晉上卦之離內外同是離體亦非卦變之例象曰明出地上晉君子以自昭明德卦體坤下離上大象但取離明之義置坤不言胡庭芳云只取卦之重者不必盡論兩體也愚按雜卦云晉晝也本卦與明夷反對明入地中則為夜晉乃初出之日明夷曰用晦則晉用明可知君子觀明出地上之象知吾德本明吾自昭之即明明德之謂而用明之道具是矣吾德既明然後能知人書曰能哲而惠何憂乎歡兜何遷乎有苗何畏乎巧言令色孔壬詩曰爾德不明以無陪無卿故明主能用小人暗主不能辨君子潘雪松曰易大象惟乾與晉以自言之自強不息我用我之強自昭明德我用我之明愚又謂君子以明德為體到得光被四表格于上下總是自昭之極功初六晉如摧如貞吉罔孚裕無咎象曰晉如摧如獨行正也裕無咎未受命也本義以隂居下應不中正有欲進見摧之象愚竊謂當晉之時陽剛者往往欲速躁進初最下以柔居剛摧者斂抑之義雖與竊位之四相應嫌其不中不正不肯因之以進而深自斂抑兩如字是摹寫其難進之狀即此便是貞便是吉罔孚以下本義云不為人所信當處以寬裕則無咎愚又謂罔孚有吾斯未信之意初不急求人知進退綽然有餘乃所以成其貞也何咎之有象申之曰獨行正以見位雖不正獨能行正而不隨人步趨似非欲進而見摧于人不為人所信之義未受命嘉其未因四之應而受命于公家也若受命則為鼫鼠輩之私人矣張元岾曰人有志于功名而比匪枉道如柳子厚劉禹錫之徒一蹶不收亦急功名之殷鑒而初幸無是也合觀爻象辭其義昭然六二晉如愁如貞吉受兹介福于其王母象曰受兹介福以中正也本義謂二上無應援故欲晉而愁愚按初三四上皆剛柔相應二獨與五無應雖居臣位介然自立不以為喜而以為憂有愁如之象即此便是貞便是吉然柔順中正終必受知于五蓋我能自守其貞君之寵任方承受得起六五柔得尊位故稱王母介福即錫馬晝接之屬初曰未受此曰受其得位可知司馬君實蘇子瞻之遇宣仁太后倣佛此爻張忠定謂冦萊公用太早仕太速蒼生無福可見仕進之際迂回遲重非徒身名俱泰君民亦將共食此福也小象推言受福之由曰以中正錫福自王受福自我豈幸獲哉合兩爻論之初不肯躁進者也二不喜驟進者也六三衆允悔亡象曰衆允之志上行也先儒多謂三不中不正宜其有悔以其與下二隂皆欲上進為衆所信而悔亡愚竊謂三居下卦之上處順之極近比于四將母謂鼫鼠之黨以其形跡可疑故有悔然而衆允之者此非以形迹論也獲上信友全憑此志與上正應志在上行人皆信其無私衆有何疑已復有何悔初之罔孚衆未允也二之受福猶有待也三則可以進而上行受三接之寵矣彖傳曰柔進而上行象曰志上行二句正相應晉與升皆柔德用事之卦升初曰允升象曰上合志晉三曰衆允象曰志上行義類正相似升以初為主爻晉當以三為主爻九四晉如鼫鼠貞厲象曰鼫鼠貞厲位不當也先儒謂當柔進之時四獨以剛進故于貞為厲愚竊謂自二至四中爻互艮為鼠自三至五中爻互坎為隱伏四處大明之下坤晦之上晝伏夜動皆鼠象陽大隂小故曰鼫鼠許氏說文鼫五技鼠本義不中不正以竊髙位貪而畏人故有此象愚又竊謂卦義取晝日鼠夜動而晝伏非若康侯之晝接者當晉之時人人有向明之望所尚者柔德九四以剛居柔近與五比竊據高位以阻諸賢之進離下而上首鼠兩端卦中之小人也雖貞亦厲况位不當者乎按鼫與碩同詩碩鼠所以刺貪也胡雲峯曰解以隂居陽象狐晉以陽居隂象鼠狐性疑當去其疑鼠性貪當去其貪朱康流曰此與豫九四皆下據三隂上承柔主于豫之六三曰位不當九四曰志大行于晉之六三曰志上行九四曰位不當象同而義則相反何也豫之三隂四得而有之故以得衆為四功此之三隂四不得而有之又豈得而阻之不得而有之故以上行為三美不得而阻之故以阻衆為四責六五悔亡失得勿恤往吉無不利象曰失得勿恤往有慶也先儒多以六五隂居陽位宜有悔愚竊謂諸卦之主德尚剛惟晉之主德尚柔賢人並進寬仁足以有容內卦三隂與五同德皆有順五之意而為九四所阻五之左右四貪而上亢宜有悔矣而悔亡者以其柔居尊位離為明主人才本五所當得因四之蔽賢而失之然不足以為憂也恃知人之明往而求賢則吉無不利象申之曰有慶人主之慶莫大乎得賢六五一爻主賢才之進者也楊誠齊曰晉之主如日之出地此朝日也天下已服其明矣若使初出之朝日遽如方中之烈日天下其不旱熯矣乎惟柔故明而不察蓋日之為明朝則升中則傾君之為明柔則容剛則窮六五晉之盛明之主也宜其福之盛也孰謂柔而不立哉胡雲峯曰彖惟升言勿恤豐言勿憂爻則泰九三家人九五萃初六皆言勿恤事有不必憂者勿恤寬之之詞也有不當憂者勿恤戒之之詞也上九晉其角維用伐邑厲吉無咎貞吝象曰維用伐邑道未光也蘇紫溪曰上九失其柔順之道不能渾然不露圭角故有晉角之象黃氏日抄凡伐邑皆釋為自治朱子謂伐邑皆是用之于小按世無稱兵自伐其邑之理釋為自治恐未安古者侯國之大夫有采邑或有不順者則伐之故為伐邑鄰國相侵則為伐國古有此事故有此語合從朱說愚又按上爻言角者惟晉與姤姤之角所以柅方孚之羸豕晉之角所以伐已進之鼫鼠離為甲胄戈兵伐之象九四乃城狐社鼠邑之象君側之惡難除故厲伐所當伐故雖危亦吉而無咎然不用明于前使四不得進逮既進而後伐之故雖貞亦吝重離上九火逾上則照愈逺王用出征何等光明正大此處晉之終餘光無幾不足以照天下僅可用以去私人非出征正邦之比故曰道未光趙汝梅曰卦以柔進得名故柔爻多吉初極下二猶在地皆欲進而未能三始出地上率衆柔俱進晉之為晉六三當之五為接柔之主四以剛居下上以剛居外嚴毅如角不得不伐以正之此六爻之情也離下坤上明夷利艱貞雜卦傳云明夷誅也本義訓誅為傷以世道言明入地中時方幽暗君子無不受傷者論卦德則內明外順又為君子不受傷之象合六爻觀之自初至五皆用晦之臣傷之者上也利艱貞者利在艱難以守其貞君子之處患難總離不得個正道艱字內有多少委曲多少痛苦難以告人處先儒或以明夷為日食之卦似于傷之義有合可備一解彖曰明入地中明夷內文明而外柔順以蒙大難文王以之利艱貞晦其明也內難而能正其志箕子以之本卦與晉反對一出一入明晦分焉全卦是事暗君之象周公爻辭只于第五爻說箕子自夫子觀之謂當文王與紂之時故先言文王後言箕子內文明而外柔順乃統言卦德非謂文王因此以蒙大難謂文王所以䝉難而不受傷者內文明而外柔順也明即是貞晦明處即是艱內明外順即是晦其明晦明而明在內即是志之正何謂志忠君愛國之心也邱行可曰文王得全卦之義故以卦德歸之箕子得一爻之義故以爻辭歸之張幼子曰大難關天下之難內難家離也此文王與箕子不同處本義以文王配卦名以利艱貞専指箕子愚竊按文王箕子所處之地雖不同其為艱貞一也釋經者試移彖傳利艱貞晦其明也二句直接明入地中明夷之下而以文王箕子證明艱貞之義詮釋便自了然此說出張氏困學記象曰明入地中明夷君子以蒞衆用晦而明吕伯恭曰用晦者君子養明之道不有虞淵之入焉有暘谷之明愚竊謂王者御宇自治則用明蒞衆則用晦故昭明而明全晦明而明全冕旒以蔽目黈纊以塞耳初不以察察為明而極其用至于明四目逹四聰惟其藏明于晦故能用晦而明蒞衆以離照坤也用晦以坤養離也初九明夷于飛垂其翼君子于行三日不食有攸往主人有言象曰君子于行義不食也王注初處卦始最逺于難絶跡匿形不由軌路故曰于飛懷懼而行行不敢顯故曰垂翼志急于行饑不遑食故曰三日不食殊類過甚以斯適人人必疑之故曰主人有言蘇氏易傳曰飛而垂其翼所以示不飛之形方其未去也垂其翼何其緩及其去也三日不食何其亟楊敬仲曰三日不食義當速也君子未嘗著已意于其間苟彰彰然著其引去之迹是為有攸往人將有言矣愚又竊謂中爻互坎有飛鳥之象義在當行寧不食而不可以不去寧有言而不可以不往總見君子决去之義穆生去楚申公白公非之但譏其責小禮而不知穆生之去避胥靡之禍也馮元敏曰辭豐而就約則愚者悟未傷而先遁則愚者疑宜其有言也聖人特為說破欲君子不以人言介意小象専釋不食一句而以義斷之其㫖深矣愚又按易于君子去就之義皆在初爻賁初之義弗乘明夷之初不當食而不食亦義也卦皆下離决去就之義于早非明者不能黃氏日抄云有以垂翼不食皆為傷困之極與義不食之意不合矣六二明夷夷于左股用拯句馬壯吉象曰六二之吉順以則也本義傷而未切救之速則免矣愚按二居卦中當用事之地與垂翼者不同夷股則支體已受傷矣中爻互震坎皆有馬象拯傷非力弱者所能必馬壯而後吉吉者何免禍而已此爻似文王出羑里之象西伯乃紂股肱之臣夷在右傷尚未切閎夭之徒用文馬九駟以獻紂乃得釋非用拯馬壯乎六二柔順中正故小象申之曰順以則順而不以則特苟且幸免耳大雅稱文王曰順帝之則此之謂也順以則單釋吉字但說卦傳巽為股而此為離象殊不解所可知者二四兩爻皆以隂居隂故一言左股一言左腹豐九三以陽居陽則曰右股易道左隂而右陽也九三明夷于南狩得其大首不可疾貞象曰南狩之志乃大得也本義謂以剛居剛在明體之上而屈于至暗之下正與上六暗主為應有向明除害得其首惡之象成湯起夏臺文王興羑里正合爻義後儒或以此爻屬武王愚竊謂此文王伐崇之事也離為火南方之卦又為兵戈狩之象助紂為惡者崇侯為首故云大首史記文王得専征伐三年然後伐崇崇不降退而修教因壘而降非得其大首不可疾乎貞即艱貞之義象曰南狩之志言其志在去害安民大得者大得民心也當三分有二之時猶服事殷文王豈以南狩為快心之舉乎六四入于左腹獲明夷之心于出門庭象曰入于左腹獲心意也程傳以此爻為奸邪得君之深愚按爻象皆無貶詞正合微子去商適周之象下三爻離與坤異體異姓之臣也故曰翼曰股四與上同坤體同姓之親也故曰腹曰心坤為腹離為大腹自離而入于坤也本義謂腹者幽隱之處獲明夷之心于出門庭者得意于逺去之義胡雲峯曰坤偶有門象出門庭猶可去而出于坤也獲明夷之心微子自靖出門庭微子行遁也愚竊謂微子紂之兄也在門庭之內似無可去之理故不曰行而曰出尚書所謂遜荒也蓋微子知紂之必亡而密謀于箕子比干箕子勸其行遁以存商祀而微子之意始决故曰獲心意也義在尚書微子篇遜荒之心何等艱苦似非得意逺去之義六五箕子之明夷利貞象曰箕子之貞明不可息也朱子云爻辭箕子蜀本作其字俞氏云不敢顯稱微其詞也孔子于彖傳顯稱之後遂于爻辭作箕子胡雲峯曰處明夷之時為微子比干易為箕子難微子已去不可復去比干已死不必再死此殷有三仁而爻獨以箕子言之愚按彖言利艱貞爻不言艱者箕子之內難其艱自不必言既值箕子地位當為箕子之貞故曰箕子之明夷利貞象言明不可息謂其委曲以冀君心之悔悟即在萬難艱苦中耿耿一念未嘗間斷使箕子之明不晦則身不可保其明遂至滅息矣夫子特深贊之不復申艱貞之戒上六不明晦初登于天後入于地象曰初登于天照四國也後入于地失則也本義以坤隂居不明之極始則處高位以傷人之明終必致自傷而殞厥命先儒多以此爻為紂亡國之象愚按晦而明者外晦而內明不明晦者似明而實晦紂之知足拒諌言足飾非自以為明晦莫甚焉故曰不明晦登天在位之象入地失國之象失則二字與六二順則相應順則所以為文王失則所以為紂黃氏日抄云明夷之極是日入于地故曰不明晦日之初登于天後乃入于地一失其中則尚如此人宜何如自畏矣釋經意特含蓄愚按他卦以五為君位惟明夷以上爻為君總而言之君者元首也賢才羽翼也羣臣股肱也大臣腹心也羽翼去股肱傷心腹離元首可知矣雖在暗世猶有君臣之義此六爻之情也析而觀之伯夷避紂有于飛象在下故垂其翼于行不食讓孤竹而逃非不食周粟也羑里之囚股肱之蒙難者雖小有傷而終得脫夷肱用拯之象文王既免難得専征伐南狩之象微子乃腹心之臣出門庭者抱祭器而歸周也箕子與暗君最近不為微子之去則將為比干之死不得已而託于佯狂尤用晦之極難者故獨以卦辭歸之紂初居天位後至覆亡非登天入地之象乎周公特不忍斥言故合反對兩卦而以晦明出入結之獨不及比干者明夷之世貴艱貞以自全也離下巽上家人利女貞爾雅室內謂之家愚按一家之中通男女而言謂之家人卦彖獨言女者巽長女一隂在下而順今居上卦之下離中女一隂在中而明今居下卦之中巽四離二皆得爻之正位執柔道以順三五之陽剛故曰女貞長女上而中女下亦二女同居之象不為睽革為家人者以其貞也九五陽剛中正而居外卦主當屬此爻貞雖在女女之貞男之利也故曰利女貞彖曰家人女正位乎內男正位乎外男女正天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣雜卦傳云家人內也蓋天下以國為內國以家為內家以女為內本義所謂欲先正乎內周子所云家人之睽多起于婦人故彖傳先言女後言男愚按本卦與睽反對在睽卦九居二而六居五內外之位皆不正此則六居二故曰女正位乎內九居五故曰男正位乎外內外二字有不相侵越之意論成卦之象則取乎女論正家之道則重在男剛柔之分明倡隨之理得上天下地之象不過如此故曰男女正天地之大義也男女只就卦畫說不論卦體一家之人不外父子兄弟夫婦故下文詳及之一說本卦隂爻皆居隂位故曰女正位陽爻皆居陽位故曰男正位不論應與以隂陽相比為夫婦二為內卦之主三居二上則為離女之夫四為外卦之主五居四上則為巽女之夫于義亦可通但脫却初上兩爻耳嚴君本義云亦謂二五胡雲峯曰在男女則九五六二皆正在父母則九二之剛可謂之嚴六二之柔未必能嚴故夫子發彖辭言外之意龔汝修曰治國如家稱父母焉治家如國稱嚴君焉趙汝梅曰父義母慈何以並稱嚴蓋母之不嚴家之蠧也瀆上下之分庇子弟之過父雖嚴有不能盡察者必父母俱嚴然後內外各盡其道也愚按嚴非疾聲遽色之謂正即所以為嚴舍正以為嚴則嗃嗃矣上九之不用威而如有威嚴君之義正家之道也本義上父初子五三夫四二婦五兄三弟以卦畫推之又有此象胡雲峯曰齊家以正倫為本上父初子則父子之倫正矣五夫四婦三夫二婦五兄三弟夫婦之上下分而夫婦正兄弟之上下分而兄弟正矣特父子之上下相去甚逺故其分嚴卦以女正為利故夫子發言外之意謂男女皆當正也愚又按一家之人以父母為綱領家道之正不正視父母之嚴不嚴正家而天下定不是說效驗謂化從近始也正天下易正家難正婦女尤難然則如之何曰正女以男正男以身正身以言行象曰風自火出家人君子以言有物而行有恆行去聲注疏巽在離外風從火出火出之初因風方熾火既炎盛還復生風內外相成有似家人之義愚按風自火出即中庸知風之自之義君子觀此象而知風化之本自家出家之本自身出近裏著已只在言行不苟父子兄弟足法耳有物者言之不虛有恆者行之不變初九間有家悔亡象曰間有家志未變也胡庭芳曰能間于初僅可免悔初之不間悔將若何愚按周禮虎賁氏王舍則守王間注梐枑也說文間䦨也門遮也多取分别內外之義初以剛居剛則得正離體則具先見之明防間在初自無後來之悔象申之曰志朱變以見一門之內尊卑大小未免人各異心當于有家之初及其志未變立法預防不至踰間蕩檢乃得悔亡顔氏家訓云教婦初來教子嬰孩是已六二無攸遂在中饋貞吉象曰六二之吉順以巽也本義柔順中正女之正位乎內者愚按自二至四中爻互坎中饋象周禮注進食于尊者曰饋在者不出其位也遂者自行其意也即公羊傳大夫無遂事之義古者君婦之職與于賓祭采蘋之詩曰誰其尸之有齊季女斯干之詩曰無非無儀惟酒食是議舍中饋而外婦無遂事矣是謂之貞吉順以巽先儒多以為事夫之道愚又按家人有父子則有婦姑兩隂爻二在下婦也四在上姑也四入巽體曰順在位二之順以巽婦承姑德也小象兩順字相應九三家人嗃嗃悔厲吉婦子嘻嘻終吝象曰家人嗃嗃未失也婦子嘻嘻失家節也本義以剛居剛而不中過乎剛者也故有嗃嗃嚴厲之象嘻嘻者嗃嗃之反愚按嗃嗃劉向傳作熇熇說文嗃嚴酷貌嘻說文作歖色喜也或者見其過嚴悔而且厲因矯之以寬嗃嗃之象變而為嘻嘻嗃嗃者其初必以嚴為苦嘻嘻者其初必以寬為樂要其終一吉而一吝可以得正家之道矣小象一則曰未失一則曰失節以見恩威皆當酌劑過嚴過寬皆非也然與其過于寬而失家節毋寧過于嚴者猶為未失也上下兩層倒換說其義更明節者品節也立于初則為間劑于中則為節三居內外之介防其過也若知和而和不以禮節之便是失家節六四富家大吉象曰富家大吉順在位也本義陽主義隂主利以隂居隂而在上位能富其家者也愚按四入巽體為近利市三倍富家之象陽實隂虛凡爻之言當者小畜九五陽也言不富者泰六四無妄六二皆隂也家人六四何以取富象謂其承乘皆陽以虛受實也富家與家當不同家富者享有成業富家者精于治生隂性吝嗇若専主聚斂易賈怨招尤富而大吉必有道致此矣既是巽體又以柔居柔故象曰順在位順則能協內外之情在位則各安耕織之業記有之父子篤兄弟睦夫婦和家之肥也富家之義當如此方獻夫曰父主教化母主貨財儀型表率父道也收藏樽節母道也故五曰假家四曰富家九五王假有家勿恤吉假音格下同象曰王假有家交相愛也假本義作至字解謂王者以是至于其家則勿用憂恤而吉可必矣愚竊謂此彖傳所云正位乎外者五居君位合天下為一家者也假與格古字通用有感格之義刑于寡妻至于兄弟以御于家邦使人人親其親長其長而天下平方且與民同樂何有于憂中爻自二互四為坎有憂恤象此爻出坎外故勿恤而吉交相愛本義謂夫愛其內助婦愛其刑家只就一家說愚又竊謂王者之愛民如一家天下羣愛戴之如父母不以分相接而以交相聨父子欲其如君臣此家有嚴君之義君臣欲其如父子此王假有家之義也楊敬仲以假為大義又是一解上九有孚威如終吉象曰威如之吉反身之謂也愚按上居家老之位為一門所信服敬畏者故曰有孚威如有孚者篤恩義也所以聨屬一家之心威如者正倫理也所以振作一家之氣家道至上而成故曰終吉前五爻是家法未及身教故小象歸本于反身所謂身修而後家齊也本義九以剛居上故言正家久逺之道張彥陵曰三曰終吝上曰終吉計及于所終而後知治家者不可苟安于目前唐凝菴曰家之本在身家人之觀望最切毫不可欺反身而觀其所以間家者皆實有諸已為舉家所信故曰有孚鄭孩如曰威從孚來孚從反身來初之有事于間三之不免于悔未孚故也曰厲則有之相愛則未也嚴于已曰嚴人嚴之曰威威與厲不同五之交相愛者交相孚也不間而間威在其中矣上九之終吉以五之道終之也兌下離上睽小事吉本義睽乖異也邱行可曰小事吉柔為卦主也程沙隨曰水火相逮山澤通氣而火澤無相用之理故相遇則革不相遇則睽愚竊謂睽之卦義本非美名故全卦取合睽為義亦猶蠱卦取治蠱也中女少女上下皆柔合睽之主又柔故僅可小事吉悅纍之也其始易悅者其繼必睽賴二五三上相應且得不睽為吉耳烏能濟大事哉說文睽目不相視字從目目主見故爻辭多取見象彖曰睽火動而上澤動而下二女同居其志不同行說而麗乎明柔進而上行得中而應乎剛是以小事吉天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣哉趙汝梅曰火澤之睽因乎動二女之睽見于行愚按火動而上澤動而下物性本然之睽也中女配坎少女配艮人情必然之睽也夫人情或交相好或交相惡恩怨皆可為用惟同居而異志外若不相礙中實不相謀者乃真正乖離之象二女志不同行只同居之日便然不待女子有行方為睽也吳因之曰睽之一卦聖人非言睽乃善言合也愚竊從彖爻統論之動而相睽者卦體也睽而必合者卦德也兌悅之麗離明是合睽也柔進而上行是合睽也得中而應乎剛是合睽也睽而不合天地萬物幾乎息矣所以卦彖言小事吉而夫子特贊其時用之大天高地下其象則睽而化育之事同男外女內其位則睽而交感之志通萬物散殊其羣則睽而聲氣之求其事相類兩者之合原于兩者之睽處睽之時合睽之用推之六爻無一凶象初與四合曰見曰遇二與五合曰遇曰往三與上合亦曰見曰遇皆因睽而得合者也本卦與家人反對家人下卦之六二來為睽上卦之六五故曰柔進而上行得五之中而下應九二故曰得中而應乎剛卦體昭然只是反對之象亦不必作卦變本義以卦變言雜引離中孚家人三卦其說與隨蠱略同愚于前卦辨之詳矣象曰上火下澤睽君子以同而異離兌二隂同分坤體而炎上潤下其性異趨先儒謂君子以同而異于同之中審其異也愚按大象不曰以異而同而曰以同而異大凡處睽貴乎合然必得其所以為同者而後可合如以異為異終于睽而已楊誠齊曰禹顔同道而異趨夷惠同聖而異行未足為同之異也孔子于齊魯之去異遲速孟子于今昔之饋異辭受此同而異也乃一人自為火澤矣君子何必好同而惡異哉張待軒曰同一君臣父子而忠孝異同一飲食男女而貪亷異所謂堯舜與人同而堯舜與人異也初九悔亡喪馬勿逐自復見惡人無咎象曰見惡人以辟咎也本義謂上無正應故有悔而居睽之時同德相應故悔亡又云見惡人可以辟咎如孔子之于陽貨愚竊謂初九以剛德居兌體剛則動而正兌則悅而和與四敵應而不立異所以悔亡中爻互坎馬象即指四在外卦喪馬象惡人亦指四喪馬而勿逐去者不追也待其自復而見之來者不拒也此初之善于馭四處惡人非小人之謂乃與我不相好者人情于我不相好者謂之交惡往往拒絶而不見所以終睽一見則睽情釋矣初泯同異之迹忘四之為惡人四遂以初為元夫卒成交孚之好辟咎者辟九四之見咎也初能辟咎四因而無咎不以避為避而以見為避合異為同之妙用如此此聖人合初四之睽也先儒多看惡人為小人把九四太說壞了與合睽之義有礙若是真正小人君子豈肯與之合異為同哉張幼于曰彖傳言睽物性之定分六爻言睽物我之相嫌愚又按內卦三爻在下則睽上行則合外卦三爻在上則睽下行則合九二遇主于巷無咎象曰遇主于巷未失道也本義二五正應居睽之時乖戾不合必委曲相求而得㑹遇乃為無咎愚竊按爻象辭未嘗有乖戾不合之象二與五正應故曰主但二以剛居柔五以柔居剛皆失正位故為遇主于巷之象初四三上皆睽中之睽惟二五為睽中之合巷者委曲之途與坎四納約自牖同當睽之時彼此皆失正位必委曲相求乃可無咎也小象恐人疑其詭遇故申之曰未失道言跡雖涉于委曲而彼此相應仍不詭于正道此聖人合二五之睽也六三見輿曵其牛掣其人天且劓無初有終象曰見輿曵位不當也無初有終遇剛也黃氏日抄云六三居二陽之間與上九應故古注與晦菴皆以見輿曵為二牽于後以其牛掣為四阻于前以人天且劓為上九猜狠而重加之刑惟程傳并歸九四而不及上之正應愚竊按六三爻象俱從上九疑字生出因疑而生見其象如此皆妄見也三與上本正應而下與二比上為四所乘爻柔位剛不中不正所居乃疑地故來正應之疑中爻互坎輿象曵象互離牛象其人即六三孔疏剠額為天程傳云髠首也本義以為去須之刑劓割去鼻也總是面目可憎之狀爻辭大意言車前有牛六三在車中為二陽所制曵其輿掣其牛者二與四也見之者上九也上初疑三與二四兩陽合故生種種妄見所謂無初也幸而上是離體識見高明久之則三之心跡明終與上合所以有終小象言位不當推原妄見之由以兌非三之正位也言遇剛發明有終之義以三與上本正應也張彥陵曰大凡剛的人性最躁急稍見形迹可疑便不惜情面然實無他腸心迹一明渙然氷釋此聖人合三上之睽也九四睽孤遇元夫交孚厲無咎象曰交孚無咎志行也說統曰初四之德敵而致孤初四之位應而有遇合看兩爻曰睽單論一爻曰孤遇字與睽字相對愚又謂四處二隂之間隂偶而陽竒孤象卦體四陽分居內外初二不云睽孤者兌為悅體不立異也四交離體未免好用聰明其勢孤矣元夫指初四與初本不相應初以四為惡人四則以初為元夫者居二隂之間勢孤而獨立不可以無輔遇同德之初九與之交孚則雖厲而無咎厲者危其心以固其交也象申之以志行可見中少之志不同而未嘗不通于男女交孚無咎則睽者合孤者有朋矣六五悔亡厥宗噬膚往何咎象曰厥宗噬膚往有慶也本義以隂居陽悔也居中得應故能亡之愚又按五為卦主與二本正應所謂柔進而上行得中而應乎剛者也柔中則為文明之主應剛則非偏係之私此而有悔以九四一剛間之也四既與初交孚則無復有間之者亦如噬嗑之去間矣故悔亡初與五並言悔亡初之悔以無應五之悔以有應初之悔以人之同德而亡五之悔以己之得中而亡二以五為主尊之也五以二為宗親之也二方委曲求遇得五之往其合如噬膚之易何咎之有勸五往從二也爻止云何咎象許以有慶者求賢而得賢君臣相合人情可以大同非來章之慶譽乎凡爻上行者謂之往此則以下行為往澤動而在下也上九睽孤見豕負塗載鬼一車先張之弧後說之弧匪冦婚媾往遇雨則吉象曰遇雨之吉羣疑亡也說與脫音義同本義以剛處明極睽極之地又猜狠而乖離也愚按上九之睽孤與九四同而義不同四即指本爻上則指六三兩爻當合看三居二陽之間自上視之為孤象中爻互坎豕象坎為弓輪離為戈兵皆弧象上以剛居離上過察過疑者也三本其正應而妄見橫生始則訛以為冦乘車服牛者猶是人也疑之不已復生變相忽而見豕負塗則人變為畜矣忽而載鬼一車人又變為鬼矣先張之弧以為有鬼而欲射之也後脫之弧則并鬼車而無之然後妄見消而羣疑頓釋不但匪冦也且婚媾也逮往而與三相遇見三之真面目從前之睽合矣故曰吉下卦兌澤往而相遇則隂陽和雨之象也聖人從既遇之後摹寫未遇之前窮形極相以解人心之蔽見上與三之始睽終合如此全虧夫子道破一個疑字兩爻竒竒怪怪之象劃然以解朱子有云孔子不說象如見豕等類說羣疑亡便見得上面許多皆是狐惑可疑之事而已困學記曰曰羣疑不特謂上與三并四與初二與五之疑皆亡一疑則無所不疑一亡則無所不亡一睽則無所不睽一合則無所不合故諸爻止云無咎上獨言吉薛畏齊曰理本無疑心疑則萬境參差心和則物我一體睽乃人自為之三有終柔遇剛也上遇雨剛遇柔也唐凝菴曰凡睽皆起于隂遇皆先于陽初四兩剛則孤于失位而得于得位故二五三上僅稱相遇而兩陽遂至交孚三上失位而難合二五得中而易合大抵易之道貴陽貴中也夫睽違之世雖得其主猶未遽應雖遇其配猶未遽合况非其主與配乎錢國端曰家人中有坎其爻位正初得之而為間如水有防盡成上下交流之愛睽中有坎其爻位不正上非化之而為雨如雲蔽日盡成上下間隔之疑家人之離必起于婦人睽之合必上有明主家上而無反身之令儀無以必之于子婦睽初而棄同德之惡人何能得之于友朋此二卦互發之義艮下坎上蹇利西南不利東北利見大人貞吉本義蹇難也足不能進行之難也愚按說文蹇跛也字從足是艱于步履之義卦體艮下坎上本以險得名所重却在內卦見險不是蹇見險而止方是蹇八卦方位坎居北艮居東北論卦體只有東北無西南西南乃坤位也九五一爻變而成坎濟險仍用坤道故曰利西南此在東北而思西南之利總言天下之大勢猶云地利云爾卦無坤而言坤之利者蓋艮其所以蹇也坤則蹇之所由濟也蘇氏易傳曰坎艮合體為蹇則難在東北矣西南其無難之地乎利西南從不利東北對看此不利則彼便利矣此解較諸家之說最為明快困學記曰聖人作易因人情而歸大道當蹇之時人思避難有東西南北之意當决擇其利不利而從事則可以出險而成功故于此指其所之而避其所忌曰西南則利東北則不利所以者何也艮為山險阻之地也坤為地平易之鄉也其說亦從蘇氏得來若依本義主變卦則本卦只是坎艮小過亦是震艮中間初無坤體于卦辭似難合矣大人指九五以剛中正應二柔中正所謂利見而貞吉也彖曰蹇難也險在前也見險而能止知去聲矣哉蹇利西南往得中也不利東北其道窮也利見大人往有功也當位貞吉以正邦也蹇之時用大矣哉鄭孩如曰以文王卦圖觀之順序而往由艮而震而巽而離以至于坤則險在後惟艮轉身遇坎故險在前能上而往西南則可以出險故贊其知愚又按本卦上下互易為蒙同一止象蒙險在內而止乎外蹇止于內而險在前彼曰蒙而此稱知以其見險而能止也能字重看能止者九三也中爻互離又有知止之道焉知止者方能止也卦名取止義彖傳乃取往為義能止者方能往也故曰往得中中者九五也陽剛中正居濟險之位所以利西南其道窮指九三三為艮主止而不往則常陷險下出險之道至此而窮所以不利東北惟往則有功而可以出險所以利見九五之大人諸爻除初位餘皆得當正位所以貞吉三當艮位五當坎位皆剛而得正故可以正邦此蹇之時用所以大也程氏紀曰見險而止為知而六爻皆言往蹇見其但可來不可往也然卦復言利西南利見大人又若必有所往者何也蓋往而有險不可往也往而得中往而有功豈不可往耶愚又謂蹇之時全視乎用須從貞吉中來貞所以善其往即所以善其用往得中有功正邦正其用之大處愚按本卦與解反對往得中謂解下卦之坎往而為蹇上卦之坎而剛得中不必言卦變也本義因傳有往字故謂卦自小過來陽進則往居五而得中但四五兩爻同在外卦何以云往即欲以卦變言不如云自明夷來初往居五又不如云自升來二往居五亦皆得中者也又按六爻言往即言來彖傳但云往來者往之對往來之義與行止同蹇者不良于行非不行也天下疾行者不必皆通徐行者未必終窒故蹇以往為有功象曰山上有水蹇君子以反身修德朱子答或人問有云山上有水則猶可進步但曲折艱難故教以反身修德愚竊謂卦體水上山下乃山阻水之下流而不能通行似非山上之水卦之名以艮遇坎故蹇反身者背坎便遇震漸向西南即出險之路反身猶云轉身也大象所云反即爻辭所云來俱從出險得義天下惟知自反者乃能自修即孟子所謂反知反禮反仁行有不得反求諸己也反身取艮上之背修德取坎中之心皆以陽爻為主初六往蹇來譽象曰往蹇來譽宜待也本義往遇險來得譽愚竊据此詳釋之初去險雖逺往則遇險與四敵應本無所謂來特以不往為來耳有譽即彖傳所云知矣哉之語時當有待見險即止故以譽歸之小象宜字有斟酌盡善之意大凡處蹇難之際率情徑行多遭陷害要以靜俟為第一義彖傳論出險之道則貴往六爻論處蹇之道則貴來往與來跡似相反機實相成非謂往則必蹇而竟不往乃待時而往也六二王臣蹇蹇匪躬之故象曰王臣蹇蹇終無尤也本義柔順中正正應在上而在險中故蹇而又蹇以求濟非以其身之故也愚又按六爻惟二不言往來蓋外卦一坎諸爻所同而自二推之上應九五中爻又互坎體是以君之蹇為蹇者獨為蹇蹇之象王五也臣二也身處臣位王事敦我投艱任重此時著不得一㸃訃校之心所以不言往來二艮體有不獲其身之象鞠躬盡瘁莫非王事所謂匪躬之故也終無尤直指王臣之心所謂不以往來二其心也若依舊注嘉其志而恕其才事雖不濟亦無可尤則作旁觀評論解矣九三往蹇來反象曰往蹇來反內喜之也本義反就二隂得其所安竊据此解詳釋之往者為外反者為內三以剛居剛遇險而止為卦中主爻近與四比不往外從四而來就同體之二隂反而向內之象在三為反自初二視之則為來初二才柔在下未能出險得三之來而喜可知故曰內喜之也一說三以陽剛之才協二之忠連四應上致初諸朋以備五之蹇則可以反危為安矣蹇一反成解如此解反字亦好但與小象詞意不甚融洽六四往蹇來連象曰往蹇來連當位實也程傳謂與在下之衆相連合本義謂連于九三合力以濟愚按連即拔茅以彚之義三之才陽剛足以濟蹇而與五非比非應得四之來連乃可與下二爻共往輔五以成朋來之象鄒汝光曰連桓公管仲之交者鮑叔也連簡公子産之交者子皮也其六四之謂歟愚又按四以隂居隂曰當位隂虛陽實實字似當指九三四之連三虛能受實也一說九三以陽居陽位得其當而實有濟蹇之才正明所以宜連之故其義亦通九五大蹇朋來象曰大蹇朋來以中節也本義大蹇者非常之蹇也九五有剛健中正之德必有朋來而助之者愚又按蹇者人之所避曰大蹇則事關天下𢎞濟時艱非大有為之君誰能任之九五居中得正無所為往但當大蹇之世不可無朋來之功卦體內外五爻朋來之象初之宜待待三也三之來反就初二也二與五應就二所以就五四之來連上之來碩就三也三與五同德就三所以就五合衆君子之朋為一大朋不必言濟蹇而大蹇之濟可知矣所謂利見大人者此爻也又按此爻未變原是坤體五之朋來即坤之西南得朋小象中節中字不應作去聲讀五剛正得中文武張弛動合機宜能定天下之大難以中為節者也鄭剛中曰以中節者羣䇿畢舉非陽剛中正之大人誰能節之酌其才品謂之節取裁其機宜謂之節制上六往蹇來碩吉利見大人象曰往蹇來碩志在內也利見大人以從貴也上本無所往猶初六之來以不往為來此則以不來為往與三正應來碩似當指九三詩所稱碩人是也三有剛實之才與初同體與二四相比三來則衆隂皆來矣諸爻無占辭不言利見大人獨于上言之者時已出蹇之時矣小象志在內似亦當指九三就外卦言故曰內若依舊注來就九五則志在外卦不在內卦矣大人五也利見者上也隂陽相比故曰從貴玩以字可見項平甫曰志內所以尚賢從貴所以明分若以內貴二字並指九五則同此一爻似不必分作兩邊說坎下震上解利西南無所往其來復吉有攸往夙吉本義解難之散也難既解利于平易安靜不欲久為煩擾西南平易之地也卦辭大意如此按本卦與蹇反對解之西南即蹇之西南先儒或謂蹇有艮故利西南不利東北解則艮變震故但言利西南不復言東北愚又謂解與屯互易中爻亦有坤象西南坤位在蹇為利往之方在解則為休息之地坎在下無逆流之理故曰無所往與下有攸往相對黃氏日抄曰古注云無難可解則來復有難而往則以夙為吉蓋兩開其端也程傳乃云其始未暇有為既安定則為可久之治晦菴非之蓋或為或不為惟其當而已合從古注今按來復當指九二謂蹇之九五來居于二而陽復于下卦也難雖解或恐有意外之事故既曰無所往又曰有攸往攸往似指九四謂蹇之九三本艮止不動今往居四而為震也復則俟其來而吉往則利于夙而吉者謂無事則宜緩待有事又宜速往也總是發明利西南之義愚又按往來二字原從反對卦出似不必說卦變本義謂自升來三往居四入于坤體二居其所而又得中据朱子之說觀之三往居四互易者三四兩爻于二無涉二居其所固未嘗變也必欲作卦變看又不若謂解自萃來以二五互換于來得中之義似為明白餘詳升卦下彖曰解險以動動而免乎險解解利西南往得衆也其來復吉乃得中也有攸往夙吉往有功也天地解而雷雨作雷雨作而百果草木皆甲拆一作坼解之時大矣哉程傳坎險震動不險則非難不動則不能出難李隆山曰以畫觀之四隂二陽坎險在前為蹇四隂二陽坎險已通為解解者蹇之反也以卦觀之坎上震下為屯坎下震上為解解者屯之反也蹇止乎險下不若屯動乎險中屯動乎險中又不若解動乎險外愚按坎居下卦者凡七本卦與蹇反對解之坎險在內震動在外二居中而不動用四之動以免乎險此卦之所以立名也在蹇謂之得中在解謂之得衆古注以西南為衆程傳以西南為坤體今兼二解而㑹通之震上二爻皆坤土坤為衆得衆之象也二之得中與訟卦剛來而得中同蹇一陽往上解一陽來下皆以陽爻為主也往有功即上文往得衆之義但四已入震體為出險之主往則夙吉一切除奸去暴當如雷之迅發方可奏功也本義以得衆屬九四以得中有功皆指九二竊恐未安以上釋彖之義已盡下復推言解道之大天地之慘舒時也時未至不得不斂時至不得不解雨自天施雷自地發雷雨交作氣之解也百果草木甲拆形之解也甲拆二字不平勾萌為甲開展為拆直到甲拆時然後萬物皆相見甲拆總是一個震合乾之木果震之果蓏震巽之木而共成其為解解之時豈不大矣哉但言時而不言用者解之用己顯于時行物生之中矣趙汝梅曰離言百榖此言百果者四陽之月百穀皆未萌芽也張中溪曰剝之碩果不食藏天地生物之仁也解之百果草木皆甲拆發天地生物之仁也象曰雷雨作解君子以赦過宥罪程傳于赦宥二字分别輕重說張中溪曰雷者天之威雨者天之澤威中有澤刑獄中有赦宥也洪覺山曰赦者釋之也宥則寬之而已愚竊按雲雷屯雲之未成雨者雷雨作則既雨矣以草木驗之屯時根荄尚在地中解時勾萌已出地上乃造化與物更新之㑹勿論過罪概從開釋乃是君子體天地之仁而行春令時也周禮司刺掌赦宥之法必經三赦三宥然後置刑即尚書宥過無大罪疑惟輕之意初六無咎象曰剛柔之際義無咎也初隂柔居坎下何以云無咎因與四應四動而出險初無所為惟四是從事得其宜所以無咎小象推原無咎之義歸諸剛柔之際蓋人情當初解之時往往彼此不交今柔得剛之應而兩相交際于義斷之自當無咎也雖是剛柔相際要重柔得際乎剛一邊方合夫子語意一說剛謂二柔謂初與坎卦剛柔際之義同從近比言亦得九二田獲三狐得黃矢貞吉象曰九二貞吉得中道也程傳九二以陽剛得中上應六五用于時者也必須能去小人則可以正君心而行剛中之道先儒亦多以解為去小人之卦愚按荀九家坎為狐中爻互離離位居三三狐之象狐者妖媚之獸坎為戈兵矢之象田者力而取之也二剛而得中黃者中色矢者直物君子之象也上應六五操舉錯之權有獲狐得天之象近與三比三狐專指六三一爻負乘之小人也爻辭雖未說破君子小人而其象已具二之獲狐與四解拇上獲隼同為去小人之爻小人之變態多端以其媚惑則謂之狐以其卑賤則謂之拇以其隂鷙則謂之隼耳孔疏云凡物不獲則兩失獲則兩得矢所以射狐狐獲則黃矢亦反矣故貞吉愚按二以剛居柔本中而不正爻詞曰貞吉象不言貞而但云得中道可見君子之去小人亦不在太過只是虛中能照使其善惡自無遁形所謂無偏無黨王道蕩蕩是已本義于此爻取象既云未詳復云卦凡四隂除六五君位餘三爻即三狐則初上兩爻皆小人矣細玩爻詞似難盡合胡雲峯曰二欲其獲狐四欲其解拇上欲其射隼三則直指其為小人五則直欲其退小人一卦六爻而去小人者居其五得其義矣六三負且乘致冦至貞吝象曰負且乘亦可醜也自我致戎又誰咎也此卦中之小人也先儒謂蹇難之時君子小人雜進難既解矣過可赦罪可宥小人必不可不去負且乘非言其既負而且乘是言其當負而且乘為僭竊之象愚又謂六三以隂險之才踞坎之上在二陽之間上既負四下且乘二居之不疑為有識者所鄙雖貞亦吝况不正乎二四與上皆欲去三者賴五為解主卒能退小人脫不幸上無明君如熙豐紹聖之朝合衆賢之力攻王蔡而不能去寇其如負乘者何象詆之曰可醜說可醜便有致戎意誰咎上著一又字見得咎自己致于人何尤聖人之惡小人如此九四解而拇朋至斯孚象曰解而拇未當位也程朱皆以拇指初愚按王輔嗣曰四失位而比于三故三得附之為其拇李鼎祚亦曰四交震體震為足拇居足下猶三居震下奔走趨附之象今從之拇當指三而字當指四而拇者見三為四所親也故為告四之辭曰必解去汝之拇而後朋之至斯相孚信拇不解未有相信者也二與四同德故稱朋自初至五位皆不當小象獨于四指出未當位三字蓋以四為震主恐其有私昵六三之意故特深警之若以拇指初爻剛柔正應似非解去之義六五君子維有解吉有孚于小人象曰君子有解小人退也古注云以君子之道解難小人猶知服而無怨程朱皆謂君子之解以小人之退為驗愚按君子小人于六五發之五柔中與二正應又近與四比得二陽之力有進君子退小人之象此時狐已獲矣拇已解矣大度之君更不用他術惟有一意蕩滌與之氷消霧釋同遊赦過宥罪之天不獨君子朋至斯孚而吉抑且有孚于小人矣四五爻兩孚字相應蓋小人向來止知結黨結仇今見朝廷寬大若此彼將爽然自失不惟斂其跡而有以服其心然則小人之退非君子退之乃小人自退也一說維字作防維之義小人反噬之禍卒至不可解者皆由君子之不解者先之故必自解其維乃可以孚小人又一說君子維有解吉言解之吉者維用君子一事而已兼存以備考上六公用射隼于高墉之上獲之無不利象曰公用射隼以解悖也愚按射隼有兩解有以三言而上射之者有即以上言者今以上射六三為正解公上六也隼指六三與上敵應不相與三之所云致戎者上亦其一中爻自二至四互離為戈兵受射之象不是謂隼集高墉謂公在高墉之上俯而射隼有居高必獲之勢所以無不利三負隂險之才當險難既除時又將發天下之大難故小象斥之以悖悖者大逆之罪名也計其竊位擅權已非一日至此則悖逆之跡昭然難掩射而獲之乃可解悖繫傳所謂藏器于身待時而動何不利之有也不然一擊不勝小人之為害于君子可勝言哉漢之竇武何進唐之李訓鄭注可鑒也諸爻惟六三為小人之尤亦可醜也猶未見其為惡以解悖也其惡著矣以字重看有與衆共棄之義勿謂赦過宥罪與除逆去奸有二道也周易玩辭集解卷五
