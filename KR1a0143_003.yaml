body:
  text: 周易玩辭集解卷三翰林院編修查慎行撰離下乾上同人于野亨利涉大川利君子貞卦體二五兩爻皆以中正相應只看一人字便見大公无我之象同人不于國于家而于野非求諸寂寞无人之鄉也要見天空地濶了无障礙來往大通氣象在我既无籓籬于人自无冰炭同人之義孰大于是所以亨自二至四中爻互巽利涉大川之象張待軒曰與人同者物必歸焉然未問所同之人必先自問其人之何如若是奄然媚世一流縱使衆皆悦之一遇風波渙然而散如何涉得川行得通二五居中得正君子之交也故曰利君子貞彖曰同人柔得位得中而應乎乾曰同人同人曰同人于野亨利涉大川乾行也文明以健中正而應君子正也惟君子為能通天下之志同人曰三字本義云衍文愚按夫子舉文王卦彖之辭故著曰字三字似不當衍楊慈湖曰與人和同之道必以柔行之柔而不得位則无勢亦不能行既柔又得位而不得中則為不得道人心亦不服中者道之異名也愚按一隂為成卦之主本卦與大有反對大有六五以柔居剛今來而為二故云柔得位得中應乎乾指九五徒柔不能以同人必應乎乾而以天德行之乃可以利涉凡卦以柔為主者皆然履悦而應乎乾大有應乎天而時行與此義同文明以健統論内外卦德中正而應兼指二五兩爻明則識見高健則力量大中正則无偏陂植黨之私相應則无孤介自守之廦所謂君子正也天下人同此心心同此理吾得其正此理自然流通天下之志即在吾方寸中矣正處即是通處不是將正去通他中爻乾互巽乘木舟虚舟楫之利以濟不通涉川者通志之象也項平甫曰卦辭有利涉大川者八卦非乾則巽葢北方屬水乾行涉之海居東南巽木涉之需訟同人大畜四卦皆以乾行為象者也蠱益渙中孚四卦皆以巽木為象者也象曰天與火同人君子以類族辨物本義天在上而火炎上其性同也類族辨物所以審異而致同也愚按天與火合則以无所不覆之體兼无所不照之用物物皆在照臨中矣故曰同人天下物類豈必盡同夫子于不同之中㸔出大同之象同聲相應同氣相求類族也推而至于男女别姓官司分職剛柔殊性風俗異宜辨物也同者自同異者自異同之中有異異之中有同无一不在光天化日之下非至明至徤其孰能與于此蘇子瞻曰水與地為比天與火為同人比以无所不比為比同人以有所不同為同呉臨川曰天之所生各族殊分法乾覆之无私者于殊分之族而類聚其所同異中之同也火之所及萬物俱照法離明之有别而辨析其所異同中之異也初九同人于門无咎象曰出門同人又誰咎也門指六二兩戸為門隂畫偶有門象同人與隨之初九節之九二皆前遇偶故謂之門本爻九與四无應近與二比出門相遇无心于同而同所以无咎小象加一出字更覺心胷曠然三四與五爭二而不與二爭初親者不得議其黨疎者不得議其薄又誰得而咎之人情大抵于門内多私出門則无柴柵之隔當離之初未為私欲所蔽故其象如此六二同人于宗吝象曰同人于宗吝道也小象吝字當屬上讀道也二字自為句胡雲峯從互卦㸔謂二往同五復成離五來同二復成乾各反其本是之謂宗同人于宗似不失六二之正較之于野之同則亦係于私矣故吝愚謂宗指五當從舊説六二一隂乃上下五陽所同而不苟同于諸陽正應者惟九五所謂君之宗之也以交道言專有所主似近乎隘而有吝象合兩爻觀之二以柔中正應五剛中正見得明守得定三四兩陽不能勝我我卒能勝之五之大師相克非特剛克亦柔克也象中以道之一字道不苟同雖吝何傷哉諸家讀小象者向以吝道也為句竊從困學記還爻辭原文九三伏戎于莽升其高陵三嵗不興象曰伏戎于莽敵剛也三嵗不興安行也離為戈兵戎象中爻互巽木莽之象周公摹寫小人情狀窺伺慿陵一一在爻中發露剛而不中在五之下有伏象在二之上有升象伏戎于莽仰而俟五之隙升其高陵俯而覘二之動其意總在離二五之交然以三求二理既不正以三攻五勢又不順所以持久而不敢發又為三嵗不興之象夫子恐人誤以為攻二也故云敵剛安行猶云行將安往與九四弗克攻義同一為勢屈一為理屈也九四乘其墉弗克攻吉象曰乘其墉義弗克也其吉則困而反則也墉指九三離中虚外周象墉九三為六二之墉四亦欲得二而隔于三不中不正居内卦之上有乘墉象乘墉而攻似有可克之勢而曰弗克非勢不順義弗克也義者二五相與之義四之乘墉乃忌人之同而伺釁以離間之豈知二五相與之義同心斷金非間之所能入哉既弗克矣更有何吉小象申之曰其吉則困而反則也則即義也義弗克便是困困而知反不相攻擊便是義便是則便是吉六爻惟三四不言同人以攻取盡人情之變也九五同人先號咷而後笑大師克相遇象曰同人之先以中直也大師相遇言相克也五與二正應初為三四所隔結嗇之氣矢口發聲有先號象及三不興四弗克則二五仍相遇矣歡暢之情非可言喻有後笑象一說陽主笑隂主哭號咷指六二笑指九五先號後笑由大師既克而相遇之後追論如此其義亦通中直與中正同困九五亦然以相遇歸之相克葢讒間之人非大加懲創則不能杜其隙此之謂乾行朱罍庵曰卦以二體為二人无小人以間之故涉險而易通爻以六位為六人有小人以間之故用師而始克天下之以間而離者可勝言哉楊誠齋曰師莫大于君心而兵革為小克莫難于小人而敵國為易又是進一層解上九同人于郊无悔象曰同人于郊志未得也于郊與于野不同野者曠逺之地郊則近在邑外爾雅邑外謂之郊周禮王國之外五十里為近郊上居卦終下无應與不與人同者也以其不為苟同則可以无悔以其孑然孤立則志未得行夫君子隠居求志當通天下之志以為志而乃潔身自逺所為同志者不過耦耕之沮溺荷蓧之二子而已如同人何然聖人則固以為斯人之徒也故于卦終致慨馬鄭孩如曰卦之相應者二五而已不能盡六爻而同之也而名之為君子之正二君子也三四皆欲同之而聖人以為譏天下亦有小人而附于君子者不得以其附君子而君子之其與君子同亦私也故必曰中正而應然則所謂同人者豈必盡人而同吾能如野不論人之多與寡也張彦陵曰卦之得名以五陽同一隂不曰五陽應而曰應乎乾見得同人也之道止在同德相應不必以上下俱同為同乾下離上大有元亨一隂居尊而虚中上下五陽皆其所有而不自以為有所以成其大凡卦稱大者例以陽得名大有以一隂統五陽大畜以二隂畜四陽大過四陽過于中大壯四陽壯于下皆是也元亨利貞本乾之四德坤屯臨无妄革諸卦言四德者皆有益詞大有元亨大壯利貞无益詞矣大有不言利貞者柔專主也大壯不言元亨者剛太盛也彖曰大有柔得尊位大中而上下應之曰大有其德剛健而文明應乎天而時行是以元亨楊誠齋曰同人大有反對一柔五剛同也柔在下者曰得位得中而應乎乾柔在上者曰得尊位大中而上下應之其堯之垂裳舜之恭已乎趙汝楳曰五以下諸陽下應也是為人助五以上一陽上應也是為天祐愚按易以上卦為尊陽爻為大尊位犬中專指六五一爻剛健文明以下則兼上下兩體而贊其德提出德字仍以大中為主上下之應應乎此也離雖隂卦却有文明之象凡柔近乎暗剛近乎明暗者欲其明明者又欲其健司馬溫公曰柔而不明則前有讒而不知後有賊而不見明而不健則知善而不能舉知惡而不能去皆亂亡之端也惟應天而時行則健不過剛明不好察居不失中行不失時天下雖大元氣貫通更无一毫阻隔是以元亨説統曰上下應之者衆陽應乎六五也應天時行者六五應乎乾陽也此正所謂厥孚交如象曰火在天上大有君子以遏惡揚善順天休命火非水火之火乃天地陽明之氣陽氣萌于子極于午午者離南正位也火在天上日月有明容光必照物之善惡未嘗不並生並育其間使必斤斤其明見一惡從而罰之見一善從而賞之非大有之象矣唯于惡則遏之所謂禁于未形也于善則揚之所謂樂與人同也以此應天是為順天以此受命是為休命本義云天命有善而无惡直溯源頭不是福善禍淫奉行天命天討之説初九无交害匪咎艱則无咎象曰大有初九无交害也程朱謂初爻處卑而未涉乎害楊龜山蔡節齋皆謂无交而有害詮釋多不甚明了竊以管見測之初與四不相應比二而不相得又逺于五无交之象上有交孚之主而在下无交似害于大倫而有咎然此匪其咎也惟不艱則有咎若艱則无咎矣北門之詩曰終窶且貧莫知我艱此艱字之義錢田間曰當大有之世諸陽上下皆應獨初剛正自守處艱難之地不求上交譬諸搆明堂世室良材革出而偃松癭柏自託于幽岩邃谷中不必盡登廊廟適足見天地之大巢許不仕堯黃綺終辭漢于大有之君何損乎小象就爻辭以釋之曰无交害謂无交亦无害所以堅其克艱之志也九二大車以載有攸往无咎象曰大車以載積中不敗也五虚中以應二凡大有之任皆萃于二而二受之不辭者惟其為大車也車以載物必量其所受以大車而任重滅之不覺少增之不見多自然无往不利小象積中二字補爻辭所未言大有之九二與鼎之九四皆陽居隂位而成敗相反者一中一不中也天下事權有重輕器量有大小器不足以容則為覆餗量有餘于載則為大車故授任者當器使受任者當自量亦視其中之所積而已矣非大車其能免于覆轍乎呂伯恭曰大臣之位百責所萃震撼擊撞欲其鎮定辛甘燥濕欲其調燮盤錯棼結欲其解紓黯闇汚濁欲其茹納如大車之積中而後可也九三公用亨于天子小人弗克象曰公用亨于天子小人害也亨當作享初與四正應而不相得由无交故逺害三居内卦之上而與四比近交離體離為戈兵故疑于相克公似指三天子似指五小人似指四用亨之義先儒或云亨字當作享春秋傳晉文公將納王使卜偃筮之得此爻曰吉戰克而王享此其證也愚按本義六五虚中下賢則三之用享乃以剛正之德輸之于五所謂嘉謀入告是也小象害字從初九來睽卦離在上曰見惡人此曰小人害彼兑水受火制此則乾金畏火克小人意在害君子而弗能克由三之剛正也九四匪其彭无咎象曰匪其彭无咎明辨晳也六五柔中諸陽本為所有而四為之領䄂則疑為四之彭彭者盛多之貎其者四自謂匪者不然之辭四不以諸陽為其彭可謂善逺權勢矣由其離體見事明晳當局不逺故无震主之嫌晳音制與詩明星晰晰同六五厥孚交如威如吉象曰厥孚交如信以發志也威如之吉易而无備也五柔中二剛中君臣相應上孚于下下孚于上不啻如朋友之交而君臣之等威仍不失故曰厥孚交如威如吉後世君尊臣卑中不相信乃致飾于外以威嚴臨之文明柔順之主不然其位彌尊其體彌降馬文淵一見光武袒幘坐迎服其豁也逹是之謂信以發志易而无備上九自天祐之吉无不利象曰大有上吉自天祐也六五言大有之德上九言大有之福以爻位言五為君位上則天位也先儒謂大有上吉事闗全卦非止一爻陸庸成曰大有之世保終之道慎于履始必有克艱之初而後有天祐之上故初曰大有初九上曰大有上吉獨本末見大有焉艮下坤上謙亨君子有終朱啓莊曰大有之後繼之以謙明乎非有之難有而不居其有之難也愚按本卦與豫反對一陽互易在三四之際聖人取其自上而退處于下者為謙自下而奮出乎上者為豫此觀畫立象之本㫖也謙以處世无不亨之理君子專指九三以言其尊則在下卦之上以言其卑則居上卦之下自其行无不得言則曰亨自其行之不已言則曰有終謙之一言君子固終身行者也有終不是説效驗若謂先屈而後伸母乃疑于前恭後倨乎虞翻曰艮終萬物故君子有終潘雪松曰功逾高心逾下碩膚有几几之安德彌盛禮彌恭既耄有抑抑之戒此君子之有終也彖曰謙亨天道下濟而光明地道卑而上行天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也艮陽在坤之下天道下濟也濟與際同剛畫在上陽氣發見光明之象坤隂居艮上地道卑而上行也此就卦體釋亨義天地之謙只在氣機上説天與地對舉則山在其中盈者謙之反天道虧盈三句起下人道一句語雖平而意側重謙一邊虧盈以氣言變流以形言害福以理言好惡以情言歐陽永叔曰此聖人極論天人之際也春秋雖書日食星變孔子未嘗道具所以然曰天地鬼神不可知為其可知者人而已日中必昃月盈必缺天吾不知吾見其盈虧于物者矣草木之盛者變而衰落之水之下者進而流行之地吾不知吾見其變流于物者矣人之貪滿者多禍守約者多福鬼神吾不知吾見其人之禍福者矣此据其迹之可見者爾若人則可知者故直言其情曰好惡其知與不知異辭也叅而㑹之與人无以異也愚又按謙之為道統造化人事之全而本于一心自治之學此君子進德无窮之境故曰德之柄又按謙者以尊下卑之義惟居尊而不自尊所以為謙若居卑者其謙何待言如此則夫子但云謙尊而光可矣又云卑不可踰何也義在豫之六二所謂上交不諂下交不凟也上下各有劑量君子因物付物不亢不卑小人則為脅肩諂笑矣豈惟傲為凶德謙固有道也尊而光以德言卑不可踰以理言人情一時勉强未必能久于其道故曰君子之終一陽統五陰之卦凡六師比謙豫剝復是也彖傳于師比等五卦皆指出一剛字惟謙則否謙不貴剛也謙之反為傲不曰傲而曰盈者傲是驕人盈是自滿自滿而後驕人聖人惡其盈也若不自滿假則傲何由生象曰地中有山謙君子以裒多益寡稱物平施稱去聲卦體地下有山不曰地下而曰地中者臨川鄒氏云是實象如深谷為陵是地中有山而深者可以獲益黃氏日抄則云豈必實有其事特取象耳愚竊謂萬仭之山其巔高出地上其趾則深入地中知地中之有山則知山下于地乃自上下下之象而謙之義得矣君子于此得襃多益寡之道就心源理欲上酌劑謙是天理用事盈是人欲用事去一分人欲便增一分天理益寡无工夫工夫在裒多上裒之所以為益也稱物乎施其權操之自我如以秤秤物物有輕重持其平者則在人要歸于稱物而已矣漢書律厯志云權者所以稱物平施知輕重也此其義凡上人之心多而施不得其平只為見有我不見有物耳張彦陵曰須先認物字明白夫子不言人已而言物者置吾身于萬物之中作一例看既无彼此對待之形種種不平之念從此化矣愚又謂平施亦從自己心上酌劑不從物上起見也初六謙謙君子用涉大川吉象曰謙謙君子卑以自牧也卦以謙名初居最下謙而又謙者也中爻互坎坎在前有涉川象用涉與利涉不同謂用此謙德以涉川居後而不與人爭先也一説人知謙者之能退而不知謙者之能進故必取涉川之象何用不臧故曰吉自牧者反身之謂如牧牛牧馬有降服馴養之功卑者牧之于初也學問事功原无底止君子之卑以自牧從始至終只見自家之不足雖欲多上人得乎六二鳴謙貞吉象曰鳴謙貞吉中心得也二柔順中正與九三相比故以隂陽唱和寄之于鳴蘇子瞻曰謙之所以為謙者三也其謙也以勞故閒其風者莫不相從以謙六二其隣也上六其配也皆和之而鳴于謙二處内卦之中故貞而吉愚謂鳴謙者言辭之謙也聖人恐人疑于外飾故云中心得六二居中翕受其辭和禹拜臯陶之謨曰師汝昌言諸葛孔明發教府屬令勤攻已過皆發于此心之誠小象所以云中心得上六誓衆出征其辭危湯放桀而曰惟恐來世以台為口實武王伐紂而曰余小子夙夜祗懼皆不得已而有言小象所以云志未得中心字與志字相應鳴者心之聲也若依注疏作以謙有聞解則間人譽已囂囂自得竊恐于聖人語意不合九三勞謙君子有終吉象曰勞謙君子萬民服也三為成卦之主一陽在五隂之中以剛居剛而止體凝然不動艮勞卦也履得其位羣隂所宗承上接下勞之象君子有終與彖辭同周公于爻辭亦苐推其勞而要其吉勞而能謙則不施勞舜之贊禹曰汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功非勞謙而民服乎萬民服即人道好謙之公心所謂有終之吉者以此六四无不利撝謙象曰无不利撝謙不違則也四爻坤順之體以柔居柔在上卦之下何不利之有撝與指麾之麾同程傳所謂施布之象動容周旋无不中禮乃无不利本義云居九三之上更當發撝其謙其義難曉愚竊謂鳴謙者宣之于口撝謙者措之于躬六四位尊于三以柔乘剛无功而在功臣之上危地也必也卑躬折節尊賢而尚功人或疑其足恭故象以不違則表之則者卑而不可踰之義六五不富以其隣利用侵伐无不利象曰利用侵伐征不服也六爻惟五不言謙葢人主之謙不在屈體而在虚受富有四每守之以謙不富者其中虚也隣與不富皆指羣隂凡陽稱富故小畜九五曰富以其隣隂稱不富故泰六四曰不富以其隣與此同五居尊无應有征伐之象何閩儒曰治天下者苟非好大喜功即四征九伐不礙其為謙也愚謂征伐者義在求勝本非謙象爻辭乃推極言之以見謙道之合人心五為坤主衆隂皆其隣惟不恃其衆乃能用衆書曰臣哉隣哉稱臣為隣亦謙辭也不服服字從九三小象來謙者民无不服其或不服即用以侵伐而亦无不利夫子補周公所未言往往如此上六鳴謙利用行師征邑國象曰鳴謙志未得也可用行師征邑國也先儒多謂上六處順之極位高而得衆發號施令可以无徃不利而惟用行師以征已之邑國即此便見其謙鳴謙者聲罪致討之中有引慝責躬之意象曰志未得謂其志本非高亢而位居卦之上似與志違前云得此云未得一中一不中也愚按五上兩爻皆取征伐之象者葢謙與豫反對豫彖云利建侯行師謙之二三四五即師之二三四五也中爻互震為大塗行之象坤在外卦邑國之象行師者多在外也舊注以為上六自征其邑國者非也上所征之邑國即五所侵伐者上奉五命以往故不曰侵伐而曰征先儒又云人主之謙合天下以為量而有人焉謙德所不能服不得不用師以征之故湯武之征誅同堯舜之揖讓愚又謂滿招損謙受益二語禹征有苗自伯益發之因人之未服退而修德此出征用謙之證小象不曰利用而曰可用深許之也王輔嗣云六爻雖有失位无應乘剛而无凶咎悔吝以謙為主也愚按下三爻皆言吉從艮上來上三爻皆言利從坤彖來坤下震上豫利建侯行師卦名取和樂為義九四一陽上下應之和樂之象外卦震長于主器侯象内卦坤為衆師象屯有震言建侯師兼坤坎言師豫震與坤合又互坎故兼二者言又卦體震動于坤之上故利建侯坤順于震之下故利行師愚按國語晉文公將歸國筮得貞屯悔豫筮史皆曰不吉司空季子曰吉是皆利建侯坤母也震長男也母老子強故曰豫其辭曰利建侯行師居樂出威之謂也得國之卦也韋昭注居樂謂坤在内出威謂震在外彖曰豫剛應而志行順以動豫豫順以動故天地如之而况建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉本義九四一陽上下應之與大有柔得位而上下應義同此不云得位者剛居柔位故也愚按彖傳无上下應之文剛應只据初四兩爻說志行則從應字生來順以動明所以應之之故皆据卦體贊卦德天地如之者言天地不過如此順動而已建侯行師雖國家大事較之天地則小矣天地以順動順其自然之氣日月四時非兩事惟日月不過所以四時不忒如夏至晝六十刻夜四十刻其時則署冬至晝四十刻夜六十刻其時則寒是也聖人以順動順其當然之理民莫不惡死而貪生清者非廢刑罰而不用也當其罪則刑清而民服所謂以生道殺民雖死不怨也謙禮也豫樂也大禮與天地同節大樂與天地同和故兩卦皆推極言之愚按易有時有用有義彖傳贊大矣哉者豫隨頥大過坎遯暌蹇解姤革旅凡卜二卦言時義者豫遯姤而已夫子于六十四卦中偶舉十二卦欲人于每卦卦辭涵泳于意言之外非謂此外諸卦无時无用无義也亦猶十九卦之言上下徃來豈卦變止于十九卦乎象曰雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考不曰雷在地上而曰雷出地奮者自復之後厯臨泰二卦潛閉既久奮迅而出鼔動和氣發揚生機通暢和樂豫之義也先王因之以作樂自三代以上皆然樂由天作天作以震蘇明允云雷以神用用莫神於聲故聖人因聲以為樂是已愚又按樂以象功舞以昭德古樂未有不用舞者作樂崇德舉大畧言之崇者闡揚光大之謂殷盛也禮有殷薦殷奠樂亦以殷薦為極盛薦上帝配祖考一是仁人享帝一是孝子享親總暢吾心之和以洽天地神人之和不必援郊祀后稷以配天為冬至祀天而配祖宗祀文王于明堂以配上帝為季秋祀上帝而配考之舊説只慿周制抺却上古帝王之樂也初六鳴豫凶象曰初六鳴豫志窮凶也隂柔居初而與四應恃上有強援而荒于逸豫志滿樂極開口驕人鳴豫便是凶象荀九家云隂陽相應故鳴愚謂凡鳴者又必心與口相應故謙之六二中孚之九二一曰中心得一曰中心願豫之初六反對即謙之上六鳴謙者有不樂居上之意鳴豫者有自滿于初之意在初即鳴无逺大之志可知志窮者謂其器量已盡于此也善處豫者其惟中正之六二乎六二介于石不終日貞吉象曰不終日貞吉以中正也説文介分疆也愚按几物兩間為介中爻自二至四互艮有石象二居初三兩隂之間初與四應以鳴豫致凶三與四比以盱豫有悔惟二于義利之介見得分明不為豫境所溺无應无比介于石之象不終日者无遲回瞻顧之意與下盱字遲字相應見幾明决貞吉可知小象推本于中正此卦此爻所獨也蘇子瞻云以隂居隂晦之極靜之至也以晦觀明以靜觀動凡吉凶禍福之微如黒白之判于前是以動静如此之果介于石果于静也不終日果于動也故孔子以為知幾愚又按比卦諸爻内外皆以比五為義上以无首得凶惡其後時也豫卦諸爻凡與四應者比者非悔則凶二以介石得吉嘉其先幾也六三盱豫悔句遲有悔象曰旴豫有悔位不當也本義以盱豫二字為句悔字連下為句今從程傳程傳謂盱上視也三不中正上視四不為所取故有悔然四為卦主遲而不前亦有悔愚按人之處順境者一入其中不覺因循繫戀君子審于事先其決幾也早衆人迷于當局其見事也遲二居中得正三不中不正旴豫遲與不終日彼此相反聖人提出一悔字以動其良心又就悔處轉出一遲字以策其速改三與四比有伺門牆承色笑之象故曰旴豫盱者張目企望也小象以為位不當要見乘時得勢之徒與其近而相取不如逺而不相得凡易中言位不當者皆須從所處之地㑹通之九四由豫大有得勿疑朋盍簪象曰由豫大有得志大行也一陽為卦主爻五隂皆由之以得豫剛應而志行由豫之象大有得者一剛得五柔之象初與四應三五與四比上與四同震體惟六二以中正自守四若以為異已而疑之朋黨之嫌生矣惟勿疑而化異為同則二亦吾朋其志不大行乎合爻辭小象觀之其義甚明舊注以大有得為占辭與經文似不合朋盍簪從大有得來朋者五柔合一剛之象晁以道云古冠服无簪桯可久闢之謂簪即弁服之笄也所以括髪四以一陽括衆隂猶以一簪括諸髪盍義與合通六五貞疾恒不死象曰六五貞疾乘剛也恒不死中未亡也愚按六五一爻得恒卦上體之中畫受本卦震東之生氣雖受制于四而不失其中者也疾與豫反五居君位而有疾猶云弗豫也貞者久也以柔乘剛理當有疾尸居餘氣奄奄一息孱主也中爻自三至五互坎為加憂為心病貞疾之象疾則隣于死矣而恒不死者以中也外常憒憒内常惺惺中者人之命脉一日未亡一日不死四剛而五柔臣強則主弱周既東遷猶傳二十餘世非貞疾恒不死之象乎上六㝠豫成有渝无咎象曰㝠豫在上何可長也朱與三曰上以隂柔處豫極沉㝠汩没疾已成矣似不可改矣然物極則變上又震體故發有渝之象可見重隂晦昧中一隙之明未嘗個蔽纔一動念覺人世悦豫之境本无久長之理本无足躭何不可變之有成而有渝則不終于豫而无咎矣爻辭于三之悔猶懼其遲于上之㝠深冀其改鳴豫言凶遏其端于始㝠豫言无咎開其善于終愚按小象曰何可長謂急宜改圖也即有渝无咎之義又一説成如春秋求成之成渝如渝盟之渝渝者變也變則為晉明出地上故无㝠暗之咎凡言渝者當以變卦觀之渝安貞官有渝成有渝皆是也胡雲峯曰卦辭只一豫字而爻之言豫者不同初六上六逸豫也六二幾先之豫也六三之遲猶豫也九四和豫也六五之疾弗豫也卦辭主九四剛應志行以德言爻辭則諸爻于九四以勢位言李宏甫曰彖辭彖傳極言致豫之盛而爻與象極言享豫之禍葢亡國敗家相尋不絶者咸以豫也愚按雜卦傳所云豫怠正是此義可見世道不可无豫人心不可有豫震下兌上隨元亨利貞无咎隨從也六爻不論應否只論近比初隨二二隨三三隨四五隨六多取以下從上之義先儒云隨之為卦小卦也于世則為隨俗于已則為隨意世道若此不成世道士生斯世須得盡美盡善之道方有安身立命處故以元亨利貞歸之謂必如此乃得无咎也彖曰隨剛來而下柔動而説隨大亨貞无咎而天下隨時隨時之義大矣哉本卦與蠱反對蠱下卦是巽今為震而來居于兌之下所謂剛來下柔也本義釋卦變者凡千九据卦變圖云凡三隂三陽之卦皆自否泰來隨乃三隂之卦則當云自否來矣今云自困九來居初又自噬嗑九來居五而自未濟來者兼此二變皆剛來隨柔之義竊所未詳胡雲峯通釋置之不論不議愚又按卦變之説漢儒只取兩卦中隂陽互易未有合三卦而言變者今就本卦推之若論卦變自乾坤來則坤之初居上而為兌乾之上居初而為震是謂剛來下柔此一解也若論三隂之卦皆自否來則應云否外卦上九之剛來居下卦之初而剛柔易位此又一解也本義皆不然而雜引諸卦各言一爻之變然則内卦亦可云自咸九來居初外卦亦可云自益九來居四矣不識朱子何説處此他如无妄之剛自外來亦從反對卦得象謂大畜外卦之艮來居无妄内卦而為震也本義則云為卦自訟而變九自二來而居于初初二兩爻同在内卦可謂自外來乎似與彖傳不合象數論曰朱子所謂卦變皆舍主變之卦兩爻互換者而隨意為詮釋就十九卦中主變者凡二十七爻或取諸一卦或取諸兩卦三卦或同在内卦而謂之往或同在外卦而謂之來或同在上卦而曰下或同在下卦而曰上義例不一今舉隨與无妄餘可類推矣愚又按程子闢否泰卦變之説謂卦變皆自乾坤來蘇氏易傳亦然今觀隨卦乾之上九來居坤初坤之初六往居乾上蠱卦乾之初九進居于上坤之上六下居于初隨自否來上九與初六五換故曰剛來下柔蠱自㤗來初九與上六互換故曰剛上柔下一卦之中自有乾坤二體非即否㤗乎卦以隨名聖人恐人誤認為詭隨之隨故彖傳以隨時二字贊卦德之動而悦以釋名卦之義而一部易經與時偕行之道不外乎此李子思曰時出于聖人天下隨聖人時成于天下聖人隨天下治亂之原人品邪正之闗俱係于此其義豈不大哉第二箇隨時又承上文而推廣言之程傳只作隨時之義解本義從王肅本改云隨之時義大矣哉愚按大象嚮晦入宴息自有隨時之義朱子注亦云隨時休息此處似不當改象曰澤中有雷隨君子以嚮晦入宴息程傳君子觀象以隨時而動則以動息言本義雷藏澤中隨時休息則以藏息言其説似異矣顧澤以震而動雷以時而藏所謂隨時之義也兩先生豈有異乎臨川鄒氏云凙中有雷此收聲于兌之時荀九家云八月之時雷藏于澤震東方卦日出之地曰𤾉谷兌西方卦日入之地曰昧谷今震自東趨兌西嚮晦之象愚謂雷在澤中雷之蟄時也嚮晦入宴息君子之隨時也宴息中有洗心藏密之義入者自動而之静也彖傳以動言大象以静言静所以養動之根雷惟收聲乃能發聲豫之雷出地奮動也隨之澤中有雷自動而反静也復之雷在地中動而未離乎静也人身之夜氣培于息君子以嚮晦入宴息一已獨體其静也天地之元氣培于閉先王以至日閉闗與天下共養其静也初九官有渝貞吉出門交有功象曰官有渝從正吉也出門交有功不失也本義謂初九有所偏主而變其常以貞吉為戒辭焦弱侯曰以乾之上九與坤之初六相變而成隨上九初六本皆不正因變而得正故曰官有渝貞吉此一句論卦之始變隨之本也困學記曰隨之義通人情達世變不主故常者也初為成卦之主與四應者乃其常今與四无應而與二相隨雖若變常而隂陽相比所隨不失其正官者常也渝者時之當變也故貞吉愚又按一陽在下動則變渝之義一隂在前門之象人情于門内多私初出門則无私主故不曰隨而曰交居中得正因不失其親故有功不失者不失隨之正道也與二三爻失丈夫失小子兩失字相應王伯厚曰同人之初曰出門隨之初六曰出門謹于出門之初則不苟同不詭隨愚又按卦取物來隨我爻取以我隨物但有剛柔之分故三陽爻言交言孚言隨三隂爻皆言係與孟子從大從小之義同六二係小子失丈夫象曰係小子弗兼與也吳草廬曰二非必背五向初也但以其近比易于牽係若係此則必失彼矣故爻辭示成云爾愚竊謂二本與五正應當隨之世舍逺應而就近比隂柔居中不能自立有係象初以剛隨人謂之交二以柔隨人謂之係初不失其所交而二之所係者則三也既係三矣豈能兼與乎初非不欲與勢固弗能兼也本義以初九為小子愚竊謂係小子指六三失丈夫指初九隂小陽大易之定分漸卦初爻以隂故稱小子此小子若指初九則以陽為小矣似可商六三係大夫失小子隨有求得利居貞象曰係丈夫志舍下也舍上聲三與二同體而外比于四小子六二也丈夫九四也卦義以隨上為貴隨陽為得三四近而相取其情易合故隨有求而皆得但以六居三以九居四位皆不當恐其為妄求為苟得故戒以利居貞貞字從求字來欲其守正而弗求也三既係四則與二漸疎意向之間不覺有所取舍象申之曰志舍下謂隨在上之四而舍在下之二猶二既隨三則不能兼與乎初也張待軒曰人生止此精神意趣一有所係必有所失連自家也主張不得所以不可不慎九四隨有獲貞凶有孚在道以明何咎象曰隨有獲其義凶也有孚在道明功也四與五比初其所應也三其所係也我隨人而人隨我隨有獲之象張待軒曰獲者取非其有之詞以義論必當得凶愚竊謂四之有獲與三之有得同爻辭乃以為貞凶者患在不能自盡其誠也故提出孚字而引之以當道可見大臣之隨與小臣異既盡其誠又合于道則雖身處功名之地而心可大白于天下何咎之有若霍子孟廢昌邑而立宣帝功在王室可謂隨有獲而貞矣而滅族之禍萌乎驂乘于義則凶史譏其不學无術只為此心未孚于上不能在道以明功耳小象于明字下補出功字要見當此地位不能有字在道則在我以為功者在人即以為罪明功非表白之謂乃此心光明洞違正其道不計具功也豫隨之九四皆近君大臣也豫五乃柔主又為四之所逼故成在君而為貞疾隨五乃剛主四有震主之嫌故戒在臣而為貞凶九五孚于嘉吉象曰孚于嘉吉位正中也自初至四或隨或係得失不同其為比周均也九五陽剛中正以居君位與二正應而二為三所係五既不嫌二之比人且不疑四之逼已而惟善是從一片至誠相感故不言隨而言孚孚于嘉不但指二兼指四故兩爻皆曰孚亦同體同德之相孚者上六拘係之乃從維之王用亨于西山象曰拘係之上窮也亨如字中爻巽為繩維繫之象王指九五亨者通也卦體兌位居西中爻互艮西山之象上居卦末不隨人進退有白駒空谷之風而五以隨為義有縶之維之之意通西山以求之是五欲隨上而上不為五所拘係故曰上窮言隨之道至上爻而窮也此説本瞿塘來氏之合爻象辭㸔其詮釋較明朱子謂亨當作享自周言岐山在西遂以文王有享西山之事郭相奎曰程朱云居隨之極固結而不可解于上窮字難説臨川鄒氏以為文王居羑里之象上之困窮可知鄭申甫曰文王身䝉大難恪守侯度惟修享祀于西山此臣之隨君而不可解者以上諸説皆因本義以下王為文王而為之辭耳説詳升卦六四爻劉石閭曰係者己私也隨者天德也學无小无大皆不可以有係以係為隨而欲執所係之大小為得失是外襲之學也故卦之三陽為隨三隂為係四體陽而位隂故告以先難後獲之道而戒以訃功謀利之凶所以辨係之介杜係之源其隨之九四乎巽下艮上蠱元亨利涉大川先甲三日後甲三日蠱字象形蟲之傷皿積久而壊卦體艮上巽下風所以發舒萬物在山下則為所止木氣不能宣暢而生蠧蠱之象也蠱則何以元亨葢卦之取名本以治蠱為義蠱之為蠱只是元氣萎敝積漸不通所致善治蠱者使元氣享通而已利涉大川是元亨之作用中爻互卦震在澤上涉川之象不避艱險必求有濟利涉之義先甲後甲先儒詮釋不同王嗣輔以甲為事之始程傳依之鄭康成以甲為日之始先三日辛也義取更新後三日丁也義取丁寧本義依之今据八卦方位推之艮巽夾震木于東甲于五行屬木先甲言巽先于甲後甲言艮後于甲也先後三日指本卦六爻先三日者下三爻巽也後三日者上三爻艮也下三爻積巽之柔懦而成蠱上三爻積艮之止息而成蠱由來非一日矣文王雖未有爻辭而六爻之義隠然已具矣本義于復卦謂自五月一隂生至此七爻而一陽來復此一日當一爻之證程沙隨曰巽之九五變蠱乃與蠱卦彖相通先甲先庚是也説詳巽九五爻下彖曰蠱剛上而柔下巽而止蠱蠱元亨而天下治也利涉大川往有事也先甲三日後甲三日終則有始天行也本卦與隨反對隨之外卦本柔今變艮而居上故曰剛上隨之内卦本剛今變巽而居下故曰柔下剛柔指初上兩爻剛上者艮之上九柔下者巽之初六義木昭然朱子謂卦變自賁來者初上二下自并來者五上上下自既濟來者兼之亦合三卦以言變辨詳隨卦彖傳巽而止釋致蠱之由元亨而天下冶歸重在治蠱之人張待軒曰元亨天下治不是坐嘯畫諾中來要合下二句説如涉大川駕舟之具无不整飭操舟之人无不强健量其廣狹度其淺深衝風破浪无躊躇顧盻之意故不曰有功而曰有事也朱罍庵曰惟不事事乃以生事故還以有事治之愚按雜卦傳云蠱則飭也飭者修治振刷百度維新之義聖人治天下每厪豐之盈不怕蠱之壊曰往有事矯巽之柔懦則有事于剛果矯艮之止息則有事于奮發事字是全卦本領因内卦艮是止體故勸其往吳因之曰先甲後甲雖云人事然終則有始即是天意故曰天行愚又謂蠱由前人積弊而成非一世之事所以五爻皆取象于父子以繼世言莫非有事于冶蠱者也文王言先後孔子言始終亂之終治之始也猶之天道循環有先甲必有後甲當庸人束手之時聖人㸔成絶好機㑹正要盡人事以應天行豈委諸氣運而已乎胡雲峯曰凡卦德當分内外先後如隨則先動而後悦歸妹則先悦而後動歸妹之凶與隨反蠱則内巽而外止漸則内止而外巽漸之吉與蠱反象曰山下有風蠱君子以振民育德張獻翼曰小畜風行天上觀風行地上涣風行水上无所阻故曰行今在山下則障蔽迥旋不能條暢蠱者風之族也蠱以風化故字從蠱振民育德譬諸良醫治病振者驅其外邪育者養其元氣本義以二者乃治己治人之道愚竊謂振育似當俱從治人一邊振民取象于風所以奮興之也育德取象于艮所以涵養之也初六幹父之蠱有子考无咎厲終吉象曰幹父之蠱意承考也乾文言貞者事之幹也幹字從此卦爻辭中出幹通作榦木之本也内卦巽為木中爻又互震木幹象父之蠱謂父養成此疾至子而發也父蠱豈能无咎子能幹則考无咎使天下稱之曰幸哉有子如此可謂孝矣厲是幹蠱之苦心所謂操心危慮患深者故始厲而終吉初爻柔而志剛幹事最早父在子不得自專而志則可知小象中之以意承考有潛移黙改之妙葢不以事幹而以意幹也意若承順而事實由以幹全考之无咎以此或云合初二兩爻觀之是无父有母之孤子説近穿鑿康誥云大傷厥考心父在何嫌稱考乎九二幹母之蠱不可貞象曰幹母之蠱得中道也前革或以母后垂簾之事已兆其端愚意只就本卦看艮巽二體隂長而陽少二與五應隂居上母象以國家言凡大事陽事則為父蠱凡小事隂事則為母蠱積陽之弊為暴横為危亂父蠱也積隂之弊為因循為哀弱母蠱也九二剛而不正恐其一往恃才過于直遂故义設不可貞之戒易之為道无不要之于貞獨此曰不可貞者非理不可貞時不可也時不可貞則以不可貞為中道二剛中所幹者純是一片至誠至情委曲周旋以圖有濟幹母蠱者必如此方得中道也繫傳所謂巽以行權于此爻見之九三幹父之蠱小有悔无大咎象曰幹父之蠱終无咎也三以剛居剛幹蠱之事不免以子改父為嫌或者更張措置之間先後緩急稍失其序所以小有悔然巽體得正不陷父于不義何大咎之有小有悔以心言无大咎以理言爻因其過剛不中猶摘其微庛象要其終而斷以无咎並畧其小過使之任事不惑為克家之子也程敬承曰聖人于蹇二言終无尤所以作天下之忠于蠱三言終无咎所以作天下之孝六四裕父之蠱往見吝象曰裕父之蠱往未得也四居外卦之下與初同是柔爻初蠱未深柔者猶可幹四則深矣復以柔居柔裕蠱之象三之失在過中四之失在不及裕與幹正相反强以立事曰幹怠以委事曰裕葢幹蠱之事當如拯溺救焚庶克有濟今乃无才无志優游過日不肯上緊去做由斯道以往則立見其吝彼其父子嘻嘻方且自以為得夫子正之曰往未得父陷于不義相視而笑可謂得親乎彖傳本取往有事而四入艮體乃是止象故爻曰往見吝象曰往未得六五幹父之蠱用譽象曰幹父用譽承以德也在九二以五為母在六五則仍居子道繼體之令主也柔得中而居尊位其幹蠱也過則歸己善則歸親用譽言父用子之幹而得譽也初小象但云承考不言所以承之者五小象曰承以德可見事雖出于幹全心一主乎承順若謂今日改圖之事吾以承先人之德云耳非獨不恃幹蠱之才以楊親之過並欲泯幹蠱之迹以成親之名者也來氏謂因用人而得譽九二承以剛中之德只是贊應父與本爻无涉上九不事王侯高尚其事象曰不事王侯志可則也自初至五凡事之蠱壊者已无不整飭幹之能事畢矣上居卦終身在事外以君臣言不事王侯之象在艮體之上髙尚之象兩事字有别言雖不出身事主而自以高尚為其事亦非不事事可知李子思曰君子當蠱之世方事之典也盡力以幹操巽之權而行所當行及事之終也潔身以退體艮之義而止其所當止愚竊謂自初至五皆言父子上獨言君臣者父子以情親不敢置身事外君臣以義合王侯之事君子有不事者矣象中之曰志可則要見世運之蠱皆由上大夫溺志于功名所致蠱為食心之螟諸爻所治者世事之壊上爻所治者士大夫心術之壊也聞伯夷之風者頑夫廉懦夫有立志孰謂高尚非所以治蠱乎田間易學曰易以三隂三陽為中故泰否為綱領而隨蠱寓咸恒損益之消息焉隨者否初終之反也蠱者泰初終之反也否泰反具類于換爻而益明兌下坤上臨元亨利貞至于八月有凶本義云臨進而凌逼于物愚竊据程傳作君臨解以大臨小以上臨下皆是也初二大臨小以德言三四五上上臨下以位言歸重在二陽爻二陽漸進泰運方來光明正大之氣照臨天下故以天德之元亨利貞歸之張潤甫云臨者大也聖人明以大字作注脚解此卦必須體貼大字不可漫言凌逼使君子小人相仇陷也臨為十二月之卦至于八月當自正月數起薛敬軒云于十二月陽剛漫長之時而以來年八月陽消隂長為戒其義甚明本義謂自復卦一陽之月至遯卦二隂之月為隂長陽遯之時又云八月謂夏正八月又云前説是周正八月文王作卦辭時只用周正紀之三説初无定論愚按文王演易在殷之末世正朔未改似未便遽用周正今以十二支凖之臨當丑月自此而㤗而大壯而夬而乾而姤而遯而否至于八月建酉為觀臨與觀反對此時臨之二陽變為觀之四隂矣故曰有凶朱子之注觀卦謂四隂長而二陽消為八月之卦與此彖辭正合可証本注之非李子思口卦體已是二陽則當自觀數起不當自復數起本卦與觀反對則當數至觀而止不當數至遯而止朱子依程傳從一陽初生起所以不能盡合也張待軒曰古人説到臨字便有凛凛戒懼之意詩云如臨深淵如臨于谷書云子臨兆民若朽索之御六馬故于剛長之際而厪八月之戒此臨之時義也愚按京氏十二辟卦之説從此卦辭推出彖曰臨剛浸而長説而順剛中而應大亨以正天之道也至于八月有凶消不久也愚按彖傳不曰剛長而曰剛浸而長兑為澤在地之下浸之象列子云一氣不頓進董子云長日加益而人不知皆㓎而長之義復惟一陽臨已二陽聖人幸内其長更幸其方長駸駸乎有莫禦之勢也困學記曰兑為悦陽之進也不偪外坤為順隂之從也不違二剛得中則陽德方亨而不過二與五應則剛柔合德而有為説順二句緊承浸長來此所謂大亨以正天之道也愚按天道只在隂陽消長上見二陽漸長則四隂漸消人方以隂消為快聖人預憂之曰至于八月有凶然則隂之消豈久消哉其慮深其辭危所以示儆者切矣本義无明文王輔嗣作君子道消解以消不久指陽似失經文語氣陽消不久何以云凶象曰澤上有地臨君子以教思无窮容保民无疆本義二者皆臨下之事愚按大象于觀曰設教于師曰容民于臨則言教义言思言容又言保思者教民之心至誠懇到也保者容民之事多方調䕶也无疆乃地之體澤之行地亦與之為无窮君子之臨民以之教思如兌澤之深容保如坤德之厚无窮无疆亦從剛長得義初九咸臨貞吉象曰咸臨貞吉志行正也卦體四隂雖居上位實為下二陽之所臨初剛正四柔正兩爻相應故貞吉咸字有三義感也皆也和也以德服人非勢相偪感之義也二陽同德相繼而進皆之義也皆感則和矣象曰志行正與屯初九同皆以剛居剛而行其正也九二咸臨吉无不利象曰咸臨吉无不利未順命也二為卦主與初同德初剛正二剛中初與四應而二與五應所謂剛中而應者此爻也其于諸隂亦不以非應而外之无所不臨之象故與初並稱咸臨但爻曰吉无不利象何以曰未順命程傳云至誠相感非由順上之命本義云未詳注疏則云二未盡順五之命臨川鄒氏云二之應五非專以順命為感其間或有未順者无害其為咸也愚竊謂未順命當指四隂而言二陽在下四隂在上其勢尚壯未必皆順以從陽夫子于陽長之時致防微之慮所以補爻辭未言也李隆山曰山澤通氣其卦為咸而澤上有地初二爻亦謂之咸乃隂陽之氣相感也六三甘臨无攸利既憂之无咎象曰甘臨位不當也既憂之咎不長也三以柔居剛兑口在内卦之上與二陽同體先為所臨與三隂同類其性悦甘言取容之象張彦陵曰二陽乃難悦之君子也六三以悦取容既不為君子所許上三隂以其求媚于陽也亦不以同類見收進退失據故无攸利而有憂聖人就其憂之一念撥轉之若曰既知所憂則自有无咎之道正不必以甘為臨耳象曰位不當諒其所處之艱也曰咎不長廣其自新之途也一説三為悦主不嫌陽之偪已而甘為所臨但于下文接不去耳六四至臨无咎象曰至臨无咎位當也至臨本義只就下應初九説蘇氏易傳則云陽至而遂順之愚竊謂四在坤下近與兌比地之臨澤无如此爻之至親至切兼與初應非貎親而情疎者與三之甘臨不同三以柔居剛故位不當此以柔居柔故位當所以同為无咎而三獨多憂兩爻相反當合看六五知臨大君之宜吉象曰大君之宜行中之謂也知去聲當臨之時柔中居尊不忌剛長而以柔接聰明睿知足以有臨者也左右皆隂獨與九二正應即此便是知人則哲君臨之道莫有宜于此者詩稱宜民宜人宜君宜王是也象申之以行中見得知臨不是以苛察為明只在不剛不柔行事得中所以得吉耳上六敦臨吉无咎象曰敦臨之吉志在内也爾雅邱一成曰敦邱坤上一畫地之最厚處猶艮上為山之最高處故彼曰敦艮吉此曰敦臨吉程傳云兌終則悦甘臨者小人之事坤終為厚敦臨者君子之德志在内指初二上之志在從二陽五既尊賢上更加䕶持所以為敦也坤下巽上觀盥而不薦有孚顒若觀去聲自上示下曰觀讀去聲自下視上曰觀讀平聲卦取自上示下之義爾雅闕謂之觀是也二陽在上衆隂所仰猶王者居尊臣民屬目卦以觀名似為外飾之事文王揭出德化之妙用以示觀道之精蘊廟中者境内之象也盥而不薦二句是觀字注脚盥者以水潔手也薦者獻祭品也不字只作未字解有孚者誠也顒者仰也凡入廟承祭者始必以水盥手此時尚未薦而誠意所孚有若鬼神之在其上至于薦則備物矣但取盥而不薦以見顒若之孚不在物而在誠蘇子瞻曰盥者以誠薦者以味二語得之先儒或謂盥則誠意方專薦則誠意已散仁人孝子之享帝享親豈初䖍而終怠乎胡敬齋謂盥而不薦不可以辭害意盥則必薦葢言盥而不薦之時在下者已信而瞻仰之以見觀感之神速故下文言神道設教云云以下句屬觀者言與彖傳下觀而化正合本義正為八月之卦彖曰大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣下觀觀字平聲餘俱去聲本卦與臨反對皆二陽四隂臨二陽在下觀二陽在上卦彖皆以陽為主可見撑天柱地者二陽也不徒曰在上而曰大觀在上者必合順巽中正以為觀而後成其大也聖人用此道為觀于上盡誠盡敬不大聲以色而在下者自觀而化夫子就卦辭推出一層説不足申釋上文神字即從上化字看出觀乃天之神道只是四時不忒聖人以之設教只中正以服天下便是聖人之神道以教顯神非以神為教也觀字句不連天之神道讀象曰風行地上觀先王以省方觀民設教觀民觀字平聲六爻同朱與三曰風行天上人不見其形也風行地上遇物斯形水平而風盪之樹靜而風動之无形而无不彤者風行地上之象也古帝王巡守之禮葢取諸此愚按地有五方各成風氣巡守所至陳詩以觀民風納賈以觀民好惡修其教不易其俗齊其政不易其宜凡以順風土耳風為教象春夏之風生物長物仁之教也秋冬之風肅物凝物義之教也觀民設教所謂樹之風聲也是以先王尚之初六童觀小人无咎君子吝象曰初六童觀小人道也木義天卦以觀示為義爻以觀瞻為義皆觀乎九五也愚按内卦諸爻以去五之逺近為所見之明暗初隂在下去五最逺所見不真童觀之象以其童也體剛居柔未可判其為君子小人故爻辭兩言之若以為小人下觀而化則无咎也若以為君子亦隨衆而觀斯為吝矣象直斷其為小人道葢如深山窮谷之民不識不知與兒童所見无異者也六二闚觀利女貞象曰闚觀女貞亦可醜也張彦陵曰初之童局于才二之闚短于識愚竊謂二柔順中正不出戸庭乃女子之正道以其所見不廣故為闚觀象説文闚閃也葢從門内邪視之狀在女子則為利貞在丈夫則亦可醜猶恒九五婦人吉夫子凶之意合兩爻觀之可見人主舉動為天下所共睹苟非天觀在上則婦人小子皆能窺見隱微矣此又聖人言外之意六三觀我生進退象曰觀我生進退未失道也三亦欲觀國之光者而爻柔位剛為四所隔外度之人不如内度之已觀我生者自考其生平也居下卦之極是可進之時在上體之下又是可退之時進固可以行道退亦可以修道小象斷之曰未失道出處大事不嫌詳審也楊誠齋曰三五皆曰觀我生三審已以從人五審人以修已六三似漆雕開六四觀國之光利用賓于王象曰觀國之光尚賓也進退之介在六三四已近君宜進不宜退矣九五陽明在上故曰觀國之光内卦三隂草莽之臣也四與五比市井之臣也不曰臣而曰賓者古人未仕則君賓興之仕而未祿猶以賓禮待之不統臣也諸侯來朝亦有三恪來賓之典左傳陳敬仲筮得觀之否稱六四為公侯是已王指九五作賓于王家者四也尚之者五也五為貴德尊士之君四為羣隂領袖内三爻所視為進退者也近者觀光逺者可知若依注疏尚字作志意順慕解于用賓尚賓之義説不去矣九五觀我生君子无咎象曰觀我生觀民也九五中正以觀天下為全卦之主出身加民萬邦所仰下之觀化者不一童觀闚觀觀國各隨分量為淺深而五之自觀者我生而已何為我生中正是也不求為聖為神但求為君子不求有譽但求无咎象中之曰觀民言時時返而自觀果不失中正足為民所具瞻否所謂觀人以修已也君子无咎對初爻小人无咎説君子小人猶言君民也上九觀其生君子无咎象曰觀其生志未平也上與五爻詞畧同舊注多以其生為上九之自觀愚竊謂其字當指五以五自觀曰我生以上觀五曰其生君子无咎幸九五之猶在君位也葢本卦與臨反對八月有凶正當觀之時剝則九月之卦矣觀之異于剝只多九五一陽其係甚重其幾甚危上與五同德身居事外志在扶陽目睹下四隂之方長初二乃兒童婦女一流固无足賴三之進退不過自為身謀四之國賓亦非腹心之寄上之眼界開濶觀盛而知衰觀治而知亂世運一變將成剝不啻切膚之痛志安得平小象以志未平補爻辭所未盡直指出上九心事以結大觀在上之全局剝之碩果不食猶賴有斯人也夫吳草廬云上居卦外惟自觀其身而已釋其字亦得但把上九説成一箇自了漢于象辭志未平難合震下離上噬嗑亨利用獄本義噬齧也嗑合也物有間者齧之而後合王注謂噬嗑乃去間之卦愚按間去則噬嗑卦中自有亨義凡君臣父子兄弟朋友有離間者皆當去之用獄乃噬嗑中之一事也卦體九四一陽居三隂中强梗不服之象不曰用刑曰用獄者必先究治情偽知其為閒乃可致刑六爻皆治獄之官六五柔中居尊為用獄之主此利用獄之義又按凡齧者下動而上不動震在下而動噬必及之賁與噬嗑卦形相似而賁不為噬者艮止與震動異耳艮震合而成頥則亦下動之象但中四爻皆隂无陽以間之又為養道觀象可以知變矣彖曰頥中有物曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也當去聲上下二陽與頥象同頥中无物卦名曰頥此有九四一陽間于其中必湏間去噬乃可嗑嗑則亨矣剛柔分三句正所以得亨處三隂三陽之卦獨于噬嗑言剛柔分者震離分居内外取明動相資也于剛柔言分于雷電言合者分之則上與下未噬之象合之則動而明已噬之象分者其體合者其用也以其動而明故曰章柔得中而上行雖不當位專指六五一爻不當位卦彖所未言夫子推原文王之意謂五以柔居剛位雖不當然居上以寛為主所以利用獄也本義自益卦六四之柔上行以至于五而得其中為卦變愚竊謂兩爻同在上卦似不得云上行据卦變圖噬嗑自否來于内卦三柔中分初六一柔為上卦之五是謂柔得中而上行上卦得柔而成離五本陽位而柔來居之故不當位義當如此來氏不取卦變多從反對看于他卦徃來之象為順至噬嗑之于賁兩卦初上皆陽二五皆隂惟三四兩爻剛柔互易與彖傳柔得中而上行不合反對之例于此卦獨難通象曰雷電噬嗑先王以明罰勅法雷電二字先儒或以為誤以卦體離上震下也其説始于李鼎祚程傳亦謂象无倒置者本義直云雷電當作電雷愚按本卦彖傳云雷電合而章又泰卦坤上乾下大象不云地天交泰而云天地與此例同只依原本經文未必誤也黃氏曰抄亦云然上卦本離火夫子易火以電乃取在天之象所謂天討有罪也黃氏日抄云雷電本一氣而雷為主電者雷之精光今按凡大兩之候雷將發聲必先之以電光而後霹靂隨之故王者亦先明罰而後勅法明罰如電先雷而顯勅法如雷繼電而至潘雪松曰利用獄是臨時明罰勅法是平時愚又謂罰者一時所用之法法者平日所定之罰不言用罰而曰明罰辨别詳審使人知所避不言行法而言勅法告戒威嚴使人知所畏皆在未用獄之前不待有間而後冶也吳草廬云聖人之用刑不掩人以所不備不慢令而予之死得其義矣初九屨校滅趾无咎象曰屨校滅趾不行也程傳滅傷也黃氏日抄云恐止是滅没如過涉滅頂之義以校滅没其趾與滅鼻滅耳同與傷字異義愚又按中爻互艮艮為趾初陽横于艮止之下屨挍之象本義云初上无位為受刑之象愚竊謂初為震主亦治獄之官也周禮秋官掌囚中罪桎梏注云在手曰梏在足曰桎桎足械也亦曰校屨校者著校于人之足如納屨然滅其趾使之不得行也初所治之人其罪尚輕只用屨校之刑小懲而大戒故无咎初曰趾上曰耳人身自下至上也初震體宜其行而互艮故曰不行上離體宜其明而互坎故曰不明兩爻之吉凶在此六二噬膚滅鼻无咎象曰噬膚滅鼻乘剛也二柔順中正上與五應聴斷易以得情噬膚之象凡獸肉无骨者曰膚儀禮豕膚内則麋膚皆是也荀九家艮為鼻卦體自二至四互艮九四一爻當之正卦之所以為間者膚肉易噬言二之治獄不用深詢已得主名用能滅鼻使不濫及也滅鼻與滅趾滅耳皆用刑之義人處胎中鼻最先生比之于惡是為禍本二之滅鼻罪人斯得矣何咎之有初為動主二因初以動故曰乘剛中正則得情乘剛則能斷乃與之之詞與他卦言乘剛者不同先儒謂噬膚而烕其鼻于器中殊難理㑹六三噬腊肉遇毒小吝无咎象曰遇毒位不當也當去聲下同愚按獄至此凡三訊矣三偪近于四離火在前二所噬之膚至此為腊肉矣去惡較難于二有噬腊遇毒之象周禮腊人掌田獸之脯腊膴胖之事注云小物全乾為腊漢書五行志厚味實腊毒注云腊久也味厚者為毒久葢腊肉有味積之久而成毒猶人有過積之久而成惡噬者至此乃遇之不免小吝由三所居之位不中不正也然時當噬嗑雖吝无咎據爻例三與四凡遇毒似當指四而小象歸諸位不當此反躬責已之論九四噬乾胏得金矢利艱貞吉象曰利艱貞吉未先也愚按以全體言四為一卦之間以爻位言則四亦為除間之人内卦三爻三訊已終至此則獄上于大司冦矣九四為大臣之位胏乾肉之有骨者噬之猶難于三四已變離體以其溺于三四重隂之間恐有狥私之念而未光明正大故戒以利艱貞程傳于金取剛于天取直葢謂治獄者必得剛直而利在艱難正固然後吉也本義引周禮獄訟入鈞金束矢而後聴之謂得用刑之道黃氏日抄云金矢黃金皆象也合從程説蘇紫溪曰得金矢所謂訟得其理非為訟人言也若借周禮之文以作解則未受民辭而先受金矢此豈可為訓哉愚又按矢百為束三十斤為一鈞必入金矢而後聴其獄竊恐貧民之寃无由上達肺石矣六五噬乾肉得黃金貞厲无咎象曰貞厲无咎得當也愚按此爻所謂柔得中而上行者人主以好生為德故貴柔而得中五柔中居尊受成于四獄已具矣周禮腊人掌乾肉與腊肉同兩爻同為離體離為乾卦故一象乾胏一象乾肉又本皆乾體同為金象故一得金矢一得黃金離得坤之中爻故坤曰黃中離曰黃離又旅卦六五亦離中爻也曰一矢亡故本爻金當得黃而无矢四以剛噬五以柔噬貞者正也刑當其罪之謂四曰艱貞艱在貞之前其難其慎惟恐不得當也五曰貞厲厲在貞之後雖正猶危不敢自謂得當也四為臣位詘法易執法難故艱而利貞五居君位用刑易恤刑難故雖貞亦厲彖傳曰不當位六三曰位不當此則曰得當者言必如此方得當而无咎也前以位言此以事言上九何校滅耳凶象曰何校滅耳聰不明也何去聲與荷同何猶負也滅耳謂校加于人首而没其耳中爻自五下互三為坎坎為耳上之一陽貫于坎耳之上何校滅耳之象同一校也初滅趾則无咎小懲大誠喜其斂跡之早也上滅耳則凶怙終不悛惡其聽言之不明也聰不明猶云聴不聰此小人之罪名也上為三公之位獄至此當制刑矣但治獄者刑期无刑故初以滅趾者之无咎為己之无咎上以滅耳者之凶為己之凶聖人之心吉凶與民同患如此豈初自屨校上自何校乎象數論曰治獄宜設困苦之象而中爻所言皆燕享祭祀之用膚者豕腹下肉祭禮别為一鼎所謂膚鼎也腊者周禮腊人所供乾腊也胏者肉而聮骨者也乾肉大饗之腵脩也先王設刑官原以輔教之不逮一民有罪曰我陷之也刑豈仁人所輕用哉故以燕享之義寓于縲絏之中所謂不忍人之心不忍人之政也愚按六爻就人身取象者噬嗑咸艮凡三卦本卦爻辭之取象痛傷人之肌膚也漢書刑法志云禹制肉刑湯武順而行之初之滅趾剕刑也二之滅鼻劓刑也上之滅耳則刑也中間噬膚噬腊噬胏无非取于肉者葢三代時皆用肉刑也先儒謂初上无位為受刑之人愚又謂卦體頥中有物四也初上兩爻乃頥之象欲丢一間必用兩剛似不當作犯罪之人㸔有犯罪之人必有斷獄之人初上則定其所犯之罪名者也古之聴獄者史以獄成告于正正聴之以獄成告于大司冦大司冦聴之棘木之下以獄之成告于王王命三公叅聴之三公以獄之成告于王王三又然後制刑今以爻位配之初則司冦吏所謂史也二與三正也四為大司冦五為王上則三公也屨校之罪定于初厯二三四中更幾讞獄无異辭五既虚中受成復命上叅聽而獄始決刑至于上則一成而不可變矣故凶本卦當與訟卦叅㸔訟者獄之未成兩造方爭非剛中之君不能斷噬嗑則已斷而用刑非柔中之君不能恤訟惟九五為聴訟之主噬嗑六爻皆治獄之人兩卦之不同在此像抄曰噬嗑之道日用飲食之道也有一步不可輕舉一毫不可自昧者焉所以膚可嗑腊可噬遇毒之害不可以不防雖噬而得金天得黃金艱貞之厲不可以不戒當為先事之禁滅趾于方動之初毋為養成之惡滅耳于不可救藥之地此治身之道即治天下亦此道離下艮上賁亨小利有攸往賁文飾也卦名取剛柔相錯為義愚按繪事後素質在文之先剛一畫奇在先質也柔二畫耦在後文也乃縁禮飾情之謂剛不得柔則不能亨柔不附剛則不能有攸往六爻惟初與四應往遇艮則止故曰小利彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下愚按彖傳將卦辭分兩截説天地間所謂文者不過一剛一柔間雜而成但文有去來而質无離合上截妙在一來字下截妙在一分字質極而柔自外來文之初无致飾之意而真情自相流通故亨文所以文其質也而分剛以為文則加一分華采即減一分實意故小利有攸往要見不可過為縁飾之意舊説此亦卦變之一柔來文剛屬内卦分剛文柔屬外卦凡三陽之卦變皆自㤗來㤗外卦上爻之柔今來居賁内卦之二爻故曰柔來而文剛㤗内卦三爻之剛分而為賁外卦之上爻故曰分剛上而文柔程傳云凡卦變自乾坤來本卦下本乾體中爻變而成離上本坤體上爻變而成艮離在内故曰柔來艮在上故云剛上與蘇氏易傳同李衷一曰賁乃噬嗑之倒體所謂柔來文剛者只是噬嗑之離上倒入而在内也六五之柔來居二在初三兩陽之間豈不是柔來文剛所謂分剛上而文柔者只是噬嗑之震下倒成艮而居上也初九之剛上居上九在四五二隂之上豈不是剛上文柔合三説觀之于往來上下之義甚明朱子謂卦自損來者柔自三來而文二剛自二上而文三自既濟來者柔自上來而文五剛自五上而文上既云自損來又云自既濟來與卦變圖之説不合且二三俱在内上五俱在外似不得謂之來周易説統亦以此為疑天文也之上本義從王弼本謂當有剛柔交錯四字愚謂天文也三字緊承柔來文剛剛上文柔兩文字來中已有剛柔交錯之意程子所云質必有文自然之理故謂之天文似不必多添四字胡雲峯曰以卦變言則剛柔之交可以見天文以卦德言則文明各止其分可以見人文鄭申甫曰文明而不以止則致于飾矣故必以止方為人文非止其文乃救文之弊也朱子發曰有此人便有此文非增飾于人之外也愚又謂天文人文亦不必推廣泛論即從卦象看出過觀者就卦象而觀也天文本自適中而時或有過文質之變則察之而㢮其補救人文貴乎文明惟止之而使文不至勝質乃可以化成天下象曰山下有火賁君子以明庶政无敢折獄薛敬軒曰大象論用刑者凡四卦皆離火之用可見用法貴乎明噬嗑豐以火雷雷火交互為體威明並濟也賁旅以山火火山交互為體明慎並用也愚按旅火在山上曰不留獄賁火在山下曰无敢折獄一則止而明一則明而止皆取治獄之象庶政之中折獄為難折獄之道在得實情不在文飾故弄法者曰舞文刻覈者曰深文濫刑者曰文網煆煉者曰文致皆自作聰明而逞其敢心者也君子以明庶政法離體也无敢折獄法艮體也初九賁其趾舍車而徒象曰舍車而徒義弗乘也舍上聲愚按二與初比柔來文剛而初自與四應又以剛德居明體賁趾之象上爻變坤為艮舍車之象舍車而徒者不受二之文也人情皆以乘車為榮徒步為辱初獨以徒為賁不以乘為賁義在故耳君子行義必于涉足之始觀之象曰義弗乘見初以道義自持非貧賤驕人也又按易于初爻言趾者凡六噬嗑之滅趾大壯之壯趾夬之前趾鼎之顛趾艮之艮趾大都陽動而隂静静者吉而動者凶賁初以剛居剛舍軒車之榮而安于徒步即此便是賁趾處所謂素履无咎者與六二賁其須象曰賁其須與上興也顔師古曰毛在頥曰須侯果曰三至上有頥體二在頥下須之象本義依之先儒多作是解惟楊誠齋云須待也愚按詩卭須我友須乃待之義内卦離為火中爻互震為木在離火之上火必待木而先始發火者薪之用也二待三而成賁猶火待木而發先火性炎上故曰與上興也九三賁如濡如永貞吉象曰永貞之吉終莫之陵也先儒云一剛居二柔之間上下受賁中爻互坎濡之象水火調和相潤以成文故曰賁如濡如愚按三當賁道之隆賁則懼其盛濡則懼其溺凡下之陵上卑之陵尊皆從文勝質起幸其體剛以質為主是其貞也惟永之則吉象曰終莫之陵言終不可使文勝質也終字與永字應六四賁如皤如白馬翰如匪冦婚媾象曰六四當位疑也匪冦婚媾終无尤也三以剛居剛質也四以柔居柔文也皤如白馬何以皆取朴素為義來矣鮮曰此爻變巽為白皤如之象中爻互震馵為白足顙為白顛白馬之象又互坎為亟心之馬翰如之象四與初應本匪冦也乃婚媾也以隂居隂位非不當也疑之者初也初方舍車而徒見四之白馬翰如故疑其為冦然卦體剛柔交錯四之應初以上求下終成婚媾而无尤也愚按三四兩爻當叅看三以柔文剛懼其文勝而史故曰永貞吉曰終莫之陵欲三固守其質也四以剛文柔不慮其質勝而野慮其以質為野也故曰匪冦婚媾曰終无无欲四崇尚夫質也聖人于文質之際軒輊如此六五賁于丘園束帛戔戔吝終吉象曰六五之吉有喜也程傳以丘園為上九本義只屬本爻説愚竊謂六五下无應與而與上比上乃艮之主爻艮為小石為徑路丘園之象先儒釋此爻多從聘賢取義今從之五屈萬乘之尊式賢士之廬雖賁于丘園實人主之自賁也戔戔束帛其跡似吝然任質則事可久守約則漸反淳終歸于吉程傳以束帛戔戔為受其裁制義亦難曉小象只舉一吉字包括爻辭竊就上文作釋可見戔戔者非吝財惜費由其中心之好别有一種相得處故曰有喜也又按子夏傳五匹為束三𤣥二纁戔戔作殘殘言其狹小如殘帛然亦可備一解上九白賁无咎象曰白賁无咎上得志也文猶質也不可偏廢所患踵事増華流蕩不且耳上居艮終文明以止者也賁極則反質故曰白賁四之賁如皤如賁與白猶二也白賁則白即賁矣大傳所謂賁无色文心雕龍所云賁象窮白貴乎反本也愚又竊謂卦體上九一剛文四五之柔者而上以白賁為志四之皤如五之束帛皆上承白賁之志故曰上得志以此化天下而成風俗豈有文勝之弊哉何咎之有愚按彖傳文明以止句是全卦綱領挽回世風而化成天下多由于此六二以離明為主于内正柔來文剛者初之賁趾三之賁濡皆受文焉則剛以濟柔而化為明矣上九以艮止為主于外正剛上文柔者四之賁如皤如五之丘園束帛皆受文焉則柔以濟剛而化為止矣項平甫曰聖人謂人之情不可以徑行也故因其辭遜之節而為之文以飾之其交也以禮其合也以禮百拜而飲三辭而受六禮而婚所以飾其情而養其恥荀氏不知而以為偽晏子不知而以為勞聖人曰此天時之變人倫之化不可一日无也觀賁之六爻无一爻凶咎聖人之貴文如此存此一段議論以見兩卦反對之義與序卦正合所謂物不可苟合也周易玩辭集解卷三
