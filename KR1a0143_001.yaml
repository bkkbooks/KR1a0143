body:
  text: 周易玩辭集解卷一翰林院編修查慎行撰上經愚按易歷三聖謂伏羲畫卦文王繫辭孔子十翼自漢以下司馬遷班固鄭康成皇甫謐皆云然至孔穎達作注疏始據左傳韓宣子適魯見易象云吾乃知周公之德斷為卦辭文王所作六爻辭周公所作其説乃定又按古易經文與翼傳各自成書乾卦之先彖辭次爻辭次彖傳次大象次小象則鄭康成本王輔嗣因之而以文言附於後自坤以下諸卦輔嗣又以彖傳附卦彖後以大象次彖傳後以小象附各爻後石經注疏從之俗本通行已久今次第不復改更取便觀覽乾下乾上乾元亨利貞程傳曰乾天也天者形體乾者性情楊仲堅曰乾非即天乃天之所以為天愚按乾以健為義元亨利貞四德周流貫徹只是形容乾健之妙乾是伏羲第一卦元亨利貞是文王彖辭第一句三百八十四爻多從六畫中出六十四卦卦辭多從元亨利貞四字中出全易之綱領也他卦言元亨利貞者多有益辭又或言元亨利而不言貞或言亨利貞而不言元或止言元亨或止言利貞或止言亨或止言利增減一字便不渾全惟乾卦六畫純陽故以元亨利貞歸之孔子發揮文王所未言析為四德以仁義禮智配之彖傳文言凡九百餘字又從天道推之人事反覆贊嘆不窮朱子則云若論文王之易大通而利於正只作兩字説孔子見得此四字好便挑開説了故本義例以元亨利貞為占辭竊謂聖人觀象繫辭初不專為占者設也卜筮乃易中一事故曰以卜筮者尚其占黃氏日抄謂伊川專主於辭以明理乃易之要日用常行無往非易此語得之按京氏易以十二辟卦配十二月本義於泰否等十卦多引其説乾為四月之卦不言於本卦而言於姤坤為十月之卦不言於本卦而言於復以上彖辭初九潛龍勿用孔疏陽爻稱九陰爻稱六者老陽數九老陰數六老陰老陽皆變周易以變者為占也蔡伯靜云初二三四五上為位之陰陽九六為爻之陰陽李子思曰陰陽之氣自下而上各分為六層卦之六爻似之故畫卦自下起愚按第一爻言初第六爻當言終第六爻言上第一爻當言下所以文不同者下言初則上有未義大過彖云本末弱是也六言上則初有下義本卦小象云陽在下是也互文相通愚按説卦傳以震為龍乃乾之初畫也乾是陽生之世故六爻皆取象於龍自潛至亢一龍也初潛在下先儒或以為舜始漁於雷澤之象孔疏云若漢高帝生於暴秦之世隱居為泗上亭長是已愚更以後世事證之元史王約傳仁宗在東宫家令薛居敬上言陜西分地事因被命往理約謂居敬曰太子潛龍勿用之時而為飛龍之事可乎以太子為潛龍於義似尤當邵子有云龍能大能小然受制於陰陽之氣得時則能變化失時則不能今初陽在潛陰氣正盛勿用者謂非用事之時而非世之不我用也勿字大有執持在陸庸成所云勿者我勿之也九二見龍在田利見大人上見字音現遁世為潛出世為見九二陽氣發見故曰見龍以六畫言二地位有田象以三畫言二人位有人象二五皆陽大人象天下皆尊仰之之謂見皆蒙其澤之謂利卦體純陽自然剛健若論中正惟九五一爻而已九居二則中而不正其象昭然本義謂九二剛健中正初甚疑之後看胡雲峯集陳定宇櫟問曰本義乾九二剛健中正莫是剛健得中否胡答云凡言九五剛健中正易之正例乾九二變例也雲峯本義通釋恪遵朱子故云爾其實易取中正六十四卦一定不移者似不應於第一卦先成變例程傳大德之君九五也乾坤純體不分剛柔而以同德相應本義云九二雖未得位而大人之德已著王陽明云乾六爻只作一人看蓋乾卦無臣位所以爻辭與九五皆稱大人同為物所利見來矣鮮謂利見九五之君以行其道則仍以二為臣位矣九三君子終日乾乾夕惕若厲無咎無俗作旡非程傳曰理無形也故假象以顯義乾六爻皆然可見六爻無非龍象君子即大人亦龍德也因九三重剛不中在下之上居危懼之地則當有警惕之義故托君子以發之世稱龍嗜睡而物莫能害惟其善惕也有三之惕而後能躍能飛觀文言曰上不在天下不在田固以龍德稱九三矣若以君子指占者言餘五爻豈無占者乎陽為日居下乾之終日終而夕之象三當二乾之交故曰乾乾惕若老氏所云惕兮若驚也王伯厚曰危者使平易者使傾易之道也乾以惕無咎震以恐致福愚又謂聖人無危機惕若是其危機常存此心反復其道謀始要終何咎之有凡言無咎者本宜有咎處之得其道故無咎獨於三四言之者三多凶四多懼也九四或躍在淵無咎已離下體故曰躍猶在上體之下故曰淵淵卑于田二言在田四曰在淵者田乃發見之處淵乃安身之處在田未能變在淵則可變之時矣或者未定也亦詳審之辭時當變革更加詳審安其身而後動何咎之有九五飛龍在天利見大人陽氣自下而上龍之由潛而見而惕而躍至于飛則陽剛極盛之時九五中正而居尊位在天之象鄭康成曰五於三才為天道清明無形而龍在焉飛之象也愚謂飛者龍之本體天者龍之本位雲雷風雨翕然交集萬物皆見四海咸蒙其利非九五孰能當之此乾之主爻上九亢龍有悔位以九五為中正過是則亢矣大旱為亢旱龍居上九不能致雨亢之象陽極盛則陰將生龍既飛則必至于亢故有悔謂所處適當其會宜有此悔也潘雪松曰惟亢而後天者盡惟悔而後天者還程敬承曰乾道豈遂以亢終其妙在悔識時通變從有悔得也黃石齋曰亢者上九之遇悔者上九之德多不説壞爻象方與文言純粹精之義合洪範筮占曰貞曰悔先儒多以內卦為貞外卦為悔胡雲峰曰乾上九外卦之終曰有悔坤六三內卦之終曰可貞於此發諸卦凡例愚按屯需之九五皆曰貞豫之六三蠱之九三皆曰悔亦有不盡然者易固難拘一例也用九見羣龍無首吉朱子以此爻為揲蓍之法故其言曰五行成數去其地十之土而不用則用七八九六而已陽竒陰偶故七九為陽六八為陰陽進陰退故九六為老七八為少然陽極于九則退八而為陰陰極于六則進七而為陽一進一退循環無端凡占法皆用變爻揲蓍所以用九六取其變也見羣龍謂值此六爻皆九也無首謂陽變而陰也剛而能柔故吉愚按左傳蔡墨云在乾之坤曰見羣龍無首吉杜元凱注亦如此説又按蘇子瞻力闢老少進退之説其言曰謂陽極于九其次則七極者為老其次為少則陰當老于十而少於八謂陰不可加于陽故十不用猶當老于八而少于六也則又曰陽順而上其成數極于九陰逆而下其成數極于六夫自下而上陰陽均也稚于子午而壯于己亥始于姤復而終于乾坤陰猶陽也曷嘗有進退順逆之别乎且此自然者天地且不能知豈聖人得制其豫奪哉愚竊謂此一爻兼承上六爻來故不但曰龍而曰羣龍羣龍未嘗無首只是屈伸往來其首不可得而見所謂善藏其用也故曰吉易主于用用易在人似非以剛變為柔為無首也若論周公爻辭只就爻立義尚未及卜筮用九用六只當單指乾坤六爻説至于老少之説四聖人所不言乃卜筮家欲考動爻之變始分别老少言之耳或者難曰六十二卦皆無用爻何獨于乾坤有之應之曰乾坤為易之門所以獨稱用九用六者九六有象七八無象也以卦則六子之卦皆從乾坤中出以畫則六子皆乾坤之畫如震之初乾畫也震之二三坤畫也乾坤用九六而諸卦之得竒畫者皆用乾之九得偶畫者皆用坤之六此乃體易之人用易之道謂揲蓍之法亦在其中則可謂用九用六二爻專為揲蓍而設則恐未必然臨川鄒氏以用九節總為上九之爻辭屬于亢龍有悔之下王氏亦云然竊采其説以備一解以上爻辭彖曰大哉乾元萬物資始乃統天元與天叶照古本彖曰當作彖傳曰程子所云卦下之辭為彖夫子從而釋之本義亦云後凡言彖者倣此今刻本多削去傳字似以夫子釋彖之辭為彖矣凡彖傳以易象與天道雜言見易之取象皆天道也以人事終之者見易之天道言人事也此六十四卦之例本義此一節首釋元義愚按卦辭元亨利貞四字並言夫子獨提出元字而贊之曰大哉乾元蓋一元之氣流行無間而物物于焉資始始萬物亦始天地故曰統天乾之為天文周所未言至夫子乃以天道發明乾義元者大也始也資始專就氣言有是氣方有是形故下文説到流形雲行雨施品物流形以下四節叶彖言元亨利貞傳獨不言亨本義謂此釋乾之亨也楊誠齋云雲行雨施氣之亨也品物流形形之亨也愚謂萬物皆資始于氣氣之發泄則為雲雨所謂神氣風霆也不曰萬曰品者資生以後形質已具物各分類可為區別矣流形者如水之流有生生不息之機蔡虛齋謂品物只是植物若飛潛等物豈待雲雨然後流形耶愚竊謂不然形對氣言氣以成形飛潛動植多在品物之內若但作植物看則解之雷雨作而草木甲拆矣非乾元統天之道也大明終始六位時成時乘六龍以御天天字叶汀張彥陵曰萬物由元而亨人見其為始而已聖人心通造化默契夫循環之運會終始于一元而不生分別之見愚謂陽大陰小陽明陰暗故曰大明乾元資始者也有始則有終乾之六位也只據卦畫言之始于一畫終于六畫九三下乾之終九四上乾之始終始者時也而六位成乎其中矣六位言六畫之定分六龍言六爻之變象六位以時成六爻因以時乘一剛加于初位是乘以一龍一剛加于二位是乘以二龍餘四位凖此天之六陽時序如此聖人加畫乾卦其序亦如此一無成心惟潛見惕躍飛亢之時而已時字首于乾象發之上以元始總明乾德曰統天此六龍各分其位曰御天統天言乾之體如身之統四體御天言乾之用如心之御五官本義謂是乃聖人之元亨乾道變化各正性命保合太和乃利貞孔疏云變者以漸改移化者忽然而改本義云變者化之漸化者變之成愚謂變者自無而有萬物之出機化者自有而無萬物之入機陽變陰化統而歸諸乾乾道變化而萬物各正性命所謂氣化相催也以物所受謂之性以天所賦謂之命各正者有分別而不相侵奪萬物各具一元也保者常存而不虧合者翕聚而不散太和即資始之氣以其運而不息謂之道以其融而無偏謂之和萬物得是氣而生有生則有成凡資始于元流形于亨者至此無少欠缺萬物統會一元也本義云此以釋利貞之義愚竊謂此節須從元亨説到利貞細玩乃字可見首出庶物萬國咸寧本義此言聖人之利貞也程敬承曰首即乾元所云始也聖人體元以治世首萬物即能終萬物愚按爻辭以無首為吉彖傳云首出者龍之潛見惕躍飛亢皆時為之六龍以時乘雖首出猶無首也首出不專指飛龍如夫子雖不得位而為萬世師非潛龍之首出者乎庶物各正性命聖人又何事焉猶為之領袖云爾雖有一切制作不過順其自然非謂功業既成萬國始各得其所而咸寧也張待軒曰羲皇六畫萬法皆備以一字名之曰乾以四字形容之曰元亨利貞夫子彖傳止以乾元二字提綱而亨利貞錯綜點綴其間知元之為元則亨利貞特張弛闔闢之節候耳説易者謂此是元此是亨此是利貞逐節界斷意味索然矣以上彖傳彖傳小象皆夫子贊易之辭往往作韻語舉乾坤二卦餘可知象曰天行健君子以自強不息每卦大象夫子別從卦體取義與文周絶不同乾與他卦又不同不曰重乾曰天行健健者乾之德故以卦德易卦名用冠六十四卦之首天之運行一日一周健者運而不息也卦體上下純陽無一毫陰柔以雜之故健在人為無欲則剛君子以之自強不息以者體易而用之也用易之人稱名非一大約前時創典則稱先王因時經世則稱后用之身心學問則稱君子胡翼之曰天南極入地下三十六度北極出地上三十六度狀如倚杵其用則一晝一夜行九十餘萬里人一呼一吸為一息一息之間天行八十餘里人一晝一夜有萬三千六百餘息故天行九十餘萬里天之行健可知故君子法之以自強不息云愚謂君子與天共一乾德乾者健也自強便是健不息便是行一刻不行即一刻失其健矣按此為大象傳而釋六爻者為小象傳皆夫子所繫六爻之辭乃周公所繫也本義謂此周公所繫辭本連上作一氣讀王弼削去傳字但稱象曰以致經傳淆亂胡雲峰曰上經乾曰天行坤曰地勢坎曰水洊至離曰明兩作先體後用也下經震曰洊雷艮曰兼山巽曰隨風兌曰麗澤先用而後體也以上大象傳潛龍勿用陽在下也下音戶與普叶以下六節當有象傳曰三字以別于文言陽謂龍下謂潛周公取象于龍大是竒特夫子恐人泥于迹象涉于竒怪故詮之云陽在下明經之稱龍即陽氣也孔疏云第一爻言陽在下是舉自然之象胡庭芳云易卦爻辭無陰陽字夫子于乾初曰陽在下于坤初言陰始凝陰陽之稱始此即太極所生兩儀之一以為諸卦通例陰陽之名一立而動靜健順剛柔竒偶大小尊卑變化進退往來由是著矣見龍在田德施普也在田則龍德已見表出德字明九二所謂大人雖未得君位已具君德矣德施普從見字看出如日之方升光已遍照矣終日乾乾反復道也以下三節叶反者自上而下復者自下而上如云反反復復同在一條路上易之變化不窮只是反復其道反復莫密乎晝夜君子日乾夕惕如晝夜之往來總在道理上盤旋而已道本無止息君子體道之精神亦與道同其無息也或躍在淵進無咎也咎音如咎繇之咎上聲讀與道造叶四當進退之位爻言或躍乃疑而未定之詞夫子決之曰進無咎所以破其疑也本義謂可以進而不必進似與小象不合飛龍在天大人造也古韻蕭豪與尤侯通用平昃皆同九二之大人有德而無位九五則有德有位矣張橫渠云成性則躋聖而開天乃大人自造之地位本義云造猶作也言作而在上非制作之作也愚按大人釋龍字造釋飛字止是釋飛龍在天之義世稱天地曰造化曰大造聖人居天位而行天道其有造于天下萬世者大矣亢龍有悔盈不可久也久與首叶陽氣至上而極故曰盈天道虧盈人道惡盈豈是可久之理亢者時之盈盈不可以久居悔者幾之微幾不可以久滯處亢之道只在不盈而已非但氣不可盈德亦不可盈盈其德是昻其首以為龍矣合下節看更明用九天德不可為首也天德即乾道也吕東萊曰乾者萬物之首非有心于首萬物也雖有首而未嘗為首本義謂陽剛不可為物先愚按不可為首為用九者言也不好處在為字上九一爻在五爻之上翹然自以為首聖人揭出不可為三字以示戒此用九者所當知朱啓莊曰周公爻辭取象離竒險怪夫子作小象傳不于取象處下一注腳斷章摘句一一歸之于理或提掇其要或推原其故或疏解其義或申明言外意或發為感嘆或寄諸調笑離竒險怪悉歸平淡以上小象傳文言曰元者善之長也亨者嘉之會也利者義之和也貞者事之幹也君子體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事君子行此四德者故曰乾元亨利貞長上聲自此至末皆文言也釋文引梁武語以文言為文王所作觀辭中屢稱子曰其為孔子無疑程傳云他卦彖象而已獨乾坤更設文言推乾坤之道施于人事也愚按施于人事不獨文言他彖傳往往有之但諸卦皆從乾坤中出故于此反覆發其藴耳元者善之長也至足以幹事八句出左傳襄九年穆薑薨于東宫始往而筮之遇艮之隨是于周易曰隨元亨利貞無咎元體之長也亨嘉之會也利義之和也貞事之幹也體仁足以長人嘉德足以合禮利物足以和義貞固足以幹事云云中間惟體德兩字不同歐陽永叔謂穆薑筮時去孔子之生尚十三年因疑文言先孔子而有愚竊意此八句本古隨卦繇辭夫子引之以贊乾耳其分元亨利貞為四德亦出穆薑語張待軒曰元亨利貞四字潔靜精微未易窺測夫子不得已以天道明其一二至于人如何法天如何學易不別下注腳只用穆薑相傳之語稱述一番而結之曰君子行此四德者故曰乾元亨利貞以見乾道雖精深莫測只行此四德便呌做元亨利貞四德散見于諸卦者或分或合體例不一其純粹以精者獨乾而已故于此首發明之愚按乾道所包者廣有在天之元亨利貞有聖人之元亨利貞有在人所具之元亨利貞此則就人所具而言元即在人之仁亨即在人之禮利即在人之義貞即在人之知此四句説天德之自然體仁以下四句説人事之當然直指君子身上所謂行此四德者也孔疏謂元亨利貞即仁義禮信不論智者行此四事並資于智也文中子亦以貞屬信獨朱子以智為貞愚謂智與信合方為貞孟子所云知斯二者弗去是也知是智弗去是信若知不真則信亦不堅焉得為貞張彥陵曰四德雖分屬要以一元為主元者生生大德萬善之所始也亨利貞三者總謂之善合亨利貞而統于一元則謂之長嘉即善之通生機發越其彪炳者聚會在此利即善之宜生理充足其整肅者調和在此貞即善之成生機完固其紛紜者植立于此袁了凡曰前言元者善之長長在理也後言體仁足以長人又推理之長以長天下也前言嘉之會以美之所聚為亨也嘉會足以合禮又推合禮以為美也利者義之和是即義以明利利物足以和義是因利以成義也貞者事之幹是以立事為貞貞固足以幹事是謂貞能立事也朱子又嘗以健順分配四德其言曰仁禮健而義知順又曰禮者仁之著知者義之藏見玉山講義當時學徒無深究其説者惟李孝述問曰以仁為動之始猶春之生物禮為動之極猶夏之長物義為靜之始猶秋之收而去華就實智為靜之極猶冬之藏而歸根復命朱子答之曰此元亨利貞所以循環無端也申以上第一節彖辭之意初九曰潛龍勿用何謂也子曰龍德而隱者也不易乎世不成乎名遁世無悶不見是而無悶樂則行之憂則違之確乎其不可拔潛龍也何謂也是自相問答之詞後放此此以人事釋勿用之義勿用者何隱也惟有龍德故能隱夫子恐人將爻辭勿用作不為時所用解故又深贊之著三箇不字兩箇無字兩箇則字以見內斷于心審時之未可有為故確乎不拔如此困學記曰不易乎世是第一層到不成名才是真遁不見是而無悶是名心盡處也遁世如龍之蟄猶可測其為龍不見是則為魚為蛇為蝘蜓不得以龍目之矣説統曰道可以易世不易者無必用之心隱可以成名不成者無潔身之迹愚謂兩悶字猶從已起見到樂行憂違處全是萬物一體之懷有憂有樂所以為堯舜若僅無悶而不憂則巢許一流矣九二曰見龍在田利見大人何謂也子曰龍德而正中者也庸言之信庸行之謹間邪存其誠善世而不伐德博而化易曰見龍在田利見大人君德也行去聲九居二據爻例中而不正者也所以夫子稱龍德不曰中正而曰正中蓋謂初爻在下三爻在上二所處之位正在內卦之中耳程子謂中重于正正有不中中無不正朱子亦以九二為中正余于爻辭下辨之詳矣夫子恐人以二爻為臣位故再以君德表之中庸二字發于此庸言之信庸行之謹皆中德也兩庸字跟龍德説來人知龍德之變化而不知所以變化處只在平常日用之間謹信便是間邪間邪便是存誠邪自外入故曰間誠自我有故曰存如此則不徒善一身兼可以善一世無智名勇功之迹故不伐非近功小效之比故博而化九三曰君子終日乾乾夕惕若厲無咎何謂也子曰君子進德修業忠信所以進德也修辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危無咎矣君子終日乾乾何所事乎進德修業是已日新之謂盛德故曰進富有之謂大業故曰居忠信所以為進德之基修辭立誠所以為居業之地幾者心之初動義者事之得宜知時之當進而至乎上則奮然至之而不失事機之會知時當退而終乎下則確然終之而不拂分義之正三在內卦之上故曰居上位在外卦之下故曰在下位知至而至非為位也故居上而不驕知終而終不出位也故在下而不憂去驕憂之根而乾惕之精神自因時而露正見進修工夫無歇手處此君子所以終日乾乾也九四曰或躍在淵無咎何謂也子曰上下無常非為邪也進退無恆非離羣也君子進德修業欲及時也故無咎本義內卦以德學言外卦以時位言愚按上進二字釋躍字義下退二字釋淵字義無常無恆釋或字義非為邪非離羣釋無咎義非字與欲字應四居可上可下可進可退之時故曰無常無恆上下無常似乎為邪而非為邪進退無恆似乎離羣而非離羣當躍而躍乃其時矣進德修業承上説來三之進修正欲及此時而上進也故無咎九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也同聲相應以下七句總以聖人作而萬物覩一句為主聖人作飛龍在天也萬物覩利見大人也孔疏所謂上陳數事本以明此此亦同類相感也本乎天者親上二句則統説天地間同類感應之義本義謂本乎天者動物本乎地者植物正蒙曰有息者根于天無息者根于地此動植之分也息謂呼吸錢飲光曰聖人上有天道故本天之類親聖人如天聖人下有地道故本地之類親聖人如地九五具天德居天位故一以聖神功化之妙言之楊誠齋曰所謂各從者一物親一物而已至于聖作物覩無一物之不親所謂出乎其類也出乎其類故統乎萬類上九曰亢龍有悔何謂也子曰貴而無位高而無民賢人在下位而無輔是以動而有悔也楊誠齋曰六龍之首故曰貴曰高非君非臣故曰無位陽剛無陰故曰無民自四以下皆從九五故曰無輔今按高貴以品格言無位無民無輔以時地言六位時成亢亦龍之一位而云無位者五居君位唐虞之世自有巢許也人豈有不動之時曰動而有悔妙在一動字天下極重難反之勢只在聖人一反掌間致悔之由止在一動處亢之道止在一悔而已以上第二節申爻辭之意不釋用九一節不知何意歐陽永叔以初九日以下六節為漢時傳經師弟子問答之辭疑經之原文未必如此存其説俟再考潛龍勿用下也以下二爻叶胡庭芳曰前陽在下以氣言此下也以位言見龍在田時舍也舍去聲與下叶本義言未為時用也舍字作用捨之義馮竒之謂與出舍于郊之舍同適止于此非久安也蓋龍既在田視初潛之時又進一位矣似不當作捨字解終日乾乾行事也以下四爻叶以乾惕之心施之于事則為行道外無行反復其道只是行所當行而已或躍在淵自試也上下進退之宜內度諸已非人所能喻故曰自試蔡虛齋曰試其時非試其才也飛龍在天上治也不徒曰治而曰上治所謂有德有位操制禮作樂之權者也亢龍有悔窮之災也災叶兹去聲龍至于上亢亦時為之也陽窮于九天運適然于龍何病故曰窮之災乾元用九天下治也釋用九而稱乾元何也一百九十二陽爻皆用九此與諸卦不同其治亂關係天下非一身一家之事故曰天下治孔疏云九五只是一爻故云上治乾元總包六爻故云天下治以上第三節以人言潛龍勿用陽氣潛藏內卦三爻叶藏字有不可輕泄之意藏之而為氣顯之而為光此初二兩爻之別也見龍在田天下文明陰晦陽明陽光發見文明之象也終日乾乾與時偕行時者天行也天行晝夜一周日乾夕惕法天行也或躍在淵乾道乃革外卦三爻叶曰自試猶有斟酌進退意曰革陽氣離下而上天道至此一變矣此就卦畫發取象之意飛龍在天乃位乎天德潘雪松曰龍潛龍見龍躍皆非其本位惟在天乃還其本位人皆以九五為位乎天位聖人曰此乃位乎天德可見雖有其位苟無其德不過位乎天位而已亢龍有悔與時偕極極者盡也一陽生于子六陽盡于已皆時為之下乾與時偕行上乾與時偕極龍至于亢宜其有悔適當其時也此就文詮釋之辭乾元用九乃見天則龍之變化無定形亦無定用顧無定之中有一定不易者存焉是謂天則天則不可見于用九而見之潛見惕躍飛亢何在非用而皆統于乾元故曰乾元用九乃見天則以上第四節以時言乾元者始而亨者也利貞者性情也乾始能以美利利天下不言所利大矣哉文言首論人事既分元亨利貞為四德矣至此復論天道故以元亨利貞合言之再提乾元者以元統四德也始亨乾始兩始字與元同義彖所謂乾元者即氣化之始而亨非別有乾元也彖所謂利貞者即乾元之性情非別有利貞也何以知之于乾元之所能者知之蓋物生于春非亨利貞之所能惟元為生物之始以美利利天下者乾之能也到得利貞之時收斂歸藏已是坤道用事萬物之享其利者以為坤之功也而不知皆乾之功此之謂不言所利乾之所以為大彖傳曰性命此曰性情蘇氏易傳曰情者性之動也泝而上至于命沿而下至于情無非性者卦以言其性爻以言其情情以為利性以為貞愚謂有生以後情用事而性日漓利貞者斂情以歸性也大哉乾乎剛健中正純粹精也六爻發揮旁通情也時乘六龍以御天也雲行雨施天下平也本節叶元亨利貞文王所已言夫子復以剛健中正贊乾之大純陽之謂剛健無俟詮解矣中正二字全易要領夫子于乾卦發之中者二五所同中正者九五所獨三百八十四爻中而正者六十四中而不正者亦六十四正而不中者百二十八不中不正者亦百二十八湛元明謂陰陽剛柔器也得其中正者道也羅整庵闢之云但以得中正者為道不過六十四爻而已餘爻三百二十以為非道可乎夫子贊純乾為中正意蓋如此又以乾德之妙非剛健中正所能盡復加純粹精三字孔疏謂六爻皆陽是純粹本義云純者不雜于陰柔粹者不雜于邪惡王凝齋云純言其不二粹言其不雜精則進乎粹矣趙汝梅曰兩卦不雜曰純八純卦是也剛柔不雜曰粹乾坤是也愚更以説卦為證為玉為金即純粹之義金取其不雜故言純玉取其無瑕故言粹精者純粹之至也趙汝梅曰聖人于乾彖三釋之取義各殊此章專主爻畫言結束在六爻發揮一句性者爻之剛柔情者爻之好惡聖人因乾以發諸卦玩爻之例愚謂卦以言其性爻以言其情發揮者陳列其象旁通者曲盡其情也聖人立六爻以通乎乾之情乘六龍以行乎乾之道雲行雨施以沛乎乾之澤則乾道之大不在乾而在聖人矣聖以上第五節重贊乾道以及人御天之功君子以成德為行日可見之行也潛之為言也隱而未見行而未成是以君子弗用也未見見字音現弗疑當作勿三箇行字要細玩德未成未可以行德既成然後可見之行君子成德之稱初九德已成矣可見之行矣爻辭謂之潛者時當隱而未見是以行而未成朱子云如伊尹耕于有莘之野便是行而未成此潛龍所以勿用君子學以聚之問以辨之寬以居之仁以行之易曰見龍在田利見大人君德也程傳學聚問辨進德也寬居仁行修業也困學記曰學貴多聞見故曰聚問以析精粗故曰辨寬居則有優遊不迫之功仁行則有天理流行之樂書贊成湯曰克寬克仁九二之為君德審矣愚竊謂仁以行之一句為主聖人雖具天德亦由學問而成功夫全在行仁君德之成以此君子體仁足以長人故仁以行之便是君德九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危無咎矣重平聲後同九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故無咎兩節當合看三居下卦之上四居上卦之下三四兩爻以剛遇剛故皆曰重剛猶離言重明巽言重巽非陽爻居陽位之謂也所以九四居陰位者亦曰重剛統六爻而論取其純陽析三四兩爻而論則嫌其重剛也黃氏日抄云三居內卦之極四居外卦之始兩陽交際之地故皆為重剛其説甚明本義謂九四非重剛重字疑衍者似未可依下卦以二為中三則已過上卦以五為中四則不及故皆不中九四只多中不在人一句前言進退無恆非離羣也此云不在人非離羣乎蓋三四皆人位四之躍淵離三而近五對天而言故曰人非謂人事已盡可以聽天正見天人交際之會舉動不可不慎或者據其迹疑者指其心惟其疑必審時以進矣故無咎夫大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而况於人乎况於鬼神乎同聲相應一節釋利見大人之義已備矣此言大人與造化合德天地者造化之主宰日月者造化之精華四時者造化之流行鬼神者造化之功用覆載無私之謂德容光必照之謂明寒暑不忒之謂序禍福先見之謂吉凶大人無不一一與之合以其創所未冇曰先天以其時至事起曰後天要之先天妙用即在後天奉時中天之弗違大人即先天大人之奉天時即後天程傳所云大人心通天地之先而用必後天事起天地之後而知必先天也亢之為言也知進而不知退知存而不知亡知得而不知喪其惟聖人乎知進退存亡而不失其正者其惟聖人乎喪去聲胡雲峯曰初九潛之為言也二句釋一潛字而言君子者再必君子而後能安于潛也上九亢之為言也三句釋一亢字而言聖人者再必聖人而後不至于亢也愚竊謂亢乃時之所必至聖人豈能避但當進退存亡得喪之會自有處亢之道其知冇此而不知冇彼者道在故也道者正而已以進為正安得顧其退以存為正安得慮其亡其知進不知退知存不知亡乃所謂知進退存亡而不失其正也此時一有知退知亡之心則失其正道矣若作以退為進以亡為存解又是老氏之學與聖人亦無涉其惟聖人乎兩句總是贊嘆處亢之道非謂聖人不至于亢也以上第六節復據爻辭發不盡之意按胡雲峯本義通釋乾坤二卦自文言曰起至末別為一卷編在説卦傳之前竊意本義原本當如是而通釋遵之今原本不復見矣坤下坤上坤元亨利牝馬之貞君子有攸往先迷句後得主句利句西南得朋東北喪朋安貞吉喪去聲説文土位在申坤字從土從申愚按陰起于午至申而三本卦三畫皆陰坤象也元亨利貞與乾同中多牝馬之象説卦乾為馬坤為牛牝馬者從乾而稱之也馬取其健牝馬取其順利牝馬之貞坤道以從乾為正也天行健而坤從之冇攸往之象君子有攸往以下開示其例以明牝馬貞之意不必專就人事説往則宜審先後坤從乾則以乾為主矣先乾而往則迷而不利後乾而往則得主而利利者順也得主是迷之反後得主三字當連讀觀文言自明蘇氏易傳云先則迷而失道後則順而得主張橫渠曰東北喪朋雖得主有慶而不可懷也故曰安貞吉楊慈湖曰迷為失道後而得主利莫大焉午亭陳氏曰陽為陰主得主故利參同契于坤卦亦云先迷失軌後為主君利字當另為一句本義謂先迷後得而主于利以主利二字為句似與文言不合西南東北據方位言見于大傳西南乃坤之本位兌離巽三陰與坤居之故曰得朋東北則乾與震坎艮皆陽位非陰之朋矣故曰喪朋惟喪其三陰之朋絶類以從陽乃安于正而吉也邵子所云坤統三女于西南乾統三男于東北即是此象像抄云何以西南言得得兌所以承艮得離所以承坎得巽所以承震合之皆為坤承乾何以東北欲喪巽喪成歸于震而巽乃終離喪成歸于坎而離乃終兌喪成歸于艮而兌乃終合之皆為成歸于乾而坤乃終一説西南為地陰土也東北為山陽上也據卦體只有西南無東北故一曰得一曰喪愚又謂陰數偶二畫相比便是朋象故易之言朋者在陰位居多本卦六畫皆陰陰往求陽交一陽而為復則羣陰相繼隨陽復卦所來之朋即坤卦所喪之朋也合觀全卦總不外以陰從陽四字之義彖曰至哉坤元萬物資生乃順承天本節元與天叶乾元資始坤承乾之資始以生物故亦稱元始之者氣也氣至而生即坤元矣才資始便資生始之之氣機在乾而行于坤故並資生亦即承其始氣而發育萬物故曰乃順承天順字為全卦要領夫子贊乾元曰大哉贊坤元曰至哉大者廣言之也至者究言之也分量固自有別大則無所不統至只是就他分量亦到極處也先儒或謂乾是吾儒之學坤是老氏之學儒者以剛為用故稱大人老氏以柔為用故稱至人元此節釋坤二字坤厚載物德合無疆含𢎞光大品物咸亨以下四節叶承上文來坤積順而成厚凡其所生之物即其所載之物也乾不言覆物而坤言載物地之所載何一非天之所覆故曰德合無疆謂與乾之不息合德也遊定夫曰含言無所不包𢎞言無所不有光言無所不著大言無所不被含𢎞以靜翕言光大以動闢言愚按含𢎞光大四字正極贊坤德之厚以其虛而受故曰含𢎞以其美而章故曰光大正萬物潔齊相見之象品物咸亨隨坤而亨也此節釋亨字牝馬地類行地無疆柔順利貞君子攸行牝馬地類類字與後類行義同猶云陰類也程傳行地無疆謂健也乾健坤順坤亦健乎曰非健何以配乾其動也剛不害其為柔也本義亦以行地無疆為順而健愚竊謂坤之貞只在順似不必添出健字以象言則為牝馬行地以德言則為柔順利貞可見順以從陽乃坤之正道以柔順為利貞則君子之所行也行字與上行地相應往此節釋利牝馬之貞君子有攸二句先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶叶羌三百篇皆如此讀柔者不為物先先之斯述失坤道矣處後以順隨而不倡乃得坤道之常陽與陰非類也陰當從陽彖辭所謂得朋者不過同類為朋耳惟喪其同類之朋而從陽則有得主之慶可以有終矣聖人之惡朋黨若此項乎庵曰乃終有慶所以發文王言外之意臣之事君婦之從夫皆喪朋之慶也此節釋先迷以下五句安貞之吉應地無疆安貞吉從人事言張彥陵曰人有才而不露于分之所在無成而代終德器深厚直與厚德載物者一般故與地之無疆相應彖傳三箇無疆曰德合是坤配乾曰行地是坤之本德曰應地是人法坤之德此節釋安貞吉句象曰地勢坤君子以厚德載物地者形體坤乃地之性情李去非曰天以氣運故曰行地以形載故曰勢愚按凡以高臨卑以上臨下則謂之勢地居卑下而曰勢者以其順也坤字只作順字解與乾之健相配地之大勢西北高東南下水皆就下其順可知就勢以見其順由順而知其厚君子以厚德載物自處于萬物之下卑而法地與坤厚載物同所謂應地無疆也初六履霜堅冰至象曰履霜堅冰陰始凝也馴致其道至堅冰也凝與冰叶凡卦初爻取象于履者自坤起例説卦乾為寒為冰此何以取坤象王伯厚曰乾初九復也潛龍勿用即閉關之義坤初六姤也履霜堅冰即女壯之戒愚謂坤初爻自陽變陰冰霜畢竟是陰氣所結然惟陽消于內故陰凝于外聖人于乾曰為冰正可作此處注腳陰陽之氣皆自下而上震為足陽在下也巽為股陰在下也履霜者陰從足下起也霜一陰之象冰重陰之象當履霜之始即厪堅冰之防爻曰堅冰至要其終也象曰至堅冰原其始也始字最重陽主發散陰主收斂故曰凝大戴禮霜陰陽之氣也氣盛則凝為霜廣韻霜凝露也馴者狎順之意其道小人道長之道積漸馴習以致陰道盛長豈一朝一夕之故哉一説陰以凝為道凝又要堅乾初曰陽在下坤初曰陰始凝陽惟下然後能發生陰惟凝然後能收斂此兩爻乃三百八十四爻之根蒂不説壞坤道別是一解郭京易舉正曰按陰始凝也上誤增堅冰字履霜與堅冰時候頗異不合相連結愚又按三國志魏文帝紀注太史許芝引此象辭履霜上加初六二字而無堅冰字古本當然郭所云殆唐以後本也似當從古衍堅冰二字作初六履霜本義陰陽者造化之本不能相無而消長有常亦非人所能損益也然陽主生陰主殺則其類有淑慝之分聖人作易于其不能相無者既以健順仁義之屬明之而無所偏主至其消長之際淑慝之分未嘗不致其扶陽抑陰之意所以贊化育而參天地者其旨深矣朱罍庵曰坤與乾陰陽相反夫子于乾取象于冰周公于坤取象于冰者乾以時令坤以氣質也以此知説卦取象苐舉一隅則剛柔健順雖各有據依而義可相通惟變所適康成令升之徒既失之膠固即輔嗣謂馬取其健牛取其順者亦得其一説而不知其又有一説也屯賁明夷以陰爻而稱馬何取于健革既濟以陽爻而稱牛何取于順乎六二直方大不習無不利象曰六二之動直以方也不習無不利地道光也方與光叶乾道莫盛于九五坤道莫盛于六二八卦正位坤居二六二柔順中正坤之主爻也先儒謂陽主進進至上卦之中而止陰主退退至下卦之中而止天數五地數五乾進止五坤退止二自上而下數之則仍五也五者中數也河圖之説本此直方大三字程子謂至大至剛以直本義謂其德內直外方而又盛大蔡節齋謂直者發于內而無私曲方者止于外而有定則內直外方其德乃大來矣鮮曰直字即至柔而動也剛之剛也方字即至靜而德方之方也大字即含𢎞光大之大也張待軒曰自其承天之氣有施即生更無曲撓曰直自其因物賦形整齊畫一曰方自其厚德載物配合無疆曰大愚按三字當分三德看以是三德承天而動毫無造作則曰不習無不利蘇紫溪曰不習非不假于學也曰敬曰義皆學中事然緝熙敬止初非矜持是之謂聖學愚又按乾其動也直二得坤道之純故小象以承天而動之事屬之直以方以字只作而字解直方以大居然配乾乾曰天道坤曰地道是以全坤歸此一爻矣光者發越之象人但知日月星辰為天道之光不知地之為道萬物資生百穀草木莫不有光輝發越之盛非地道光乎六三含章可貞或從王事無成有終象曰含章可貞以時發也或從王事知光大也大與下節害叶知去聲陽為章陰為含三位陽而爻陰含章之象凡人露才揚已最是薄德章而能含厚德士也含章乃可貞之道其或出而從王事但當盡臣道而不可自專其成曰有終則不為事始可知三居下卦之上故云終夫子懼人誤認可貞而一意株守也故申之曰以時發言含章非終于韜晦乃待時而發發者何為乾用也乾知坤行惟行之而知之光大始著是之謂從王事是之謂代乾有終也王指乾與他卦以君道屬五者不同坤六爻皆臣道也吕伯恭曰惟其知光大故能含晦尋常人胸中淺狹才有一功一善便無安著處矣六四括囊無咎無譽象曰括囊無咎慎不害也囊所以貯物括者結其口使不得出六四重陰不中天地閉塞時也括囊之象人之處世無咎則有譽無譽則有咎二者往往迭相得失顧當六四之地無咎又須無譽乃為藏身之固東漢諸賢只為名心未忘互相標榜致成黨錮之禍非不慎之害與象但舉無咎者君子處末世不求有功但求無害譽者咎之招也六四之所以無咎者殆由無譽與六五黃裳元吉象曰黃裳元吉文在中也中下與窮終叶乾為玄坤為黃乾為衣坤為裳黃中色裳下飾六五柔順居中黃裳之象元吉與大吉不同元吉者大善之吉也蓋吉有大而未必善者矣文在中與六三含章不同三所居之位不中章須含而不露五則柔順在中含章時發正其時矣故曰元吉坤六爻無君位猶乾六爻無臣位程傳謂此乃婦人居尊位之戒竊恐未然此小象言中之始九五為剛中正六二為柔中正此外或言剛中或言柔中或言正中或言得中或言以中或言中行中道皆其例也上六龍戰于野其血玄黃象曰龍戰于野其道窮也以陰從陽順之至也當純陰用事時忽然説到龍戰取象大是竒特戰者逆也順之反也胡雲峯曰不言陰與陽戰而曰龍戰于野與春秋王師敗績于茅戎天王狩于河陽同一書法干令升曰坤位未申之維而氣溢酉戌之間故曰于野王介甫云陰盛于陽故與陽俱稱龍陽衰于陰故與陰俱稱血蘇君禹云其血玄黃直是血戰猶言血流漂杵愚按此爻變艮為剝陰陽相薄戰之象以寒凝之極而微陽薄之雖欲不戰得乎往戰之地未離乎陰而來戰之龍已乘乎陽龍當指陽血當指陰言玄黃者此震一索為長男之候故大傳云震為龍為玄黃此其證也乾上九曰窮之災坤上六曰其道窮易窮則變上是當變之爻也用六利永貞象曰用六永貞以大終也用六與用九同説見乾卦貞即牝馬之貞坤德也用坤之柔則當法坤之貞利在長久而貞固此用六之道也象曰以大終大謂陽終即乃終有慶無成有終之終程沙隨云乾以元為本所以資始坤以貞為本所以大終胡仲虎云坤安貞變而乾則為永貞安者順而不動永者健而不息愚又謂乾以上為首坤以上為終變乾上之陽為陰則陽不為首變坤上之陰為陽則陰以大終乾以大始而坤以大終終不失順承天之意凡窮于上者反于下故坤變則為復乾變則為姤先儒或謂乾六爻變為全坤坤六爻變為全乾而後占用九用六之二爻愚亦未敢謂然文言曰坤至柔而動也剛至靜而德方後得主而有常含萬物而化光坤道其順乎承天而時行叶杭至柔二句本義謂此是釋牝馬之貞胡雲峯曰乾文言釋元亨利貞乾以君之所主在元也坤文言則首釋牝馬之貞坤以藏之所主在貞也愚又按乾卦文言將元亨利貞四字一一分疏坤卦于彖辭但取後得主三字其餘多作贊辭歸重在順承天三字乾剛坤柔定體也坤道固至柔矣然乾之雲行雨施至坤而生物之機不可遏止屈撓則又柔而能剛乾動坤靜定體也坤德固至靜矣及其承乾之施陶鎔萬類各有定形不可移易則又靜中之方此皆坤隨乾後得乾以為主乃坤道之常也故云後得主而有常先儒以此句為釋坤之利含𢎞光大彖傳所已言此復言含萬物而化光先儒云此句釋坤之亨含萬物貞元之交也愚謂地之成物不翕聚則不能發生以草木驗之凡果核其仁必兩瓣偶而屬陰其中生意則竒而屬陽生意妙在能含含而後能化化而後有光所以含之化之者陰也所以為光者陽也總之只是順只是承天時行而已故以唱嘆結之蘇子瞻曰物非剛者能剛惟柔者能剛蓄而不發其極必決故曰沈潛剛克又云物圓則好動故至靜所以為方亦有理解蔡虛齋謂其動也剛承乾而動愚竊謂坤一爻動則為震故曰其動也剛又據説卦傳立地之道曰柔與剛其靜也翕其動也闢是地自有剛有動但天包地外地旋于天中質不動而氣則動是為承天耳時行者時未至不敢先時既至不敢後正見坤道之順積善之家必有餘慶積不善之家必有餘殃臣弒其君子弒其父非一朝一夕之故其所由來者漸矣由辨之不早辨也易曰履霜堅冰至蓋言順也慶叶平聲乾文言元者善之長坤則兼善不善言之善惡之積其初由于一身不曰身而曰家者家之中不止一人也吕伯恭云胸中有容著善處善自然積胸中無容著惡處不善自然不積愚竊謂本節積字漸字順字理解相通積善之家子順其父妻順其夫以陰順陽者也積不善之家父順其子夫順其妻以陽順陰者也同一順也以漸而積善不善遂分焉是不可不辨辨之早則積善而有餘慶辨之不早則積不善而有餘殃上文兼言善不善下獨言弒父弒君者非惡其順惡其順乎陰也夫子目擊春秋時事故于坤初爻發之蓋言順也順字本義云當作慎按小象于六四一則曰慎不害再則曰蓋言謹矣此處只當作順經文未必訛也順者積漸使然非一朝一夕之故即所謂馴致其道吕伯恭所云大凡惡念最不可順他得其解矣直其正也方其義也君子敬以直內義以方外敬義立而德不孤直方大不習無不利則不疑其所行也爻辭曰直曰方本自明白夫子恐人以率意徑行為直故復申釋之曰直者心無私曲所謂正也恐人以拘攣固執為方故復申釋之曰方者處置合宜所謂義也兩其字乃推原周公之意如此敬義二字即直方之注腳敬以養其直于內義以行其方于外內直則旁引不得外方則移易不得內外交養表裏相資則德不孤矣何大如之何不利之有不疑所行與乾可見之行義同皆成德之事非勉強而行者朱子有云立吾心于不疑之地然後若決江河以利吾往即其解也李子思曰乾九三言誠坤六二言敬誠敬者乾坤之別也後儒言誠敬之學本于此乾九二言仁坤六二言義仁義者陰陽之辨也後儒論仁義之用本諸此陰雖有美含之以從王事弗敢成也地道也妻道也臣道也地道無成而代有終也臣子雖有才美含藏而不自表暴以之從王事非才不足而不能有成乃分所弗敢也試看地出雲為雨起氣為風而必上之于天地道之當然也妻道臣道何獨不然地道以承天為順故無專成代有終者乾始能以美利利天下坤承其後而終之則地之所以有終者乃代天而有其終也天地變化草木蕃天地閉賢人隱易曰括囊無咎無譽蓋言謹也天地變化二句乃引起下文之辭上二句言草木而不言賢人下二句言賢人而不言草木互文也草木蕃召南序所謂朝廷既治庶類蕃殖是也賢人隱洪範傳所謂百穀不成俊民用微是也坤本陰卦六四以陰居陰不中不正天地閉塞之象賢人當此身將隱矣焉用文之故必無咎而又無譽所謂慎密而不出也吕東萊曰人與天地萬物同是一氣泰則見否則隱猶春生秋落氣至則應衆人強自隔絶故與天地之氣不相通氣至而覺者賢人而已愚竊謂陰遇陽則為泰陽遇陰則為否陰遇陰則曰閉天地閉塞時賢人之見幾獨早其隱與龍德同不曰聖人曰賢人者聖人遁世因乎天賢人避世因乎地也賢人是開關啓鑰之人亦是扄戶逃名之人聖人不然闢則為乾闔則為坤矣君子黃中通理正位居體美在其中而暢于四支發于事業美之至也愚按此節極贊中德之妙黃中者文在中也有諸中而應乎外則為通應乎外而得其當則為理正位謂五之位居體謂六之體雖居尊位而以下體自居美在其中自然英華外發暢于四支者日新之德四體不言而喻也凡其發揮于事業無一非臣道所當為而不嫌其僭坤德之至合乾之大故曰美之至也如周公相成王而制禮作樂此足以當之陰疑於陽必戰為其嫌於無陽也故稱龍焉猶未離其類也故稱血焉夫玄黃者天地之雜也天玄而地黃愚按全卦多是以陰從陽到末節大發扶陽抑陰之義一部易經本旨也陰豈宜與陽敵夫子于上六爻辭闡透周公之意開口便説陰疑于陽蓋坤自西南得朋至此陰氣極盛目中幾無陽矣其與陽戰乃勢所必然周公嫌其目中無陽也故獨稱龍戰若曰陰犯順而龍與之戰以討陰之義與陽不許陰為敵也然陽雖稱龍而陰猶未離其類論理陰雖盛必傷論勢陽孤亦必見傷遂成兩敗俱傷之象于斯時也忠臣義士剖肝而露膽庸夫豎子駢首而就戮不辨風塵焉知天地周公獨云其血玄黃者血陰物也見得陰恃其類而敢與陽戰咎不在陽可知夫曰玄黃則天地之色幾乎雜矣殊不知天玄而地黃者兩間之定分也陰其可雜陽乎觀象玩辭直無一字虛設季彭山云當陰陽有定位之時天玄地黃今陰陽相雜猶理欲未明也故曰其血玄黃于經文虛字似尚欠理會愚按聖人于乾六爻極著陽德之盛始終無異象于坤六爻微防陰勢之漸各因其德位之當否以斷其利咎與六十二卦例略同而不同于乾卦其于乾同者文言耳蓋天地間只有陰陽二氣乾居其大坤居其至故亦反覆申釋之但乾文言凡兩釋用九坤卦于用六一爻略而不釋蓋義已盡于彖傳爻象中矣周易玩辭集解卷一
