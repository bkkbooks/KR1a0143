body:
  text: 周易玩辭集解易類提要臣等謹案周易玩辭集解十卷國朝查慎行撰慎行字初白號悔餘海寧人康熈癸未進士官翰林院編修慎行受業黄宗羲故能不惑於圖書之學卷首河圖説二篇一謂河圖之數聖人非因之以作易乃因之以用蓍自漢唐以下未有列於經之前者一謂河圖出於䜟緯而附以朱子亦用河圖生蓍之証次為横圖圓圖方圖説論其順逆加減奇偶相錯之理次為卦變説謂卦變為朱子之易非孔子之易次為天根月窟考列諸家之説凡六而以為老氏性命雙修之學無闗於易次為八卦相錯説謂相錯是對待非流行又謂相錯只八卦四卦相錯次為羣卦説二一論十二月自然之序一論陰陽升降不外乾坤次為中爻説以孔穎達用二五者為是次為中爻互體説謂正體則二五居中互體則三四居中三四之中由變而成次為廣八卦説謂説卦取象不盡可解當闕所疑其言皆明白篤實足破外學附㑹之疑經文次序用注疏本乾卦之未有注曰按胡雲峯本義通釋乾坤二卦自文言起至末别為一卷編在説卦之前竊意本義原本當如是而通釋遵之今原本不復見矣云云蓋未見劉㝐刻本者㝐之舊刻聖祖仁皇帝特命開雕慎行侍直内廷何以未見頗不可解然其説經則大抵醇正而簡明在近時講易之家特為可取焉乾隆四十四年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀周易玩辭集解原序慎行童而讀易白首而未得其解也則仍於聖人之辭求之始而玩卦辭爻辭繼而玩彖傳大小象辭務於聖人之辭字字求著落詮釋其求諸經文而不得必先考之注疏復參以諸儒之說不敢偏徇一解亦非敢妄立異同平心和氣惟是之歸管窺蠡測亦間附一二雍正甲辰三月既朢查慎行識時年七十有五欽定四庫全書周易玩辭集解卷首翰林院編修查慎行撰河圖說一注易之家自漢唐以下未有列圖于經之前者朱子指河圖為聖人作易之由獨創此例後來科舉之學遵用本義遂無敢異辭愚据繫傳攷之竊謂河圖之數聖人非因之以作易乃因之以用蓍者也上繫第九章程子移天地之數于大衍之前本義云大衍之數五十以河圖中宫天五乘地十得之則朱子固以河圖為蓍數所從出矣不知于十一章何復指為作易之由觀本章經文首云天生神物末云河出圖洛出書明是先有蓍龜後有圖書天之生蓍以為易用河之出圖列象以示蓍之用聖人則之者因圖象而立揲蓍之法也所以下文接云易有四象在圖為七八九六在易為陰陽老少其數適相符聖人倚圖之中數用蓍衍之自八卦而六十四卦三百八十四爻參伍錯綜以盡其變圖與卦爻遂相為用而不廢然則河圖之出造化所以通蓍卦之變耳若論圖象五十居中一二三四為位六七八九為數止有四象初無八卦也蓋易有易之四象圖有圖之四象以七八九六合于陰陽老少而卦之變以出而蓍之用以神顧在伏羲畫卦之初止是一竒一偶于竒上再加一竒一偶于偶上再加一竒一偶兩儀四象天造地設不假安排布置豈待立河圖于前規仿而畫卦乎夫畫卦之由吾夫子固明言之矣仰觀天俯察地近取身遠取物于是始畫八卦果若河圖為作易之由夫子何不云觀河圖而畫卦乎夫子所不言者愚不敢信也夫子所明言者愚不敢悖也河圖說二客有難余曰因圖畫卦夫子所不言固已然則朱子之臆說乎曰非也其說出于劉歆衍于緯書而傳于邵氏朱子特篤信弗疑焉爾按漢書五行志劉歆以虙羲受河圖則而畫之八卦是也春秋緯云河圖龍發禮緯含文嘉云伏羲德合上下地應以河圖洛書則而象之乃作八卦孔氏劉氏鄭氏因以河圖為八卦東漢尚䜟緯其說相沿無足怪者晁氏讀書志云緯書偽起哀平光武既以䜟立故篤信之鄭𤣥何休以之通經曹褒以之定禮自苻堅以後其學始絶厥後韓康伯注繫傳削而弗采也孔疏雖雜引衆說初不列圖于經也周子于易發太極之義第云聖人之精畫卦以示於河圖無一言也歐陽公深以龍馬神龜為不經嘗力闢之程子云无河圖八卦亦須畫陸象山曰河圖屬象非作易之㫖袁樞仲亦疑河圖為後人偽作獨朱子堅信緯書之說于河圖析四方之合以為乾坤坎離補四隅之空以為兌震㢲艮此與後世納卦家以文王八卦納入洛書者何異哉蓋朱子于易不宗程而宗邵邵氏之學則傳自陳希夷朱子亦自謂先天後天圖其說皆出邵氏而康節之子伯溫作經世辨惑謂希夷學易止有一圖以寓陰陽消息之數與卦之生變則似河圖亦傳自希夷者但自希夷以前皆為方士所授受至希夷傳穆伯長伯長傳李挺之挺之傳邵堯夫本義宗邵始舉圖歸諸易耳善乎歸熙甫之言曰河出圖洛出書此大傳之所有也通乾流坤天苞地符之文非大傳之所有也以彼之名合此之迹不與大易同時不藏于博士學官千載之下忽出於山人野客私相付受雖其說自以為无所不通然有易則无圖可也或者又援論語河不出圖之言以相證此尤傅㑹之甚者天下豈有河圖既出復有一河圖哉使後之圖不異乎前則何煩復出使前之圖有異乎後是兩河圖矣夫子吾已矣夫之歎蓋在莫年即明王不興天下孰能宗予之意如謂易因圖作則前聖人既作易矣河圖復出夫子又將作一易耶余既作河圖說復細閱朱子全書其中數條有與鄙見相發明者因摘附于左按語錄云仰觀俯察遠取近取安知河圖非其中一事玩此條則與河圖為作易之由朱子已似稍變矣又感興詩云羲皇古神聖妙契一俯仰不待龍馬圖人文已宣朗畣王伯禮書云太極兩儀四象八卦伏羲畫卦之法也玩此二條則作易之由朱子亦自謂不因河圖矣又與郭沖晦書云七八九六所以謂陰陽老少者其說本于圖書定于四象大抵圖書七八九六之祖也玩此條則蓍數出于河圖朱子固嘗言之矣元儒胡雲峰說易專宗本義然於說卦第十章謂以一索再索為揲蓍求爻乃朱子未改定之筆愚亦謂因圖作易之說詳著于啟蒙得毋行世最蚤晚年於本義遂不復改定歟慎行年且七十方有志學易上无師承旁无朋友之講習間有所疑求諸注疏程朱而未能釋然者或從先儒語錄參稽得之意在攷信而已管窺錐指易道至大何所不容縱受嗤于衆目冀不獲戾于先聖爾横圖圓圖方圖說伏羲六十四卦次序横圖凡八層一分二二分四四分八八分十六十六分三十二三十二分六十四以乾始以坤終中分復姤二卦陽起于復陰起于姤陰陽交錯位置天然莫不從一分兩中出康節謂猶根之生榦榦之生枝明道謂加一倍法此圖盡之矣方圓二圖形體雖殊大要不離乎此圓圖左陽右陰一順一逆皆從中起左自復數右自姤數歴四卦而為震㢲又自震左數自㢲右數歴八卦而為坎離自離左數自坎右數歴八卦而為艮兌自兌左數自艮右數歴八卦而為純乾純坤其次序與横圖相合方圖自下而上有逆无順亦從中起由震一陽次離兌之二陽而成乾之三陽由㢲一陰次坎艮之二陰而成坤之三陰其分六十四卦疊為八層者第一層即横圖自乾至泰八卦也第二層即自履至臨八卦也第三層即自同人至明夷八卦也第四層即自无妄至復八卦也推而至第八層即横圖中自否至坤八卦也王魯齋云中斷横圖左右迴環是為圓圖八疊横圖是為方圖薛敬軒云三圖竒偶皆相對是已今合三圖觀之乾得一而夬倍一而得大壯倍兩而得泰倍四而得臨倍八而得復坤得一而剝倍一而得觀倍兩而得否倍四而得遯倍八而得姤此是加一倍法初以六十四卦左右上下分之各三十二降而為十六由十六而八而四而二而一此是減一倍法蓋卦順往故以倍而加圖逆來故以倍而減畫卦者漸分漸多筮卦者愈求愈少反復其道互相發明也邵子又云月者日之影陰者陽之影以其彼此交錯也然則偶者其竒之影乎横圖之影𦂳相錯者也圓圖之影遥相錯者也方圖之影斜相錯者也知順逆加減之法又知竒偶相錯之理而後可與觀卦而後可與觀圖卦變說大傳云爻者言乎變者也未有爻變而卦不變者上經三十卦反對者十二下經三十四卦反對者十六惟乾坤頤大過坎離中孚小過八卦正反相同則反其竒偶以相配卦體既變爻則隨卦而變三百八十四爻无一爻不變即无一卦不變无一卦不變則必皆有成卦之由所謂卦變者乃九六陰陽二老之交主占者臨時而言作易時何曾有某卦自某卦來之說乎夫子于彖傳或言上下或言來往或言内外或曰進而升或曰行而得位見于訟泰否隨蠱噬嗑賁无妄大畜咸恒晉暌蹇解升鼎漸渙等十九卦朱子因指此十九卦為卦變今据他卦推之如比損益三卦亦曰上下井彖亦曰往來胡雲峰著本義通釋皆闡明朱子之言獨十九卦變或及或不及而于涣彖傳明其意曰本義以二爻相比者為變朱子雖有是疑而未及改正也其亦不足於卦變之說而云然乎如屯以初上兩爻互換則成觀蒙以初上兩爻互換則成臨泰以初五兩爻互換則成井否以三五兩爻互換則成旅又如泰否二卦彼此互換亦可為四陰四陽之卦以初爻互換則為无妄為升以二爻互換則為訟為明夷以三爻互換則為臨為遯以四爻互換則為大壯為觀以五爻互換則為需為晉以上爻互換則為萃為大畜引伸觸類兩體中莫不有上下往來之象夫子何必舉剛柔相易者一一明言卦變之由乎其于六十四卦中偶舉上下往來之義言之于十九卦亦猶豫隨等十二卦或言時義或言時用或止言時豈此外諸卦无時无義无用乎竊攷卦變之說昉于左氏演於虞仲翔而仲翔之釋比卦曰師二上之五得位蜀才宋景文筆記引顔之推曰范長生自稱蜀才則蜀人也謂此本師卦動者惟一爻而已戴仲培曰左氏說卦變往往不過一爻薛文清讀書錄亦云卦變只換一爻後李挺之為六十四卦相生圖則臨遯兩卦自第二變以後主變之卦兩爻皆動已失虞氏之傳朱子因李氏之說別為卦變圖凡一陰一陽之卦皆自復姤來二陰二陽之卦皆自臨遯來三陰三陽之卦皆自泰否來四陰四陽之卦皆自大壯觀來五陰五陽之卦皆自夬剝來本取一卦之中剛柔相易兩爻往來者也乃其釋十九卦則又不然有取諸一卦者有取諸兩卦者有云上自某卦來下自某卦來又自某卦來取諸三卦者非特與虞李兩家不合即朱子亦自變其圖說矣凡卦以上體為外下體為内自外而内者為下為來自内而外者為上為往此易之通例也而无妄之剛自外來本義謂卦自訟而變九自二而來居初初與二同在内卦可謂之自外來乎此尤與經顯然不合者胡雲峰為之說曰或謂外卦為乾震之剛自乾來本義固未嘗言也其餘或兩爻互易並居内體而曰上曰往並居外體而曰下曰來愚于各體辨之詳矣薛河東以卦變為孔子之易愚竊謂卦變乃朱子之易也又按程傳謂卦變皆自乾坤來而闢古注賁自泰來之說然据其所稱乾坤者皆三畫卦即㤗否所分上下二體之乾坤也下乾上坤非泰而何朱子謂依程子變法則于四陰四陽之卦難通愚謂若依本義雜引兩爻三爻以證一卦之變亦何難通之有似未可是此而非彼也故余于雙溪王氏之言易獨有取焉曰卦變之說存而勿論可也天根月窟考康節以先天圖為伏羲之方位創為天根月窟之說其詩有云乾遇㢲時觀月窟地逢雷處見天根蘇君禹解之云復為天根陽含陰也姤為月窟陰含陽也愚攷先儒有以八卦言者指坤震二卦之間為天根指乾㢲二卦之間為月窟程前邨謂天根在卯離兌之中月窟在酉坎艮之中有以十二辟卦言者則以十一月為天根五月為月窟是已康節又有詩云天根月窟閒來往三十六宫都是春所謂三十六宫者其說凡六以八卦言者三乾一兌二離三震四㢲五坎六艮七坤八之次序積數為三十六又以乾一對坤八兌二對艮七離三對坎六震四對㢲五積四九之數為三十六又乾畫三坤畫六震坎艮畫各五㢲離兌畫各四統計八卦陰陽之畫亦三十六以六十四卦言者三朱子曰卦之不易者有八乾坤坎離頤中孚大過小過反易者二十八合之成三十六方虚谷曰復起子左得一百八十日姤起午右得一百八十日一旬為一宫三百六十日為三十六宫周海門曰其往也由姤而遯而否而觀而剝而坤其來也由復而臨而泰而大壯而夬而乾每卦六爻六卦往來共三十六以辟卦言者一鮑魯齋曰自復至乾六卦陽爻二十一陰爻十五合之則三十六自姤至坤六卦陰爻二十一陽爻十五合之亦三十六陽爻陰爻總七十二以配合言故云三十六按以上諸說雖若各殊其以一陽生為天根以一陰生為月窟則无不同也象數論曰康節以天根為性月窟為命性命雙修乃老子之學其理為易所不言故其數亦于易无與今第因邵氏之說而攷存之八卦相錯說八卦相錯邵氏謂伏羲先天之學乾一兌二離三震四㢲五坎六艮七坤八此先天八卦方位也邵子又有詩云天地定位否泰反類山澤通氣損咸見義雷風相薄恒益起意水火相射既濟未濟經文云水火不相射詩中刪去不字以就句法已失經㫖則又以否泰損咸恒益既濟未濟為八卦愚于此不能無疑焉按方位南與北對東與西對東南與西北對西南與東北對皆就三畫卦對看未及重卦一陰對一陽二陰對二陽三陰對三陽妙在爻爻相錯一與八錯乾坤也二與七錯兌艮也三與六錯離坎也四與五錯震㢲也相錯之象不在互易而在對待所以為先天若彼此互易則為後天之流行矣今据其說推之否泰互易天地無定位矣既濟未濟互易水火乃相射矣損咸恒益互易一陰對二陰一陽對二陽矣不但方位變遷且與經文不合邵子又云八卦相交而成六十四卦愚謂合觀下文只是八卦用順逆方得相錯乾兌離震前四卦為往㢲坎艮坤後四卦為來往者順乾一至震四皆用順數來者逆㢲五至坤八皆用逆數數往者之順而知來者之逆所以㢲五不次于震四而次于乾一若㢲五即次震四之後則八卦不相錯矣相錯祇就八卦言似不當說到六十四卦蔡虚齋云以順逆分判八卦八卦之位既定則一卦各管一卦而六十四卦在其中矣不可以相錯者為六十四卦皆逆數也先儒固有言之者矣亦非某臆說也辟卦說一京房卦氣以十二卦分配十二月其源發于子夏傳所云極六位而反于坤之復其數七是也本義于純陽純陰二卦不注四月十月其餘復臨泰大壯夬五陽長卦姤遯否觀剝五陰長卦皆分注云此某月之卦則是祖京房說也今按乾坤而外上經泰否臨觀剝復六卦三十六畫而陰之多于陽者十二下經遯大壯夬姤四卦二十四畫而陽之多于陰者十二上經自泰正月臨十二月復十一月皆陽月也則逆數已往自否七月觀八月剝九月皆隂月也則順推未來下經自遯六月姤五月皆陰月也則逆數已往自大壯二月夬三月皆陽月也則順推方來此陰陽之多寡順逆自然之序也辟卦說二十二辟卦在上經者八在下經者四其說亦詳于邵氏以一歳之月一日之辰配一元之㑹一運之世皆十二也陽起十一月為復于辰為子十二月為臨于辰為丑正月為泰于辰為寅二月為大壯于辰為卯三月為夬于辰為辰四月為乾于辰為已陰起五月為姤于辰為午六月為遯于辰為未七月為否于辰為申八月為觀于辰為酉九月為剝于辰為戌十月為坤于辰為亥十二月三十六旬分之則七十二候十二卦三十六陽分之則七十二畫一陽之運息于復盈于乾消于姤虚于坤此其大畧也按臨卦辭曰至于八月有凶十二月分卦自文王始至京房卦氣圖以坎離震兌為四正卦主二至二分以六十卦分辟侯大夫卿而復臨泰大壯夬乾姤遯否觀剝坤十二卦皆屬于辟每爻各主一候此辟卦之名所由昉要而論之陰陽升降不外乾坤十二畫中辟者主也為之主者在内故也吾于辟卦益明乾坤之理或問十二卦體但有乾坤震巽艮兌而无坎離何也曰震巽一陽一陰坎離二陽二陰所以未便成三陰三陽者以離中有少陰而二陽分必至于兌則陰在外而二陽合始可進而成三陽之乾坎中有少陽而二陰分必至于艮則陽在外而二陰合始可進而成三陰之坤復姤一陰一陽之後必合諸十六卦而後成二陽之臨二陰之遯者正以其有坎離故也觀夫子于治厯明時則獨取諸坎離者其義不昭然乎中爻說中爻之義注疏與本義不同孔穎達分内外卦以二五為中爻朱子除初上二爻而取二三四五呉草廬則兼二說為正體二為内卦之中五為外卦之中互體三為内卦之中四為外卦之中今合六十四卦爻象辭觀之言中者多在二五兩爻惟復卦六四一爻益卦三四兩爻則以三四為中行說者以為此互卦也因取左傳莊公二十二年周史為陳侯筮遇觀之否曰坤土也巽風也風行于土上山也杜元凱注云自二至五艮象為互卦占易之證凡卦爻所取象求之二體不得者求之互體往往得之非中爻不備其以此歟然觀下文二與四同陰位用柔又貴得中四過中又以近五而多懼得中者二也三與五同陽位用剛不用柔而云柔危剛勝者指三也五則剛柔皆吉蓋三四不中而二五中譽懼功凶之分由此据經文遠近對五言貴賤以等言所謂中爻仍以二五為主但雜物撰德辨是與非則非中四爻互體不備耳中爻互體說邵子云卦用六爻乾坤主之爻用四位坎離主之今据所謂先天圓圖取為互法去其初上用中四位左方自乾至復三十二卦右方自姤至坤亦三十二卦取而互之各得十六卦皆以兩卦中四位相交而縮一卦實由六十四而三十二也蓋自太極肇判氣以成形由一以生二及夫兩儀既奠則形交氣感復合二而生一斯造化之機緘大易之精蘊也按其二體之序上則乾一至坤八兩兩相對下則乾一至坤八四運迭周自然而然條理不紊誰為之哉造化之自然也復以再互之左右各得八卦乾坤既未四四相比共十六卦皆以四卦縮成一卦實由三十二而為一十六也夫造化以乾坤坎離為主故再互之卦則乾坤坎離具八體在下體則乾離坤坎分先後以著先天之體在上體則坎乾離坤明交錯以終後天之用也再以十六卦互之則成乾坤坎離否泰六卦蓋乾坤乃隂陽之純氣坎離得陰陽之中氣否泰則陰陽之交合乾坤為易之門于此不更可見哉統而言之子午當陰陽之極故兩互而乾坤之位皆不易所以定上下之位也卯酉當陰陽之中故一互而坎離為姤復再互則姤復歸乾坤而十六卦縮成兩卦矣所云乾坤為大父母坎離復姤為小父母以圖按之其序如此然互體既分上下則上下亦有中位正體則二五爻居上下卦之中所以多譽多功互體則三四爻為内外卦之中所以多凶多懼三四之中乃由變而成故曰雜物撰德辨是與非則非中爻不備也吾邑張待軒先生極闢中爻互卦之非謂孔子云非中爻不備者初上兩爻所不言中四爻備言之也二與四三與五乃總論中爻功位何嘗謂二三四為一卦三四五為一卦乎廣八卦說注疏於說卦取象字字分疏難免穿鑿之病本義又失之太畧後學遂靡所折衷蓋夫子推廣八卦之象語大語小引伸觸類初非義類可拘有從文周彖爻例者有自引大象例者又有於說卦別取象者雲峯胡氏云周公以乾為龍夫子以為馬文王以坤為馬夫子以為牛象之不必泥如此然而求取卦爻亦往往有合者如乾為馬則取諸大畜之良馬逐内卦乾體也巽為雞則取諸中孚之翰音外卦巽體也坎為豕則取諸睽之豕負塗中爻互坎也離為雉則取諸旅之射雉外卦離體也兌為羊則取諸犬之牽羊外卦兌體又取諸大壯之羝羊中爻互兌也又如乾為首於乾卦用九得之坤為腹于明夷外卦六四得之震為足于大壯内卦初爻得之巽為股于咸中爻互卦得之坎為耳於噬嗑中爻互卦得之離為目于履中爻互卦又于歸妹内卦九二得之艮為手于蒙外卦上九得之兌為口于咸外卦上六得之此外則有偏求卦爻而終不得其義者如坤卦辭言馬爻辭言氷今則取為乾象蒙言金夫困言金車鼎言金鉉玉鉉卦中无乾體也此以乾象言之坤文言言天𤣥地黄此則言于地為黑乾于爻言龍此則入震象賁四上兩爻言白卦中无巽體也此于巽言之坎初用事稱雲稱雨稱泉此則稱月未嘗見于卦爻也頤言靈龜損益言十朋之龜未嘗有離體也晉言鼫鼠未嘗有艮體也此則于離艮言之爻有兌雨兌月而兌象不及巽之用巫鼎之得妾亦无兌體也兌象則言之又如乾馬坤牛震龍艮狗兌羊皆重舉而巽雞坎豕離雉則不重舉乾言為圜為君坤不言為方為臣凡若此者難以悉殫類非後人所能窺測楊龜山云說卦取類亦不止此為之發其端使學者觸類取之耳此言得之學者只從近取諸身遠取諸物㑹其大意可解者解之不可解者毋以己說傅㑹强解之君子於其所不知蓋闕如也聖人且云然學者顧欲强不知以為知乎哉周易玩辭集觧卷首
