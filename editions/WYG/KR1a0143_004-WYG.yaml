body:
  text: 周易玩辭集解卷四翰林院編修查慎行撰坤下艮上剝不利有攸往乾五變而成剝京氏所云九月之卦也五隂盛長孤陽在上一變即純隂矣君子未嘗一日忘世剝之時正當勇往圖功轉亂為治而曰不利有攸往不是教人徘徊觀望計較利害只為氣運至此天時人事无一可為惟恐君子動觸禍機所以深戒之也彖曰剝剝也柔變剛也不利有攸往小人長也順而止之觀象也君子尚消息盈虚天行也彖傳總是發明不利攸往之義剝剝也上剝字主上九以受剝者言下剝字屬五隂以剝陽者言夬一隂在上曰剛决柔剝一陽在上曰柔變剛先儒謂君子之去小人明白痛快故云決小人之害君子萋斐浸潤故云變愚按本卦與復反對復利有攸往則言剛長剝不利有攸往則直言小人長惟恐君子不警惺也順而止之又轉在卦徳上去順而止有堅忍自守之大力觀象者君子也消息盈虚多在乾象看出純乾為陽之盈變坤為陽之虚變姤為陽之消變復為陽之息此皆天行自然之象獨于剝言觀者為處變之君子謀也尚者尊而奉之之詞若曰此天行也敢玩忽處此哉剝復皆曰天行一要其終一原其始象曰山附于地剝上以厚下安宅黄氏曰抄云山特出而遠于地者山之常也此曰山附于地山之變也如春秋梁山崩之類愚按先儒之説此解極分明切于剝義也象何以不言隂陽消長盖下剝上者成卦之義也上厚下者治剝之道也厚下坤土象安宅艮止象大象例稱君子先王后剝獨云上者一陽居上卦之上也君以民為地厚下所以安宅大凡君子在上必厚下小人在上必剝下故君子安宅小人剝廬初六剝牀以足蔑貞凶象曰剝牀以足以滅下也卦體一陽居上牀象五隂在下足象人以牀為安牀以足為安剝自下起故初爻言之剝牀以足猶云剝牀之足以字見小人播弄伎倆先儒謂最下一畫正當姤之時聖人于隂類方來云蔑貞貞者上九也蔑謂蔑視之也愚謂剝時隂黨用事初在最下其目中已无上九矣豈知碩果不食孤陽乃天地之正氣合羣小之力其能滅正乎蔑貞之凶本為小人示戒象曰以滅下見其有漸上之勢亦欲君子防之于始也六二剝牀以辨蔑貞凶象曰剝牀以辨未有與也程傳辨分别上下者牀之幹也説本注疏二本初黨亦欲蔑貞者故同此凶象一説辨字只作分别解國論之是非人心之邪正君子于此全要辨析明白小人即就此翻案以是為非以正為邪遂使青天白日一變而成霾蒙暗昧世界君子无間口處此小人之作用也其義亦通但牀字无著落耳未有與注疏指小人程傳指君子愚按卦例凡隂陽相應者謂之應與咸六爻皆應則曰感應以相與艮六爻皆不應則曰敵應不相與其近相比者亦然二本隂爻或與陽應或與陽比則有與矣今近比者三與五又无應故云未有與似當依注疏指小人為是觀六三與上應則无咎六五與上比則无不利可見六三剝之无咎象曰剝之无咎失上下也三亦剝陽之類何以上下皆凶此獨无咎先儒謂三在四隂之中獨與上應小人中猶知有君子而欲保全善類者其于隂黨跡同而心異衆方以剝陽為事三亦若隨衆而剝之者而究不與為同志故云失上下愚又謂剝之失上下與坤喪朋義同夫子不言其得但言其失失小人則得君子可知矣所以无咎六四剝牀以膚凶象曰剝牀以膚切近災也困學記曰剝至于四君子直无地置身貞之名號不存蔑之慘毒不必言矣故直曰凶愚按下三爻之災在牀雖近而未切身至此不于牀于膚矣故象曰切近災陽之受災豈獨君子之凶哉崔憬云膚薦席也與人相近故云切近若是肌膚之膚豈止近而已耶别是一解六五貫魚以宫人寵无不利象曰以宫人寵終无尤也困學記曰四已剝膚過此以往聖人所不忍言矣故别設一義曰與其剝陽而至于凶何如承陽之為利哉朱罍庵曰剝至于五而一陽止于其上屹然不動五不能復有所往反率羣隂而順陽盖勢盛則作威計窮則效欵隂柔之性然也五之隂寵本宜有尤而因以承陽故曰終无尤丘行可曰遯剝皆隂長之卦遯隂猶微故九三言陽制隂之道曰畜臣妾吉剝隂已極故六五言隂従陽之道曰以宫人寵愚按五為羣隂之主不取君位隂以類聚艮為黔喙之屬魚象此爻變巽為繩貫之象宫人進御于君先後以次有同魚貫隂不剝陽而順乎陽之象小人不知義理只知利害爻辭分别利害以示趨避若曰如此則无不利終无尤所以導小人従正之心也上九碩果不食君子得輿小人剝廬象曰君子得輿民所載也小人剝廬終不可用也先儒謂此一爻總是發明君子不可盡剝之意愚按艮為果蓏陽大隂小碩果之象五陽被剝上九獨存不曰未食而曰不食者以見陽無絶滅之理天運所留人不得而食之也坤為衆五隂在下輿象艮為門闕一陽在上廬象爻辭專為君子設而兼及小人者盖此爻未變吉在君子此爻一變凶並在小人若是君子則為得輿之象乗者獨而承之者衆民所載也廬者用以安身既剝矣終何用哉國破家亡小人豈有獨存之理小象就兩家末路以終剝卦之全局一似安慰君子一似喚醒小人其㫖微矣蘇紫溪曰于陽則象之曰牀曰廬謂其能安乎隂于隂則象之曰魚曰宫人謂其當順乎陽曰蔑貞曰剝廬危之也所以嚴未然之防曰无咎曰无尤幸之也所以開反正之漸至于上九而得輿剝廬之戒猶深致意焉夫蔑貞之極猶有碩果剝膚之餘終于剝廬則君子之道固未嘗一日廢于天下為小人者亦可惕然思矣震下坤上復亨出入无疾朋來无咎反復其道七日來復利有攸往反復之復音義與覆同剝與復反對一陽窮于上即反于下盈虚消息循環往復文王觀象至此一連二十二字説出許多好處盖内陽而外隂則為泰陽宜在内者也自五月一隂生陽漸出而在外至十一月一陽生復反而入于内矣還其故有此所以亨出入皆當指陽无疾言進退有漸不迫遽也楊龜山以朋為五陽愚謂當指五隂當復之時一陽足以敵五隂故朋來亦无咎反復其道統言隂陽往來之理七日來復専言一陽方來之數子夏傳云極六位而反于坤之復其數七是已愚又謂七日只就剝復兩卦言自剝初起至復初在卦經七爻在時經七月不言月言日者猶詩云一之日二之日也晁公武之説亦然上下兩來字相應明來為客來復為主利有攸往與剝不利有攸往正相反往則為臨為泰矣出入无疾有數解蘇子瞻云自坤而復為入自復而乾為出晁公武以自剝至復為入自復至夬為出李象先則曰外隂用事而出内陽為主而入程傳云復于内入也長進于外出也微陽生長无害之者也疾字作害字解蔡氏鄒氏以无疾為不求速胡雲峰云易之言疾者凡五豫六五无妄九五損六五兌九四多在外卦惟復彖曰无疾以内卦一陽生于下也盖陽在内則无疾凡疾皆有感于外者也愚按遯九三一陽在内卦爻辭亦云有疾憊本卦疾字宜従不求速之解彖曰復亨剛反動而以順行是以出入无疾朋來无咎反復其道七日來復天行也利有攸往剛長也復其見天地之心乎剛反釋復亨二字之義對下剛長説反者如主人復歸故宅前従此往今従此還剝之一陽窮上反下為復也以其既去而來反故亨以其既反而方長故利有攸往剛反言方復之初剛長言既復之後卦徳内動而外順一陽方動元氣初回此時欲速助長最是大病惟動而行之以順則不疾不徐可以固前日之生機並可以養將來之全力乃所以善其出入五隂雖朋來亦无咎也天行者隂陽消長天運之自然也故反復其道七日來復隂數極于六七則乾之反易每以初爻為七日震與既濟亦然鄭亨仲曰七者陽數日者陽象故于陽長言七日八者隂數月者隂象臨剛長以隂為戒故云八月陽以日計幸其來之速隂以月計見其消之遲也愚按天行也以上八句全以氣運言利有攸往三句方説人事陽剛用事君子道長所以利有攸往天地以生物為心者也十月純隂生物之心固未嘗息而无端倪可見到此一陽纔露端倪于此體㑹真若天地之心有象在目昭昭可見者張子所云形色皆天也王輔嗣以静為天地之心程傳謂動之端乃天地之心邵子詩云一陽初動處萬物未生時朱子云復卦下一畫便是動楊誠齋云動為天地之心金仁山云惟于極静之中而有動之端是乃天地之心程沙隨謂此天地之徳藴于内者不必論動静愚竊玩其字見字乎字語氣正指人心説夫子讀易有得恍然慨嘆要人在自心上體認出天地之心來就本文涵泳意味何等深長若従天地求心何異認指為月象曰雷在地中復先王以至日閉關商旅不行后不省方愚按象不曰雷在地下曰在地中者在坤為美在其中即未發之中也雷自八月收聲至來年二月復發聲在地中凡六閱月十一月正其極静之時然一陽已動張子所謂轉闗于子月是也至日冬至也易以乾為體乾以復為用復初一爻次第成三百八十四爻而卦氣周即冬至一日次第成三百六十日而嵗功成除乾坤坎離四卦二十四爻當主體而流行化生亦止三百六十爻正當三百六十日故嵗功従至日起此時微陽初動自貴至賤皆當以安静為事者也商旅指五隂不行則外者不入無逐利之心后指初陽不省方則内者不出无求人之事關者人心之㡬希閉關即退藏于密之意初九不逺復无祇悔元吉象曰不逺之復以修身也復之初即剝之上隨剝隨復故曰不逺一復則本體依然何悔之有祗解作至諸卦言悔亡者悔已見而能亡也言无悔者宜有悔而无之也此云无祗悔不至于悔而待亡待无也不但吉而且元吉元者始也最初一念萬善之元此爻即乾之初畫以下五隂比此者吉逺此者厲應此者无悔違此者凶元吉中隠然含一仁字大傳特以顔子當此爻盖顔子之不貳過當念覺即當念改己于此克禮即于此復人欲去而天理還欲仁仁至仁豈逺哉夫子于初爻只提出修身二字與二爻仁字互相發明所謂修身以道修道以仁也初至五小象四箇以字皆示人克復之方六二休復吉象曰休復之吉以下仁也胡五峯曰仁者天地之心金仁山曰天地之心仁也生生之初也語其象則復卦一爻是已愚按仁字夫子不言于初爻而于六二發之人心所以逺仁者以其馳而不休也六二柔順中正従容休養心不外馳故吉下與初比以退為復故曰下仁初九仁體已具二則従容俟其自化而已小象下字當玩收斂浮氣消磨勝心多在此按自乾文言而後至此仁字再見看來此一字可貫全卦天地以生物為心一陽來復造化之仁也初九體仁之君子也二比初友其士之仁者也三頻復日月至焉者也四與初應修道以仁也五居坤土之中有安敦象安土敦乎仁也上之迷復失其本心違仁者也六三頻復厲无咎象曰頻復之厲義无咎也愚按復乃惟精惟一功夫如何説頻字曰頻復則頻失可知矣聖人只従他好一邊説盖三居震終其體易動為頻復之象學問中操存舎亡之機在此頻失則頻悔其心危而不安然旋悔即旋復雖厲而義无咎此爻即乾之九三故同此厲无咎也六四中行獨復象曰中行獨復以從道也六四正而不中爻辭何以言中行吳幼清云行者路也震為大塗卦之五隂二三近陽五上逺陽四居逺近之中猶路之半也愚又按爻言中行者凡五泰九二得尚于中行夬六五中行无咎兩爻居上下卦之中也復四曰中行一爻居五隂之中也益三四曰中行三四兩爻在一卦之中也皆隨時取中之義四在羣隂中獨下與初應故云獨復小象于初曰修身二曰下仁四曰従道仁與道皆修身之事二近而比故曰下四逺而應故曰従又據反對卦看復六四即剝六三在剝取其失上下在復取其獨復皆以應乎陽也六五敦復无悔象曰敦復无悔中以自考也臨之上六處四隂之末曰敦臨无咎復之六五亦處四隂之後曰敦復无悔皆乗坤者也先儒謂臨為二陽之卦以初二為主爻而敦之者上六也復為一陽之卦以初九為主爻而敦之者六五也皆取應之上一爻盖陽氣方萌于下而上有應爻則其氣易洩敦者于應爻之上従而加厚焉不令非時早出雖若錮之實所以成之也本義訓考為成當是此意愚又謂无悔以心言六五柔順得中自考者反心檢㸃之謂大傳所云復以自知也上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征象曰迷復之凶反君道也先儒多謂初一復不再迷上終迷而不復愚竊謂迷字従坤卦彖來坤本先迷今居上暗極故蔽難開以其无改過之勇故曰迷復凶與比上後夫凶之義畧同上亦非終迷而不復者也但與初之元吉相反故得凶象六十四卦中上爻言凶者凡十四未有天災人禍備極凶象如本爻者甚言復之不可迷也坤為衆行師之象只就一事言其終至喪師以辱君此外无事可為矣十年不克征又七日來復之反乾无十坤无一隂數極于六剝既變復則七為乾之初陽數極于九復未變乾則十為坤之終至于十年而後復先迷之凶至于如此較初之不逺復相去懸絶矣反君道本義无注愚又竊謂君當指初九復以一陽為卦主胡雲峯所云復上六衆隂之極表一陽之為君是已若依程傳人君居上治下當従天下之善而迷于復反君之道也吳幼清云上六變為陽而統衆于外則皆指上爻為君矣似當従雲峯之解陳伯容却亦明白以明鏡却塵之義解初上兩爻語稍近禪了當其言曰塵集而鏡昏不知是塵不曉拂拭到極明時雖一塵之落便自照見使随手拭去是謂却塵至于本來清淨是大聖人事雖在顔子亦不敢擔當顔子不能无不善但能知能不行耳知是照處不行是拂處隨照隨拂則常拂常照終亦无塵故曰不逺復吉照而不拂則日堆日積終于不見故曰迷復凶无塵者聖人之鏡拂塵者賢人之鏡留塵者衆人之鏡不知其為塵者下愚之鏡京房卦氣始于此卦十一月建子卦為復十二月建丑卦為臨正月建寅卦為泰二月建卯卦為大壯三月建辰卦為夬四月建已卦為乾五月建午卦為姤六月建未卦為遯七月建申卦為否八月建酉卦為觀九月建戌卦為剝十月建亥卦為坤震下乾上无妄元亨利貞其匪正有眚不利有攸往周子云不善之動妄也妄復則无妄矣无妄則誠矣故无妄次復愚按无妄史記作无望惟至誠无妄者乃无意外之期望故非望之福君子以為災上體乾本天道元亨利貞四徳備焉震在下動以天不動以人者也卦辭分兩截説一反一正任天而動何往不利所以元亨利貞其或動以人而不以天則匪正矣匪正則有眚所以不利有攸往有眚與无妄相反説文眚目翳也焦弱侯曰人心本无妄其有妄如目有眚王汝中曰復動以地无妄動以天復曰有不善无妄曰其匪正可見義理无窮愚又按无妄之義先儒皆以為誠程沙隨不然曹立之以无妄名齋沙隨告之曰无妄有正與不正先儒以无妄對有妄者非也此論正與卦辭合非程之臆説也彖曰无妄剛自外來而為主于内動而健剛中而應大亨以正天之命也其匪正有眚不利有攸往无妄之往何之矣天命不祐行矣哉剛自外來本義以為自訟而變九自二而居于初愚按卦變圖云凡四陽之卦皆自大壯來自壯而需而大畜與无妄反對大畜外卦艮上一畫來居无妄内卦而變震故曰剛自外來若自訟來則初二兩爻同在内卦非自外來乃自内來矣則亦可云卦自遯變九自三而來居初何獨訟耶一説内卦本坤乾之初陽來而為震以其非本卦剛柔之往來故曰自外亦是一解初為震主震屬内卦故曰為主于内自外來而為主于内如心之既放而復還也人心出入无時只是自家做不得主所以有妄為主是先立乎其大者為主于内則外物不得撓之矣有如雲翳空塵蒙鏡雲開塵淨虚明自在无妄之本體如此動而健指内外二體剛中而應指二五兩爻動而健則行義勇剛中而應則待物誠所謂大亨以正也此三句只是解无妄而貞意已在其中不曰天道而曰天命以見无妄之理賦于生初即天命之性盡人所以合天也其匪正有眚其者或然之辭聖人深慮无妄之人别有一種病痛往往果于自用以人言為不足惜天變為不足畏豈知乖于大中至正之道純是我見理障如何行得通所以不利有攸往有妄之不可往易見无妄之不可往誰則知之故曰天命不祐曰何之矣曰行矣哉甚言攸往之不利盖傷之也又按每卦六爻必有一爻為主獨于无妄發之曰為主于内本義所云初為誠主可以類推象曰天下雷行物與句无妄先王以茂對時育萬物天下雷行時至而物動動以天也故曰无妄程朱皆分二句以物與无妄四字相屬愚竊按先儒之説物與二字當連上為句與者應也従也張希獻謂天雷而物應胡旦謂物物相與以應雷行劉念臺曰天實有此流行之命而物物付之是也盖雷行天下發生萬物其所賦與各正性命物與之義如此先王于天下裒時之對因物而育所以體天行之无妄也茂對與對越上帝之義同天之生物不違乎時聖人之育物亦不違乎時一氣説下勿作兩截看初九无妄往吉象曰无妄之往得志也本義初以剛在内誠為主也如是而往則吉可知愚按初為卦主卦之所以為无妄者震也初九一爻可當无妄一卦所謂為主于内者在震初而動其動也以天故以卦名歸之不益一詞直斷之曰往吉或云初與四无應往將何之不知最初一念即是至誠无妄與匪正而往一種人正相反同一往也彖傳曰何之象傳曰得志要知此兩種人起初發念俱天欺罔彼匪正而行故窒此恃誠以往故得志也六二不耕穫不菑畬則利有攸往象曰不耕穫未富也先儒皆以此爻為无妄之富程傳謂不耕而穫不菑而畬為不首造其事以首造為妄据此解則力田為妄念惰農為守正矣細繹爻詞語意竊所未安愚按震于稼為反生耕穫之象六二柔順中正安分循理不作非望之妄想者也妄想者何利是也天下攘攘皆為利往聖人借耕菑之象以示之曰人情未有耕而不祈穫菑而不祈畬者然農必春耕乃秋穫田必先菑而後畬天下豈有不耕而穫不菑而畬之理哉如有不耕而穫不菑而畬者則是富可妄求何往非利矣兩不字與則字緊相呼應如富而可求也雖執鞭之士吾亦為之語氣乃反言以决其必无非設言而許其或有也象申之以未富謂不耕菑而致富天下古今所未有也即伐檀詩中不稼不穡胡取禾三百㕓之義陽實隂虚故曰未富莊子云吾未嘗牧而䍧生于奥吾未嘗好田而鶉生于宎此子綦之索然出涕而以為大怪者也夫非分之獲異端且以為不祥聖人顧懸設此象以啓人徼幸之心乎本義謂無所為于前無所冀于後未嘗起私意以作為又似涉外學前念不生後念不起无心順運之説矣六三无妄之災或繫之牛行人之得邑人之災象曰行人得牛邑人災也黄氏日抄云程傳言有得則有失朱云行人牽牛以去居者反遭詰捕之擾臨川鄒氏云或者繫牛于此自以為固矣繫脱而不知牛之所之以出意外牛為行人所得而乃責得于邑人豈邑人之罪哉此為无妄之災覺于經文尤切云云愚按以上三説似當従程傳竊従其解而詳説之承上文而言无妄之富世所必无乃若无妄之災則或有之矣離為牝牛卦體自初至四有離象本卦與大畜反對六三一爻即大畜六四故皆取象于牛或者假説之辭假牛以明无妄之災非人所自致也邑人即六三牛本邑人之所有偶脱所繫而為行人之得凡人之情得之便以為福失之便以為災豈知人得人失事之適然者耳小象就文作解曰行人得牛邑人災也可見人世之得失靡常非可意料苟能置身得失之外无妄之災于我何有哉吳幼清云无妄之災因卦變取象无妄自遯變遯下卦艮也坤為牛艮以一陽交坤上畫為坤之君坤牛艮之所有也此以遯之九三未變為无妄之六三言也及既變為无妄也三下易初成震則震之一陽為坤之君而坤牛又為震所有矣震為大塗行人也坤為邑邑人也朱子云云攷之爻象无此義九四可貞无咎象曰可貞无咎固有之也愚按爻辭亦承上文來天下无妄之災非可意料君子惟為其可貞者耳貞即无妄利貞之貞四得乾體之剛天徳本其固有居震之初利在守正可貞與匪正相反无咎與有眚相反固有者天之命也可貞則无咎不可貞則有咎矣知固有之為可貞則于福必不敢倖邀于災必不求苟免可知爻辭言可貞者凡二坤六三以柔居剛此以剛居柔皆不得其正者故以可貞朂之九五无妄之疾勿藥有喜象曰无妄之藥不可試也愚按疾字従彖辭眚字來此爻變為坎有疾象五居中得正真无妄矣本无致眚之由此而有疾所謂无妄之疾也不問疾従何生寜論所服何藥中爻互巽木又互艮為果蓏藥之象惟以不治治之非徒无眚抑且有喜若妄用藥是以身嘗試矣天下之以疾試藥者豈少哉所以爻詞喜其勿藥象辭戒其不可試吕仲木曰君子存誠則邪自閑舎誠而遂邪邪斯為敵試藥之謂也愚又謂人君之治天下如一身急則驅其外邪緩則固其元氣元氣既固客疾自消易于疾言有喜者三皆在外卦本爻與損四兑四同疾之自外感入者也知其為无妄之疾而勿試藥焉勿藥即是良方上九无妄行有眚无攸利象曰无妄之行窮之災也此爻先儒所謂匪正有眚不利攸往者也愚按上爻不好在一行字雖正而行有眚亦无攸利眚字従行字來以剛居上行將何之故曰窮之災與乾上九小象同彼云有悔此云有眚皆位值其窮所致履初曰往上曰旋无妄初曰往上曰行履之元吉以其旋无妄之有眚以其行又无妄與大畜反對此爻即大畜之初爻彼以止故不犯災此以行故有災也卦辭言眚爻辭言有災兼言眚眚者過由己致災者禍自外來自外來者雖災不為眚六三之失牛也由己致者因眚而成災上九之妄行也聖人之惡妄動如此又按易于内外爻例取剛柔相應无妄則不然初四兩剛敵應初震體四互艮體一行一止初所以吉四所以无咎二與五三與上非不相應而三有災五疾上有眚有應者反不如无應者之為愈豈其動皆妄乎天下固有動以无妄而匪正者矣申生之孝荀息之忠亦自發乎至誠但身死無補于家國揆諸正道未免有病爾乾下艮上大畜利貞不家食吉利渉大川本義以艮畜乾畜之大者也錢塞庵曰小畜大畜皆畜乾也小畜以一隂畜乾主在五大畜以二隂畜乾主在上皆剛為主也巽隂之微也故小艮陽之極也故大潘雪松謂陽能自畜來矣鮮謂艮上以陽畜陽語皆有病愚竊謂外无陽爻則柔順不能畜内無隂爻則同類不相畜卦體以上為主以四五為用止健者四五而能使四五止健者上也如此説以艮畜乾之義乃明先儒又謂有畜止藴畜二義愚按卦彖云不家食彖傳云養賢爻詞取象于馬牛豕又有畜養之道故繼之以頥利貞者利于正道也中爻自二至四互兑口在外卦不家食之象自三至五互震震為本乗木舟虚涉川之象畜極而通則當出而食禄以濟天下之險曰吉曰利多就人事言彖曰大畜剛健篤實輝石經作輝光日新其徳剛上而尚賢能止健大正也不家食吉養賢也利涉大川應乎天也剛健篤實輝光日新其徳本義云以卦徳釋卦名義愚按剛健者乾之徳篤實者艮之徳无一毫私欲故剛健无半㸃虚浮故篤實兩體上下交映健者愈健實者愈實自有光輝發越日新又新卦之所以名大畜也剛上以下方以止健歸功于艮本卦與无妄反對无妄内卦之震今為外卦之艮而剛居上爻故曰剛上本義謂變自需來九自五而上似不必従賢指四五兩爻尚之者上九也以其能止健故尚之能字大有作用在上以剛乗柔復能用柔以馭剛為國家養人才為天地養萬物道理正大莫過于此故曰大正其畜之也將以用之故曰不家食吉利涉大川此二句卦辭原説大畜之功用夫子以内卦乾體復推本于應天賢者上帝之所簡也養賢所以應天而天下无不可濟之險矣象曰天在山中犬畜君子以多識前言往行以畜其徳識音志程傳止言所畜之大朱子云止以象言不必實其事程沙隨曰天之氣在山中如天地交泰只以氣言黄氏日抄曰有謂芥子納須彌者此異端誕語有謂草木皆天者苦居四山之中而仰視天亦可言天在山中薛敬軒曰天氣也山形也以形畜氣所畜至大先儒又有云自地以上皆天也愚竊謂天在山中本是假象君子觀此而知虚在實中徳在言行中把千古前言往行无不收攝于吾心多識者健而能止畜徳之工夫也他卦大象與彖傳取義不同本卦却従日新其徳説來日新者知新也前言往行者畜故也苟求其故何故非新吾徳之新即在前言往行中多識蔵往也日新彰往也大象與彖傳正互相發明初九有厲利己音以象曰有厲利己不犯災也畜者止也内三爻受畜者也以自止為義外三爻能畜者也以止人為義初以剛居剛又健體勢方進而未已進則為六四所止不得自遂故爻詞為之斟酌曰往則有厲不若止之之為利也程朱解初二則以四五之畜之者為小人解四五則又以初二之為所畜者為小人初无定論蘇氏易傳則六爻皆作君子解愚竊据爻辭似當従蘇氏初九欲進之心應于六四遇厲而止使初知止而不至犯災由四畜之于早也需曰不犯難以坎水之險大畜曰不犯災以艮山之阻皆在初爻九二輿説輹説音義與脱同象曰輿説輹中无尤也本義九二亦為六五所畜以其處中故能自止而不進愚按小畜九三見畜于六四曰輿説輻此受畜于六五曰輿説輹輹與輻字義不同輻在車輪中輹則車旁横木説輻者外為隂所繫畜久住之象説輹者中自止而不進暫住之象九三過剛而九二剛得中也有此中徳故无冐進之尤朱漢上曰初剛正二剛中四五柔也柔能畜剛剛知不可遽犯而安之故曰大畜時也按卦體互卦无坤而二三爻皆取輿象所未解九三良馬逐利艱貞曰閑輿衛利有攸往象曰利有攸往上合志也舊注良馬指三上兩爻説愚竊謂良馬乾象非艮象也初利己勸其止也二説輹喜其止也三居乾體之上陽剛之性銷鎔變化非亟心之馬矣故曰良漢書五行志引此爻注云逐進也三逐上以進下二陽又逐三以進並驅連鑣不為上所止之象聖人許其可進而猶戒以利艱貞者必如下文所云乃艱貞而利也輿所以駕馬考工記周人上輿車有六等之數皆名衛閑者調習也曰者計度之詞陸氏釋文只作曰字言當調習輿衛果其車堅御良然後利有攸往與困上六曰動悔有悔曰字義同木義謂當為日月之日似可商三主進而上主畜似乎其志不同不知上之止健原欲以止而善其往也今三利有攸往故曰上合志六四童牛之牿元吉象曰六四元吉有喜也本義童未角之稱牿施横木于牛角以防其觸所謂楅衡也愚按四艮體而居上卦下與初應所畜者初也初陽居下卦之下四以柔道止之其勢易制如加童牛以牿使之習于牿而不知有觸我无駕馭之勞彼成馴服之性所以元吉中爻互兑四當兑口之悦有善之義也卦體自初至四有離象與反對无妄同説詳前卦六三下六五豶豕之牙吉象曰六五之吉有慶也艮為狗與豕同類爾雅豕子豬􅭘豶豶為豕子與童牛同例方言海岱之間繫豕杙謂之牙埤雅牙者杙以繫豕非齒牙之謂也與牿同例程傳六五居尊位止畜天下之邪惡則以二為小人矣愚竊玩爻詞要得相畜實以相成之義莫把上下截然分别小象于四言有喜于五曰有慶慶與喜相似但五居君位所畜尤大即一人有慶之意四五兩爻皆取制服為義四隂得位五柔得中四與初應牿牛所以止初五與二應牙豕所以止二而止健之功總歸上九唯陽能制隂故隂能畜陽論為力之難易則五不如四之易論成功之大小則五不如四之大一喜一慶見艮之畜乾止之皆愛之也按説卦傳以坎為豕此則以艮為豕兩聖人取象之不同如此上九何天之衢句亨象曰何天之衢道大行也何音義與荷同去聲程傳以何字為誤加諸家遂生别説鄭孩如曰四五之畜初二成就賢才之術也上則廣開賢路之道也愚桉爾雅四達謂之衢艮之徑路闢為天衢中爻互震為大塗亦衢象何字與詩何天之休何天之龍同揚雄美新云荷天衢提地釐魯靈光殿賦云荷天衢以元亨皆作去聲何荷兩字古通用亨字自為句本義讀何字作平聲言何其通達之甚也又將亨字並入上句似亦非正解又三上兩爻當合看他卦取隂陽相應本卦初二四五相應者乃是止象惟三與上兩剛相遇其徳同不獨良馬輿衛利有攸往抑且天衢蕩蕩任其馳驅在朝廷為養賢在士君子為受禄畜之義莫大乎此所謂不家食吉利渉大川也盖賢人藴蓄既隆起而負荷大任正應天行道之時以其蘊于身謂之徳以其用于世謂之道徳為大畜道為大行如伊尹出畎畝而就湯欲使君民為堯舜之君民而自任天下之重所謂何天之衢道大行也周易舉正曰小象何天之衢下脱亨字愚謂道大行正發明亨字之義非脱字也震下艮上頥貞吉觀頥自求口實説文頥頷也在口兩旁愚按卦名已見于噬嗑只多九四一陽為間今間去則頥中无物矣卦體外實而中虚頥之象外實初上兩爻所同顧動者必得止者而後動動體又不如止體之善故以上九一陽為卦主中虚則未受外物之間揀擇取舎正在此時必得正乃吉京氏傳曰頥自觀來故卦辭曰觀頥愚按本卦大象似離離為目觀象觀頥者自人觀我也實者能養人虚者待養於人自求口實隂求養于陽也上句屬初上二陽下句屬中四隂非内卦自養外卦養人之説彖曰頥貞吉養正則吉也觀頥觀其所養也自求口實觀其自養也天地養萬物聖人養賢以及萬民頥之時大矣哉養正則吉朱子主養徳養身程傳主自養養人今依程解頥雖飲食之道不可以不正正則享天下之奉而不為泰不正則簞食豆羮不可受于人中含兩層意養之正道貴止不貴動噬嗑頥中有物必動而後合今頥中虚而下猶動故動體之三爻朶頥顛頥拂頥皆凶外三爻皆止體由頥固吉顛頥亦吉拂經亦吉六爻之義昭然可見觀頥者觀其象而知吉凶也觀其所養食所當食之義觀其自養食不虚食之義適館授粲者所養之觀不素餐兮者自養之觀也夫子復従養人一邊推廣言之天地養萬物有正道不正則物不得遂其生聖人養賢及萬民亦當以正道不正則賢不受其禄而民不被其澤大頥之時者恐人以口腹之故小之也黄魯直曰養虎者不以全物與之牧羊者去其敗羣視後者而鞭之養鷹者飢之是謂觀其所養之性也庖丁不以肯綮嬰解牛之刀痀僂丈人不以萬物易蜩之翼匹夫之志不可奪于三軍之帥是謂觀其自養觀其所養盡物之性也觀其自養盡己之性也語雖雜莊却有理解象曰山下有雷頥君子以慎言語節飲食山下有雷艮止于上震動于下頣之上止下動如之人之言語飲食皆従頥出入者也動之義慎節者止之義禍従口出故言語不可不慎病従口入故飲食不可不節楊誠齋曰慎言語非黙也當其可則諫死不羡括囊節飲食非矯也當其可則采薇不羡林肉初九舎爾靈龜觀我朶頥凶象曰觀我朶頥亦不足貴也全卦中虚有離象離為龜故初爻取象于此先儒謂四隂爻皆有求于人者也初陽實可以无求如靈龜能咽氣不食无待外養而自足此在我之良貴也一慕于外則以賤害貴矣愚按朶字書作朵朶頥垂涎飲食之貌初與四應不好處在此爾者初也我者四也四方待養于上爻辭若為四語初曰靈龜者本爾所自有今乃舎之而來觀我作朶頥之狀耶大似嘲笑語正與自求口實相反由其震體以剛居剛欲動情勝不能自守故凶象曰亦不足貴見其本貴也亦惜之之詞惜其為飲食之人而人賤之也凡喪已狥物非道義而干利禄者皆是已張元岵曰嘗見一書中載朶頥事云朶頥腹大項短食物无厭出雲南某處玩文朶頥與靈龜對明是貪穢之物存之以俟博雅攷正若謂朶頥欲食貌則靈龜為不食狀矣又是一解六二顛頥拂經于丘頥征凶象曰六二征凶行失類也先儒多謂二與五无應因與初比反自上而求下故曰顛顛而下者也愚竊謂上養下下亦養上顛頥何病六二之顛頥不若六四顛頥之吉者二因求養于初而不得復拂其常道越五而往求上故也丘指上艮為山丘土之髙者上爻之象與賁卦第五爻丘園同例六二之丘頥无異于六五之従上但五之従上用其養以養人而二之求上則私其養以自養故曰征凶二與三四五隂類也彼皆待養于上二獨求養不得故曰行失類六三拂頥貞凶十年勿用无攸利象曰十年勿用道大悖也愚按六三不中不正又居震終不好處亦在有應恃其有應于上妄動狥私以戕生之術為養生以滅性之事為養性大拂乎養之正道異端之學也夫三受上之養本是正應而矯拂如此故雖貞亦凶十年勿用无攸利正見其凶處象申之曰道大悖悖者叛道之謂道之所包者廣自言語飲食以至立身用世修之則吉悖之則凶小而嗜慾殺身大而學術殺天下拂頥之凶至于如此多従悖道來又按爻之言貞凶者凡八屯師隨巽節中孚多在外卦惟頥三與恒初在内卦外非无應而皆隂柔不中不正此則拂人之性彼則求人之深者也六四顛頥吉虎視眈眈其欲逐逐无咎象曰顛頥之吉上施光也先儒謂四本與初正應宜求養于下者也因與上同為艮體乃轉而求上則顛而上矣四之顛頥與二同而吉凶相反者二狥人而喪已四舎己而用人也愚按説卦傳无虎象荀九家艮為虎物之自養于内者靈莫如龜求養于外者猛莫如虎虎无項不能左右顧行常垂首初在下眈眈下視貌其性専一逐一物不更逐他物眈眈逐逐本求養于初之象初方舎己狥人力不足以相養四乃反而求同體之陽與上同為止體果能遂其所欲所以吉而无咎又以見養得其道雖猛可馴漢髙駕馭韓彭用此術耳象申之曰上施光與施禄及下義同見上爻之為頥主故六五亦曰順以従上也六五拂經居貞吉不可涉大川象曰居貞之吉順以従上也先儒多謂二五相應經也二不應五而求養于初五不應二而求養于上同此拂經之象而二凶五吉者二動體五止體也愚竊謂五以柔居中處養人之位而諉其權于上九上之功即五之功故居貞則吉所謂反經行權而合于正也不可涉大川即居貞之意而申戒之語氣一正一反言當如此不當如彼也五曰不可涉大川上曰利涉大川君不可喜功臣不當避事明以養道師上爻矣胡雲峯曰五獨不言頥者由豫在九四故五不言豫由頥在上九故五不曰頥也然彼貞疾而此貞吉彼以柔乘剛此以柔承剛也上九由頥厲吉利涉大川象曰由頥厲吉大有慶也一陽在艮止之上四隂皆由之以得養故曰由頥然任大責重必其難其慎方為養道之成故戒以鴈而許以吉利涉大川又従厲吉中得義言必如涉大川乃所以為厲乃所以為吉大有慶者君民咸食其福也朱康流曰下之事上上之惠下者正也故觀所養于下體以无所奉為凶觀所養于上體以有所施為吉下不干上上不剝下者正也故觀自養于下體以有求于上為凶觀自養于上體以无求于下為吉愚又按先儒有云辱莫辱于多欲樂莫樂于无求大抵求従欲來施又従求來卦中欲求施三字有相因之義與其有求而多欲不如无求而勿施巽下兌上大過棟橈利有攸往亨橈石經従木不従手愚按四陽之卦凡十五獨此名大過者非謂陽多于隂謂四陽居中也四陽皆過獨以三四言者自二五視之未見其過積至三四然後皆以一隂承二陽而謂之過也卦體上兌下巽彖辭獨取義于木巽為髙棟之象棟者屋脊木所以承椽瓦者兌為毁折橈之象橈者曲也初上乃棟之所寄而皆隂柔無力不能擔當重任故橈然則勝任者非剛不可矣但太剛又虞其折必須善用其剛而後可利有攸往所以救其過也往則窮而變變而通故亨大壯亦四陽相連繫傳取諸宫室彼以陽壯為棟宇此以陽過為棟橈彖曰大過大者過也棟橈本末弱也剛過而中巽而説行利有攸往乃亨大過之時大矣哉愚按凡任事者固須剛果之人然巽順和悦一流亦可叅酌相濟今四陽接連上下二五又皆居中用事而擯二隂于外此大者之過也亦猶衆君子在朝而悉逐小人于外此賢者之過也初隂為本上隂為末只就兩頭説本末二字従巽木得義木字下加一畫為本上加一畫為末卦象上缺下短兩頭太弱中央太過棟之所以橈也陽雖太過然到底要陽剛做事聖人于過極難處時看出一叚斡旋妙用來剛過而中則可與立巽而恱行則可與權所以利有攸往在此易之為道貴乎陽能御隂不貴乎陽之陵隂而蔑之也仔細看來二五皆剛中一比初隂一比上隂二有益于本而五无補于末盖初得四應而下不橈三與上應而不可有輔本末兼舉仍以本為重又見救過于末不如救過于初也以一人言之體質本剛足以有為又須用之以中徳性本順足以入理又須行之以和然後利往而亨乃者幸之之辭亦難之之辭也當大過之時一失不可復救其所係甚大末句與他卦贊語不同象曰澤滅木大過君子以獨立不懼遯世无悶愚按澤滅木至上六一爻其象始著滅非生滅之義乃滅沒之義獨立不懼巽木象遯世无悶兌恱象水在上能過乎木而不能使仆其根固也君子以之處世有定見有定力自作主張不隨世俗流轉非大過人之才者不能初六藉用白茅无咎象曰藉用白茅柔在下也本義白茅物之潔者愚竊謂本爻无潔義只宜取柔象巽為白故曰白茅上承四剛藉之象初之本弱矣茅之為物又弱之弱者天下无棄物顧用之何如耳茅雖弱而有弱之用不可用為棟而可用為藉髙以下為基也以人事論之當大過之時柔居巽下以之擔當世事則不足以之敬慎自守則有餘何咎之有小象于初之无咎有幸辭焉幸其柔在下也在上則為滅頂之凶矣蘇氏易傳謂初之所藉為九二愚按初與四應詳見下注非近比之謂也九二枯楊生稊老夫得其女妻无不利象曰老夫女妻過以相與也巽隂木在水而易生者楊之象性又早凋枯之象稊鄭氏作荑愚按稊之義有數説夏小正正月栁梯注云芽也王注稊楊之秀也漢書五行志師古注亦云楊秀之始生者本義稊根也今従根解水潤下木得潤則生初比二隂在下故曰稊下之根生也楊稊是本爻正象老夫女妻又即上意而申發之象中之象也王注云老過則枯少過則穉以老分少則穉者長以穉分老則枯者榮此言老夫女妻均受其益也張横渠曰扶衰于上使枯木生稊拯弱于下使微隂獲助張元岵云玩小象過以相與老夫過消女妻過盈以有餘補不足以至壯扶至衰所謂枯楊生稊者以此愚又按内卦巽為長女而稱女妻外卦兌為少女而稱老婦者初在卦為少上在卦為老也二在下曰老夫五在上曰士夫者二老于初五少于上也又所比之爻隂居初陽居二因妻之女而老其夫也陽在五隂在上因婦之老而士其夫也司馬君實曰大過剛已過矣止可濟之以柔故大過之陽皆以居隂為吉不以得位為美玩二四兩爻可見九三棟橈凶象曰棟橈之凶不可以有輔也卦辭言棟指中四爻爻辭屬三四兩爻而棟橈之象又獨歸三何也本義九三以剛居剛不勝其重故象橈而占凶此専就本爻説程傳亦然愚合小象觀之竊謂三之所應者上也故象詞補爻詞所未盡云不可有輔盖陽所以輔隂三以剛居剛欲起而扶衰拯溺其如上隂積弱不可以有輔何合九四爻象觀之此爻有為上所橈之義隠然言外九四棟隆吉有他吝象曰棟隆之吉不橈乎下也四以陽居隂當巽之終處恱之始彖傳所謂巽而恱行正是此爻故為棟隆之吉有他二字本義歸咎于應爻謂初以柔濟之則過于柔故吝諸儒多依之子夏傳則又云非應故稱他與比之他吉同例愚竊謂九四一爻居多懼之地事起不虞往往而有故以他吝為儆若初之敬慎不敗而四與為正應下有白茅之藉棟隆之吉初與有力焉與上之不可有輔相反故小象特従應爻發明之言九四所云棟隆者不橈乎下則可知九三所云棟橈者乃橈乎上也兩爻合看其義益明蘇子贍云初六不橈乎下則九四棟隆上六不足有輔則九三棟橈棟之隆非初之福而四享其吉及其橈也上亦不與而三受其凶亦合兩爻而論九五枯楊生華老婦得其士夫无咎无譽象曰枯楊生華何可久也老婦士夫亦可醜也一隂在上華象華者上之枝生也愚按本爻以過極之陽比過極之隂當云老夫得其老婦而云老婦得士夫者隂居上故先婦而後夫與九二正相反五以剛居剛過而易恱隂反得而乗之也易言无咎无譽者惟此爻與坤六四彼居重隂之間无咎又須无譽此居三陽之上而與隂比棟橈則三任其咎棟隆則四受其譽與五一無與就所處之位言也九二象辭止釋老夫一句五則句句闡發者陽氣太過之餘衰候至矣枯楊已非可久之道况復生華是速之也老婦士夫本欲資隂而身居兑體乃為女所恱失夫道矣可醜在士不在婦也愚又按二五爻辭若古歌謠稊與妻叶華與夫叶古華字作荂方無切以六義合之若以枯楊興起老夫老婦以稊華興起女妻士夫此三百篇之祖也采菽第四章維柞之枝其葉蓬蓬枝以興殿邦之君子葉以興左右之率従章法似之上六過渉滅頂凶无咎象曰過渉之凶不可咎也以隂柔居卦終兌澤用事過渉滅頂即澤滅木之象一隂在四陽之上與木末同故曰頂大夏將傾豈一木所能支明知過涉有滅頂之凶而時位到此有不得不涉不得不滅者象雖凶而于義則无咎乃殺身成仁之事也聖人非不知徒死之无益但忠義激發之懐雖過而不嫌于過象曰不可咎謂非馮河經瀆者比也不可歸咎于涉也聖人特繫此爻以為見利忘義者戒世固有見危授命而于事无濟旁觀猶議其非者苛刻之論聖人所不取也彖辭取象巽木六爻亦然艸與木為類故初象白茅楊木性之柔者二五近本末而弱故曰枯楊三四兩爻居四陽之中任重者也故皆言棟惟上爻取諸澤而滅頂與滅木之義略同馮奇之曰易卦上下兩停者従中反對頤中孚小過皆然大過尤顯而易見三與四對二與五對初與上對玩辭可見愚謂此四卦无反而有對頤與大過對者也中孚與小過對者也止可謂之對卦與餘卦爻爻倒換者不同坎下坎上習坎有孚維心亨行有尚舉正卦首當有坎字習者重也先儒謂乾坤六爻與一爻同畫不變也畫變則爻變故卦至六子而後言重重卦之序坎在六子之先乾坤之中男也愚按八重卦多出單名獨坎加一習字盖險之境最難處文王欲人之習而安之也故不曰重坎而曰習坎孚者信也今海中畫夜兩潮不失其期謂之潮信即有孚之義一陽在二隂之中心象二五動而出險行象陷溺之害心為甚身次之水能溺人身不能溺人心身處坎而心則亨乃可以行險維者捨心亨而外无他術也心何以亨有孚而已行有尚忠信涉波濤之謂張子云坎維心亨故行有尚添一故字彖詞之㫖瞭然愚又按卦辭于坎曰心亨繫傳于坎曰心病有孚則心亨加憂則心病此憂危之君子所以異於陷溺之小人哉彖曰習坎重險也水流而不盈行險而不失其信維心亨乃以剛中也行有尚往有功也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉愚按彖辭曰習坎傳曰重險重卦之義于此發之險不重則人猶可趨避如需之不陷蹇之能止非真險矣兌止水也有時而盈坎流水也惟流故不盈惟不盈故險可行水自澗谷達江海厯多少髙低曲折所謂行險雖所遇有難易而未嘗不果于行所謂不失其信陽動隂中故以心亨歸剛中之徳以行為主往而有功則出險矣可見天下无險非可行之地无往非出險之功以上處險之道釋彖已畢天險以下夫子别言用險之方人情説到險便頽然消沮聖人于是發明險之時用以破人心之疑用字重看天險无形者也地險有形者也設險者因地形而措置城池也險之時用上極于天下極于地中極于人豈不大矣哉象曰水洊至習坎君子以常德行習教事本義治己治人必皆重習然後習而安之愚按爾雅洊再也内坎方至外坎洊至水之有恒如此君子體之以常徳行學不厭也習教事教不倦也吾夫子所以有取于水也夫初六習坎入于坎窞凶象曰習坎入坎失道凶也卦體習坎以冠初爻王輔嗣云最處坎底者也愚按坎底有穴曰窞習坎合上下之卦言入于坎窞指下卦之下言初柔居最下不但不能出險且入于坎窞之中一入不可復出陷溺之象故凶象曰失道謂身投陷宑自失出險之道未可諉咎于險也道者何有孚心亨是已九二坎有險求小得象曰求小得未出中也愚按坎已是險矣何以又言有險要見身在坎中禍患之來有非意料所及者聖賢處此猝難措手急求出險如何可得雖以九二之剛中但可求小得而己未能出險中也小得即需九五需于酒食之義錢啓新曰陷不在大失嘗在小如之何勿求諸葛武侯苟全性命于亂世得九二善處險中之道者也六三來之坎坎險且枕入于坎窞勿用象曰來之坎坎終无功也自上而來曰來自此而往曰之三居下卦之上上卦之下受四之坎以輸于二故曰來之坎坎乾三爻處二乾之間曰乾乾此處二坎之間曰坎坎先儒多以三句相承説无非言其險之至愚竊謂六三才柔位剛力不足而志有餘當往来上下之交經營以求出險可謂不遑寜處矣入于坎窞本初爻之象爻辭勸以險且枕言處險之時姑且伏枕以待毋若初之入于坎窞而凶也勿用又申戒之辭謂无所用其躁急也大凡處險者以速求出險為有功但須通盤打算徹始徹終方克有濟象要其終而曰无功益見目前欲速之无益也六四樽酒句簋貳句用缶句納約自牖終无咎象曰樽酒簋貳剛柔際也程朱於四五二爻皆作君臣相與出險解是已愚竊据二先生之説而發明之四離下坎而入上坎尚非風恬浪静之時近與五比相與習處險之道而定出險之謀者也爻辭于需困未濟凡有坎體者皆取酒象曰樽酒則无濡首之嫌曰簋貳則非殽核之旅曰用缶則无華美之飾總以儉約相結納也自牖與暌之遇主于巷義同五為卦主爻四有委曲相求之意餽之以薄禮行之以簡陋而終无咎者一剛一柔當同舟共濟時交際之義宜然也樽酒以下陸徳明分兩字為一句程傳依之本義依晁以道分三字為一句愚按小象樽酒簋貳未嘗以貳字屬上讀似不當捨經文程傳而従晁説也黄氏日抄所見略同九五坎不盈祇既平无咎象曰坎不盈中未大也本義九五雖在坎中時將出險之象愚按卦體中滿盈之象盈則不平機械變詐相㝷而起此行險所以失信也機深則禍愈深寜有出險之望五陽剛中正妙處全在不盈中不自滿險阻皆成康莊何不平之有故以不盈既平取象二與五皆剛中而二有險五則險既平矣故无咎象辭于二言未出中于五言中未大者一有險一不盈也中謂坎未大謂不盈就文作解其義如此上六係用徽纆寘于叢棘三歲不得凶象曰上六失道凶三歲也先儒謂係者拘也三股曰徽兩股曰纆拘囚之索也叢棘如今之圜土墻上列棘之象上六隂柔居險終陷之深者也故有此象愚又謂坎為隠伏自起糾纒自生芒刺多是險象豈必江河之陷溺哉周禮收教罷民能改者上罪三年而舎三嵗不得凶何待言推原所以致凶之故明是隂居險極時位使然聖人言人不言天故初上皆曰失道愚按六爻无一吉字盖重卦内外无應初雖與二比二方在險中豈能従井救人惟四五兩爻同在外卦近而相比取剛柔交際為義故皆无咎三之險以乘剛初上在二五兩陽爻之外所以最凶愚又按同一水也井以上出為功坎以下流為險取義各不同竊謂坎卦六爻従源溯流自上説下于義亦可盖水之發源多在山谷榛棘之處上乃坎之源也荀九家以坎為法律故設係纆寘棘之象以為輕冐險者之戒五為承流第一坎水勢猶未大不盈則无泛濫之虞既平則无風波之憂五以剛中處之時當利濟故无咎四近比于五有卬須我友之義五以剛濟柔有乘流拯溺之才五不盈四所以无險可以酒食相約漢光既渡滹沱馮異進麥飯豆粥樽酒簋缶之象似之三則江河之水矣上受四五之坎下輸二初百川灌注其勢滔滔前臨險而後枕險有入坎之危无濟川之功爻辭于此方掲出險字二之有險亦自三來也二雖剛而不正幸其得中猶可以求小得若出險大事尚非所能初則地居最下衆流之壑矣邱行可云坎之性下下則為陷尤甚胡雲峯云坎水潤下愈下則陷故習坎入窞之凶歸焉上之失道係寘止于三嵗初之失道陷溺且終身矣雜卦云坎下也竊用此象逆推之離下離上離利貞亨畜牝牛吉本義隂麗于陽其象為火體隂而用陽也愚按六十四卦无一非乾坤之孕育亦无一非坎離之變化一隂一陽乾坤也隂陽互藏坎離也坎離得隂陽之中與震巽艮兌不同故上經之終坎後繼之以離離為火其用明故利乎貞麗而貞則亨矣其性躁而炎上愈上則愈焚故又以畜為吉畜者養之使消其剛躁之性而成順也牛物性之順者牝牛順而又順者也離再索而得女中一畫自坤卦来故坤取牝馬離取牝牛卦體二五皆柔中必養其柔順之徳如牝牛而後吉胡雲峯曰坎之明在内以剛健而行之于外離之明在外當柔順以養之于中愚又按牝馬牝牛同為柔順之物坤馬以行為利離牛以畜為吉者坤純隂非行不足以配乾健離一隂居二陽之中非畜不足以蔵坤順也彖曰離麗也日月麗乎天百穀草木麗乎土重明以麗乎正乃化成天下柔麗乎中正故亨是以畜牝牛吉也古説皆以麗為附楊龜山曰火无常形附物而有形黄氏曰抄云麗字當兼文明之意不特言附著而已愚竊謂火麗于薪而不滯于薪離者兩之分麗者兩之合本非一物而不能相離故曰離麗也離之為卦在二五兩爻五為天位天道下濟而光明有日月麗天之象此以氣麗形者也二為地位地道含萬物而化光故有百穀草木麗土之象此以形麗形者也合上下二體故曰重明明之必麗乎正猶日月之麗天草木之麗地教人以用明之道也化成天下向明出治之象又従重明得來重明麗乎正兼指二五柔麗乎中正専指六二猶重坎之剛中専屬九五也故坎以五為主爻離以二為主爻分言之六五麗乎中六二麗乎中正總言之則柔麗乎中正離之所以為明者中柔也惟柔故能麗乎中正惟中正所以利貞而亨惟柔以中正而亨所以畜牝牛吉故字是以字相承説張元岵曰人心屬火其眀亦猶火也麗乎色則為視麗乎聲則為聴所麗者正則明亦正所麗者不正則明亦不正矣故重明以麗正為主郝仲輿曰火之麗于薪猶知之寓于物離薪為火者妖火也不可以烹離物為知者邪慧也不可謂知故曰致知在格物象曰明兩作離大人以繼明照于四方程傳以明兩二字為句本義用水洊至句法以明兩作三字為句黄氏日抄従之愚按卦有離體者上下十有六大象或為火或為日或為電本卦重明兼取日與火明兩作以卦之上下言如云日新又新也繼明以爻之前後言如云以聖繼聖也大人以徳言則聖人以位言則王者照于四方與書之光被四表詩之緝熙光明義同非物物而察之也先儒或謂日照乎晝火照乎夜為繼明以内三爻屬日外三爻屬火日光被于下故下卦取之至三而有日昃之嗟火氣炎于上故上卦取之至四而有焚如之象初九履錯然敬之无咎象曰履錯之敬以辟咎也辟音義與避同本義以剛居下而處明體志欲上進履錯之象愚按初爻在下如日之初出諺云日出事生履錯然之象以剛居剛乃聰察之人鋭意前行者如所謂火性也錯字有紛錯舛錯二義當事物紛錯于前或不免舛錯之咎理固相因若敬則无是矣敬之云者即其明鋭處下詳審之砭象申之曰以辟咎可知擇地而蹈敬之在初乃用明之要道也六二黄離元吉象曰黄離元吉得中道也本義黄中色柔麗乎中而得正故其象占如此愚又謂土之真精天五冲氣位乎中央其色黄非火色也以坤之中爻入乾之中爻則為離故坤五曰黄裳元吉離二曰黄離元吉凡天地間有黄色者皆吉祥之氣也爻詞止表一黄字而位之中正徳之柔順俱包涵于中聖人之文簡括如此象曰得中道正在其中矣二與五皆得中獨于二言中道者離以二為主爻也九三日昃之離不鼓缶而歌則大耋之嗟凶象曰日昃之離何可久也本義云重離之間前明將盡不安常以自樂則不能自處而凶二句作一串説吳幼清易纂言云三者下卦之中當人之位故為日昃之時詩述陳國之風史稱秦人之俗皆鼔缶而歌盖以樂生也人之老也不能以死為樂則必以死為憂矣愚又竊謂初為日出二為日中三以隂居陽而不中日昃之象于人則為老境聖賢當此忘食忘憂不知老之將至固不以垂盡為憂亦不以達生為樂也世間乃有兩種人其一委蜕形骸謂造化勞我以生逸我以老是作達一流鼔缶而歌者也其一老大傷悲或戚戚于貧賤或皇皇于富貴是不逹一流大耋之嗟者也羣情役役大約不出兩端不字則字兩相呼應言不之乎此則之乎彼也豈知日昃之時大有事在趨之則吉而悖之則凶乎細玩爻辭嗟者與歌者正相反一不當樂而樂一不當哀而哀分兩叚説其義較明象曰何可久乃援天以曉人見日昃之離乃天運之自然人何以憂樂為哉九四突如其來如焚如死如棄如象曰突如其來如无所容也棄石經作弃本義後明將繼之時而九四以剛迫之故象如此愚按明者離之徳火者離之象四以剛居柔不中不正與柔麗乎中正相反在下卦之上氣燄驪張離火外明明來自外突如之象非咎其來咎其來之突也焚如死如棄如即左傳不戢自焚莊子以明自煎之義是以君子貴居晦而用明也胡庭芳曰坎性下三在下卦之上故曰來來而下也離性上四在上卦之下亦曰來來而上也水本下又來而之下入于坎窞而後已火在上又來而之上焚如死如棄如而後已爻辭之不善未有如是其極者不能畜柔而失用明之道其禍乃至此愚按象曰无所容謂其剛而又躁不但不能容人直无地自容矣觀四之无所容則初敬慎以辟咎之義益見六五出涕沱若戚嗟若吉象曰六五之吉離王公也離鄭本作麗程傳謂五以柔附于剛强之間危懼之勢也錢田間曰二五皆以柔麗剛二之辭安五之辭危二得位五失位也失位則危知危則吉愚竊謂五才柔位剛雖不正而麗乎中繼體向明有憂盛危明之意如傷泣罪形于涕洟為出涕戚嗟之象九三之嗟所憂止一身六五之嗟所憂係天下所謂危者安其位者也故吉蔡氏以王公屬本爻愚竊謂公當指上九五近比于上王與公相為附麗終收正邦之功是亦善繼善述者矣上九王用出征有嘉折首獲匪其醜无咎象曰王用出征以正邦也本義剛明及逺威震而刑不濫无咎之道也愚按離為甲胄戈兵火炎上故于上爻言出征王用出征者五用上以出征也有嘉者有功可嘉美也折首者擒首惡也匪醜者非我族類也此爻正合周公東征之象四則管蔡也五為成王變起骨月遭家不造而出涕戚嗟小毖之詩所由作也折首者其武庚乎管蔡本我之兄弟非武庚之醜類公奉王命出征既誅其首惡所獲又匪其類不但无咎且成正邦之功就辭作解彷彿似之黄氏日抄云古注除其非類此語盡之程傳云所執者非其醜類則无殘暴是欲增説義理也然欲言无暴當曰非執其類可也今曰所執者非其醜類反若禍及无辜豈得云无殘暴耶馮文所曰前離則鼔缶後離則出征者作者過于動故止之繼者安于逸故振之也臣之炎盛不能以剛為柔也君之憂嗟則能以柔為剛者也故臣死棄而君獲吉初居下之下四居上之下志皆躁動而初慎于進四急于進吉凶之所以分聖人于剛柔進退之際其審如此此明之極也正易心法以上經乾坤頥大過坎離六卦下經中孚小過二卦為對體與諸卦反體者不同乃造化之機緘其體不變故云卦有反對最為闗鍵反體既深對體尤妙李子思曰坎蔵天之陽中受明為月離麗地之隂中含明為日月司夜日司晝坎為水而司寒離為火而司暑天地造化之妙孰有出于此哉又曰水在人為精火在人為神一陽居中即精蔵于中而水積于淵之象一隂在中即神寓于心而火明于薪之象薛敬軒曰水火二字乃坎離二卦順置之可見經繹曰人受天地之中以生坎離象之為誠為明上經終焉愚按坎中實誠也離中虚明也誠明皆出于中爻先儒以為卦之用愚竊以為卦之體鄭潛谷曰大過陽中隂外象坎頥外實中虚象離于以啟坎離之先收上經之終頥震艮合男大過巽兑合女又以成咸恒之交開下經之始八卦中乾坤坎離无反對六十四卦中頥大過中孚小過亦然故次上下經之後而皆以坎離終此乾坤六子相終始之義周易玩辭集解卷四
