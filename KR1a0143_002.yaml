body:
  text: 周易玩辭集解卷二翰林院編修查慎行撰震下坎上屯元亨利貞勿用有攸往利建侯楊誠齊曰氣始交未暢曰屯物勾萌未舒曰屯世多難未泰曰屯張待軒曰乾坤之後繼之以屯冰霜甫消戰血已盡龍起雲興萬物逡逡然將春矣故謂之屯愚按屯之時天地初闢元氣未漓震坎二男起而用事非具天德何以濟屯故亦以元亨利貞歸之勿用有攸往便是貞處利貞二字似是戒辭利建侯者言更無他事只願聖人早即大位便可濟世安民也程傳謂屯難之世當建侯以自輔本義云利建以為侯楊龜山云使人各有主而天下定王伯厚云封建與天地並立一旅復夏共和存周封建之效也愚竊謂卦之主爻在初九震為長子帝出乎震侯即帝也注疏所云得主則定是已自民心言則涣散無主利初九之為君自初九言則事業方新利樹人以廣助必兼此二者建侯之義始備彖曰屯剛柔始交而難生動乎險中大亨貞雷雨之動滿盈天造草昧宜建侯而不寧難去聲乾坤二卦贊辭皆言陰陽自屯以下皆言剛柔乾坤陰陽未交也剛柔之交自震初二兩畫始坎在上險體也故曰難生震在下動體也故曰動乎險中動未便能出險之外只在中而能動便見出險之才故曰大亨貞雷雨滿盈又從上動字說來蓋水在雷上一滴不漏此時山川震蕩日月晦冥若天别造一草昧世界者聖賢處此正當審時觀變未可輕動卦辭云勿用有攸往夫子却將此句略過重在利建侯不言利而言宜者當屯時建侯所以慰羣望人情皆以為宜非一已之利也不寧謂王者心不自安亦從動字來不寧之心即起于勿用攸往之日其始不輕動者其後決不自安于小成也此夫子發文王未盡之意一說難讀平聲險在下震從上動動之易故為解險在上震從下動動之難故為屯亦是一解象曰雲雷屯君子以經綸彖傳言其磅礴之勢則曰雷雨大象摹其經營之意則曰雲雷坎在上體故言雲雷而不言水水氣方上騰猶未為雨也卦之名屯以此需卦坎居上體亦曰雲䝉卦坎在下體則曰泉可以義推君子以經綸者徹始徹終通盤打算不在雨勢滂沱之後而在精神停蓄之時如雷之斂而未發如雲之聚而未散方是取象于屯一雨即為雷水解矣初九磐桓利居貞利建侯象曰雖磐桓志行正也以貴下賤大得民也磐桓持重不輕動之義人多作盤旋解張橫渠則云磐桓猶言柱石按字書磐大石桓柱也初為屯主爻如全卦之柱石于義亦通所云利建侯者即其人矣利居貞即勿用攸往之義貞者正也以剛居剛得位之正雖持重而不輕動乃其志則在濟世安民欲以行正也彖傳小象凡六卜五志字于此爻發之初以一陽居二陰之下故曰以貴下賤即行正之實際處凡岩穴之士㷀獨之人無一不延攬無一不矜恤有不大得民心者乎得民乃建侯之根本夫子于爻辭只釋磐桓二字餘皆發周公未盡之意小象之變例也午亭陳氏曰天下大勢決于民而已初能大得民宜為成卦之主也胡雲峯曰乾坤初爻提出陰陽二字此則以陽為貴陰為賤陽為君陰為民尊陽之義嚴矣六二屯如邅如乘馬班如匪寇婚媾女子貞不字十年乃字象曰六二之難乘剛也十年乃字反常也易簡録曰陽動而上雲雷則屯矣陰乘于陽不交而乘矣乘剛始此剛不是論德只据二所乘之位言之愚竊按二與初所謂剛柔始交者正應在五而近與初比志在從五而內忌于初曰屯邅曰寇皆難生之象夫初為卦主本非寇也乃求二為婚媾耳此人情之難却者而二守貞不許知有五而已不字者不字于初乃字者終字于五至于十年而後復其陰陽相應之常道二之屯邅如此又按二四上三陰爻二取震馬四與上取坎馬二四上俱言班如二獨多屯邅者只為以柔乘剛故遇始交之難屯如以時言塞而木通也邅如遲回不前之象班如分布不進之象六三即鹿無虞惟入于林中君子幾不如舍往吝象曰即鹿無虞以從禽也君子舍之往吝句窮也張彥陵云六三躁進者也愚謂凡陰必資陽以有為君子志在濟世須得人相助六三陰居陽位才弱志剛即鹿無虞之象在二陰之中入于林中之象羣雄逐鹿上有五而下有初識時務者見幾則當舍昧事機者往吝必致窮爻曰不如舍猶有斟酌之意象曰舍之直是決去之詞更不必商量矣周易舉正云以從禽也以字上當增何字愚竊按凡獵者必用虞人設驅逆之車使禽趨田然後有獲即鹿無虞而可以從禽乎以從禽也大似調笑語不直言其事之無成而無成之意隱然言外若增一何字便非活句矣六四乘馬班如求婚媾往吉無不利象曰求而往明也先儒多謂四以陰輔五才不足濟屯故下求正應之初與之俱往愚竊謂初方求賢共濟四又近君新舊從違之間進退未決故有乘馬班如之象求婚媾者非四往求初乃是初來求四所謂以貴下賤也以卦言自內之外為往自外之內為來以爻言則我之人為往人之我為來四必待初來求而後往者二下初為婚媾非正應故不字四下初為婚媾正應也故往吉小象贊之以明見得觀時識變內度之已外度之人非明哲者不能也九五屯其膏小貞吉大貞凶象曰屯其膏施未光也此爻先儒詮釋不甚明析愚竊取其義而詳說之蓋易道莫重于中正五居中處正本有德有位者但在坎中一陽為二陰所掩坎為雨故有屯膏之象詩芃芃黍苗陰雨膏之今曰屯膏則不能霖雨天下可知初震體動而得時五坎體陷則失勢蓋事權在初五但有位而已夫人主之財當與天下共之在無事時謹身節用不失為小貞之吉時方屯難待澤者多顧乃恩不下逮如有司出納之吝非大貞凶乎所謂可小事不可大事者也按周禮小宗伯之職若國大貞則奉玉帛以詔號太卜注云大貞大事求正于龜也貞字亦釋作事字象置吉凶于勿論特原其情曰施未光以五為重陰所掩雖有恩施而未能光大與厚藏吝嗇者不同上六乘馬班如泣血漣如象曰泣血漣如何可長也吕伯恭曰屯極則當通上正是一機㑹然以隂柔居之雖欲有為而才不足徒為無益之泣而已愚又謂二乘馬以應五也四乘馬往而應初之求也上居屯極陰柔無應乘馬將安往乎坎為血卦泣血之象劈頭難到底迅雷轟霆動于坎下四之所媾為彌天之雨上之所泣為盈坎之血當此之時不能變屯為治則入于亂亡而已曰何可長猶云豈是久訃要人思可長之道也卓去病曰上勢窮力弱有心泣血無力回天蓋遺老孤臣如漢末楊彪以司徒擁大位至不能庇其子求長久之計而不可得者也愚按自屯至比六卦皆有坎聖人防危虞險之微意又按六十四卦上經除乾坤頤大過坎離六卦下經除中孚小過二卦無反對外自屯䝉至既濟未濟凡五十六卦彖傳多從反對二卦發剛柔互易之義而已觀雜卦傳兩兩對舉其義昭然至京房虞翻輩推而衍之極六十四卦之變遂成四千九十六卦雖易道之大變化無方而由其說竊恐流為小知小數無關于大源大本故是編于諸家言卦變者間采一二即本義所釋十九卦云某爻自某卦來亦未敢据為定論即如屯可云自坎來初二兩爻互易而成震亦可云自震來四五兩爻互易而為坎亦可云自觀來初上兩爻互易而為屯亦可云自萃來初四兩爻互易而為屯莫不有卦變在其中餘可類推聖人所不言者似不必多生枝節也坎下艮上蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞告入聲下同序卦傳蒙昧也不明之義愚按凡物之被掩蔽者謂之蒙如鏡之蒙垢目之蒙翳而其本體之明自在亨乃䝉之本體下是養蒙之道先儒謂屯䝉二卦反對屯取建侯之義作之君也蒙取求我之義作之師也愚又按震變艮為少男童蒙象蒙而曰童天性未漓為教易入故亨本義謂亨以下皆占辭筮者明則人當求我而亨在人筮者暗則我當求人而亨在我愚竊謂匪我求童蒙即不憤不啓不悱不發之謂此其義如筮者之揲蓍初筮必告由其一念之誠求也至再至三則煩瀆矣不告者問此而答彼之謂筮字借作求字影子不必主卜筮言兩我字皆指九二童蒙指六五五來求二二為卦主故曰我利貞者教之以正也彖曰蒙山下有險險而止蒙蒙亨以亨行時中也匪我求童蒙童蒙求我志應也初筮告以剛中也再三瀆瀆則不告瀆蒙也蒙以養正聖功也蒙之所以不終蒙者自有可亨之道以險而止必以亨而行行則亨不行則止行對且說時止則止時行則行便是時中兼指二五兩爻五為蒙童二則養蒙者非亨行必不能以正養非時中必不能及其蒙而養下文多是以亨行時中處時中二字乃聖功張本京氏傳云蒙自觀來志應者二五蓋往來之爻故有相求之象吕伯恭云教者雖不先求學者自有樂育精神感發來學處此無以感之彼安得而應之應生于感也愚按此諸卦言應之始剛中專指二告字從應字來洪鐘在懸隨叩隨應初筮所以告也再三之瀆似是蒙來瀆發蒙者何以云瀆䝉吕伯恭曰至理不容擬議一言之下便當領㑹苟未領解吾置而不告彼雖未達其胸中天理固完然不動若再三告之則彼將入于擬議測度反瀆其天真矣瀆童之義如此然所云不告者非棄之也乃養之耳即孟子養不中養不才之義蒙自有其良知良能所謂正也從渾沌立根基不使鑿竅入聖之功由此不曰正以養蒙而曰蒙以養正張子所云使蒙不失其正教者之功也象曰山下出泉蒙君子以果行育德行去聲真西山曰艮之象山其德止也山惟靜止故泉之出者無窮冇止而後冇行也吳草廬曰童蒙猶山麓初出之泉汩之則清者渾閼之則通者塞養之導之而後可果行者導之之方育德者養之之方愚按蒙養在初猶泉之始達故不曰水而曰泉周子所云靜而清也蓋坎為流水泉者其源也泉之流或濁其源未有不清者猶物欲乃後來之蔽性未有不善者蓄其源使常清所貴果行育德之功果行者體坎之剛中以果決其行育德者體艮之靜止以涵育其德也初六發蒙利用刑人用說桎梏以往吝象曰利用刑人以正法也說與脫同程傳謂去昏蒙之桎梏本義謂痛懲而暫捨楊龜山謂脫桎梏而聽之往似皆非爻辭正解愚竊謂䝉在初不可無以發之如昆蟲伏地遇蟄則出有開豁警動之意初近二中爻互震凡易言用刑者必有震象刑即書之朴作教刑禮之夏楚收威是已漢書刑法志械在手曰梏在足曰桎立教之始利用刑人然以為蒙童而發之非以為罪人而桎梏之也其或束縛過嚴學者將苦難而不知益如刑人而加以桎梏矣所貴敷教在寬藏修遊息使其手足冇所措則心思當日開故又取用說桎梏之象若一味任嚴以往則有吝矣以見立教當寬嚴相濟之意朱子嘗云教導後進須是嚴毅然須有以開發之方得此正解也楊敬仲曰知有陷開心亦有桎梏或錮于聞見或拘于私意真明不得出矣此心之桎梏也故利用以說其桎梏也湛甘泉曰治蒙之初非用教刑則無以警其惰破其愚所以然者使䝉不至于終䝉終蒙則過惡之甚至受桎梏之刑矣故初之用刑用以脫其桎梏之罪也兩用字有著落此解亦得愚又按鍾維新讀易抄曰䝉初有師道焉非用刑者也當如詩之刑于且法正之以身法也以正為法桎梏自脫所謂名教中有樂地也此解更深一層項平甫云發之于初者正法示之而有餘擊之于終者干戈禦之而不足合初上兩爻看教䝉之義盡矣九二包蒙吉納婦吉子克家象曰子克家剛柔接也一陽居中乃治蒙之主中以上則過中以下則不及童蒙之質精神未完血氣未定治之稍過不及俱失其時故周子說蒙之義曰慎哉惟時中二之能包蒙以剛中也凡易之道以陽包陰以君子包小人䝉曰包蒙泰曰包荒姤曰包魚皆在九二包蒙有家庭容納之義故取象于婦子自初至此童年已長可以授室矣故曰納婦可以總家政矣故曰子克家剛者九也子也柔者二也婦也故曰剛柔接以一室言為夫唱婦隨父作子述推之朝廷則周禮嬪御膳夫庖人統于冢宰皆是也本義以剛柔接為二五之應細看來本爻已具此義六三勿用取女見金夫不有躬無攸利象曰勿用取女行不順也取去聲三與上本正應但以陰居陽而不中又近比于九二女子之柔而多欲者也二雖以納婦為吉此則戒其勿取嫌其遠正應而近相比也不有躬由于見金夫病在見字見利則忘身矣二剛中金夫之象凡剛居二爻者多稱金姤初之金柅用四之金車皆指二此金夫亦當指九二無疑孔疏謂指上九似非三往從上于行為順今舍上而下比于二小象所以云行不順本義順字當作慎與坤文言略同又引荀子順墨作慎墨按術順墨而精雜汙語出修身篇其義本難曉不知朱子何以援此為證愚竊謂經文未必屢訛也蘇紫溪曰蒙卦凡三言順五之順在從人上之順在禦寇若為利欲所誘則本性之拂逆多矣赤子之心順乎性者也利欲之誘逆乎性者也只就順字作解為得六四困䝉吝象曰困䝉之吝獨遠實也本義以遠于陽而無正應為困象是己愚又按六四以陰居隂質既昏暗又無賢父兄師友之助者內有九二為父兄而隔于三則包之所不及外有上九為師友而隔于五則擊之所不加孑然處于晦昧之地困而不學終于下愚而已可羞孰甚焉陽實隂虛木卦陰爻多比陽惟四比應皆陰故曰獨遠實非實之遠四四自遠實也六五童䝉吉象曰童䝉之吉順以巽也此求我之童蒙也艮為少男童象五居尊而下順于二惕誠齊以高宗學于傅說武王訪于箕子證之愚謂五之受教于二能以童蒙自居如太甲之于伊尹成王之于周公不啻子承父命者然書曰復子明辟直謂之子可也以子承父而何不順以巽乎順者善受巽者善入皆童蒙之德也若順而不巽則悅而不繹從而不改矣夫子補爻辭所未言愚又按六十四卦中六居五九居二者凡卜六卦而十五卦皆吉謂人君柔中虛已而任剛中之臣其臣亦以剛中之德應之也于蒙卦首發其例陸君啓曰蒙之君願為賢者童泰之君願為賢者婦尊賢之義隆矣上九擊蒙不利為寇利禦寇象曰利用禦寇上下順也本義治蒙過剛為擊象攻治太深則必反為之害與小象上下順其義難合愚竊謂上之所擊者三也三雖與上正應而陰柔不中不正又居艮止坎陷之交三既以二為夫自上視之則為寇矣故曰擊此遠不相得者也坎為盜寇之象擊蒙有二義治之太過則激而為寇因其來而禦之則可以止寇為寇者不利則利在禦寇者矣艮為閽寺守禦之象禦寇者上也胡雲峯曰上之剛不為寇而止寇是上能順下三之蒙因其禦而不為寇是下能順上得其解已愚又謂本卦陰爻皆蒙二剛而居中包蒙所以養其善上剛而過中擊蒙所以懲其惡初之用刑防寇于早也上之用擊持法于終也象數論曰初六乃立教之方九二陽爻師象三四五爻皆陰弟子象六三以陰居陽坎性趨下見金夫不有躬蒙之見誘于利欲者勿用取女有不屑教誨之意焉六四困而不學者也六五與二正應順以受教故以童蒙之吉與之上九陽剛居終有衛道之力者也凡異端曲學足以惑蒙童之聞見者皆寇也不利為寇而利用禦往者不追來者不拒歸斯受之而已矣蘇君禹曰乾坤初闢即有屯蒙屯則未舒蒙則未覺其洪荒時乎唐虞以後智識漸開私欲之誘甚于金夫意見之障甚于桎梏名利之竊引寇而攻其外道德之竊引寇而攻其中有如水之潰決而莫之止也夫水之源澄之也易水之流塞之也難故初言發不過開關啓鑰之功二言包猶有含垢匿瑕之度上曰擊則有移山壓卯之勢矣要學者求其在我得其初心則夜氣之動即為仁義孩提之知即為堯舜困可通婦可納又何桎梏寇盜之足慮哉乾下坎上需有孚光亨貞吉利涉大川愚按坎在上體者凡七卦聖人于屯蹇取濟險之功多是時㑹既至經綸斡旋之事若時㑹未至以前須有一段忍耐工夫需是也需亦造化自然之候時方險難不得不待者也然往往陰柔者患不能出陽剛者患不能需卦體乾內而坎外卦德妙在有孚二五剛中充實有孚之象中爻互離欲速見小蔽他不得光之象外卦坎為通亨之象八卦正位坎在五剛中正貞之象貞則不妄動以犯險自然得吉合二體險在前陽剛臨之利涉大川之象末句兼指內卦三陽而援三陽以出險者九五之功也彖曰需須也險在前也剛健而不陷其義不困窮矣需有孚光亨貞吉位乎天位以正中也利涉大川往有功也須即詩卭須我友之義彖辭言利涉大川者凡七惟需渙二卦有坎體渙坎在內卦故曰乘木有功需坎在外卦故曰險在前內卦三陽以健體居坎下喜其能需故剛健而不陷非由剛健故不陷也天下事躁進者每多阻今遇險能須故其義不困窮外卦一陽居坎中而得位凡人阻于勢而不得不需九五位乎天位勢無所阻由其陽剛中正故能鎮靜俟時養其全力險在前而需則往非冒險在險中而需則可援諸陽以出險此其所以往有功象曰雲上于天需君子以飲食宴樂屯需大象皆不言水而言雲遇雷則為屯取滿盈之象上天則為需取悠揚之象舒卷不迫要見與迅雷疾風不同何以不言雨雨是己下之象無須待意矣凡人利害得失迫于其中一飲一食俱不自適能需者不然從容暇裕如浮雲太虛盡其在我聽其在天故于飲食之中得宴樂之道也身安曰宴心恬曰樂初九需于郊利用恆無咎象曰需于郊不犯難行也利用恆無咎未失常也難去聲國外曰郊初猶未近險需于郊之象同人以象上九去火遠者也需以象初九去水遠者也需在初為時最早恐其歷久而變故戒以利用恆恆者常道也蓋乾剛之性一往無前每每犯難而行失需之常道今在郊能需則無是患矣小象不字未字皆釋無咎而需之義即在其中所以堅用恆者之心也朱啓莊曰凡言郊者多由主爻取象同人以二為主上去二遠故上為郊需以五為主初去五遠故初為郊同人由近而遠需由遠而近所以處險者正在此郊者蕭然閒曠却步步蹈實地沙在水中灑灑脫脫不濡首塗足泥則沾濡汚穢大費手腳矣九二需于沙小有言終吉象曰需于沙衍在中也雖小有言以吉終也二則漸近于險矣沙在水中尚無沾泥塗體之患故取象于此初可以遠害而不可以濟時三則逼險而致寇惟二進不于泥退不于郊正在或遠或近之間所以未免小有言者初則言其不能退而遠避三則言其不能進而有為于此之時能不為羣言所惑從容以俟由其剛中之德也說交衍水朝宗于海也衍在中即從沙字取義此爻即乾之九二衍字即寬以居之之義此心寬然無入而不自得人言何足惜哉以其中而不正故小有言以其衍在中故終吉九三需于泥致寇至象曰需于泥災在外也自我致寇敬慎不敗也三居內卦之上與坎切近為泥象自郊而沙而泥三之時位適然于三何尤而致寇愚竊謂三之病在過剛不中不能靜待所以致寇至寇自我致則三不得辭其咎矣象乃為之謀曰幸其災尚在外卦也自我致寇故寇至我不致寇則寇斯不至其道在敬慎而已何謂敬慎需是也本爻即乾之九三乾乾惕若即敬慎之義不敗者謂當自處于不陷之地非與寇爭勝也曰難曰寇曰災皆從險在前說來敬字從上六應爻爻辭來六四需于血出自穴象曰需于血順以聽也先儒釋此爻者多以血為殺傷之象愚竊謂坎之為險者在六四一爻三陽方進而四扼其前卦體本以乾需坎坎非需乾者也四何以亦稱需蓋以三陽從容鎮定無隙可乘九五陽剛中正與為近比四之柔順得正亦非與陽為難者故取需于血之象血陰屬循分以自安也坎為隱伏穴象中爻互離離中虛出穴象出自穴者若離其所處之安以為三陽彚征之路順以聽順于五以聽陽之進也有四之出穴而後有上之入穴有四之順聽而後上有三人之來需于血之妙用如此絶無相拒見傷之義凡解爻辭者須細玩小象若以血為陰陽相傷則既受傷矣何以需為與夫子順聽之㫖不幾相悖乎項平甫解此爻亦不取陰為陽所傷之說竊從其解而極論之九五需于酒食貞吉象曰酒食貞吉以中正也坎居八卦正位五為卦之主爻所謂位乎天位以正中者也下三陽恃其有孚故堅忍以需之五為主人位乎中正具酒食以待客式飲式食共釋險難之憂而享安養之福此其所以貞吉也凡卦中有坎者爻辭多取酒食之象坎六四尊酒簋二困九二困于酒食是已彖傳倒轉以叶韻云正中小象所云中正即正中也與乾九三龍德而正中不同上六入于穴有不速之客三人來敬之終吉象曰不速之客來敬之終吉雖不當位未大失也當去聲愚按四上兩陰爻皆取穴義而出入不同四之穴在三陽之前以退避為義上之穴在三陽之外以守己為義此爻即坎卦之上爻也在坎為置棘之象在需為入穴之象坎上無應而此有應故彼以三歲不得為凶此則以三人之來為吉三人指內卦三陽也自陽呼陰曰寇自陰稱陽曰客五為卦主三陽本五之客因上與九三正應故三率其同體而來出于上之意外故曰不速謂不召而自來也雖不當位未大失者言能敬則雖不當位亦未大失况上之當位者乎曰終吉則食報尚屬有待到底不脫需之義也愚又按處險難之時著一㸃躁急之心不得惟知其為險或遠或近必先置身事外乃可徐往而有功所以需六爻皆無凶咎申屠蟠絶迹于梁碭標榜所不加初之需于郊也郭林宗周旋京師亦不及難二之需于沙也陳仲弓委蛇宦寺之間卒能保身三之需于泥也內三爻似之太王去邠遷岐以出穴為需者也武王遵養時晦以酒食為需者也勾踐棲于㑹稽以入穴為需者也外三爻似之汪潛谷曰需訟坎乾合以有事需險在乾外訟險在乾內學者到得全體乾健一團天理在我矣才學步須知需寇不在外所以防從欲之危才動念須知訟褫亦不在外所以貴克己之勇坎下乾上訟有孚窒惕中吉終凶利見大人不利涉大川以訟名卦只是要人無訟文王就人一㸃好勝之念去開示他分別箇吉凶使知所趨避彖辭一惕字隱然有內自訟之意訟與需反對卦辭皆曰有孚顧需之坎在外為光為亨訟之坎在內為窒為惕蓋能安其分則為需不安其分則為訟所以一利涉大川一不利涉大川訟者好剛而為血氣所使也有孚者中實也窒含忍也惕戒懼也中和平也有此四德必不與人訟故吉終凶指上九大人九五也孔疏以九二為聽訟之主本義亦以九二陽剛為險之主愚按彖傳剛來而得中當指九二利見大人尚中正也則指九五九二以陽居陰雖剛中而不正處尊位而中正者非九五乎吕刑曰咸庶中正蓋聽訟者以中正為尚虞芮質成利見西伯雀鼠速獄利見召伯見大人則訟可無訟故以卦名歸之曰訟元吉二方逋竄何以為聽訟之主利不利對說隨所處為吉凶吳草廬曰涉川之象利于前進不利于退後需主爻九五自四上往為五舟進而前所以利訟主爻九二自三下來為二舟退而後所以不利彖曰訟上剛下險險而健訟訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利涉大川入于淵也上以剛陵下下以險陷上乾健遇坎險訟之所由生以一人言內險而外健以兩人言彼險而此健皆必訟之道也剛得中故中吉訟者彼此一是非獄猶未成也至于上則成訟矣故終凶尚中正乃使民無訟之本上無明主則下無良民舉世成傾險之俗是擠之而入于淵也機心機事日險日深有不載胥及溺者乎彖傳有往來內外字樣者凡十九本義指謂卦變此其一訟自遁來說本虞翻蜀才亦云此本遁卦二進居三三降居二朱子因之建安邱氏遂以此為聖人言卦變之始愚竊謂易中無卦不變似難指某某為卦變也一卦可變六十四又安知遁不自訟來乎大抵彖傳所云往來只就兩卦反對說上下易位便有往來之象夫子偶于十九卦言之耳本卦剛來得中謂需上卦之坎來居訟之下而剛仍得中則乾之往居需下而得中自不必言所重在剛得中言來則往可知矣凡爻自外而內曰來自內而外曰往泰否二卦彖傳甚明若以遁第三爻居訟第二爻同在內卦何以謂之來所以先儒宋仙井李舜臣凡舍本卦而論他卦及某卦自某卦來者皆所不取又按甬上董次公所著卦變考略兼采郎顗京房荀爽虞翻四家除乾坤而外無一卦不變者亦可證專指十九卦之非象曰天與水違行訟君子以作事謀始項平甫曰天一生水始本同氣一麗于形天上行水下潤天道西轉水流東注遂成天淵之隔女子爭桑而吳楚連兵羊斟爭羊而宋師敗績君子以作事謀始防于未違行之先也愚按人之彼此乖忤多起于違行事之所包者廣訟其一耳彖辭只說中吉終凶大象補出謀始二字要人絶爭端也凡立朝不分朋黨講學不立門戶皆是初六不永所事小有言終吉象曰不永所事訟不可長也雖小有言其辨明也初才弱位下無必勝之心無難已之勢不永所事之象不曰訟而曰事事在初未成訟也小有言與需九二同言其傷我者小也大抵人之訟多從角口起小有言則彼此解釋尚易只用略與之辨辨明即止所以不永而終吉彖傳曰訟不可成要其終也此云訟不可長戒其始也兩箇不可全從理上斷九二不克訟歸而逋其邑人三百戶無眚象曰不克訟歸逋竄也自下訟上患至掇也九二彖傳所謂剛來而得中者爻則以歸逋為義一言其才一言其位故各不同爻辭但言其不克訟而歸逋故無眚小象則謂其以下訟上而患至彼此不同何也先儒多謂二與五訟愚竊謂九五中正之大人何至見訟于二三本與上應而與二為比二與上爭三而有訟故云自下訟上上者上爻也與下之從上吉義同春秋時往往有父子君臣相獄者如元咺訴衛侯于晉王子朝訴敬王于諸侯之類故夫子借爻象發周公所未言以警之蓋二與上訟而質成于五遇中正之君而為所化二之不克訟以此爻言不克訟以二之剛中也其所以不克訟由其能歸逋自處卑約以免患也曰歸是退步之義三百戶下大夫之邑坎為加憂眚象無眚者周禮所云憑弱犯寡則眚之謂四靣削地也二歸逋故邑無眚象言以子訟父以臣訟君分卑勢屈禍患立至有如拾取除却逋竄更有何策曰歸而逋所以開其自新之路曰患至掇所以折其無上之心也劉石閭曰訟之為卦四陽而二陰夫陰者陽之所悅也二以坎之一陽而介二陰初自應四二欲初則四必起而爭之矣三自應上二欲三則上必起而與之爭矣云云與二三兩爻小象中上字正合得其解矣六三食舊德貞厲終吉或從王事無成象曰食舊德從上吉也唐凝庵曰坎卦原舊是坤以乾再索而成坎今三在二既歸之後復成坤遂全有坤德項平甫曰六三所食之舊德坤也曰貞曰或從王事無成皆坤六三之舊辭愚按三陰柔不能訟人皆以為無才由君子觀之則為德食舊德只是守舊之義二與四所爭者初與上爻所爭者三也二不克訟故初不永所事初與三本無訟因二之訟而牽入事中也三與上本正應二不克訟而三仍從上即此便是貞以其居二陽之間故有危象以其從事無成故終吉無成者不終訟也玩爻辭于坤六三去有終二字其義可知九四不克訟復即命渝安貞吉象曰復即命渝安貞不失也程傳命謂正理失正理為方命九四剛而不中正躁動則不安處非中正則不貞不安貞所以好訟也若義不克訟反就正理變其不安貞而安貞則吉矣愚按九四乘三而應初初與三皆比二而三又應上四之所以不能無訟也二與四皆以剛居柔又同為不克訟之象二以下訟上其不克者勢也四以上訟下其不克者理也君子安于理小人制于命知理之不可渝而復而即命好勝之心一變而歸于正道前念之悔即為後念之貞何吉如之象曰不失正解吉字以理之得失為吉凶非以訟之勝負為吉凶也一說渝變也即春秋渝平之渝此爻剛變而柔則為渙訟事散矣凡爻之言渝者皆取變卦也其義或然九五訟元吉象曰訟元吉以中正也此尚中正之大人也初三兩爻陰柔不能訟者二不克訟而歸逋四不克訟而安貞九五居中得正下皆無訟故曰訟元吉中正不作聽訟解無偏無黨王道蕩蕩一切發奸摘伏俱置不用何以聽訟為哉使九五聽訟而當不過一大有司耳非大君使民無訟之道也上九或錫之鞶帶終朝三褫之象曰以訟受服亦不足敬也馮厚齊曰初不言訟杜其始也上不言訟惡其終也上與二爭三而有訟二歸逋三從上則上居勝勢矣乾為圜荀九家乾為衣中爻互巽為繩鞶帶之象凡命服先束革帶乃加大帶鞶帶乃命服之飾訟者得勝豈有受服之理或錫之者假設之詞縱或有其事終必見褫况萬萬無其事乎中爻離為日朝之象本爻居外卦之終三褫之象褫奪也夫子復發周公言外之㫖謂不奪亦不足敬其辱有更甚于褫者矣終凶所不必言項平甫曰凡訟皆起于剛而止于柔九二九四皆剛是以起訟終以居柔而不克訟故一逋一渝初六六三雖居剛位而其德皆柔故終吉一為不永所事一為從事無成獨九五一爻有全剛之資而居中履正非好訟者也故為元吉上九以剛居柔在訟之終居高用剛不勝不已此終訟之凶人也坎下坤上師貞丈人吉無咎崔氏憬曰丈人子夏傳作大人吳氏易纂言依之卦體以一陽統五陰周禮五人為伍五伍為兩四兩為卒五卒為旅五旅為師師者衆也古未有兵之名也人衆則不可無以統之丈人者師中之主也周禮司馬掌兵者也而言掌邦政九伐之法所以正天下之不正也軍伍㑹于教官之司徒古未有將之名也坎為中男而稱丈人者乾坤以後坎即用事歷屯蒙需訟至此凡五見矣非他弟子可比故子以尊稱九二一陽卦主也行師者先要得正次要得人不得正則師出無名不得人則師行無主得正得人自然吉而無咎程傳云有吉而有咎者凡無名行師而幸勝者是也有無咎而不吉者凡聲罪致討而不勝者是也彖曰師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣王去聲三代興師未有不出于正者後世機變用事乃好出竒竒兵或以少致勝惟正兵乃能用衆非爭地爭城之比故曰可以王矣剛中謂九二應指六五二雖為卦主爻所重尤在五剛中而無應則上之信任不專師出何以有功兵凶戰危故曰險坤居外卦故曰順行險而不順則下之人情不服既應且順即以此毒天下而民必從之吳起所謂興師動衆而人樂我所以有吉而無咎胡雲峯云王者之師不得已而用如毒藥之攻病非有沈疴堅癥不輕用也愚竊謂行師之時供億之煩殺僇之慘俱在所不免故曰毒然而民從之者意主于除害非以殃民也一說剛中而應專指九二蓋卦體五陰聽于一陽二欲自王誰能禁之即不自王如韓信之于漢李光弼之于唐緩急之際召之不至君臣遂生怨咎二惟盡忠以應五所以上順而下從如諸葛武侯之于蜀是已象曰地中有水師君子以容民畜衆蘇氏易傳曰地中有水師言當如水行地中而人不知也愚按不言地下而言地中者取容畜之義井田之制寓兵于農如水在地中隨地可以得水容民畜衆養之于井田耳曰容有樂利之意曰畜無黷武之情彖言臨時御衆之道此言平時畜衆之道初六師出以律否臧凶象曰師出以律失律凶也律者紀律也初爻在一卦之內由內而外故云出出師之初勝負未可知故不言吉若出不以律則凶立見矣否者不然之謂否臧只作不以律解即小象所云失律凶也注疏謂失律而臧何異于否却將聖人語意說得支離了一說律指律吕言周禮太師之職執同律以聽軍聲而詔吉凶師曠曰吾驟歌北風又歌南風南風不競多死聲楚必無功又史記律書六律為萬事根本其于兵械尤所重以上諸說皆出師用律之證蓋音律通乎法律必法律嚴然後音律清亦是一解吳草廬又云律為元聲而軍法紀律皆取法乎此不可專言吹律一節九二在師中吉無咎王三錫命象曰在師中吉承天寵也王三錫命懷萬邦也一陽在比為君在師則為將卦彖之丈人即六五之長子自衆尊之曰丈人自君稱之曰長子皆指此一爻剛而在中威德並著所謂老成持重練達軍務者也玩在字有不動聲色而鎮服三軍之意故彖辭之吉無咎歸之中爻自二至四互震長子之象不發于本爻而于六五者委任責成不在將在君也禮一命受爵再命受服三命受車馬錫命者如春秋王使宰周公錫齊侯命王使內史過錫晉侯命是也有錫命之寵而後師中得以展布錫至于三見天寵優渥天字只作王字解歸重在王之任將上懷萬邦推原所以錫命之故懷邦為行師根本非好大喜功全是一腔惻隱之心乃所以為貞也六三師或輿尸凶象曰師或輿尸大無功也二為卦主三以失位之柔而乘之不中不正有撓權僨事之象輿尸程傳謂衆主也本義謂司徒撓敗輿尸而歸觀六五爻辭以輿尸屬弟子當依程傳為是軍中不專一主則事權錯出如或有之乃取凶之道荀林父邲之戰令出于先縠趙盾河曲之師令出于趙穿郭子儀相州之敗以九節度非大無功者乎愚又按古者車戰一車百人故謂衆為輿六四師左次無咎象曰左次無咎未失常也四居坤之下乘承皆陰由其知退所以無咎左次猶言退舍兵事尚右故以左為退次者師行止舍也凡師三宿為次春秋次于郎次于召陵是也三以陰居剛躁動而有輿尸之凶四以陰居柔左次以聽主帥之令當退而退故無咎小象失字從失律來未失常者不失律也夫子恐人疑具以退為怯故補本爻辭所未言以解之六五田有禽利執言無咎長子帥師弟子輿尸貞凶象曰長子帥師以中行也弟子輿尸使不當也長上聲當去聲五君位興師用將之主也兵者凶器必如田有禽而執之乃可舉兵如牽牛蹊田而奪牛之義即下文利執言之意所謂師出有名也禽者鳥獸之總名凡易言禽者多在坎坎體有禽象本卦九二坎體上應六五故曰田有禽比九五坎變坤則為失禽象恆大象坎井坎體在上皆曰無禽利執言者奉辭伐罪師出有名本無咎也病在委任不專耳長子弟子通二三兩爻言既用二義用三以新進參老成則雖正亦凶况不正乎小象以字使字當玩以者用也與使字互文用人係民命之生死社稷之安危長子使之當者也弟子使之不當者也能用二者本五柔中之德參以三者五中而不正之過也上六大君有命開國承家小人勿用象曰大君有命以正功也小人勿用必亂邦也此爻乃班師論功之象大君謂五上六以大臣奉君命而行黜陟故其辭嚴正如此外卦坤建侯開國之象中爻互震長子承家之象下二句即大君之命閒國功之大者承家功之小者分別等級以杜冒功之門故曰正小人亦即在此二等中勿用者非吝于爵賞之謂當行師之時使貪使詐權宜可也至于開國承家所關非一世之事若復用小人雜處其間不但灰豪傑之心抑且貽子孫之患東漢之衰始于外戚冒功繼而宦寺封侯卒至亡國覆家由不知師終之戒也御將之道賞功易正功難要見公天下而不市私恩之意聖人于二之錫命嘉其懷萬邦上之勿用決其必亂邦總為斯世斯民起見或問勿用之義小人而有功者當何以處之答曰或賞而不封或封而不任俾之衣租食稅勿令干預政事此安寧天下之計亦保全功臣之道也坤下坎上比吉原筮元永貞無咎不寧方來後夫凶比去聲後同京氏傳曰比自師來此据反對言變者一陽之卦凡六得君位者惟比元永貞三德屬九五原筮為比五諸爻而設易內外卦多取陰陽正應其近相得者則為比然亦有不相得者惟比諸爻不論內外應否總以比五為義一陽乃卦主也上不求比而下自比之故吉原筮者再三詳審之謂元者天德也永貞者地道也其此三德何以筮為愚竊謂諸爻于所比必審求具此三德者順而從之則無咎所謂臣亦擇君也文王恐人疑比之義近乎私昵故借筮以發明之與蒙之初筮義同非真以筮為卜也若依本義再筮以自審有元永貞之德然後可以當衆之歸則以原筮指九五矣似于上下辭意不洽今据程傳發其義觀下文兩句自明不寧方來是歸命不遑之象上有剛中之君向男侯衛同軌畢至而不敢後上居卦末為後夫如田橫尉他始雖倔强終必滅亡凶字正與無咎應又按萃與比下體坤順同萃多九四一陽以分其權故元永貞言于五比無分其權者故元永貞言于卦彖曰比吉也比輔也下順從也原筮元永貞無咎以剛中也不寧方來上下應也後夫凶其道窮也比吉二字卦辭所有本義謂比吉也三字疑衍文愚按彖傳連用三箇也字重復其詞以贊之多從卦辭來似不當衍趙汝梅曰吉者卦之義輔者吉之由兩舉卦名自有兩義是為得之輔車兩旁木名一剛在上如車衆陰順從如輔順者情不容已從者分不可逃下字指下四陰以剛中者因五有剛中之德故比之者無咎也上下應兼指上爻上亦非不比五者特以後至面凶耳其道窮者自致窮蹙之謂又按彖傳言上下應者比與大有兩卦相似彼以上下五陽應一陰此以上下五陰應一陽皆居君位而得中者而陽剛中正則又本卦所獨也象曰地上有水比先王以建萬國親諸侯彖言五陰比一陽象言一陽比五陰水者地之經絡也分界九州血脈貫通故建國親侯取此象顔質卿曰法地中之水藏天下于天下法地上之水以天下治天下愚謂井田封建相為表裏師之容民井田也比之親侯封建也君與民一體而分親諸侯所以親民曰建則枝幹固曰親則脈絡通不獨合天下為一家且通天下為一身矣初六有孚比之無咎有孚盈缶終來有他吉象曰比之初六有他吉也初為比始倡諸陰而比五有孚是比之道凡易言孚皆取陽爻中實初六陰爻何以曰有孚蓋初陽實六陰虛缶者中虛之器盈缶則中實矣內卦坤為釡缶之象初去五最遠而歸誠獨先如蕭何護高祖于布衣鄧禹親光武于同學由其有相孚之實故無咎他時將相王侯皆分內事而若獲之意外初願固不及此也故曰終來有他吉吉在終而聖人即比之初決之以其有孚耳兩有孚只是徹始徹終表裏如一便是滿盈處非初之孚尚淺必積之而後盈也夫子只以比之初六四字該括爻辭令人深思自得堅持初念而已惟吉為他吉斯孚乃真孚六二比之自內貞吉象曰比之自內不自失也二在內卦對六四外比言內外卦之分例見于此二柔中正與五剛中正相應君臣合德非徇人以失已者故曰比之自內居帷幄之中參預密勿者也八卦正位坤居二六二又以陰居陰故曰貞得正又得中所以吉自內與不自失兩自字重看乾曰自強謙曰自牧復曰自知頤曰自養晉曰自昭明德皆是此義所謂達不離道者與五正應非私比可知何失之有六三比之匪人象曰比之匪人不亦傷乎大人君子首繫于乾小人首繫于師匪人首繫于比匪人者非正人也其類不一何地無之在吾之比與不比耳六三不中不正乘承皆陰非人來比我而我自比之所謂見邪即入者也爻不言凶咎象曰不亦傷乎但作從旁憐憫之辭欲其惕然自反也六四外比之貞吉象曰外比於賢以從上也初六內也九五外也四不與初應而近比于五義之與比也二自內比四自外比兩爻皆以柔居柔故貞吉小象賢字對匪人說賢與上皆指五賢以其剛中正上以其居尊位四之比五周以其賢亦循君臣大義而安從上之分耳九五顯比王用三驅失前禽邑人不誡吉象曰顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也衆陰皆比一陽獨尊聖作物睹其道光明顯之義也三驅借田獵言之坎為豕禽象邑人不誡者徒御不驚有聞無聲也三句只作一氣總是顯比之象蓋王者惟以比天下為心未嘗强人以從我士各有志不相迫也譬之三驅豈以失一禽而介意哉三驅之禮經傳無明文先儒或云三度驅禽而射之或云三靣著人驅禽或云圍合三靣前開一路使之可去初無定說愚竊謂前禽似指上六以其在五之上曰前以其獨不比五曰失又按一陽居尊得位中而且正小象惟首二句明白易解餘義大難理㑹周易舉正曰舍逆取順一句誤在失前禽上當云失前禽舍逆取順也虞仲翔曰三驅謂驅下三陰不及初故失前禽背上六故舍逆据三陰故取順愚按彖傳云下順從上下順以比我為順則不比者為逆矣兹何以云舍逆取順塗山之㑹防風見戮逆者何嘗縱舍乎舜之格有苗庶幾舍逆之義而逆卒為順舍之乃以取之漢光武得隴望蜀是以逆而不舍也宋太祖卧榻之側不容他人鼾睡併順者亦不舍矣先儒之解紛紛不同或是射去我之禽或是射向我之禽或以隂乘陽為逆舍逆者舍上一陰是長亂矣或以陰乘陽為順取順者取下四陰是殺降矣或謂來者不殺為取順去者不追為舍逆是終日不獲一禽矣惟張彥陵說統曰王者之民何順何逆王者之心何取何舍惟不必于順若見以為有逆不必于取若見以為有舍故曰失前禽詮釋較明邑人不誡上使中也二句亦難詮釋潘雪松曰王者之田以法從事而不必于得王者之心也邑人衆著于好生之仁不盡物而聽之去故惟王者之田惟不相告戒而人亦渾于兩忘故為王者之比楊慈湖曰致邑人初不待諄諄誡諭而自化于中正之道者上之人行中正之道自能使邑人中正也卓去病曰聖人之于天下不使其親已不使其去已亦不使其防人自有恰好所在使其中而已三說不同采以備訓詁上六比之無首凶象曰比之無首無所終也此爻畫卦在五後故謂之後夫上為衆陰之首下四爻皆順從于五獨上六在一陽之外而不比五則衆隂無首矣所以上獨受其凶爻曰無首象曰無終互舉之詞天下有有首而無終者矣斷無無首而有終者也此之謂道窮合一卦而觀下固順從上亦當下比故有方來之象以一爻而言羣陰在下而承五上獨在上而乘五故專言無首之凶乾下巽上小畜亨密雲不雨自我西郊卦之取名以陰畜陽而聖人扶陽抑陰之意至此卦尤深切著明一柔自姤變同人自同人變履自履變小畜兩卦反對小畜似宜居履後何以巽反居上蓋乾坤以後陰爻用事自巽始故以一陰居初畫為先亨字仍屬陽說陽之所以得亨以畜未成也畜陽者四也四居巽初又互兌而在天上故謂之雲以其所畜者小而不能止陽故成密雲不雨之象吳仲清曰坎水其氣上升為雲其液下降為雨二三四互兌兌有坎之上半體故上有雲而下無雨董次公曰需上變而為巽需之坎升天為雲墜地為雨今坎象半見故不雨又中爻互離為乾卦亦不雨之象互兌兌位在西故曰西郊天地之氣必鬱結醖釀方能成雨今雲興而風散之焉能久畜程傳云西郊陰所凡雨須陽唱乃成陰唱則不成今雲過西則雨過東則不雨正是彖義自我西郊申明密雲不雨之故本義謂我者文王自我也文王演易于羑里視岐周為西方似非取象之㫖愚按小過六五爻辭與此同亦豈周公自稱為我而以岐周為西方耶据蒙卦彖匪我求童蒙童䝉求我兩我字指木卦主爻而言小畜一陰為卦主我亦當屬六四觀彖傳云自我西郊施未行也其義較明彖曰小畜柔得位而上下應之曰小畜健而巽剛中而志行乃亨密雲不雨尚往也自我西郊施未行也八卦正位巽在西小畜反對為履履六三以陰居陽而位不當今來為小畜之四則以陰居陰故曰柔得位一味柔巽最能惑人故上下應健而巽者卦德也小人用之以順則足以籠絡君子君子行之以健則絶不受制于小人歸重在剛健剛中謂二志行統言下三陽施未行謂四兩行字相應陽志方尚往陰豈得下施所以欲畜而未成深為君子幸之之意郭白雲曰有止而畜之者畜之大也有入而畜之者畜之小也蘇子瞻曰大畜將以用乾小畜將以制之乾進而求用則可進而受制則不可故大畜之乾以之艮為吉小畜之乾以之巽為凶象曰風行天上小畜君子以懿文德每卦大象夫子于彖爻辭之外別有取義而義要不外卦象中孔疏謂此不取風行天上之象者非也按風行地上為觀先王以省方觀民設教天下有風為姤后以施命誥四方此皆風力足以及物達則兼善天下者也故稱先王稱后今風行天上則為罡風而不能下被乎物君子觀此象以懿文德懿者美也細行必矜獨善其身之謂凡謹儀飭度稽訓修辭皆是也又卦體以柔遇剛有柔來文剛之象而謂不取風行天上之象然則聖人所取者何象乎初九復自道何其咎吉象曰復自道其義吉也周用齊曰卦以陰畜陽為義爻以不受畜于人為道愚按初以陽居陽雖與四應而能自守故曰復自道道本自之道復之者還其故吾何咎之有故不曰無咎而曰何其咎吉象曰其義吉以見不論應否據理而斷自當得吉也復為一陽之卦初曰不遠復二曰休復吉小畜一陰之卦亦于初二兩爻言復何也胡雲峯曰復卦乃六陰己極之時喜陽之復生于下小畜則一陰得位之時喜陽之復升于上愚又謂復曰出入無疾初九似之曰朋來無咎九二似之聖人欲人以復之道處小畜之時也九二牽復吉象曰牽復在中亦不自失也二漸近于陰以其剛中而與初同體同德故連于初而有牽復之象二陽並復其勢不孤故吉二之不受畜與初同但初與四應而能復自道其事較難二則同體牽連而復其事較易初吉則二之吉可知象曰亦不自失乃因彼許此之辭不自失與前復自道相應兩爻合看更明程傳謂二與五牽復其義難曉九三輿說輻夫妻反目象曰夫妻反目不能正室也說與脫音義同三為四所乘巽初一陰乃坤之初畫輿之象三居四下比而悅之為所畜而不行脫輻之象乾為夫巽為長女三與四比夫妻之象巽為多白眼反目之象王注以上為巽長指妻為上九愚謂上雖巽長終是陽爻何可指之為妻似當指六四三四本非正應以近比為所止畜安其室而無上進之意四以柔乘剛妻居外而夫居內乃反為所制脫輻反目皆九三過剛不中所致小象歸咎于不能正室乃責備賢者之意謂其非正應而與四比也上爻所謂婦亦指六四而言因四之血去惕出故尊尚其德而以為婦貞耳輻釋文作輹項平庵曰輻車轑也輹車軸轉也輻以利輪之轉輹以利軸之轉輻無脫理若輹則有脫時車不行則脫矣六四有孚血去惕出無咎象曰有孚惕出上合志也此爻所謂柔得位者一陰畜五陽其勢孤若以智術籠絡諸陽有渙然散耳故必有孚然後能合血者陰也四陰虛何以能有孚四之孚五孚之也近與五比知陽之同德而不忌其進故無戰而受傷之象血去則雖以陰居陰而無陰纍然猶不安其居惕懼而出與需六四出穴義同不敢固位以妨羣賢之路此四之善自處也所以無咎上合志指五以其為衆陽之領袖故曰上以其與四同體而皆有孚故曰合志九五有孚攣如富以其鄰象曰有孚攣如不獨富也四五皆曰有孚五與下三陽同德四則其同體也恐四之包藏陰謀而不利于陽之上進故極誠以孚四而四亦上孚于五四既血去而出于危惕矣與五方一體固結五雖與二應遠不相得而近與四為鄰以一誠相結而衆陽歸之曰富以其鄰則仍以五為上而不為四所畜可知象曰不獨富見得不專以力服人感動人心全在有孚上几世之孤立而無鄰者只為無德以相孚耳上九既雨既處尚德載婦貞厲月幾望君子征凶象曰既雨既處德積載也君子征凶有所疑也說經者皆言巽體三爻同力畜乾至上九則畜道成而陰陽和矣愚按爻辭乃陰陽兩不利之象向之密雲不雨者今既雨矣向之志行者今既處矣陽德積而尚往今無所往矣巽一陰月象上居卦末如月幾望則疑于陽矣婦陰也當指六四君子當指諸陽就爻辭看來陰雖貞亦厲陽有征則凶所以示戒也似非同力畜乾之謂王伯厚有云易言月幾望者三皆對陽言中孚言從乎陽歸妹言應乎陽小畜言抗乎陽夫陰至于抗陽可謂之畜道成而隂陽和乎所未解也午亭陳氏曰小人之順君子將以漸制君子而使之不得有為六四巽之土也有孚者非孚于君子而孚于小人也故云上合志蓋五雖陽而與上同居巽體五四既交孚合志矣欲不成既兩既處之象得乎小人之巧也君子之疏也苟非君子尚陰德而使之滿當不若此咎小人而責君子君子亦無所辭其責也詮解校先儒為明析兌下乾上履虎尾不嘻人亨雜卦傳云復不處也需不進也履當以進為義却不可躁進彖詞開口說履虎尾取象大是竒特乾剛在前故稱虎兌躡其後故曰尾一陰居五陽之中不中不正三多凶本危道也幸是悅體故履危而得安又為不嘻人之象不嘻即是亨論成卦之主在六三一爻卦言不嘻人亨而爻言嘻人凶者卦以德言爻以位言也蔡子木曰人之處世無地非實踐故無地不戒懼履虎尾不嘻人戒懼之學也彖曰履柔履剛也說而應乎乾是以履虎尾不嘻人亨剛中正履帝位而不疚光明也說與悅同程傳訓履為踐為藉本自上履下之義卦體乾上而兌下似乎剛履柔矣夫子所以釋之曰履柔履剛也見卦之取名不是論上下乃是論前後以柔履剛宜其見嘻而不嘻者以其悅而應乎乾也天下之難制者惟剛而柔能履之本義和悅以躡剛强之後吳草廬云乾有虎象兌躡其後是已蔡節齊謂兌有虎象者非大抵人生涉世兩剛相遇則舉足皆是危機故九卦之處憂患以履為首惟和柔以應之則凶暴亦可馴服悅而應乾乃兌之妙用莊子所云虎之與人異類而媚養已者順也本卦惟三與上應若依爻例作陰陽感應于義全無交涉此應字只作感字解與他卦不同剛中正三句專贊九五于全卦亦無涉須從上文看出上言柔履剛此言剛中正兩剛字相承剛不徒剛中而且正九五乃英主也不疚則無瑕可指光明則非道不悅為之下者稍用權謀知術未有不被其嘻者此正見虎尾之難履處所以文王言虎尾夫子言帝位俞吾玉曰易以剛居五不止一卦獨于履言帝位者履乃辨名分之卦也象曰上天下澤履君子以辨上下定民志不云天下有澤澤上有天而云上天下澤履以定位也程傳云上下之分明然後民志定何閩儒曰所謂辨者非徒天尊地卑君上臣下之謂亦于細微之際人所易忽者明別之耳人知主威不可犯而不知路馬之不可齒君子欲移風易俗必于隱微疑似之間區分縷析使民凛然畏懼不敢踰越尺寸乃可定其心志又是進一層語初九素履往無咎象曰素履之往獨行願也素現在也初陽居下即其現在之位素位而行不願乎外自然無咎初是出門第一步故曰往上無應與故曰獨往而不違其初心故曰行願胡雲峯曰履者禮也先質而後文故履初言素賁者文也文盛則反質故賁上言白白賁無咎其即素履無咎者與九二履道坦坦幽人貞吉象曰幽人貞吉中不自亂也二亦與五無應而近與三比見三之與虎為鄰履而被嘻二剛中遵道而行安恬平易中無城府外自無畏途雖居臣位不以廊廟易山林之致者也故曰幽人幽人對下武人言彼以志剛賈禍此以履道得貞凶者自凶吉者自吉人境之險阻艱危其能擾幽人之懷抱哉不自亂由其中有定力也愚又按他卦取陰陽相應為善履惟三與上應而三乃得凶象初二四五俱無應曰無咎曰貞曰吉蓋士君子處世一藉應援之力便不能自行其素自守其貞無往非憂患之途矣上與三應而獨云元吉者三則惡其躁進上則喜其有退步也六三眇能視跛能履履虎尾嘻人凶武人為于大君象曰眇能視不足以有明也跛能履不足以與行也嘻人之凶位不當也武人為于大君志剛也當去聲黃氏日抄云蔡節齊謂兌有虎象三為兌終故曰尾一說虎屬金之一陰故兌有虎象嘻人主九四言晦庵指外卦之乾陽而下卦之兌履之合從晦庵蓋六三自為虎不應自履其尾也今從之六三不中不正居乾之下志在躡剛兌為毁折有眇視跛履之象與歸妹初二兩爻取象同歸妹先言履後言視此則先視而後履蓋履未有能離視者說命曰若跣勿視厥足用傷史記單襄公云足以步日皆此義視不明以致履冒險冒昧處尤在兩能字眇而自以為能視跛而自以為能履一派自用自專恣行罔顧之意有不被嘻而凶者乎兌口在上嘻之象武人為于大君又從凶中得此義武人乃剛暴之夫豈可以為大君哉夫子中明其義謂三之能視能履不但自以為有明人亦許具可與行矣自有識者觀之直如瞽者之冥行耳故一則曰不足再則曰不足重言以喚醒之然後說出致禍之由曰位不當曰志剛夫履不當之位而欲行剛猛之志一蹶不救又何怪乎九四履虎尾訴訴終吉象曰訴訴終吉志行也說文作虩虩引易履虎尾虩虩恐懼與今文不同三之所履者四也四居上卦之下正虎尾之位亦曰履者其不中不正與三同而以剛居柔則與三相反訴訴畏懼之象見三之履危而凶心存畏懼擇地而蹈故終得吉三曰志剛則四之志柔可知四曰志行則三之志不能行可知三柔而好剛四剛而能柔吉凶所以相反九五夬履貞厲象曰夬履貞厲位正當也此彖傳所云剛中正履帝位而不疚者也內卦兌下有容悅之臣五居尊位凡事必行無有疑阻夬履之象夬者決也貞者舉動正大厲者氣象尊嚴與他爻危厲之義不同蓋君體雖剛而有用剛之道五之所處不得不夬不得不厲猶乾上九之不得不亢適當其位也當字平聲讀按京氏傳履之變自夬來故五有夬履之象上九視履考祥其旋元吉象曰元吉在上大有慶也爻處履終更無進步矣人之涉世不進便當退但恐無轉身地步耳本爻下應六三有旋反之道焉旋字從往字來初上履之終始也譬如行役之人認得正路前由此而往後循此而歸天下吉祥善事孰踰于此視履二字從第三爻來曰考曰其因彼警此借以為鑒酙酌盡善之詞故不徒曰吉而曰元吉不徒曰有慶而曰大有慶若依舊注旋字作周旋解于吉慶之義似難合黃氏日抄云旋字上連視履恐是旋踵之旋吳草廬履齊銘曰中有實地下澤上天初履其素終視具旋亦以初爻對上爻說乾下坤上泰小往大來吉亨大上地下乾坤之體也天氣下降地氣上騰乾坤之用也泰者通也主世運說正是貞元㑹合太和充塞時候張彥陵說統曰兩儀既分自是一陰一陽必欲存大去小不成世界不若使小自往大自來則賢愚有各安之分乃所為泰之道愚按當泰之世陽來陰往以來者為主吉亨二字屬大來一邊否泰反其類也否曰大往小來泰曰小往大來所謂上下無常剛柔相易者卦體尤顯而易見陰小陽大自內而外曰往自外而內曰來否之坤本在內卦今往而居外乾本在外卦今來而居內是謂小往大來本義云卦變自歸妹來六往居四九來居三竊据此說推之則亦可云自賁來六往居上九來居二矣亦可云自豐來六往居四九來居二矣亦可云自井來六往居五九來居初矣豈獨歸妹耶凡朱子所謂十九卦變者皆此類也董次公曰考漢儒解歸妹云泰三之四是泰變歸妹非歸妹變泰也似不可以無辨彖曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也內陽而外陰內健而外順內君子而外小人君子道長小人道消也長上聲此節是彖傳中變例夫子讀易至泰卦得小往大來吉亨之象如身處盛際不覺踊躣鼓舞把卦辭一口道盡直恁通暢直恁快活則是二字直貫到小人道消也中閒兩交字釋泰字義內外釋往來之義陰陽健順君子小人釋大小之義先儒謂天地交而萬物通天地之泰也上下交而其志同上下之泰也內陽而外陰二句造化之小往大來也內君子而外小人三句人事之小往大來也愚又謂陰陽是卦體健順是卦才君子小人是卦義內君子而外小人不獨說君子在朝小人在野只是信任之則為內疏遠之則為外道長道消亦不是說但有君子絶無小人只是正氣足則邪氣自消消長論道不論人也堯舜在上下有共歡泰之時安得無小人乎彖傳言陰陽者惟否泰二卦自乾坤至履陽三十畫陰三十畫其數適相等然後為三陰三陽之否泰消長之機全視乎此按京氏十二辟卦泰為正月之卦象曰天地交泰后以財成天地之道輔相天地之宜以左右民財與裁同天在下而氣上升地在上而氣下降故曰交非六爻俱應之謂裁成輔相本義分過不及說愚竊謂天地之道由一氣渾淪中分别區處出來宜即道中之當然者似難分作兩橛看如天地有寒暑聖人因而治歷堯典以閏月定四時成歲即裁成之義天地能發育聖人因之教稼大雅后稷有相之道即輔相之義左右與佐佑同古字通用皆扶助之意詩經疏能左右之曰以初九拔茅茹以其彚征吉象曰拔茅征吉志在外也大過初爻巽巽為陰木取象于茅泰初爻變亦巽也故取象同茹者根也初在下根之象彚者類也茅之為物拔其根則類相連引茅兼指二三兩爻初之同類也拔之以之者初也陽主進故征吉初與四應故曰志在外有初之志以陽感陰致四之應以陰從陽泰道實基于此九二包荒用馮河不遐遺朋亡得尚于中行象曰包荒得尚于中行以光大也二為成卦之主內外陰陽皆賴以調和浹洽不但引同德為已用直使外卦之六四率羣陰以類從休休之度實能容之荒如鴻荒之荒包如天之包地隂陽各安于內外包荒之力為多用字貫下三句用包荒之雖以馮河則可勇往圖濟惟其能包荒所以不遐遺陰雖遠而不棄疏逖也惟其能包荒所以朋亡陽雖近而不私親昵也他卦言朋者多屬陰泰則以三陽為朋蓋一君子進則衆居子亦進固是太平盛事或者意在汲引善類而分別之見未能泯然失中道矣得者慶幸之訓謂初與三皆泯其親比之迹而忘其為朋乃得尚于中行也二五皆得中而相應故曰尚上合于五之中行也小象只舉首尾而贊以光大光以心事言大以度量言此大臣以人事君之道九三無平不陂無往不復艱貞無咎勿恤其孚于食有福象曰無往不復天地際也楊誠齊曰平與陂相推往與復相移愚按陂偏頗不平之貌無平不陂外卦地道也無往不復內卦天道也周公說此二句不是諉之于天地氣運要見倚伏循環莫非自然之理持盈保泰正當及此時也君子履平而知陂觀往而知復當極盛之時厪艱危之慮守己以貞何咎之有黃氏日抄云程朱皆以孚為所期之信楊龜山主人臣食祿而言以勿恤其孚為不阿意以取信于上惟徐氏云勿憂而孚矣今從徐解恤者憂也孚者誠也勿恤其孚言世運升降無足為我憂惟誠心以孚四則陰陽交而泰可長保不但無咎抑且有福本卦六五之以祉元吉否九四之疇離祉亦將共食此福也三四兩爻正交泰之際三居內卦之上羣陽所依以接陰四居外卦之下羣陰所從以接陽三曰其孚四曰以孚兩孚字正相應小象提出際字要人及時綢繆意張橫渠云因交與之際以著戒能艱貞則享福可必一語包括爻象之㫖極為明白切當六四翩翩不富以其鄰不戒以孚象曰翩翩不富皆失實也不戒以孚中心願也翩翩羣飛貌鄰謂五六兩爻羣陰視四為進退其鄰富矣而四之心不以為富者因與初應而為二所包又近與三比衆君子既開誠以待小人小人亦輸情而信君子不待告戒之及傾心以孚也兩孚字相應季彭山曰象言失實謂三陰從陽而不為主不有其富之義也愚竊謂凡陰在陽上皆非其分蓋小人之于君子向來不過面交而無忠信之實今見君子無偏無黨若此不覺爽然自失翩翩然相率而來其孚也由于中心之願與五之中以行願同內外一心陰陽合德此其所以為泰也六五帝乙歸妹以祉元吉象曰以祉元吉中以行願也卦體陰陽交泰而陰居尊位陽反在下六五以柔中之主委心于九二剛中之臣有王姬下嫁之象又中爻互體上雷下澤故周公即取象于歸妹唐虞已有釐降之事獨言帝乙者程子謂至帝乙而後正婚姻之禮本義謂帝乙歸妹之時亦嘗占得此爻按京房易傳載帝乙歸妹之詞曰無以天子之尊而乘諸侯無以天子之富而陵諸侯往事爾夫必以禮義其務自貶損以無加于娣云云此其可据者也愚又按史記殷本紀以乙為帝號者成湯曰天乙後十一世曰祖乙又十一世曰小乙又二世曰武乙又二世曰帝乙即紂之父也郝仲輿云帝乙七祀文王始立立三十祀而帝乙崩然則文王正當帝乙之世周公作爻蓋據文考時王為象朱罍庵云周書自成湯至于帝乙罔不明德慎罰是帝乙處商家泰道之終故六五象之以祉者從中左右數四上兩爻為以以陰必從陽以順必承健以娣必尊君無一人不禔之以福是為泰五之元吉愚按祉字從九三福字來以祉者以此受福也德以下賢為盛故云元吉中以行願與二之尚于中行相應願者何陰陽和洽之謂也二曰尚五曰歸一往一來之意二曰中行五曰中行上下交而志同也上六城復于隍勿用師自邑告命貞吝象曰城復于隍其命亂也隍城塹也有水曰池無水曰隍程傳掘隍土積纍以成城如治道積纍而成泰及泰之終將反于否如城土傾圮復于隍是也愚按上與三應于三示其端于上要其極玩兩復字其義自明下兩句先儒謂重告命不重行師泰至于上已成土崩之勢命之不行自近者始故云自邑告命貞吝愚按此二句與夬彖辭略同曰勿用師即不利即戎也曰自邑告命即告自邑也聖人于一陰在上示戒猶若此况三陰在上乎夬上曰終凶泰上曰貞吝夫子于此指出源頭曰命亂治世之君告戒在先孚號之危厲乃光也亂世之君告戒在後復隍之自邑貞吝也運將否而方告命亦何救乎聖人貴未然之防如此坤下乾上否之匪人不利君子貞大往小來先儒謂泰則歸之天否則責之人故卦彖第一句便說匪人程傳云天地不交則萬物不生是無人道故曰匪人胡雲峯曰以天地言陰陽不交生道絶矣以一身言陽亢陰滯元氣竭矣以一心言人欲為主于內天理緣飾于外失其所以為人矣潘去華曰聖人以致否歸咎小人實亂本也皆就文作解本義云或疑之匪人三字衍文愚按卦辭之匪人即彖傳爻辭之小人與比之匪人句法同若卦辭三字當衍彖傳先當去此三字矣吳草廬易纂言竟刪去此三字不但失聖人之㫖且非朱子存疑之意矣內三爻皆陰小人用事此時君子之貞自然不利大往小來正說所以不利之故然雖不利而君子之貞斷不可少天地間無此正氣則一否不復泰矣泰之為泰以卦之內外覘之幸小人之在外也故外卦多為內卦之用否之不終否以爻之上下覘之幸君子之在上也故下卦不如上卦之善主持世運豈非人事哉本卦與泰反對大小往來之義多從泰來乾往居外故曰大往坤來居內故曰小來本義云又自漸來九往居四六來居三今据卦變圖三陰之卦皆自否來則亦當云漸自否來不當云否自漸來也彖曰否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下無邦也內陰而外陽內柔而外剛內小人而外君子小人道長君子道消也長上聲泰否二卦各具乾坤之全體上下易位翻轉另是一世界如禹湯文武之時一變而為桀紂幽厲矣所以彖傳只就泰卦反靣說惟泰言志同此則言天下無邦泰言健順此則言剛柔蓋君臣不交禍辭之本國無人矣雖有邦與無邦同尚何同志之有上下不交則有天地之形無天地之用矣故不言健順朱啓莊曰天下有君子不能無小人聖人之心則未嘗不欲天下盡為君子故于小人道長之日一邊以利害喻小人使不得肆毒于君子一邊告君子使急為之地至君子道長之時則又恐其恃盛而用罔或反召意外之禍故乂教以周防委曲期于十全必克而後已其為君子謀如此象曰天地不交否君子以儉德辟難不可榮以祿辟與避音義同否者閉也天地不交正天地閉賢人隱之時孔疏以儉德為節儉之義非也當從本義作收斂解君子處否時有才不露有善不形一以收斂為主使天下不得物色加我始能超然寵祿之外其視寵祿之來不以為榮而以為難辟之惟恐不遠不可榮以祿謂人不可得而榮我坤之無咎無譽乾之遁世無悶皆是道也初六拔茅茹以其彚貞吉亨象曰拔茅貞吉志在君也初爻取象與泰初同要得聖人引誘小人之意蓋茅柔物也爻詞若曰人才類聚進退皆當以貞否之初猶然泰之初也所謂吉而亨即在此矣小象亦提出一志字蓋泰初與四應志在外卦陰來從陽君子拔小人也故勸以征則吉否初羣陰在下志在得君援引並進小人自拔其類也故戒之以貞則吉亨程傳以此爻為君子處下之道于卦義似未甚合愚人按志在君君字所以破小人自私自利之念蓋小人之欲傷君子祇為身謀耳若能從君起見則必愛護善類矣六二包承小人吉大人否亨象曰大人否亨不亂羣也泰二曰包荒否二曰包承先儒謂小人陰柔居中亦自謂能禮賢下士故曰小人吉但泰二意在不擯棄小人否二意主于籠絡君子其包容承順足以惑人亦足以凂人故曰大人否亨非是則無以自絶于小人也愚竊謂小人之吉即大人之否此時留得一箇君子共圖休否之局靣便是否亨不是身否而道亨亦不是惟否乃亨之謂不亂羣者謂不受小人之籠絡此時朋黨未分情面尚在包承是小人之深心不亂羣是君子之本領轉移世道自此立基六三包羞象曰包羞位不當也當去聲二曰包三亦曰包二陰柔而中正恐君子不覺其為小人而受其包故以大人否亨戒之若三所居之位不中不正有識者所共知其見棄于正人久矣乃欲效二之所為適自取羞辱而已與恆九三或承之羞義同象以位不當斥之見得含垢忍辱非其本心特所處不當耳君子正當預為之計也九四有命無咎疇離祉象曰有命無咎志行也否過中將濟之時君子可以出而有為矣四居外卦之下能以義命自安不肯躁進孔子之得不得曰有命孟子不遇魯侯歸之于天皆自行其志而無咎者也故象以志行表之小人有羣君子有疇惟其不亂羣是以疇離祉疇指同德之陽離祉者受福也小往大來將復見矣蓋君子當否時必先自處于無過而後可為福而後可為疇離之福由其自安于有命也若依諸家作君命解則一命甫膺即羣以為受祉欣欣然有釋屩彈冠之慶聖賢氣象豈若是乎九五休否大人吉其亡其亡繫于苞桑象曰大人之吉位正當也否以九五為主爻陽剛中正時否居休不曰否休曰休否者見大人撥亂反正力量元氣漸復泰道將還故吉于此之時下多柔媚之臣皆曰已安已治矣大人獨曰其亡其亡繫于苞桑不以近功小效自足而以晏安鴆毒為戒蓋古有此二語而周公引之似痛定思痛之辭若曰幸而有今日其不絶如線者屢矣諸家以繫于苞桑為安固之道者似非語意象不曰位中正而曰位正當可見九五有德有位方能轉否為泰萬世不拔之業即在其亡其亡一念中矣上九傾否先否後喜象曰否終則傾何可長也上九否已終矣可以傾矣猶有懼心焉制其喜而不敢先先否後喜即先天下而憂後天下而樂之意正與其亡其亡之君心相似象辭一則字有乘機遘㑹許多事業在何可長言天下無久否之埋又見天道之盛衰與人事之憂喜互藏其機如此否泰兩卦上下諸爻相應同然泰初征而四孚二中行而五歸妹三陂平而上城復但見上下相交之意否初拔茅而四有命二大人否而五大人吉三包羞而上後喜皆有不相交之意故曰否泰反其類也京氏卦氣以泰為正月之卦順數已往否為七月之卦逆數未來愚按圓圖泰以否對自乾八卦至泰自泰三十二卦方至否方圖泰以否繼自乾八卦至泰自泰一卦便至否與京氏之說不相合其間遠近參差不知何以不同如此先儒或謂圓圖之義見泰易而否難方圖之義見泰難而否易究竟所謂難易者從何處索解此等圖不作可也又按泰易而否聖人所憂也何六爻無一凶咎字蓋陰陽之分著于六爻少則不及多則過泰與否皆平分君子小人並生于天地之間至再變而成剝方成小人世界否時尚未是柔剝剛之候聖人所以未加顯拒當初之進也則導之以貞于二則豫之以承于三則動之以羞皆變化小人之微權也四所以有命五所以休否上所以傾否彼此相應似非盡與君子為難者六爻無凶咎之占或在是周易玩辭集解卷二
