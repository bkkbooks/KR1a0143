body:
  text: 周易玩辭集解卷九翰林院編修查慎行撰上繫傳愚按彖傳文言大象小象皆夫子贊易之辭古本不附六十四卦中上彖傳第一下彖傳第二上象第三下象第四上繫傳第五下繫傳第六文言第七説卦傳第八序卦傳第九雜卦傳第十通為十翼孔頴逹云漢初為傳訓者皆與經别行及馬融注周禮欲省學者兩讀故具載本文易之以彖傳文言大小象分附本卦亦自注疏始古所謂十翼今止繫傳以下五篇矣又按繫傳中言聖人繫辭者六皆指文周卦爻夫子所言者則謂之傳上繫傳分章本義與注疏異注疏又與漢以後諸家不同注疏分十二章本義自第三章後與注疏互異馬融荀爽等則分十三章虞翻則分十一章今依本義以十二章為定鄭孩如曰孔子作傳本意曰繫辭者非傳辭也傳象也其傳象又非六十四卦也傳乾坤也既於文言逐節詮之猶以為未盡故上下傳二十四章言乾坤剛柔天地者十有七皆所以發明乾坤之理胡庭芳曰繫辭乃象數之總括義理之淵藪易無繫辭猶天無日月人無眼目天尊地卑乾坤定矣卑髙以陳貴賤位矣動靜有常剛柔斷矣方以類聚物以羣分吉凶生矣在天成象在地成形變化見矣先儒多謂乾坤三畫卦名也貴賤卦中爻位也剛柔卦德也吉凶占辭也變化卦爻之象也下一截言八卦既成之後其象始著天地卑髙動靜方物形象上一截言未畫之前其體已具愚按八卦畫自伏羲連山首艮歸藏首坤周易則首乾坤夫子所贊周易也歸重在乾坤二字蓋指一畫者言非三畫六畫之卦也此一畫者一名為乾一名為坤夫子于既有易之後追論未畫卦之先其象如此貴賤剛柔變化又從乾坤中標出在文周卦爻中初無此名目獨有吉凶二字耳非貴賤等與乾坤並列也看三個矣字皆已然之詞只是發明周易所以首乾坤之故胡雲峰曰乾坤之卦未畫觀之天尊地卑乾坤之位已定矣貴賤之位未齊觀天地之卑髙卦爻之貴賤已位矣易未有卦爻則未有剛柔之稱也天地間陽者常動可見其為剛隂者常靜可見其為柔矣易未有爻位則未有吉凶之辭也天地間事事物物善惡各以其類而分善者可知其為吉惡者可知其為凶矣易未有蓍卦固未見所謂陽變隂隂化陽也天成象地成形蓍卦之變化于是乎見矣此一節言畫前之易固如是也其説本于臨川王氏愚又按首節論造化之乾坤而易書在其中以下論易書之乾坤而造化在其中是故剛柔相摩八卦相蕩鼓之以雷霆潤之以風雨日月運行一寒一暑乾道成男坤道成女黃氏日抄云晦菴謂此節言易卦之變化南軒謂易所以幹旋造化之間者臨川王氏謂言自然之八卦愚竊按是故二字承上變化見矣來剛柔者一奇一偶也摩以奇偶相比言隂陽相摩而為八卦也蕩以層纍疊出言八卦交錯而成六十四也雷霆風雨日月寒暑變化而成象者男女兼人物言變化而成形者此一節言畫後之易如此雷霆以下四句只是説天道自然之變化而六十四卦中六子迭用不假安排亦猶天道之鼓之潤之運行之也總要見易中無所不有言天而地在其中人與物亦在其中生者生成者成男男女女共成一個世界夫子到此不知是贊天地贊聖人贊易一歸之乾道坤道而已愚又按震艮反易為雷言雷可以該艮巽兑反易為風雨言雨則兼坎兑邵子以兑為月艮為日蓋謂坎月行至兑而為月似非以兑體為月象艮居亥方以離日行至艮而為日似非以艮體為日象至寒暑之變則隋日月之運行者也首節因乾坤而究及于變化此節因變化而推本于乾坤乾知大始坤作成物乾以易知坤以簡能易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之德可大則賢人之業易簡而天下之理得矣天下之理得而成位乎其中矣乾知大始四句臨川王氏謂此言乾坤以造化之用付之六子而其所自處者甚易簡也易則易知以下朱子謂此言人法乾坤之道愚又按自此至末從乾坤中看出易簡之理而言人位乎中兼三才而成六位也乾知知字不與行字對乃太虛中一點靈氣冒萬有之先而萬物于焉資始者也坤作作字即下文能字成物者資生也資始資生看來何等煩難造物却不勞而成化乾惟知大始坤惟能成物以其易簡也張待軒曰伏羲仰觀俯察將天地人物許多道理收拾在奇偶二畫即此便是易簡夫子從此發出無窮妙處一氣直説到底總此易簡之理今就文繹之乾本乎氣之自然故曰易坤因乎乾之自然故曰簡惟其易故易知天道無心也惟其簡故易從地道無成也易知則百姓可以與知簡能則百姓可以與能順萬物之情故有親通天下之志故有功親切于中亹亹而不息故可久功同乎人積漸而日益故可大可久者日新之盛德可大者富有之大業至此則人與天地參矣賢人即聖人也胡雲峯于賢人之外添出衆人聖人頗覺辭費所謂天下之理者不外髙卑動靜羣類形象而已總于易簡中得之成位乎中成人之位于天地之中也右第一章言伏羲畫卦本于易簡卦成而易簡之理察于天地徴于人事天地人並立而為三矣聖人設卦觀象繫辭焉而明吉凶虞翻本有悔吝二字自此至三極之道也臨川王氏云前言易書之未作此言易書之既作也本義云此言聖人作易愚竊按上章言伏羲畫卦此章言文周繫辭觀象繫辭是一篇綱領畫卦已來吉凶雖其却未曽明白説出自有繫辭而吉凶之理始著明于天下然辭非象則無根據繫辭之本全在觀象觀某卦之吉凶生于某畫而後繫之以辭聖人所以泄造化之祕至辭無餘剩矣朱子發曰設卦本以觀象不言而見吉凶自伏羲至文王皆觀象而自得者也聖人懼觀者不足以知繫之卦辭爻辭以明告之為觀象而未知吉凶者設也剛柔相推而生變化本義謂此衆人所以因蓍而求卦者也愚竊按語氣承上文來象以辭而明變由象而出相推與相摩相蕩義同每卦有剛柔即有變化如在某卦為剛在某卦則變而為柔在某卦為柔在某卦則化而為剛剛柔無迹豈有為之推蕩者而前之所移若迫于後故謂之推彼卦之變化若根于此卦故謂之生只就卦象説似木説到因蓍求卦上此節只是原聖人設卦觀象之由剛柔相推象也象因變而出故曰剛柔相推而生變化要知剛柔相推之中或當位或失位吉凶悔吝之原正起于此聖人之所觀觀此也聖人之所明明此也蓋吉凶悔吝雖繫乎辭其原實起于變化是故吉凶者失得之象也悔吝者憂虞之象也本義云吉凶相對而悔吝居其中間悔自凶而趨吉吝自吉而向凶聖人觀卦爻中有此象則繫之以此辭也愚按此四句承上吉凶來吉凶悔吝以卦爻辭言失得憂虞以人事言聖人繫辭始因象以著辭隨以辭而顯象象者有其倣佛而未形之謂惟聖人能觀于未有辭之象衆人則觀其既有辭之象也易之為書本以卦爻占人事此轉以人事明卦爻只得便是吉之象只失便是凶之象此聖人不以禍福為禍福而以人事為禍福所謂一念之善景星慶雲一念之惡妖氛厲鬼是也憂虞有兩解或分貼悔吝或謂悔吝處俱有憂虞蔡介夫曰悔吝是吉凶交互處憂虞不可分貼悔有痛懲往失之意然猶未至于得尚可憂虞吝有不忍割捨之意然終必至于失己可憂虞變化者進退之象也剛柔者晝夜之象也本義此以下明剛柔相推而生變化而變化之極復為剛柔歸震川云一氣不頓進變進則化退矣一形不頓虧化進則變退矣一進一退遞相出入猶動之有靜往之有來常相待為用而不獨成故曰變化者進退之象來矣鮮曰剛屬陽明晝之象柔屬隂暗夜之象晝夜一定故曰剛柔者晝夜之象愚又謂聖人以進退觀變化以晝夜觀剛柔此借造化以明卦爻也六爻之動三極之道也本義謂天地人之理三才各一太極胡雲峯曰三極是已動之後各具一太極愚竊按此二句總括上文動者剛柔之變化吉凶悔吝所自生也初二三四五上六爻也初二為地三四為人五上為天三極即三才也三才之道未動則為三動則為六三才具于六爻而三極之道具于六爻之動爻不動則不變故陽動則隂隂動則陽謂之極者到極至處則變也似不必粘太極説一説極字不訓至只訓中天地之道惟其變化進退故常不過乎中人惟不知取中之義故常動而至于過而凶悔吝生焉聖人示以極之所在非以六爻之動為極而以六爻之動自有天地人中極之理也又是一解是故君子所居而安者易之序也所樂而玩者爻之辭也先儒謂此節言君子之學易愚又按安者處而不遷之義玩者尋繹不已之義序即六十四卦之次序如剝極則復泰極則否窮上則反下自然之義不可違也安之故無入而不自得邵子得環中之趣亦安其序而已卦中之六畫便謂之爻至周公而始有辭爻之辭至三百八十四可謂煩矣而一爻各具一爻之義有有象無占者有有占無象者有假物象為辭者有據人事為辭者變動無方反覆玩之皆可悅心而研慮卦爻皆有辭但卦辭不變而爻辭則變取象既多析理更精尤君子所樂玩者也居斯安非安則不成居樂斯玩非玩則不成樂是故君子居則觀其象而玩其辭動則觀其變而玩其占是以自天祐之吉無不利先儒謂此以下言君子之用易愚又按語氣承上文來易之道不外象辭變占君子之學易用易可不詳加觀玩哉上節居安乃靜時事此兼觀變則動時事居字對動字看觀者領其大意玩者尋其微旨靜而未筮之先所玩者象辭也動則謀及卜筮所玩者變占也學易與用易工夫無少間斷靜既循乎天理動必合乎天行人見君子之吉無不利以為此有天祐孰知其自易中來哉郝仲輿曰人生有屈信往來之感悔吝休咎之幾懼則思占疑則思斷聖人體天道明人事舍此更無餘衎後儒執卜筮作解至以筮法老少為變點畫交重為動夫隂陽之老少不見于經爻畫之交重不見于卦皆後世卜祝巫史之説而以之解經陋也易者變動而已一卦之體一剛一柔變動不居周流六虛耳右第二章言文王周公繫辭而以君子學易用易終之彖者言乎象者也爻者言乎變者也吉凶者言乎其失得也悔吝者言乎其小疵也無咎者善補過也項安世曰此節皆解繫辭之文彖辭所言之象即下文所謂卦也文辭所言之變即下文所謂位也吉凶悔吝無咎皆辭也孫質言曰須從義皇畫卦説起方與卦有大小節相應歸震川曰易有實理而無實事故謂之象卦立而象形文王之彖辭言乎象者也易有定理而無定用故謂之變爻立而變生周公之爻辭言乎變者也愚又按彖辭固言象爻辭亦無非言象彖爻中吉凶悔吝無咎之辭備矣吉凶失得之大者不如悔吝之小悔吝疵病之小者不如無咎之善吉凶之分全在補過二字積疵則為過積過則為失積失則為凶積補過則為無咎積無咎則為得積得則為吉四個言字兩個其字通指彖爻之辭善者嘉也猶云嘉其補過也孫淮海曰盡善謂之得盡不善謂之失小不善謂之疵不明乎善而誤乎不善之謂過盡善而得則吉盡不善而失則凶覺其小不善欲改而不及則有悔猶可以改或不肯改則為吝當悔吝之萌不以小疵自恕以求補過則無咎胡雲峯曰前章言吉凶悔吝未嘗及無咎此章方及之大抵不貴無過而貴改過善補過者聖人許人自新之意是故列貴賤者存乎位齊小大者存乎卦辨吉凶者存乎辭項安世曰自此至末皆讀繫辭之法愚按易道貴陽而賤隂隂陽有貴賤之理而列貴賤必託六位而後明陽大而隂小隂陽有大小之理而齊大小者必假卦象而後顯彖辭之例專取主爻有時以陽為主有時以隂為主而其主又不在位之貴賤故曰齊言無有分别也先言存乎位以六爻言後言存乎卦以主爻言此二句承上文彖者言乎象爻者言乎變來位以上下别貴賤卦以隂陽分小大至于吉凶則有貴而吉者亦有賤而吉者有小而凶者亦有大而凶者其象具于卦爻中非辭不能析而辨之故云辨吉凶者存乎辭此一句承上文吉凶者言乎失得來而歸重尢在末句正見觀象玩辭觀變玩占之學須從辭上理會憂悔吝者存乎介震無咎者存乎悔蔡虛齋曰憂悔吝易憂之也震無咎易震之也愚按此二句又在存乎辭中析出以足辨吉凶之義易辭總為吉凶憂悔吝震無咎正辨吉凶之幾處大有辭以辨吉凶而吉凶未判之先又有憂悔吝之介吉凶既成之後又有震無咎之悔雖三句實一句也吉凶之辨所爭在幾微之間毫釐千里所謂介也辭以憂之因其介也本有咎而無咎惟能悔也辭以震之使知悔也憂者危疑之意震者警動之意介在事前悔在事後又按介有二義韓康伯云纎介也本義云辨别之端要而言之是善惡分路處是故卦有小大辭有險易辭也者各指其所之説統曰上文逐一説個通例此則總言卦爻辭原是合一的非卦是卦而辭是辭也愚按是故二字承上文來歸宿只在辭上卦有小大二句一氣説下以陽為主則大如復臨泰是也以隂為主則小如姤遁否是也辭有險易易者明白而易曉卦辭如利用獄取女吉之類爻辭如師左次同人于門之類險者奇奧而艱深卦辭如履虎尾先甲三日之類爻辭如龍戰于野載鬼一車之類卦有小也而辭險不惟戒君子亦以警小人卦有大也而辭易不惟慰君子亦以安小人易固指之以為吉險亦指之以為吉所之謂或趨或避要歸于吉而已又按楊誠齋曰讀謙復之辭者如行夷途如逢陽春如對堯舜周孔何其氣象之樂易其辭夷易而指人以所之之吉也讀遁剝之辭者如涉風濤如履霜雪如對紂桀盜跖何其氣象之慘栗其辭艱險而指人以所之之凶也據此説則各指所之兼吉凶悔吝言義亦可通右第三章上章言繫辭此釋卦爻辭之通例以明聖人憂世覺民之心易與天地凖故能彌綸天地之道韓康伯云作易以凖天地本義以卦爻為易書愚竊謂此章主贊易道説卦爻未具之前易道在天地聖人作易效法乎天地而與之凖則天地之道在易中矣凖是凖其道非凖其形彌者彌縫而無少滲漏綸者經綸而各有條理非作易之聖人其孰能之二句是一章綱領下文反覆發明此意仰以觀于天文俯以察于地理是故知幽明之故原始反終故知死生之説精氣為物遊魂為變是故知鬼神之情狀本義此聖人窮理之事以者聖人以易之書也易者隂陽而已幽明死生鬼神皆隂陽之變愚竊謂天地之道只是隂陽之理聖人體易只是窮盡隂陽之理但本章不曽説破隂陽二字只從幽明死生鬼神隨在而異名其實只通乎晝夜之道而知一句便了幽明之故不易知于觀天察地知之死生之説不易知于原始反終知之鬼神之情狀不易知于物變知之三知只是一知幽明即死生死生即鬼神鬼神即萬物幽明有所以然之理故曰故死生本人之常談故曰説鬼神體物而不可遺故曰情狀三個故字乃推原其由來非體易之聖人孰能知之精氣為魄魄為鬼志氣為魂魂為神鬼常與體魄俱故謂之物神無適而不可故謂之變張待軒曰精氣即遊魂之所凝聚遊魂即精氣之所運用二者具而為人人生始化曰魄既成魄然後成魂魂者氣之英魄者氣之精也聖人教人只在自身中認取若謂生則為物為神之伸死則為變為鬼之歸則所知亦淺矣陸君啓曰天地間有一種精氣凝結有形有聲之鬼神有一等肅然凄然遊移往來此是遊魂所結非精氣也鬼神情狀盡于此二者愚又謂鬼神情狀有數種有一種效靈造化主持世運如社稷山川之屬有一種聰明正直精爽不磨如忠臣孝子之屬有一種強魂怨氣團結不散如國殤烈婦之屬有一種依草附木為妖為孽如魑魅罔兩之屬至于山林曠野磷火聚散難以悉數總之福善禍淫是其情不見不聞洋洋如在是其狀聖人只在魂氣聚散倐有倏無處洞如觀火天下極奇幻之事只作平常看大要若此與天地相似故不違知周乎萬物而道濟天下故不過旁行而不流樂天知命故不憂安土敦乎仁故能愛本義此言聖人盡性之事愚又按承上文而言聖人體易至于幽明死生鬼神之理無不洞然直與天地相似矣不違與先天而天弗違義同以下總見與天地相似處天地之道知仁而已聖人作易與天地相似亦知仁而已知周萬物知也道濟天下仁也旁行行權之知也不流守正之仁也樂天知命知也安土敦仁仁也不過不憂能愛皆指天地言至大而莫能過者天地之體不憂者天地之性能愛者天地之情聖人與天地相似故亦不過不憂能愛而作易與天地凖也範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知故神無方而易無體本義謂此聖人至命之事張彥陵曰此節承上與天地相似來愚謂首二句是贊易範闈曲成即裁成天地之道輔相天地之宜以左右民言天地皆有待于易也至通乎晝夜則易全在聖人矣通晝夜以為知是貫幽明一死生同鬼神非徒知其故知其説知其情狀而已晝夜即隂陽之象隂陽者易也所以妙乎隂陽者神也神無方者不離乎隂陽亦不滯乎隂陽也易無體者隂陽雖分而實未嘗分也惟通乎晝夜者知之蓋隂陽之道于晝夜最分明故以晝夜表之晝夜即隂陽也通章字字説隂陽却一字不露直至下章方開口道破右第四章前三章皆言畫卦繫辭此章言聖人體易而贊易道之大仍歸重在作易之聖人一隂一陽之謂道程傳道非隂陽所以隂陽者是道本義隂陽迭運者氣也其理則謂之道愚竊按此句緊承上章通乎晝夜之道而知來所謂晝夜之道者何一隂一陽之謂也隂陽二字夫子于乾坤文言中首發之至泰否而再見此則于隂陽上加兩個一字剔出道之所以然處有對待之義有流行之義又有相因之義此是聖人直指道體語道者自然而然不落形氣之名正從隂陽上見得似不可與氣對舉不曰陽隂而曰隂陽者隂靜而陽動朱子所云陽前是隂故先隂而後陽亦猶上章言幽明死生鬼神不言明幽生死神鬼也韓康伯謂道者無之稱孔穎達云一謂無也皆異端所謂道非一隂一陽之謂道也張橫渠云大易不言有無言有無者諸子之陋也殆指此歟愚又按朱子嘗云天地間只是陽氣下截便是隂又云陽氣便是六層只管上去下面空缺處便是隂語氣微有病隂陽自是二氣夫子所以云一隂一陽謂二氣循環如一氣則可謂只是一個陽似不可張子云兩不立則一不可見一不可見則兩之用息從此體會方得繼之者善也成之者性也薛敬軒曰繼成以氣言從上句隂陽字來善性以理言從道字來繼善者化育之始流行而不已陽也成性者人物稟受一定而不易隂也愚又謂上文一隂一陽就化育流行上説繼善就天所賦人所受中間過接處説繼者靜之終動之始循環不已不滯于隂不滯于陽所以為善至成性方屬人物謂之性是有得于一隂一陽非偏滯于一可知此段是説天地生成人物之意不是説性上事仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣黃氏日抄云自一隂一陽至君子之道鮮矣言道原于天而賦于人胡雲峯曰上章言聖人之知仁知與仁合而為一此言仁者知者仁與知分而為二仁者之見滯于陽知者之見滯于隂愚按隂陽之道在天地間本自無滯人生以後便落氣質便有知仁之偏見百姓之無知氣稟不同各以具性之近者言仁者只見得發生處而以為仁知者只見得流動處而以為知百姓又下仁者知者一等所以日用而不知君子之道即一隂一陽之道流行而不滯者鮮矣與中庸民鮮久矣義同張彥陵曰見與知從何分别知者從本性上發出靈機見則落于意識了自以為見者既不能知日用不知者又不能見合一之道非君子不能體其全正借知仁百姓以影出聖人不是泛論道體按天台董氏楷所輯程朱傳義附録自易與天地凖起至君子之道鮮矣止為第四章與今本異其言曰易與天地凖以下只是言個隂陽繼善成性于造化流行處分隂陽此是指人氣稟有偏處分屬隂陽耳存其説俟再考顯諸仁藏諸用鼓萬物而不與聖人同憂盛德大業至矣哉程傳運行之迹生育之功顯諸仁也神妙無方變化無迹藏諸用也黃氏日抄云此言造化寓之易顯仁藏用盛德大業皆指造化言先儒或謂顯藏二字與中庸費隱相似隱在費中藏即在顯中顯諸仁是用之迹藏諸用即仁之心如春夏之生長萬物至秋冬則收斂成實春夏是顯秋冬是藏愚又竊謂顯仁藏用乃一隂一陽之實際仁言顯即用是體用言藏即體是用為藏為顯循環無端隂陽互根如鑄者之鼓洪爐要生便生要成便成造化只管鼓自有人來代其憂故不與聖人同憂所謂無心而成化也大業從顯仁來盛德從藏用來至矣哉無以復加之謂盛德大業本是聖人分上事此以贊隂陽非贊天地也富有之謂大業日新之謂盛德生生之謂易成象之謂乾效法之謂坤極數知來之謂占通變之謂事隂陽不測之謂神黃氏日抄云造化之德業生生不窮者即是易易之成象者即是乾效法于乾者即是坤自此以下言卜筮妙用處愚按自首至未接連八個之謂一氣貫注多承一隂一陽之謂道來盛德大業一隂一陽之道在天地者也生生之謂易一隂一陽之道在易者也作易者因隂陽二畫而得乾坤二象此一隂一陽之道在卦者也用易者極隂陽之數以知來通隂陽之變以行事此一隂一陽之道在筮占者也夫孰非隂陽乎又孰為隂孰為陽乎神也神也者妙萬物而為言者也末句是通章收尾易之精義盡此矣程敬承曰生生之謂易論其理也有理則有數隂陽消息之數也推極之可以知來占之義也非實指占筮之占也通變通數之變亦易變也非以所占卦變而通之也蓋此章全是論隂陽之道未及畫卦用筮以後事張子厚云富有者大而無外日新者久而不窮程伊川云天地有隂便有陽有一便有二才有一二便有三自三以往不可窮矣此是生生之謂易朱子云易有交易變易二義交易者隂陽之相感變易者隂陽之相推相感者固生相推者亦生錢田間曰成象謂乾一畫效法謂效乾之一畫以生坤二畫也乾坤奇偶象立而數顯占者占其變也通其變則陽或變隂隂或變陽而九六始有事所謂功業見乎變也胡雲峯曰事之未定屬陽占之已決屬隂張子曰兩在故不測要見隂陽之不測即從兩個一字內看出王輔嗣曰不知其所以然而况之曰神趙震潛曰生生之謂易是一篇關鍵若本節論是造化人物相生之理若兼上文言則繼成之相因知仁之遞用德業之互根皆生生所在若兼下文言則法象之相禪占事之相因亦皆生生所在愚又謂隂陽何嘗有意于生一陽生而成象之謂乾一隂生而效法之謂坤只是隂靜之極了此氣遏抑不住不得不發舒出來及發舒既極了不得不收斂入去生生只是相生只管變易故曰生生之謂易右第五章黃氏日抄云此章言道原于天而賦于人愚按通章只是贊隂陽之道觀首尾二句可見夫易廣矣大矣以言乎逺則不禦以言乎邇則靜而正以言乎天地之間則備矣愚按首節統贊易道廣大者極其所至而言推而求之逺則動而莫禦即而求諸邇則靜而正邇言靜則逺之為動可知天地之間通萬物萬事言備者無所不具無所不包易之所以廣大也此章之旨兩語可了易之廣大本乎乾坤乾坤之廣大本乎易簡而已夫乾其靜也專其動也直是以大生焉夫坤其靜也翕其動也闢是以廣生焉凡繫傳所言乾坤皆指奇偶也此節就乾坤二畫而贊其廣大動靜者變與未變之分乾畫奇未變則靜專變則動直以其朕兆未形一真未散謂之專以其任真而出絶無坰曲謂之直坤畫偶未變則靜翕變則動闢以其收斂凝固生意不泄謂之翕以其氣機一到通達無礙謂之闢朱子云專直只是一物翕闢却是兩個翕則合闢則開此奇偶之形也乾一而實以質言故曰大坤二而虛以量言故曰廣愚又謂大與廣皆從奇偶中出乾一之氣常行乎坤兩之中是天包地之外故大生坤兩之中常受乎乾一之氣是地容得天之氣故曰廣生吳草廬曰陽本實隂本虛也陽主用隂主體則陽反似虛隂反似實今觀天之積氣雖似虛然其氣徑急如鼓能舉大塊于其中而不墜則實莫實于天也地之凝形雖似實然其形疏通如肺氣出入于其中而不礙則虛莫虛于地也明乎陽實隂虛而聖人所以言乾坤者盡矣廣大配天地變通配四時隂陽之義配日月易簡之善配至德此承上乾坤大生廣生來乾坤者易中之畫也天地得其廣大易之廣大如之四時得其變通易之變通如之易所言隂陽之義與日月相似所言易簡之善與聖人之至德相似朱子云此是將易中之理取外面一事來對愚按配者相似之意不取配合立義蓋此章又是借天地以形容易之廣大不是相配合而成功用也張南軒曰乾之大生以資始坤之廣生以流形此廣大配天地也闔闢往來終則有始此變通配四時也復言七日以陽生為義臨言八月以隂長為戒此隂陽之義配日月也中庸之德中人以上可俯而就此易知中人以下可企而及此易從也故曰易簡之善配至德胡雲峯曰首章言乾坤之尊卑而歸諸易簡此章言乾坤之廣大而亦歸諸易簡總見易不在天地而在人心也黃氏日抄云至德晦菴指為在人之至德揚氏鄒氏皆云中庸之至德伊川云乾坤易簡之功乃至善之至德右第六章此章言易道之廣大由于乾坤而乾坤之藴盡于奇偶二畫子曰易其至矣乎夫易聖人所以崇德而廣業也知崇禮卑崇效天卑法地天地設位而易行乎其中矣成性存存道義之門黃氏日抄鄒氏云此章言聖人體易之道與天地相似易與天地同出而聖人獨得其要愚按前言繼善成性又言盛德大業多就現成説此章承上文易簡至德説來首句先贊易道之至下言聖人之德業皆從易中出德變易則積而日崇業變易則推而日廣天下至崇莫如天至廣莫如地聖人以乾之易知為知故知崇如天以坤之簡能為能故禮卑如地知窮萬物之原則乾之始萬物也禮循萬物之則則坤之成萬物也天地自有定位聖人從乾坤奇偶而設而易之變化即行乎其中然則聖人效法天地又豈在乾坤二畫之外哉亦就天地所賦之成性而存存不已焉耳存字對發字説所謂未發之性也存之又存性體渾然道義皆從此出非即所謂易簡理得乎道義在天地則謂之易易在吾性則謂之道義乾坤為易之門猶性為道義之門得此之謂德修此之謂業悟此之謂知體此之謂禮率而行之之謂道行而宜之之謂義只完得一個成性存存本來固有之善非天下之至精至微孰能與于此此聖人體易之全功也右第七章此章贊易而以聖人之學易明之聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻黃氏日抄云此言聖人推其所獨見者立象生爻使天下皆有所見而得善其言動也愚又按第一個聖人有言伏羲者有言文王者若專指伏羲卦象則文王彖辭何無一言之及若是文王則形容物宜乃畫卦時事似與文王無涉今只就文作解賾者多也非雜亂之謂物之形象多矣聖人見天下之至一故有以見天下之至賾而擬諸形容以象其物宜擬在未畫之先象則畫卦之事擬是擬其所象象是象其所擬易之取象者有三如地中有水地中生木實象也天在山中風自火出假象也天下有山可以遁矣澤中有火可以革矣意象也物各有宜得其形而下者正肖其形而上者故謂之象第二個聖人專指周公一卦體要之聚曰會六爻旁通之情曰通昭晰無遺之謂觀典以為經貴守其常禮以為緯貴權其變無所拘執之謂行天下之吉凶皆自動中出聖人見天下之至靜故有以見天下之至動而觀其會通以行其典禮如卦有六爻會其大意則此可通于彼彼可通于此典則萬古而不易禮則因時而制宜同一象也有在此爻則吉在彼爻則凶者繫辭所以斷也故謂之爻卦象即是爻象今分而言之者合諸一卦則為象散之六畫則為爻也前段不重畫卦重在畫卦本于隂陽後段不重繫辭重在繫辭本于一理言天下之至賾而不可惡也言天下之至動而不可亂也黃氏日抄云賾幽深也諸家皆然晦菴獨以為雜亂合從伊川及諸家之説與經文探賾索隱之意合愚又按言者聖人之繫辭惡厭也亂淆也象自賾之不可見處名之是言天下之至賾爻自變之不可窮處通之是言天下之至動賾之至處有至一者存所以不可惡謂不厭其多也動之至處有至靜者存所以不可亂謂不患其淆也擬之而後言議之而後動擬議以成其變化先儒謂擬有倫比詳度意議有商確裁定意愚又謂爻象自兼言動擬議亦非分屬總要見聖人心神涵泳獨會于意言象數之表時然後言即是擬而後言時然後動即是議而後動人第見聖人之易千變萬化而孰知其變化由擬議以成學易者可不擬而言議而動乎以下七爻乃夫子擬議之辭一爻只作一事説程沙隨曰鳴鶴在隂擬易而為言藉用白茅議易而為動餘皆發明言動變化之義不必求于深逺胡雲峯曰前言變化易爻之變化也此言成其變化學易者之變化也鳴鶴在隂其子和之我有好爵吾與爾靡之子曰君子居其室出其言善則千里之外應之况其邇者乎居其室出其言不善則千里之外違之况其邇者乎言出乎身加乎民行發乎邇見乎逺言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不慎乎蔡伯靜曰萬化不窮感應二端而已夫子取中孚九二之辭而推廣之居室即在隂之義出言即鳴鶴之義千里之外應之即子和之義張彥陵曰户之運在樞矢之發在機樞運而户必間機發而矢必逺以况言行之加民見逺也言行一發榮辱係焉應在人而感者在已故曰主不但榮辱也推而極之可以動天地安得不慎所以貴擬議而後言動也同人先號咷而後笑子曰君子之道或出或處或默或語二人同心其利斷金同心之言其臭如蘭楊誠齋曰君子之道于其心不于其迹心同迹異不以迹間心心異迹同不以心混迹故同人之先悲後喜與君子甲出乙處此默彼語皆所不計也出處同道則禹顯顔晦同一情語默同道則史直遽卷同一意心同故也愚按易言斷金猶詩言攻玉也斷金言其琢磨之工屬先號説如蘭言其臭味之合屬後笑説初六藉用白茅無咎子曰苟錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之為物薄而用可重也慎斯術也以往其無所失矣蔡節齋曰凡天下事過則有失惟過于慎則無所失愚按苟者輕忽之意慎者鄭重之意錯諸地則為苟藉以茅則為慎薄莫薄于茅重莫重于藉在用之何如耳惟其慎故用可重此禔躬處世之善道也勞謙君子有終吉子曰勞而不伐有功而不德厚之至也語以其功下人者也德言盛禮言恭謙也者致恭以存其位者也揚誠齋曰人之謙與傲繫其德之厚薄德厚者無盈色德薄者無卑辭如鐘磬焉愈厚者聲愈緩薄者仄是故有功勞而不伐不德惟至厚者能之德愈盛則禮愈恭矣俞玉吾曰存位猶乾九三之存義謂禮極其恭所以存其分義而不敢踰越非是保其祿位而強為此謙也亢龍有悔子曰貴而無位髙而無民賢人在下位而無輔是以動而有悔也本義云釋乾上九爻義當屬文言此蓋重出愚按持盈之道貴變而通之以時前四爻舉以為法後三爻舉以為戒似非重出不出户庭無咎子曰亂之所生也則言語以為階君不密則失臣臣不密則失身幾事不密則害成是以君子慎密而不出也先儒謂密字即退藏于密之義謂吾心一念之微也愚按夫子于節初爻云知通塞以行言也此又另作一解亂猶禍也即下文失臣失身之類户庭與階皆假借之辭言語者一身之户庭不出者慎密之意非不言也不輕出耳唐髙宗告武氏以上官儀教我廢汝此君不密而失臣也陳蕃乞宣臣章以示宦者此臣不密而失身也冦凖欲去丁謂被酒漏言此幾事不密而害成也聖人雖甚易簡亦甚慎密第與隂謀權詐殊耳世人不知以慎密為機械所以敗事子曰作易者其知盜乎易曰負且乘致冦至負也者小人之事也乘也者君子之器也小人而乘君子之器盜思奪之矣上慢下暴盜思伐之矣慢藏誨盜冶容誨淫易曰負且乘致冦至盜之招也蔡虛齋曰知盜猶云知盜情也楊誠齋曰司馬氏之盜魏曹操教之也蕭衍之盜齊蕭道成教之也蓋盜非能盜小人之有也小人實教盜以盜已之有也所謂知盜非知奪伐之盜也知教奪伐者之盜故終之曰誨盜曰盜之招者以此項平菴曰七爻皆欲人畏謹也鳴鶴言處隱之誠同人言同心之一白茅貴慎有終尚謙亢龍惡盈户庭以教密負乘以戒惕右第八章本義此章言卦爻之用愚按注疏起聖人有以見天下之賾至其臭如蘭止為第六章以藉用白茅至末為第七章程氏以有以見天下之賾至成其變化為一章吳草廬則别出下七節附于文言傳而獨存聖人有以見天下之賾至成其變化九十五字自為一章熊勿軒以聖人有以見天下之賾五卜六字與後重出故欲去此五十六字而移置後三十九字于第十二章極天下之賾者存乎卦之上諸儒分章不同今從本義天一地二天三地四天五地六天七地八天九地十愚按韓康伯以此節居第十章之首漢書律歷志在天數五之上程傳依之移冠第九章黃氏日抄謂始于朱子似失考天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也張雨若曰須知此章不是推畫卦源頭乃是明蓍數本末姚承菴曰首兩節從圖上説天地之數下言大衍正見蓍策之數本天地來程敬承曰圖數只隂陽蓍法亦只是隂陽之變化愚按以上八章皆言象至此方言數天一地二至天地之數五十有五即河圖之數聖人因之得揲蓍之法者也一三五七九天數五也二四六八十地數五也五位河圖之上下左右中央方位也相得者一對二三對四六對七八對九五與十對乎中央也各有合者一六居北二七居南三八居東四九居西五十居中皆奇偶相配也積一三五七九為二十五之奇數五其五也積二四六八十為三十之偶數六其五也合之凡五十有五而棵蓍之法在其中千變萬化皆從五數出此所以三字總承上文八句來張敬夫曰月令所謂草木乃茂草木黃落之類可以厯數推而得之此天地之數所以成其變化也所謂其神勾芒其神祝融之類各司其時各治其職此天地之數所以行乎鬼神也王臨卿曰變化二字本義因周子有陽變隂合而生水火木金土之説遂以五行解經不知周子云云是論五行生成之序非為天地之數設也謂成變化之在水火木金土者不過據五數而為言耳非謂五行因變化而成也鄭孩如曰變化二字如乾道變化之義不當以五行分貼變化鬼神俱就氣機言不可以生物言愚又謂此章所重在蓍數成變化而行鬼神只是贊蓍又按程傳云由象以知數蓋謂數不在象外也曰五曰十數也五奇十偶象也聖人以數定象象惟奇偶重之盡于六十四卦數有九六其變至于四千九十六卦卦不自變因蓍而後變也蓋河圖之數聖人因之以揲蓍故下文繼以大衍之數又按本義于乾卦言隂變陽化至此一變生水而六化成之云云則又謂陽變隂化與前説不同未得其解大衍之數五十其用四十有九分而為二以象兩挂一以象三揲之以四以象四時歸奇于扐以象閏五歲再閏故再扐而後挂歐陽永叔云大衍筮占之一法耳非文王之事也後世用以占筮孔子懼文王之志不見于後世而易者為卜筮用也乃作彖象發明卦義夫六爻之文占辭也大衍之數占法也學者專其辭于筮占猶見非于孔子况遺其辭而執其占法歟蘇子由云大衍者敷衍天地之數而取其五十用于揲蓍非天地之全數也歸震川云大衍者所以求卦也愚按所云五十者即河圖中宫天五乘地卜是也大衍者自一至卜百千萬皆從此推出也天地之數是自然之數大衍之數是推衍之數凡蓍草五十莖筮之初右于取一䇿反于櫝中虛其一而不用韓康伯所謂易之太極也其入用者只四卜有九而已蓋天地之數始于奇大衍之數則以奇為用其用二字直貫到末分二者隨手分蓍莖半置左半置右象兩儀之對待也挂一者懸一莖于左手小指間也三者三才也左為天有為地所挂之策象人故曰象三揲四者先置右手之策于一處以右手四四數左手之策又置左手之策于一處以左手四四數右手之策以象四時也奇者所揲四數之餘䇿也扐者勒也四四之外必有零數或一或二或三或四左手者歸之第四第三指間右手者歸之第三第二指間而扐之也象閏者所歸之餘䇿象日之餘也挂一當一歲揲左當二歲扐左則三歲一閏矣又揲右當四歲扐右則五歲再閏矣再扐而後挂者再扐之後復以所餘之策合而為一為第二變再分再挂再揲也不言分二揲四獨言挂一者明第二變後不可不挂也以上言揲蓍取卦之法如此程氏大昌曰正易新法之論大衍曰挂一之在四十九無不入用則雖去之無欠也其意以為揲蓍之初此一既挂左指則自不與揲數之數矣及其揲四已定此一又歸奇扐則又不入七八九六之用故曰去之無欠也此蓋以象數言易于有爻之後而不知超象數以求易于未爻之前也道生一一生二二生三三生萬物一之生二是虛一之能生天生地者也夫天地得此之生于太極也其象在蓍則分一為二是其形容矣然此之分二者從何而來豈非從一握則四十九用皆藏一握之內及其分一握以為兩握則一已生二而一遂無見聖人于是即五十蓍中取其一蓍挂之左指者既不以揲又不循數其意蓋示四十九用之上此之一數處總無為而四十九者各以七八九六聽令而受數焉耳故此一雖虛而天下之實莫不由此以出則安可知有用之用而不知無用之用也故知此説不能求諸未爻之前也又曰諸家多言蓍以七為數至其何以用七則莫有言者意謂七七四十九正蓍之用耳歷考諸易自數總以及數變皆無以七為祖者獨有七為少陽固在四策之一然此之七也進之不得為陽數之極退之不能為陽變之祖則七在四策中特其列數之一耳安能總攝他數也顧獨于末流取四十九以配七七而謂蓍數之祖何所本也愚按蓍以七為祖之説今揲蓍家所不言存以備考歸震川曰四十有九得用處在挂一挂一得用處不在一變而在二變三變愚竊按挂一之妙只在第一變若第一變不挂一則四揲兩手之策而歸其餘但有奇而無偶矣至于第二變第三變除去第一變挂扐之外其策數奇偶本自均齊挂亦奇四而偶八不挂亦奇四而偶八但不挂則無以象三故再扐之後仍須挂耳愚又按揲蓍法邵子用過揲之數朱子取挂扐之數孔疏云乾坤之策為老陽三十六老隂六十四所用者過揲之䇿也今觀下文以乾坤之策當三百六十之期而以歸奇之數象閏則正用過揲餘用歸奇可知矣歸奇于扐猶歸餘于閏也若用挂扐似舍正而取餘矣竊疑後世何以廢邵法不用吾甥徐接三云後人揲蓍取挂扐之數不用過揲之數者厭煩從簡也蓋三挂三扐之策孰奇孰偶取覽甚便若用過揲之數則必取揲過者復數之未免煩矣其實聖人立法以過揲為主如厯法最重閏月然木聞紀歲者專紀閏月此後人從簡之故耳又如揲之以四者兩手之策皆當揲也今人于挂一之後但揲左手之策以歸其餘右手之策不揲而徑歸其餘則非但右手之䇿不象四時且左策歸奇與右策歸奇一時並扐是前閏與後閏相接不待五歲而後再矣亦後人從簡之故也乾之策二百一十有六坤之策百四十有四凡三百有六十當期之日策即蓍也乾坤之策老隂老陽過揲之數也乾九坤六以四營之乾一爻得四九三十六坤一爻得四六二十四乾每爻得三十六則六爻得二百一十有六坤每爻得二十四則六爻得百四十有四合成三百六十爻適當一年三百六十日之數也胡雲峯曰前挂扐之數象月之閏此過揲之數象歲之周吕與叔曰六十四卦統計三百八十四爻三百六十者去乾坤坎離二十四爻而言也郝仲與曰卦之始畫有隂陽之象而無老少之名蓋因説卦父母男女而分老少但説卦所謂男女者以卦畫奇偶乾坤相交而言筮法所云老少者以蓍策過揲之數而言非伏羲畫卦本法也伏羲畫卦奇偶相推乾坤交錯則謂之變筮法則此爻變彼爻此卦變彼卦老變少不變故卦只用九六筮則兼七八以為九六之升降非七八則二老無頓變之理無老少則變與不變無由分故以九六象父母稱老以七八象六子稱少三百八十四爻凡陽皆乾凡隂皆坤故夫子但言乾坤之策不及六子周公爻辭但用九六亦以此愚又按厯法用籌算以竹為之亦謂之策隋書曰竹廣二分長三寸正策三廉積二百一十二枚成三觚乾之策也負䇿四廉積一百四十四枚成方坤之䇿也其數亦適與易合可見易道無所不有存此以備參考二篇之䇿萬有一千五百二十當萬物之數也二篇上下經也陽爻百九十二以三十六乘之得六千九百一十二策隂爻百九十二以二十四乘之得四千六百八策合之為萬有一千五百二十當萬物之數也就本義作解如此愚又按二篇之䇿以蓍法推之皆老隂老陽之數也今取陽爻百九十二以少陽二十八乘之積五千三百七十六再取隂爻百九十二以少隂三十二乘之積六千一百四十四合之亦萬有一千五百二十但九六有象而七八元象少隂少陽之數即隱于老隂老陽之中如是則七九皆為陽六八皆為隂其畫為奇為偶皆同凡筮者欲取動爻之後卦故分别老少之象耳是故四營而成易十有八變而成卦八卦而小成引而伸之觸類而長之天下之能事畢矣營經營也四營即上文分二挂一揲四歸奇也成易謂一變也三變而成一爻十八變則得六爻而成一卦矣八卦而小成本義謂九變而成三畫得內卦也愚竊謂此句乃承上起下之辭孔疏云天地雷風日月山澤于大象略盡是易道之小成蓋謂十八變中挂揲歸奇略盡八卦之象即唐一行所云十八變之間有八卦之謂也細玩語氣此句當連下文讀言一卦十八變之中雖具八卦不過小成而已本足以盡天下之能事也惟引此小成之法而伸之人觸此引伸之類而長之則一卦可變為六十四卦大下之能事畢矣若謂九變而成三畫方得內卦則上文明明説十有八變內外二體已具矣不應下文又説到內卦只為朱子將此句屬上文讀了疑其既云成卦復云小成故以內卦當小成之義耳郭鵬海曰謂八卦而小成是九變既言十八變却説四九變語氣似倒鄙意四營二句自一變直説到十八變為一卦之變化八卦小成以下自小成説到大成為六十四卦之變化先儒已有此論非末學一人之臆説也顯道神德行是故可與酬酢可與祐神矣胡雲峯曰道在天德行在人在天者幽顯道闡幽也在人者顯神德行者微顯也蓍與卦可以酬酢其在人者可與贊助其在天者愚又按筮占雖極數之事然數出于天地天地不得而知數衍于聖人聖人不得而測道因蓍而顯德行以蓍而神明可以酬所乎人而決其疑幽可以佑助乎神而代之言此蓍之所以成變化而行神也子曰知變化之道者其知神之所為乎本義變化之道即上文數法潛解曰聖人論天地之數而終之以行鬼神論大衍之數而終之以神德行佑神神者一也惟一故神愚又謂夫子恐人泥于數故終舉而歸諸道言筮非術數之學乃天地間自然變化之道變化者神之所為也知道則知神矣右第九章此章言聖人因河圖之數而得揲蓍求卦之法易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占黃氏日抄以子曰知變化之道者一節冠第十章之首今從本義易道不外辭變象占四者聖人用之以言動制器卜筮則為聖人之道而易無不有焉四個以字多從用易者説尚者取也程子曰吉凶消長之理進退存亡之道備于辭推辭考卦可以知變象與占在其中矣何閩儒曰用易以言吉凶則取諸辭用易以規行事之動則取諸變卦爻之中各有取象用以制器則可以盡創物之智卦爻之設以前民用用以卜筮則可以得前知之明胡雲峯曰辭占是一類變象是一類辭以明變象之理占以斷變象之用故四者之目以辭與占始終焉愚按夫子明言易有聖人之道四伊川止尚其辭康節止尚其象京虞郎荀諸家止尚其變朱子止尚其占謂之非易不可謂之聖人之道似皆舉其一而未得其全也胡廷芳有云易之十翼凡以發明性命道德之藴于是易始不徒局于象數卜筮之粗而實有至精至變至神之妙天下由之以究三才之道而盡事物之情不假卜筮自足為吉凶之前知矣折衷先儒之説此數語盡之先儒或以此章承上章揲蓍而言上但言蓍䇿變化之數尚未及用蓍此言所以用蓍之道象變辭占皆指揲蓍時所得言非泛指全經中所具觀下文多是贊筮占其義亦通是以君子將有為也將有行也問焉而以言其受命也如嚮石經作響無有逺近幽深遂知來物非天下之至精其孰能與于此首節兼言動制器卜筮以見易道所包者廣此節言筮占之事而言動亦在其中有為有行動者尚其變也問焉以言言者尚其辭也以言本義在人發言上説愚竊謂即下文所云命也自筮者告蓍曰言自蓍受筮者之言曰命其受命至來物一氣貫下總見響應之速而周逺近時地也幽深天道也來物吉凶也謂蓍受筮者之言其應如響未來之事無逺近幽深皆知之至精合辭占説以其非術數之粗故曰至精本義云此尚辭尚占之事參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與于此本義云此尚象之事愚按參伍以變先儒之説不同今取來氏易解其言曰揲蓍法本于河圖圖以中數為尊一化兩由中而分一居中左右不離中而成三三居中左右不離中而成五五居中左右不離中而成九五以三為中九以五為中一分二為參三互二為伍參之伍之交互以觀其變也變乃象之未定者參伍只以一變言下文通其數則三變而成一爻極其數則十八變而成一卦而總不外乎參伍之説三五為十五五乃河圖中數故數之相倚者不曰參伍則曰參兩三與二倚曰參伍一與二倚曰參兩皆用中法也錯綜其數據挂揲後而言程沙隨曰綜如織婦之用綜合衆經相間而上下之也本義云錯者一左一右之謂綜者一低一昂之謂皆揲蓍求卦之事變者數之未定隂陽老少隱躍而不測故曰參伍以變數者變之已成錯綜之時奇偶多寡秩然而可數故曰錯綜其數首二句止論一爻之法通其變者通六爻之變得十有八遂成初二三四五上剛柔相雜之文老少不出乎二象故曰天地極其數者極六爻之數得七八九六遂定天地水火雷風山澤之象動靜實該乎萬有故曰天下此二句方論成卦之法程敬承曰天地間隂陽本無定位而消息盈虛自有至理象變本此至理來所以變一通而文遂成數一極而象遂定不待湊掇安排而文始成象始定也至定是贊占之法易無思也無為也寂然不動感而遂通天下之故非天下之至神其孰能與于此黃氏日抄此章言易之神主蓍龜而言所云無思無為者亦言蓍龜無心而能應或者因以為人不可有思為者訛也愚竊謂易當專指蓍卦不必兼龜言上文言天下逺近幽深之理多具于蓍卦中聖人既以盡其用而蓍卦之體則無思無為象在畫辭在䇿蓍木變占在櫝本寂然而不動及揲蓍以求卦則天下之故感而遂通其寂其感皆無心也非天下之至神乎精之至變之至便是神非至精至變之外别有所謂至神也夫易聖人之所以極深而研幾也惟深也故能通天下之志惟幾也故能成天下之務惟神也故不疾而速不行而至愚按上文非至精至變至神不能與于此到此節重提夫易二字見得與于此者惟聖人能之也極未形之理曰深適動微之會曰幾極深以義理言研幾以事變言此聖人作易之本領惟其深也故以我之先知達彼後知以我之先覺逹彼後覺自一心而通天下之志惟其幾也故未亂知亂易亂為治未亡知亡轉亡為存自一心而成天下之務惟神也故不煩擬議之久不見有為之迹神不在深與幾之外然非以聖人而極深研幾則不能至于神也上節神字贊筮卦此神字贊聖人子曰易有聖人之道四焉者此之謂也愚按四者雖云辭變象占而自君子將有為也以下則皆論占事末句仍云易有聖人之道四焉者蓋極深研幾聖人全體皆易而後辭變象占自聖人用之則為聖人之道聖人之所有皆易所有聖人之神寓于辭變象占而易即因之以為神故曰易有聖人之道四焉者此之謂也右第十章上章言蓍數變化歸之于神此承上章推本于作易之聖人亦歸于神見蓍所謂神者乃聖人之神也子曰夫易何為者也夫易開物成務冒天下之道如斯而已者也是故聖人以通天下之志以定天下之業以斷天下之疑本義謂此章專言卜筮愚按承上文筮占説來前章言蓍而未及卦此則合蓍與卦而言首四句贊易當兼蓍卦説下三句言聖人因卦以用蓍如斯而已不是言易道僅止于此言必如此方才休歇也天下之物蒙昧未明易示以吉凶之報如夢頓覺故曰開天下之務有始者未必有終易斟酌從違之宜趨吉避凶首尾完足故曰成天下之道上自造化氣數下及人心謀慮千條萬緒自卦象一設都牧拾在裏面不須逐項分晰自然纎悉無遺故曰冒下三個以字要重有易能開物聖人用蓍以通天下之志易能成務聖人用蓍以定天下之業易冒天下之道聖人用蓍以斷天下之疑通章連稱是故是以無所承接總以開物成務冒道為綱領而贊易卦之用耳是故蓍之德圓而神卦之德方以知六爻之義易以貢聖人以此洗心退藏于密吉凶與民同患神以知來知以藏往其孰能與于此哉古之聰明睿知神武而不殺者夫朱子謂此言聖人作易之本胡雲峯曰此以蓍卦爻之理而言愚竊謂此言用易非作易也亦不必添出理字蓍用于卦未定之前惟變所適運而不窮故曰圓圓則不可測故曰神卦成于蓍已定之後各有其體止而有分故曰方方則可率而揆故曰知六爻具于每卦之內具義本非奇險故曰易易則明以告人故曰貢蓍卦言德爻獨言義者義德之制也聖人以此蓍卦之德洗濯其心其未捰蓍也退藏于密鬼神莫窺其際即蓍卦之寂然不動也及其揲蓍也趨吉避凶物同歸一體即蓍卦之感而遂通也如此則聖人之神同于蓍德未來之吉凶已兆于布策之先聖人之知同于卦德既往之得失俱藏于卦爻之中聖人與蓍卦直無分彼此矣非聖人其孰能與于此哉神武不殺本義謂得其理而不假其物薛敬軒謂不假卜筮而知吉凶愚竊謂蓍卦乃聖人所設聖人即聽命于蓍卦所以聖心本神本知却不自用而用蓍卦之神知與古之聰明睿知神武而不殺者相似也是以明于天之道而察于民之故是興神物以前民用聖人以此齊戒以神明其德夫愚按此節言聖人之用蓍承上文説來聖人之神知與蓍卦同故能明天道以察民故故猶事也明之察之非用蓍不可神物指蓍言生蓍者天地也用蓍者人也有蓍而不能用則蓍廢矣聖人始興而用之前民猶云先導以身先之使民咸用也齋戒與上洗心相應湛然純一之謂齋肅然警惕之謂戒聖人于蓍敬而信之又不敢褻用故用之而其德乃著然則蓍德之圓而神由聖人之神而明之也是故闔户謂之坤闢户謂之乾一闔一闢謂之變往來不窮謂之通見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用之謂之神先儒于此節有主揲蓍言者有主立卦生爻言者有主譬喻言者今並存之胡雲峯曰此章本義以為專言卜筮若從卜筮説闔户謂之坤者四十九策之合也闢户謂之乾者四十九策之分也一合一分是謂蓍之變分合進退之中有往來不窮之妙是謂蓍之通見而為七八九六之數謂之象形而為剛柔之爻謂之器此乃聖人制為卜筮以教人是為揲蓍之法民一出一入咸用之以為利則為用蓍之神此立卦生爻揲蓍之説也余息齋曰聖人偶有觸于一物而發明乾坤之妙知户之説則知乾坤之説矣余德新曰一户也闔即為坤闢即為乾且闔且闢為變可往可來為通户之可見為象户之有形為器制而用之則曰法千萬世由之而不知則曰神觀天地則圖書與得諸此户無異也瞿塘來氏亦將户字直貫到末謂百姓見易之神明以為深逺難知故夫子取户以譬之而易理已在目前矣此又一解也是故易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業吳因之曰前後俱言卜筮中間突然提起畫卦之事者蓋卜筮全憑卦畫惟八卦中原有預定之吉凶所以能形見于揲蓍求卦之際愚竊據其説而解之上言聖人用蓍此節歸重在聖人畫卦非蓍則卦不行非卦則蓍不立卦乃蓍之體易有太極非易外有太極也乾坤未列無象可見故謂之太極邵子所謂畫前有易是已自其含蓄而言曰有自其根抵而言曰生太極靜而生隂動而生陽伏羲畫卦時初作一奇一偶以象隂陽于奇上再加一奇一偶于偶上再加一奇一偶兩儀四象天造地設不假安排而八卦生焉八卦便相上下而為六十四卦皆遞升而倍之程子所云加一倍法朱子所云作易自然之次第是已凡繫傳所稱八卦即六十四卦也定吉凶通天下之志也生大業成天下之務也此一節總是説設卦為揲蓍之本先儒或指卜筮者兩儀即第一揲分而為二以象兩也再揲而有四象三揲而有八卦所謂四象者即六七八九愚竊謂揲蓍法第九章已詳言之矣此處言畫卦而揲蓍之序亦在其中則可専以揲蓍言則不可又按無極之説先儒聚訟紛然只為通書多了無極而太極一句此夫子所不言者也老少之説從布蓍起謂老變而少不變也在畫卦之初安所見其變不變而謂之老少哉只從父母六子之説為是此夫子所己言者也是故法象莫大乎天地變通莫大乎四時縣象著明莫大乎日月崇髙莫大乎富貴備物制用立荀悅漢書引易立字下有象字成器以為天下利莫大乎聖人探賾索隱鉤深致逺以定天下之吉凶成天下之亹亹者莫大乎蓍龜縣音義與懸同本義疑立字下有缺文亹亹猶勉勉也楊誠齋謂六者皆聖人之大業來矣鮮曰上文闔户一節以易之理比諸一物之小者此以天地之大者言之小而同諸一物之小大而同諸天地功用之大此易所以昌天下之道也徐進齋曰上三言以易之在造化者説下三言以易之在人事者説胡雲峯曰六者之功用皆大也聖人欲借彼之大以形容蓍龜功用之大故以是終焉蘇氏易傳曰天地四時日月天事也天事所不及富貴者制之富貴所不制聖人通之聖人所未通蓍龜決之愚按此節要歸重在聖人及蓍龜上蓍龜是前民用事離不得聖人定吉凶成亹亹處離不得備物制用又按龜為卜䇿為筮前言以卜筮者尚其占故此亦兼言蓍龜其實易所用在蓍不在龜也是故天生神物聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圖洛出書聖人則之此節承上蓍龜來神物兼蓍龜説末句圖屬蓍書屬龜今專就河圖作解朱子謂此四者聖人作易所由也胡庭芳曰神物作蓍則之而四十九之用以行變化謂隂陽效之而卦爻之動靜以備象謂日月星辰循度失度而吉凶見象之而卦爻有以斷吉凶圖書則金木水火土生成尅制之數則之而卦畫方位以定愚按注易之家自漢唐以下經數千年未有列河圖于易之前者朱子以河圖為作易之由故創此例今據繫傳考之竊謂河圖之數聖人乃因之以用蓍者也本義于第九章謂大衍之數以河圖中宫天五乘地十得之則朱子固以河圖為蓍數所從出矣至本節首云天生神物末云河出圖明明蓍先而圖後天生蓍以為易用河出圖列象以示蓍之用聖人則之者因圖象而立揲蓍之法耳所以下文言易有四象在易為隂陽老少在圖為七八九六聖人倚圖之中數用蓍衍之參伍錯綜以盡其變而卦爻與圖遂相為用而不廢若論圖象五十居中一二三四為位六七八九為數止有四象何嘗有八卦似難指為作易之由果若河圖為作易之由夫子何不云觀河圖而畫卦而曰仰以觀于天文俯以察于地理近取諸身逺取諸物于是始畫八卦乎夫因圖畫卦其説出于緯書春秋緯云河圖龍發禮緯含文嘉云伏羲德合上下地應以河圖洛書則而象之乃作八卦朝公武讀書志曰緯書偽起哀平間光武既以讖立故篤信之鄭玄何休以之通經曹褒以之定禮自符堅之後其學始絶周子通書第云聖人之精畫卦以示無一語及河圖者程子云無河圖八卦亦須畫歐陽永叔深以龍馬為不經陸象山謂河圖屬象非作易之旨袁樞仲與朱子書亦疑河圖為後人偽作陸庸成曰此言蓍法生于河圖之數朱子獨信緯書之説所謂先天圖者與説卦傳第五章方位全不相同折四方之合以為乾坤坎離補四隅之空以為兑震巽艮此與納卦家以八卦納入洛書者何以别乎歸震川有言曰河出圖洛出書此大傅所有也通乾通坤天苞地符之文非大傅所有也以彼之名合此之迹雖自以為無所不通然有易則無圖可也餘詳河圖説中愚又按朱儒有據尚書顧命篇天球河圖在東序以闢龍馬負圖之説者謂天球玉也河圖與天球並列當亦玉之有文者爾其説似近之吳草廬乃謂河圖自一至十五點之在馬背者其旋毛之圖有若星象故謂之圖果如所言則自伏羲至周已閲數千年馬毛之脫落久矣尚堪與天球並列耶易有四象所以示也繫辭焉所以告也定之以吉凶所以斷也伏羲畫卦由四象而生八卦此時但示人以意而已至文周始繫卦爻之辭以明告之而定其吉凶斷者斷天下之疑也結句與首節相應張彥陵曰此章説者紛紛多因本義專言卜筮一句把闔户一節謂詳蓍龜始末太極一節為卜爻立蓍龜之體法象一節為蓍龜達卦爻之用天生神物一節為蓍龜之生原于造化易有四象一節為蓍龜之用利于天下又有以闔户一節為蓍龜興圖而立卦生爻者又有以法象一節天地為兩儀日月四時為四象八卦定吉凶成亹亹為吉凶大業者牽強穿鑿多是欲歸重蓍龜上去看來未然大抵此章合蓍卦而言之贊蓍龜之大正是贊卦爻之大也故章末畢竟把卦爻結局章中三大段一段贊蓍一段贊卦首末贊聖人言卦言爻言象多是發上章言蓍之所未備右第十一章黃氏日抄云此章言易之用愚又謂此章因卜筮之功用推原畫卦之由易曰自天祐之吉無不利子曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉無不利也本義云釋大有上九爻辭義然在此處無所屬恐是錯簡宜在第八章之末先儒或云此節當連前章第二章言繫辭焉而明吉凶結以自天祐之吉無不利此言八卦定吉凶亦結以自天祐之吉無不利論事之勢變吉一而凶三論事之極頭則無凶而有吉故曰幾者動之微吉之先見者也子曰書不盡言言不盡意然則聖人之意其不可見乎子曰聖人立象以盡意設卦以盡情偽繫辭焉以盡其言變而通之以盡利鼓之舞之以盡神本義兩子曰字疑衍其一愚竊謂兩個子曰上似問下似答乃夫子自為問答之辭易學曰上章言聖人以神明作易此章教學者以神明讀易也愚又謂以上數章詳言易書中圖數辭占象變蓍卦之妙至此將一言字包括之謂易書之意非言所能盡然則聖人二句振起下文五句聖人非不欲正言也言大則遺小言費則遺隱凡言所不能盡者惟象為能盡之故立乾坤二畫之象以盡其意而盡情偽盡言盡變盡神都從立象中出接連五個盡字見聖人于易之精微發泄無餘如此吳草廬曰有象有辭而無變通則易為凝滯之物不合于用于是作十八變之法卦爻之間隂陽彼此相通則其用愈廣而可以盡利矣以變得占以定吉凶則人知趨避而行事不倦如以鼓聲作舞容自然而然所謂神也立象卦象也繫辭辭也變通變也鼓舞占也愚竊謂此節重在聖人立象以盡意一句聖人之意不盡于言而盡于立象此聖人妙于以象為言也因而設卦因而繫辭言未嘗不盡但所言者象也象之所以然者不言也雖不言而卦之變通以盡利辭之鼓舞以盡神凡聖人所欲言者又未嘗不盡乎此是則立象果足以盡聖人之意也乾坤其易之緼邪乾坤成列而易立乎其中矣乾坤毁則無以見易易不可見則乾坤或幾乎息矣本義于上文立象只主奇偶二畫言後儒乃有概指六十四卦陽奇隂偶者愚竊按此節乾坤二字亦是就奇偶二畫説承上文而言象足以盡意而立象自乾坤二畫始然則乾坤其易之緼邪緼含蓄也二畫中含六十四卦自一隂一陽成列則易立乎中而可見若有隂無陽或有陽無隂而乾坤不成列則易不可見立者附著之義毁者奇偶不成列也乾坤豈有成毁哉本義曰乾坤毁謂卦畫不立乾坤息則變化不行楊誠齋曰乾坤二畫乃六十四卦之奧府三百六十四爻之寶藏毁立二字言乾坤與易不可相無也是故形而上者謂之道形而下者謂之器化而裁之謂之變推而行之謂之通舉而措之天下之民謂之事業黃氏日抄云此言聖人用易致治愚竊謂此夫子之妙于言象也分道與器象在其中矣自道而象象而形形而器惟器有形惟道無形形而上謂之道形而下謂之器擬議于上下之間者象也言之所不能盡者形上之事也設卦繫辭以盡其言形下之事也有象則道不墮于無器不滯于有二句中隱然有象字在化是以漸而移變是全體改换聖人化而裁之則名體各殊故謂之變推字有二義一者因其自然一者漸次不迫循是以行則理無有礙勢無所阻故謂之通以此變通之道舉而措之天下則何事不成何業不立哉張彥陵曰乾坤二節結上文立象盡意之案説者泥變通盡利句在蓍䇿上説遂把乾坤做二卦看而以易立乎其中作蓍策變化化裁推行亦多從蓍策上説不知本章以立象為主象不足然後卦卦不足然後辭與蓍揲全無干涉是故夫象聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻本義云重出以起下文顏質卿曰聖人作易之始惟立象耳象立而意斯盡故得意而後得象得象而後得爻愚按此處加是故夫象四字接上文申言象之所由立與前篇不同乃是要人體認立象盡意處上言立象可以盡意似無待于卦爻然天下之人觀象而得意者少不得不藉卦爻相闡發此正申言文周所以盡言之故人當由辭以得其意耳極天下之賾者存乎卦鼓天下之動者存乎辭本義卦即象也辭即爻也胡雲峯曰窮天地萬物之象而歸諸卦故曰極發天地萬物之理而見乎辭故曰鼓愚又謂卦從極賾而來故極賾者存乎卦辭從鼓動而來故鼓動者存乎辭化而裁之存乎變推而行之存乎通神而明之存乎其人默而成之不言而信存乎德行本義卦爻所以變通者在人人之所以能神而明之者在德愚又謂前云謂之變通此云存乎變通前之化裁推行作易也此之化裁推行用易也六存字一層深一層存乎卦存乎辭者實指卦與辭之功用也存乎變存乎通則用易之變通而不徒聽夫易之變通也存乎人存乎德行則用易之本領而卦辭變通之所由以神明者所謂待其人而後行也張待軒曰神明謂明不在見解默成謂成不在知識不言而信不待抱蓍問易而信其理之不誣胡雲峯曰自形而至事業由至微推出至著自極天下之賾至德行由至著收歸至微上繫凡十二章末乃曰書不盡言言不盡意蓋欲學易者自得于書言之外也自立象盡意至存乎辭易之書言可謂盡矣末乃曰默而成之不言而信存乎德行然則易果言之所能盡哉得于心為德履于行為行易之存乎人者蓋有存乎身心而不徒存乎書言者矣右第十二章此章言聖人作易之事其散在六十四卦之爻象其聚在乾坤之二卦聖人用易之道其散在天下之事業其聚在一身之德行周易玩辭集解卷九
